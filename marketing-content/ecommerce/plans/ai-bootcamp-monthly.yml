# Plan Definition
# ================
# A plan describes a specific pricing option attached to one or more products.
#
# plan_id:        Unique identifier for this plan (slug-style, lowercase, hyphens)
# name:           Display name shown on pricing cards
# price:          Numeric price (use 0 for free tiers)
# currency:       ISO 4217 code — overrides ecommerce/settings.yml default when set
# billing_period: one of: monthly | annual | one_time
# highlighted:    When true this plan is visually emphasized (e.g. "Most Popular" badge)
# badge:          Optional short label shown on the card (e.g. "Most Popular")
# trial_days:     Optional free-trial days before billing starts
# features:       List of feature strings displayed on the pricing card

plan_id: ai-bootcamp-monthly
name: Monthly Access
price: 149
currency: USD
billing_period: monthly
highlighted: false
features:
  - Full access to all AI curriculum modules
  - Weekly live Q&A sessions with instructors
  - Career coaching (2 sessions/month)
  - Community forum & peer study groups
  - Certificate of completion
