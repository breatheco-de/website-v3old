# E-Commerce Global Settings
# ============================
# Controls default currency and locale behavior for all products and plans.
#
# currency:
#   The ISO 4217 currency code used as the default when a plan does not
#   specify its own currency. Example: USD, EUR, GBP
#
# locale:
#   The default locale (BCP 47) for formatting prices. Example: en-US, es-ES
#
# tax_inclusive:
#   Whether displayed prices already include taxes (true) or are pre-tax (false).

currency: USD
locale: en-US
tax_inclusive: false
