# E-Commerce Global Settings
# ============================
# Controls default currency, locale, and tax behavior for all products.
# Plans are defined here as a keyed map and referenced by plan ID in
# per-entry _ecommerce.yml files.
#
# currency:
#   The ISO 4217 currency code used when a plan does not specify its own.
#
# locale:
#   The default locale (BCP 47) for formatting prices. Example: en-US, es-ES
#
# tax_inclusive:
#   Whether displayed prices already include taxes (true) or are pre-tax (false).
#
# plans:
#   Keyed map of plan definitions. Each key is the plan_id.
#   Fields per plan:
#     name:           Display name shown on pricing cards
#     price:          Numeric price (use 0 for free tiers)
#     currency:       ISO 4217 code — overrides global currency when set
#     billing_period: monthly | annual | one_time
#     highlighted:    When true this plan is visually emphasized
#     badge:          Optional short label shown on the card
#     trial_days:     Optional free-trial days before billing starts
#     features:       List of feature strings displayed on the pricing card

currency: USD
locale: en-US
tax_inclusive: false

plans:
  ai-bootcamp-monthly:
    name: Monthly Access
    price: 149
    currency: USD
    billing_period: monthly
    highlighted: false
    features:
      - Full access to all AI curriculum modules
      - Weekly live Q&A sessions with instructors
      - Career coaching (2 sessions/month)
      - Community forum & peer study groups
      - Certificate of completion

  ai-bootcamp-annual:
    name: Annual Access
    price: 1199
    currency: USD
    billing_period: annual
    highlighted: true
    badge: Best Value
    features:
      - Everything in Monthly Access
      - Save 33% vs monthly billing
      - Unlimited career coaching sessions
      - Priority instructor support
      - Access to all future curriculum updates
      - Alumni network lifetime access
