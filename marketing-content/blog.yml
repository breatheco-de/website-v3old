# Blog Configuration
#
# The blog system sources its data from a named database (managed via the
# generic Database system at marketing-content/db/).
#
# ─── Fields ─────────────────────────────────────────────────────
#
# database:       Name of the database folder under marketing-content/db/
# url_pattern:    URL pattern per locale, with :slug, :category, :locale placeholders
# categories:     Default category slug per locale
# field_mapping:  Maps database item fields → blog post properties
#                 Standard blog fields: title, slug, description, image, author,
#                 published_at, updated_at, status, category, tags, lang,
#                 content, content_url
# ───────────────────────────────────────────────────────────────

database: blog_posts
url_pattern:
  en: /en/blog/:category/:slug
  es: /es/blog/:category/:slug
categories:
  en: blog-us
  es: blog-es
field_mapping:
  title: title
  slug: slug
  description: description
  image: preview
  author: null
  published_at: published_at
  updated_at: updated_at
  status: status
  category: cluster.slug
  tags: technologies
  lang: lang
  content: readme.decoded
  content_url: readme_url
