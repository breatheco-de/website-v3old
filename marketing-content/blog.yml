api:
  endpoint: https://breathecode.herokuapp.com/v1/registry/academy/asset
  params:
    limit: 500
    offset: 0
    category: blog-es,blog-us
    status: published
    visibility: public
  token_env_var: BREATHECODE_TOKEN
  academy_header: "4"

cache:
  ttl_hours: 24
  file_path: .cache/blog-posts.json

url_pattern:
  en: /en/blog/:slug
  es: /es/blog/:slug

categories:
  en: blog-us
  es: blog-es
