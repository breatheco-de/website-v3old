i18n:
  default_locale: en
  supported_locales:
    - code: en
      label: English
    - code: es
      label: Spanish
optimization:
  tagmanager:
    sgtm_enabled: true
    sgtm_server_url: https://metrics.4geeksacademy.com
    sgtm_proxy_path: /sgtm/
page_intents:
  - id: content_seo
    what_for: 'Educational, long-form content designed to rank on Google. Examples: guides, how-to articles, pillar pages.'
  - id: product_service
    what_for: 'Showcases what you sell or offer. Examples: product pages, feature pages, pricing pages.'
  - id: lead_generation
    what_for: 'Tries to capture email or contact info. Examples: landing pages, webinars, free downloads.'
  - id: sales_conversion
    what_for: 'Pushes for purchase or sign-up. Examples: checkout pages, sales pages, order forms.'
  - id: brand_corporate
    what_for: 'About the company and trust building. Examples: about us, homepage, press, careers.'
  - id: outcome
    what_for: 'Demonstrates results and impact. Examples: outcome reports, case studies, success stories.'
  - id: research_awareness
    what_for: 'Introduces a brand or problem to attract new cold traffic. Examples: viral content, infographics, awareness blogs.'
feature_tags:
  - enrollment
  - pricing
  - curriculum
  - career-services
  - campus-life
  - admissions
  - financial-aid
  - student-support
tracking:
  # Webhook priority chain (highest to lowest):
  #   1. form.webhook      — set on the individual lead_form/apply_form YAML section
  #   2. conversion_events[].webhook — per-event default for a specific conversion name
  #   3. tracking.webhook  — global fallback for any conversion with no more-specific config
  # All webhook blocks accept: url (required) and method (POST | GET, default POST)
  # webhook:
  #   url: https://hooks.zapier.com/hooks/catch/xxxxx/yyyyy/
  #   method: POST
  conversion_events:
    - name: student_application
      description: Form submission
      # webhook:
      #   url: https://example.com/webhook
      #   method: POST
    - name: request_more_info
      description: Form submission
    - name: financing_guide_download
      description: Form submission
    - name: partner_application
      description: Form submission
    - name: job_application
      description: Form submission
    - name: newsletter_signup
      description: Form submission
    - name: contact_us
      description: Form submission
    - name: outcomes_report
      description: Form submission
