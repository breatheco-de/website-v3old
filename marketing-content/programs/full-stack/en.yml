  - type: syllabus
    section_id: syllabus-l0x9pc
    variant: program-modules
    program_title: Full Stack with AI Program Overview
    program_description: Build production-ready web applications with AI from the ground up — frontend, backend, APIs, databases, and AI-powered features. Six modules that take you from your first webpage to a complete, deployable full stack application.
    tech_logos:
      - name: HTML5
        icon: html
      - name: CSS3
        icon: css
      - name: JavaScript
        icon: javascript
      - name: React
        icon: react
      - name: Python
        icon: python
      - name: Git
        icon: git
    module_cards:
      - title: Introduction To HTML And CSS
        duration: Weeks 1-2
        objectives:
          - Create web structures with semantic HTML
          - Style pages with modern CSS techniques
          - Build visually appealing and accessible websites
        projects: Build your first web pages with HTML and CSS — learning to structure content, style layouts, and create interfaces that work across devices.
        orientation: vertical
        icon: IconCode
      - title: JavaScript
        duration: Weeks 3-5
        objectives:
          - Master variables, functions, and loops
          - DOM manipulation for interactive pages
          - Modern ES6+ features and async programming
        projects: Learn JavaScript from the ground up and use it to build interactive, dynamic web experiences — the language behind almost everything that moves on the web.
        orientation: vertical
        icon: IconBrandJavascript
      - title: React
        duration: Weeks 6-9
        objectives:
          - Build component-based user interfaces
          - State management with hooks
          - Routing and best practices for scalable apps
        projects: Build component-based user interfaces with React, the library behind some of the most widely used web applications in the world.
        orientation: vertical
        icon: IconBrandReact
      - title: Python
        duration: Weeks 10-12
        objectives:
          - Core programming concepts and data structures
          - Object-oriented programming principles
          - Web development and automation skills
        projects: Learn Python for backend development — writing clean, readable code that powers the server-side logic of your applications.
        orientation: vertical
        icon: IconBrandPython
      - title: Creating APIs
        duration: Weeks 13-15
        objectives:
          - Design and build RESTful APIs
          - Authentication and database integration
          - API documentation and best practices
        projects: Design and build RESTful APIs that connect your frontend to your backend — the skill that ties every part of a full stack application together.
        orientation: vertical
        icon: IconApi
      - title: Agile Methodologies
        duration: Week 16
        objectives:
          - Scrum, Kanban, and agile frameworks
          - Sprint planning and daily standups
          - Effective collaboration in dev teams
        projects: Learn how real development teams work — practicing Scrum, Kanban, and agile workflows firsthand on group projects.
        orientation: vertical
        icon: IconUsers
  - type: projects
    section_id: projects-t6l1tn
    title: Learn by Building Real Projects
    subtitle: Every module ends with a hands-on project — real applications that go straight into your portfolio.
    items:
