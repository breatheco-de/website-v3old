  - type: syllabus
    variant: program-modules
    program_title: IA Aplicada para Profesionales
    program_description: En solo 6 semanas, aprende a aprovechar las principales herramientas de IA actuales para optimizar tu flujo de trabajo, mejorar la calidad de tu trabajo y mantenerte adelante en tu carrera. Este programa se enfoca en habilidades prácticas de IA usando herramientas como ChatGPT, Gemini, Claude y modelos modernos de generación de imágenes aplicados directamente a tareas profesionales del mundo real.
    tech_logos:
      - name: ChatGPT
        icon: openai
      - name: Gemini
        icon: google
      - name: Claude
        icon: anthropic
      - name: Midjourney
        icon: sparkles
      - name: Stable Diffusion
        icon: cpu
    module_cards:
      - title: Introducción a la IA
        duration: Semana 1
        objectives:
          - Comprender cómo funcionan los sistemas modernos de IA
          - Panorama de los modelos de IA generativa
          - Conceptos clave detrás de los LLMs y asistentes de IA
          - Uso responsable y efectivo de la IA
        projects: Aplica herramientas de IA a flujos de trabajo profesionales simples.
        orientation: vertical
        icon: IconRobot
      - title: IA para la Productividad
        duration: Semana 2
        objectives:
          - Usar IA para automatizar tareas laborales cotidianas
          - Aceleración de investigación con asistentes de IA
          - Resumen y procesamiento de información
          - Flujos de trabajo de IA para la productividad
        projects: Construye flujos de trabajo asistidos por IA para tareas profesionales diarias.
        orientation: vertical
        icon: IconBolt
      - title: Generación de Texto y Comunicación
        duration: Semana 3
        objectives:
          - Fundamentos de ingeniería de prompts
          - Redacción, edición y resumen con IA
          - IA para informes, correos, documentación y marketing
          - Estructurar prompts para mejores resultados
        projects: Crea contenido profesional usando herramientas de IA generativa.
        orientation: vertical
        icon: IconFileText
      - title: Generación de Imágenes e IA Visual
        duration: Semanas 4–5
        objectives:
          - Comprensión de los modelos de generación de imágenes
          - Herramientas como Stable Diffusion, DALL-E y Midjourney
          - Ingeniería de prompts para generación de imágenes
          - Uso de visuales de IA en contextos profesionales
        projects: Diseña y optimiza prompts para generar imágenes para casos de uso reales.
        orientation: vertical
        icon: IconPhoto
      - title: Herramientas de IA y el Futuro del Trabajo
        duration: Semana 6
        objectives:
          - Panorama de los ecosistemas modernos de IA
          - Evaluación de nuevas herramientas y capacidades de IA
          - Comprensión de la adopción de IA en distintos sectores
          - Integración de la IA en flujos de trabajo a largo plazo
        projects: Desarrolla una estrategia de IA para tu rol u organización.
        orientation: horizontal
        icon: IconSparkles
    section_id: syllabus-9j2a7p
    marginY:
      desktop: md none
    paddingY:
      desktop: md
