  - type: faq
    title: Preguntas Frecuentes
    hardcoded_entries:
      - question: ¿Qué requisitos previos necesito para el curso de IA Aplicada?
        answer: No se requieren conocimientos previos de programación. Nuestro programa comienza con conceptos fundamentales y progresa hacia el uso avanzado de herramientas de IA. Si eres nuevo en el mundo digital, contamos con materiales preparatorios para ayudarte a comenzar.
        locations:
          - all
        related_features: []
        priority: 0
      - question: ¿Cuánto tiempo dura el programa?
        answer: El programa de IA Aplicada para Profesionales está diseñado para completarse en 6 semanas. Al ser un programa con ritmo guiado, puedes adaptarlo a tu horario con el apoyo de tus mentores.
        locations:
          - all
        related_features: []
        priority: 0
      - question: ¿Qué tipo de proyectos voy a desarrollar?
        answer: Aplicarás herramientas de IA a flujos de trabajo profesionales reales, crearás contenido usando IA generativa, generarás imágenes para casos de uso concretos y desarrollarás una estrategia de IA para tu rol u organización.
        locations:
          - all
        related_features: []
        priority: 0
      - question: ¿Necesito hardware costoso para el curso?
        answer: ¡No! Todos los ejercicios y proyectos se ejecutan en la nube. Solo necesitas una laptop y conexión a internet para aprender con las principales herramientas de IA.
        locations:
          - all
        related_features: []
        priority: 0
      - question: ¿El certificado es reconocido por los empleadores?
        answer: ¡Sí! Nuestro certificado es reconocido por empleadores a nivel mundial. Estamos acreditados por el Departamento de Educación de Florida y hemos sido destacados por Forbes, Newsweek y Course Report como uno de los mejores bootcamps de programación.
        locations:
          - all
        related_features: []
        priority: 0
