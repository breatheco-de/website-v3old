  - type: syllabus
    variant: program-modules
    program_title: Applied AI for Professionals
    program_description: In just 6 weeks, learn how to leverage today’s leading AI tools to optimize your workflow, improve output quality, and stay ahead in your career. This program focuses on practical AI skills using tools like ChatGPT, Gemini, Claude, and modern image generation models applied directly to real-world professional tasks.
    tech_logos:
      - name: ChatGPT
        icon: openai
      - name: Gemini
        icon: google
      - name: Claude
        icon: anthropic
      - name: Midjourney
        icon: sparkles
      - name: Stable Diffusion
        icon: cpu
    module_cards:
      - title: Introduction to AI
        duration: Week 1
        objectives:
          - Understanding how modern AI systems work
          - Overview of generative AI models
          - Key concepts behind LLMs and AI assistants
          - Responsible and effective AI usage
        projects: Apply AI tools to simple professional workflows.
        orientation: vertical
        icon: IconRobot
      - title: AI for Productivity
        duration: Week 2
        objectives:
          - Using AI to automate everyday work tasks
          - Research acceleration with AI assistants
          - Summarization and information processing
          - AI workflows for productivity
        projects: Build AI-assisted workflows for daily professional tasks.
        orientation: vertical
        icon: IconBolt
      - title: Text Generation & Communication
        duration: Week 3
        objectives:
          - Prompt engineering fundamentals
          - Writing, editing, and summarizing with AI
          - AI for reports, emails, documentation, and marketing
          - Structuring prompts for better outputs
        projects: Create professional content using generative AI tools.
        orientation: vertical
        icon: IconFileText
      - title: Image Generation & Visual AI
        duration: Weeks 4–5
        objectives:
          - Understanding image generation models
          - Tools like Stable Diffusion, DALL-E, and Midjourney
          - Prompt engineering for image generation
          - Using AI visuals in professional contexts
        projects: Design and optimize prompts to generate images for real use cases.
        orientation: vertical
        icon: IconPhoto
      - title: AI Tools & Future of Work
        duration: Week 6
        objectives:
          - Overview of modern AI ecosystems
          - Evaluating new AI tools and capabilities
          - Understanding AI adoption across industries
          - Integrating AI into long-term workflows
        projects: Develop an AI strategy for your role or organization.
        orientation: horizontal
        icon: IconSparkles
