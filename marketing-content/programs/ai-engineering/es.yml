  - type: syllabus
    section_id: syllabus-voteq8
    variant: program-modules
    program_title: Plan de estudios en Ingeniería de IA
    program_description: "Aprende aplicando nuestra Metodología de Caso de Empresa: desarrolla un sistema completo de IA a lo largo de 10 hitos, desde el planteamiento inicial hasta su despliegue en producción. En 24 semanas, construye una solución funcional que refleja los estándares y flujos de trabajo de equipos de ingeniería modernos."
    tech_logos:
      - name: React
        icon: react
      - name: Python
        icon: python
      - name: OpenAI
        icon: openai
      - name: n8n
        icon: n8n
      - name: Git
        icon: git
    module_cards:
      - title: Prework IA-First
        duration: Hito 0
        objectives:
          - Git, fundamentos de JavaScript
          - Fundamentos de internet
          - Agentes de código
          - Cómo comunicarse con IA (Markdown/YAML/JSON)
        projects: Comprender los fundamentos de IA e internet.
        orientation: vertical
        icon: IconCode
      - title: Fundamentos Web
        duration: Hito 1
        objectives:
          - HTML, CSS, Tailwind
          - Accesibilidad
          - Layouts
          - SEO/GEO
        projects: Construir la primera página web de la empresa.
        orientation: vertical
        icon: IconCode
      - title: Fundamentos de Programación
        duration: Hito 2
        objectives:
          - Algoritmos
          - Stateflow vs controlflow
          - Dominio de JS tipado
        projects: Implementar pequeñas funcionalidades para la empresa.
        orientation: vertical
        icon: IconServer
      - title: Ingeniería de UI con IA
        duration: Hito 3
        objectives:
          - Prompting de Visión a Especificación
          - Generación de componentes
        projects: Reconstruir la UI de la empresa usando IA.
        orientation: vertical
        icon: IconChartBar
      - title: Fundamentos de Next.js (React)
        duration: Hito 4
        objectives:
          - Arquitectura SPA
          - Arquitectura multi-página
          - Props/estado/efectos
          - Depuración
        projects: Construir el frontend interactivo de la empresa.
        orientation: vertical
        icon: IconDatabase
      - title: Backend para Frontends de IA
        duration: Hito 5
        objectives:
          - APIs
          - Fundamentos de BD
          - Serialización, autenticación
          - Funciones serverless
        projects: Crear el backend de la empresa.
        orientation: vertical
        icon: IconRobot
      - title: Telemetría y Pipelines de Datos
        duration: Hito 6
        objectives:
          - Recopilar
          - Transformar
          - Agregar
          - Reportar.
        projects: Construir la telemetría para la empresa.
        orientation: vertical
        icon: IconLayoutKanban
      - title: RAG y Memoria
        duration: Hito 7
        objectives:
          - Fragmentación de datos
          - Embeddings
          - Búsqueda vectorial
        projects: Agregar la capa de conocimiento de la empresa.
        orientation: vertical
        icon: IconBolt
      - title: Ingeniería de Agentes
        duration: Hito 8
        objectives:
          - Reglas
          - Bancos de memoria
          - Llamadas a herramientas
          - Planificación multi-agente.
        projects: Construir los agentes de la empresa.
        orientation: vertical
        icon: IconCode
      - title: Generación de Flujos de Trabajo Agénticos
        duration: Hito 9
        objectives:
          - Analizar el caso de empresa con LLMs
          - Generar y validar flujos de trabajo internos
          - Implementar pipelines de automatización (serverless, colas, cronjobs, n8n)
        projects: Construir los flujos de trabajo agénticos de la empresa.
        orientation: vertical
        icon: IconCode
      - title: Sistemas en Tiempo Real
        duration: Hito 10
        objectives:
          - Streaming de sistemas en tiempo real
          - Sockets
          - Pub/sub
        projects: Habilitar interacciones en tiempo real para datos, clientes, empleados e IA.
        orientation: vertical
        icon: IconCode
      - title: Empresa Completamente Transformada por IA
        duration: Proyecto Final
        objectives:
          - Frontend generado por IA, API + autenticación
          - Pipeline de telemetría + reportes
          - Automatización de flujos de trabajo
          - Capa de conocimiento RAG
          - Capa de comunicación en tiempo real
          - Agentes con llamadas a herramientas
        projects: Tu sistema de negocio AI-first completamente operativo desplegado de extremo a extremo.
        orientation: horizontal
        icon: IconCode
    marginY:
      desktop: md none
    paddingY:
      desktop: md
