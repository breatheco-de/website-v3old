          - label: Configurar asistentes de IA para mis herramientas actuales
            value: 1
            action:
              next_question: 4
          - label: Construir automatizaciones que funcionen sin mí
            value: 2
            action:
              next_question: 4
          - label: Escribir código o construir software con IA
            value: 5
            action:
              next_question: 4
          - label: Analizar datos y tomar decisiones más inteligentes
            value: 7
            action:
              next_question: 4
