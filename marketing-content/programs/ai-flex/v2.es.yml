          - label: Sin experiencia — pero estoy abierto a lo básico
            value: 2
            action:
              next_question: 3
          - label: Algo de bases (scripts, hojas de cálculo, HTML)
            value: 5
            action:
              next_question: 3
          - label: Programo con regularidad
            value: 8
            action:
              next_question: 3
      - text: ¿Qué habilidad marcaría la mayor diferencia en tu trabajo ahora mismo?
        options:
          - label: Obtener resultados fiables y de calidad profesional con herramientas de IA
            value: 0
            action:
