      - question: ¿Qué incluye una suscripción a AI Flex?
        answer: "Cada plan de AI Flex incluye acceso al catálogo completo de cursos vía LearnPack, Rigobot como tutor de IA integrado disponible en todos los módulos, 300 solicitudes premium de Copilot al mes, 300 compilaciones de IA, Codespaces (valor de $10/mes incluido), $5/mes en tokens LLM (DeepSeek 3.1, Claude Sonnet, Llama 3, Codex), una cuenta escolar con GitHub Developer Program, un VPS, acceso a eventos exclusivos de 4Geeks y un certificado por cada curso que completes. Cada plan también incluye al menos una sesión de mentoría al mes con un instructor experto. "
      - question: ¿Qué cursos incluye AI Flex y cómo elijo?
        answer: |
          El catálogo incluye más de 8 cursos: Prompt Engineering, Applied AI, No-Code and Automations, Vibe Coding with AI, OpenClaw, Backend Dev with Python, Deep Dive into Python y Data Science and ML. Si no estás seguro por dónde empezar, 4Geeks ofrece cuatro rutas prediseñadas según tus objetivos: El Profesional AI-First, El Career Switcher, El Analista Data-Driven y El Builder. Cada ruta combina 4 cursos elegidos para un resultado profesional específico.
      - question: ¿Hay fecha de inicio o horario para AI Flex?
        answer: |

          No hay cohortes, ni clases en vivo, ni horario fijo. Empiezas cuando quieras y aprendes totalmente a tu ritmo. También puedes cancelar tu suscripción en cualquier momento.
      - question: ¿Los certificados de AI Flex cuentan para el programa completo de AI Engineering?
        answer: |
          Sí. Los certificados obtenidos en AI Flex son los mismos que se otorgan en AI Fluency y el programa de AI Engineering. Son acumulables: si completas cursos en AI Flex y luego te inscribes en AI Engineering, recibes crédito por lo que ya completaste. AI Flex es una puerta de entrada real a la ruta de aprendizaje completa de 4Geeks, no un camino separado.
      - question: ¿Para quién está diseñado AI Flex?
        answer: " AI Flex funciona para profesionales de cualquier nivel técnico — desde trabajadores del conocimiento no técnicos que quieren automatizar su trabajo, hasta desarrolladores que quieren añadir habilidades de ingeniería de IA a su stack actual. El catálogo abarca desde automatizaciones no-code y prompt engineering hasta desarrollo backend con Python y data science. Tú eliges los cursos que encajan con dónde estás y hacia dónde quieres ir."
