      desktop: md
    background: hsl(var(--muted))
    item_overrides:
      how-long-does-the-program-take:
        hideOnLocations:
          - barcelona-spain
          - berlin-germany
          - dublin-ireland
          - hamburg-germany
          - lisbon-portugal
          - madrid-spain
          - malaga-spain
          - milan-italy
          - munich-germany
          - rome-italy
          - valencia-spain
    hardcoded_entries:
      - question: What is included in an AI Flex subscription?
        answer: "Every AI Flex plan includes access to the full course catalogue via LearnPack, Rigobot as your built-in AI tutor available throughout every module, 300 premium Copilot requests per month, 300 AI compilations, Codespaces ($10/month value included), $5/month in LLM tokens (DeepSeek 3.1, Claude Sonnet, Llama 3, Codex), a school account with the GitHub Developer Program, a VPS, access to exclusive 4Geeks events, and a certificate for every course you complete. Each plan also includes at least one mentorship session per month with an expert instructor. "
      - question: Which courses are included in AI Flex and how do I choose?
        answer: |
          The catalog includes +8 courses: Prompt Engineering, Applied AI, No-Code and Automations, Vibe Coding with AI, OpenClaw, Backend Dev with Python, Deep Dive into Python, and Data Science and ML. If you are not sure where to start, 4Geeks offers four ready-made paths based on your goals: The AI-First Professional, The Career Switcher, The Data-Driven Analyst, and The Builder. Each path combines 4 courses chosen for a specific professional outcome.
      - question: Is there a start date or schedule for AI Flex?
        answer: |

          There are no cohorts, no live classes, and no fixed schedule. You start anytime and learn entirely at your own pace. You can also  cancel your subscription anytime.
      - question: Do the certificates from AI Flex count toward the full AI Engineering program?
        answer: |
          Yes. Certificates earned in AI Flex are the same certificates awarded in AI Fluency and the AI Engineering program. They are stackable: if you complete courses in AI Flex and later enroll in AI Engineering, you receive credit for what you have already completed. AI Flex is a genuine entry point into the full 4Geeks learning path, not a separate track.
      - question: Who is AI Flex designed for?
        answer: " AI Flex works for professionals at any technical level — from non-technical knowledge workers who want to automate their work, to developers who want to add AI engineering skills to their existing stack. The course catalog spans from no-code automations and prompt engineering to backend development with Python and data science. You choose the courses that match where you are and where you want to go."
