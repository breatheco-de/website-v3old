  - type: syllabus
    section_id: syllabus-7efuv7
    variant: program-modules
    program_title: Panorama del programa de Ingeniería de IA
    program_description: Aprende construyendo y escalando una única empresa nativa en IA a lo largo de 10 hitos. Gradúate con una compañía operativa y potenciada por IA que refleja las habilidades y flujos de trabajo de los equipos de ingeniería actuales. Elige entre un calendario nocturno de 24 semanas y una modalidad matinal acelerada de 15 semanas.
    tech_logos:
      - name: React
        icon: react
      - name: Python
        icon: python
      - name: OpenAI
        icon: openai
      - name: n8n
        icon: n8n
      - name: Git
        icon: git
    module_cards:
      - title: Prework AI-first
        duration: Hito 0
        objectives:
          - Git, fundamentos de JavaScript
          - Fundamentos de internet
          - Agentes de código
          - Cómo comunicarte con la IA (Markdown/YAML/JSON)
        projects: Entender los fundamentos de la IA y de internet.
        orientation: vertical
        icon: IconCode
      - title: Fundamentos web
        duration: Hito 1
        objectives:
          - HTML, CSS, Tailwind
          - Accesibilidad
          - Maquetación
          - SEO/GEO
        projects: Crear la primera página web de la empresa.
        orientation: vertical
        icon: IconCode
      - title: Fundamentos de programación
        duration: Hito 2
        objectives:
          - Algoritmos
          - Flujo de estado vs control de flujo
          - Dominio de JS tipado
        projects: Implementar pequeñas funcionalidades para la empresa.
        orientation: vertical
        icon: IconServer
      - title: Ingeniería de UI impulsada por IA
        duration: Hito 3
        objectives:
          - Prompting de visión a especificación
          - Generación de componentes
        projects: Reconstruir la interfaz de la empresa usando IA.
        orientation: vertical
        icon: IconChartBar
      - title: Fundamentos de Next.js (React)
        duration: Hito 4
        objectives:
          - Arquitectura SPA
          - Arquitectura multipágina
          - Props, estado y efectos
          - Depuración
        projects: Construir el frontend interactivo de la empresa.
        orientation: vertical
        icon: IconDatabase
      - title: Backend para frontends de IA
        duration: Hito 5
        objectives:
          - APIs
          - Bases de datos básicas
          - Serialización y autenticación
          - Funciones serverless
        projects: Crear el backend de la empresa.
        orientation: vertical
        icon: IconRobot
      - title: Telemetría y pipelines de datos
        duration: Hito 6
        objectives:
          - Recopilar
          - Transformar
          - Agregar
          - Informar
        projects: Implementar telemetría para la empresa.
        orientation: vertical
        icon: IconLayoutKanban
      - title: RAG y memoria
        duration: Hito 7
        objectives:
          - Fragmentación de datos
          - Embeddings
          - Búsqueda vectorial
        projects: Añadir la capa de conocimiento de la empresa.
        orientation: vertical
        icon: IconBolt
      - title: Ingeniería de agentes
        duration: Hito 8
        objectives:
          - Reglas
          - Bancos de memoria
          - Llamadas a herramientas (tool calling)
          - Planificación multiagente
        projects: Construir los agentes de la empresa.
        orientation: vertical
        icon: IconCode
      - title: Generación de flujos de trabajo con agentes
        duration: Hito 9
        objectives:
          - Analizar el caso de la empresa con LLMs
          - Generar y validar flujos internos
          - Implementar pipelines de automatización (serverless, colas, cronjobs, n8n)
        projects: Crear los flujos de trabajo con agentes de la empresa.
        orientation: vertical
        icon: IconCode
      - title: Sistemas en tiempo real
        duration: Hito 10
        objectives:
          - Streaming en sistemas en tiempo real
          - Sockets
          - Pub/sub
        projects: Habilitar interacciones en tiempo real para datos, clientes, empleados e IA.
        orientation: vertical
        icon: IconCode
      - title: Empresa transformada por IA al completo
        duration: Proyecto final
        objectives:
          - Frontend generado con IA, API y autenticación
          - Pipeline de telemetría e informes
          - Automatización de flujos
          - Capa de conocimiento RAG
          - Capa de comunicación en tiempo real
          - Agentes con llamadas a herramientas
        projects: Tu sistema empresarial AI-first totalmente operativo, desplegado de extremo a extremo.
        orientation: horizontal
        icon: IconCode
