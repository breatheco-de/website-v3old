  - type: faq
    section_id: faq-rj0tg6
    title: Preguntas frecuentes
    items:
      - question: ¿Qué requisitos previos necesito para Ingeniería de IA?
        answer: Se recomienda conocimiento básico de programación, pero no es obligatorio. Nuestro programa comienza con conceptos fundamentales y avanza hasta ingeniería de IA avanzada. Si eres nuevo en programación, tenemos materiales preparatorios para ayudarte a comenzar.
        locations:
          - all
        related_features: []
        priority: 0
      - question: ¿Cuánto dura el programa?
        answer: El programa de Ingeniería de IA está diseñado para completarse en 24 semanas. El ritmo es flexible, así que puedes acelerar o dedicar más tiempo según tu horario y ritmo de aprendizaje.
        locations:
          - all
        related_features: []
        priority: 0
      - question: ¿Qué tipo de proyectos construiré?
        answer: Construirás aplicaciones de IA listas para producción incluyendo sistemas RAG, orquestadores multi-agente, aplicaciones de IA en tiempo real y un proyecto final completo. Todos los proyectos utilizan tecnologías y patrones del mundo real usados por empresas líderes.
        locations:
          - all
        related_features: []
        priority: 0
      - question: ¿Necesito hardware costoso para desarrollo de IA?
        answer: ¡No! Todos los ejercicios y proyectos se ejecutan en la nube. Proporcionamos acceso a entornos de desarrollo en la nube y APIs de IA, así que puedes aprender solo con un portátil y conexión a internet.
        locations:
          - all
        related_features: []
        priority: 0
      - question: ¿El certificado es reconocido por los empleadores?
        answer: ¡Sí! Nuestro certificado es reconocido por empleadores en todo el mundo. Estamos licenciados por el Departamento de Educación de Florida y hemos sido destacados por Forbes, Newsweek y Course Report como uno de los mejores bootcamps de código.
        locations:
          - all
        related_features: []
        priority: 0
