  - type: syllabus
    section_id: syllabus-7efuv7
    variant: program-modules
    program_title: AI Engineering Program Overview
    program_description: Learn by building and scaling a single AI-native business across 10 milestones. Graduate with a fully operational, AI-powered company that reflects the skills and workflows used by modern engineering teams. Choose between a 24-week evening schedule and a 15-week accelerated morning track.
    tech_logos:
      - name: React
        icon: react
      - name: Python
        icon: python
      - name: OpenAI
        icon: openai
      - name: n8n
        icon: n8n
      - name: Git
        icon: git
    module_cards:
      - title: AI‑First Prework
        duration: Milestone 0
        objectives:
          - Git, JavaScript basics
          - Internet fundamentals
          - Coding agents
          - How to communicate with AI (Markdown/YAML/JSON)
        projects: Understand AI and internet foundations.
        orientation: vertical
        icon: IconCode
      - title: Web Foundations
        duration: Milestone 1
        objectives:
          - HTML, CSS, Tailwind
          - Accessibility
          - Layouts
          - SEO/GEO
        projects: Build the company's first webpage.
        orientation: vertical
        icon: IconCode
      - title: Programming Foundations
        duration: Milestone 2
        objectives:
          - Algorithms
          - Stateflow vs controlflow
          - Typed JS mastery
        projects: Implement small features for the company.
        orientation: vertical
        icon: IconServer
      - title: AI‑Driven UI Engineering
        duration: Milestone 3
        objectives:
          - Vision‑to‑Spec prompting
          - Component generation
        projects: Rebuild the company's UI using AI.
        orientation: vertical
        icon: IconChartBar
      - title: Next.js Fundamentals (React)
        duration: Milestone 4
        objectives:
          - SPA architecture
          - Multi-page architecture
          - Props/state/effects
          - Debugging
        projects: Build the company's interactive frontend.
        orientation: vertical
        icon: IconDatabase
      - title: Backend for AI Frontends
        duration: Milestone 5
        objectives:
          - APIs
          - DB basics
          - Serialization, authentication
          - Serverless functions
        projects: Create the company’s backend.
        orientation: vertical
        icon: IconRobot
      - title: Telemetry & Data Pipelines
        duration: Milestone 6
        objectives:
          - Collect
          - Transform
          - Aggregate
          - Report.
        projects: Build telemetry for the company.
        orientation: vertical
        icon: IconLayoutKanban
      - title: RAG & Memory
        duration: Milestone 7
        objectives:
          - Data chunking
          - Embeddings
          - Vector search
        projects: Add the company’s knowledge layer.
        orientation: vertical
        icon: IconBolt
      - title: Agent Engineering
        duration: Milestone 8
        objectives:
          - Rules
          - Memory banks
          - Tool calling
          - Multi-agent planning.
        projects: Build the company’s agents.
        orientation: vertical
        icon: IconCode
      - title: Agentic Workflow Generation
        duration: Milestone 9
        objectives:
          - Analyze the company case with LLMs
          - Generate and validate internal workflows
          - Implement automation pipelines (serverless, queues, cronjobs, n8n)
        projects: Build the company's agentic workflows.
        orientation: vertical
        icon: IconCode
      - title: Real-Time Systems
        duration: Milestone 10
        objectives:
          - Real-time systems streaming
          - Sockets
          - Pub/sub
        projects: Enable real-time interactions for data, customers, employees and AI.
        orientation: vertical
        icon: IconCode
      - title: Fully AI‑Transformed Company
        duration: Capstone Project
        objectives:
          - AI-generated frontend, API + authentication
          - Telemetry + reporting pipeline
          - Workflow automation
          - RAG knowledge layer
          - Real-time communication layer
          - Agents with tool calling
        projects: Your fully operational AI-first business system deployed end‑to‑end.
        orientation: horizontal
        icon: IconCode
