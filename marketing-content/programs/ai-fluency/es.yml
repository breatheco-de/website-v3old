  - type: syllabus
    variant: program-modules
    program_title: Descripción del Programa AI Fluency
    program_description: Aprende haciendo, semana a semana. El programa comienza con un análisis de tu propio trabajo y tareas, para que todo lo que aprendas se aplique directamente a tu día a día. Cada semana combina módulos a tu ritmo y una sesión en vivo con tu instructor y cohorte para practicar, resolver dudas y recibir feedback.
    tech_logos:
      - name: OpenAI
        icon: openai
      - name: n8n
        icon: n8n
      - name: Git
        icon: git
    module_cards:
      - title: Cómo funciona realmente la IA
        duration: Semana 1
        objectives:
          - Qué son los LLMs y cómo funcionan
          - Por qué la elección del modelo importa en costo y calidad
          - La diferencia entre un chatbot, asistente y agente
          - "Fundamentos del prompting: rol, contexto, formato, restricciones"
          - "Auditoría laboral: identifica tus principales candidatos a automatización"
        projects: Escribe tus primeros 5 prompts para tareas reales que haces cada semana.
        orientation: vertical
        icon: IconBolt
      - title: El prompting como habilidad
        duration: Semana 2
        objectives:
          - "Patrones de prompting: cadena de pensamiento, few-shot, persona, output estructurado"
          - Prompting para emails, informes, investigación y resúmenes de reuniones
          - Gestión efectiva del contexto en IA
          - Construcción de una biblioteca personal de prompts
        projects: Sal con 3-5 prompts funcionales para tareas reales de tu trabajo.
        orientation: vertical
        icon: IconCode
      - title: Tu asistente personal de IA
        duration: Semana 3
        objectives:
          - Qué son los agentes de IA y cómo funcionan las habilidades
          - Instalación y configuración de OpenClaw
          - Creación de habilidades personalizadas a partir de plantillas de prompts
          - Conexión de tu asistente a Google Drive, Gmail o Notion
        projects: Ejecuta una habilidad personalizada en una tarea personal real.
        orientation: vertical
        icon: IconRobot
      - title: Pipelines de automatización con n8n
        duration: Semana 4
        objectives:
          - "Fundamentos de n8n: nodos, disparadores y flujos de trabajo"
          - Conexión de n8n con Gmail, Slack, Google Sheets y webhooks
          - Integración de n8n con un agente de IA para pasos de toma de decisiones inteligentes
          - "Preparación del proyecto final: mapea y construye tu automatización"
        projects: Construye y demuestra una automatización en vivo que gestione una tarea recurrente real.
        orientation: vertical
        icon: IconLayoutKanban
      - title: Flujo de trabajo automatizado con IA
        duration: Proyecto Capstone
        objectives:
          - Una automatización en vivo en n8n que resuelve una tarea personal o profesional real
          - Al menos un paso de toma de decisiones con IA integrado en el flujo de trabajo
          - Demo en vivo presentada al instructor y a los compañeros
        projects: Una automatización real que construiste, que es tuya y que puedes seguir mejorando.
        orientation: horizontal
        icon: IconChartBar
    marginY:
      desktop: md
    paddingY:
      desktop: lg
    section_id: syllabus-aifluency
