  - type: syllabus
    variant: program-modules
    program_title: AI Fluency Program Overview
    program_description: Learn by doing, one week at a time. The program starts with an audit of your own job and tasks, so everything you learn applies directly to your work. Each week combines self-paced modules and a live session with your instructor and cohort to practice, troubleshoot, and get feedback.
    tech_logos:
      - name: OpenAI
        icon: openai
      - name: n8n
        icon: n8n
      - name: Git
        icon: git
    module_cards:
      - title: Understanding AI Basics
        duration: Week 1
        objectives:
          - What LLMs are and how they work
          - Why model choice matters for cost and quality
          - The difference between a chatbot, assistant, and agent
          - "Prompt fundamentals: role, context, format, constraints"
          - "Job audit: identify your top automation candidates"
        projects: Audit your current job to find your most repetitive tasks, and build 5 foundational prompts to handle them. You will master the core structure (role, context, constraints) needed to make any AI useful for your specific daily routine.
        orientation: vertical
        icon: IconBolt
      - title: Prompting as a Skill
        duration: Week 2
        objectives:
          - "Prompt patterns: chain of thought, few-shot, persona, structured output"
          - Prompting for emails, reports, research, and meeting summaries
          - Managing AI context effectively
          - Building a personal prompt library
        projects: Upgrade your week 1 prompts into advanced, reusable templates and write your first 3-5 prompts for real tasks you do every week.
        orientation: vertical
        icon: IconCode
      - title: Get Your Personal AI Assistant
        duration: Week 3
        objectives:
          - What AI agents are and how skills work
          - Installing and configuring OpenClaw
          - Creating custom skills from prompt templates
          - Connecting your assistant to Google Drive, Gmail, or Notion
        projects: Learn to use OpenClaw—the market's most powerful open-source AI assistant. You’ll learn to sync AI with your workspace (Drive, Notion, Gmail) to build a private, chat-driven workflow that manages your data on autopilot.
        orientation: vertical
        icon: IconRobot
      - title: Automated Workflows with n8n
        duration: Week 4
        objectives:
          - "n8n fundamentals: nodes, triggers, and workflows"
          - Connecting n8n to Gmail, Slack, Google Sheets, and webhooks
          - Linking n8n to an AI agent for smart decision-making steps
          - "Final project prep: map and build your automation"
        projects: Link your apps with n8n to build a live automation. You’ll learn to make Gmail, Sheets, and Slack talk to each other, leaving your entire weekly routine on autopilot and reclaiming up to 3+ hours of your free time every single week. recurring task.
        orientation: vertical
        icon: IconLayoutKanban
      - title: Your Fully AI-Automated Workflow
        duration: Capstone Project
        objectives:
          - A live n8n automation solving a real personal or professional task
          - At least one AI decision-making step integrated into the workflow
          - Live demo presented to instructor and peers
        projects: Launch a fully functional automation for your actual job. You will master the skill of creating a 24/7 automated workflow.
        orientation: horizontal
        icon: IconChartBar
