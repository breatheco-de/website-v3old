    hardcoded_entries:
      - question: Do I need to know how to code to take AI Fluency?
        answer: |2-

           No. AI Fluency is designed for working professionals with no coding background. Every tool you use in the program — from prompt engineering to n8n automations — works without writing a single line of code. The focus is on applying AI to real work tasks, not on programming.
      - question: How does the AI Fluency program work?
        answer: AI Fluency runs over 4 weeks. Each week has a self-paced module you complete on your own schedule, followed by one live class where you apply what you learned with instructor guidance and peer feedback. If you miss a live class, the recording is available so you can catch up before the next session.
      - question: What do I build during the AI Fluency program?
        answer: |2-

           By the end of AI Fluency you have three tangible deliverables: a personal prompt library you can use immediately at work, a configured AI assistant connected to the tools you already use daily, and a working n8n automation that handles a real recurring task in your professional life. These are not exercises — they are tools you keep and use from day one after the program ends.
      - question: How do I enroll in AI Fluency and when can I start?
        answer: |2-

           AI Fluency runs on fixed cohort start dates with limited spots per cohort to keep live sessions small and interactive. Upcoming start dates are listed on the AI Fluency program page.
