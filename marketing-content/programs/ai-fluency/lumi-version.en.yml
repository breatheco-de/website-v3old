  - type: syllabus
    variant: program-modules
    program_title: Program Overview. What You'll Learn and Build.
    program_description: Learn by doing, one week at a time. The program starts with an audit of your own job and tasks, so your new skills apply directly to your work. Each week combines self-paced modules and a live session with your instructor and cohort to practice, troubleshoot, and get feedback.
    tech_logos:
      - name: OpenAI
        icon: openai
      - name: n8n
        icon: n8n
      - name: Git
        icon: git
    module_cards:
      - title: How AI Really Works
        duration: Week 1
        objectives:
          - What LLMs are and how they work
          - Why model choice matters for cost and quality
          - The difference between a chatbot, assistant, and agent
          - "Prompt fundamentals: role, context, format, constraints"
          - "Job audit: identify your top automation candidates"
        projects: Audit your own job to identify your top automation candidates. Build your first foundational prompts and learn exactly how to prompt AI to get optimal results.
        orientation: vertical
        icon: IconBolt
      - title: Prompting as a Skill
        duration: Week 2
        objectives:
          - "Prompt patterns: chain of thought, few-shot, persona, structured output"
          - Prompting for emails, reports, research, and meeting summaries
          - Managing AI context effectively
          - Building a personal prompt library
        projects: Upgrade your week 1 prompts into advanced, reusable templates and write your first 3-5 prompts for real tasks you do every week.
        orientation: vertical
        icon: IconCode
      - title: Your Personal AI Assistant
        duration: Week 3
        objectives:
          - What AI agents are and how skills work
          - Installing and configuring OpenClaw
          - Creating custom skills from prompt templates
          - Connecting your assistant to Google Drive, Gmail, or Notion
        projects: Install and configure OpenClaw, the fastest-growing open-source AI agent on GitHub, and build custom skills that handle your tasks autonomously, whether you're at your desk or not.
        orientation: vertical
        icon: IconRobot
      - title: Automation Pipelines with n8n
        duration: Week 4
        objectives:
          - "n8n fundamentals: nodes, triggers, and workflows"
          - Connecting n8n to Gmail, Slack, Google Sheets, and webhooks
          - Linking n8n to an AI agent for smart decision-making steps
          - "Final project prep: map and build your automation"
        projects: Connect your Gmail, Slack, Google Sheets, and n8n to a live automation with built-in decision-making. Watch your first fully autonomous workflow run without you lifting a finger.
        orientation: vertical
        icon: IconLayoutKanban
      - title: Your AI-Automated Workflow
        duration: Capstone Project
        objectives:
          - A live n8n automation solving a real personal or professional task
          - At least one AI decision-making step integrated into the workflow
          - Live demo presented to instructor and peers
        projects: Deliver a fully functional AI automation that makes you faster and more productive at your actual job. The proof that you know how to leverage AI to stay ahead in your field.
        orientation: horizontal
        icon: IconChartBar
