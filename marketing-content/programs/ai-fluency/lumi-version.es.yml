      - name: Thomas Wright
        role: Real Estate Agent
        company: RE/MAX
        rating: 4
        comment: The content is gold, and OpenClaw is the real deal for organizing client files, but week 3 is incredibly intense since you have to set up software locally. Took me a couple of tries to get everything synced up perfectly, but customer support helped me out.
        outcome: Automated client management
      - name: Jessica Taylor
        role: Founder
        company: Agency Scale
        rating: 5
        comment: The Capstone Project paid for the entire course. I launched a fully functional autonomous support system that makes smart decisions 24/7 using n8n and AI. I’m finally free from my email inbox.
