    marginY:
      desktop: none md
  - type: syllabus
    variant: program-modules
    program_title: Cómo aprenderás en 4 semanas
    program_description: "Aprendes haciendo, no memorizando. Cada semana: un módulo a tu ritmo + una clase en vivo con tu instructor para practicar, resolver dudas y aplicarlo directo a tu trabajo real."
    tech_logos:
      - name: OpenAI
        icon: openai
      - name: n8n
        icon: n8n
      - name: Git
        icon: git
    module_cards:
      - title: Domina las bases del prompting
        duration: Semana 1
        objectives:
          - Qué son los LLMs y cómo funcionan
          - Por qué la elección del modelo importa en costo y calidad
          - La diferencia entre un chatbot, asistente y agente
          - "Fundamentos del prompting: rol, contexto, formato, restricciones"
          - "Auditoría laboral: identifica tus principales candidatos a automatización"
        projects: Analiza tu trabajo actual para identificar tus tareas más repetitivas y crea 5 prompts esenciales para resolverlas. Dominarás la estructura clave (rol, contexto y restricciones) necesaria para que cualquier IA sea útil en tu rutina diaria.
        orientation: vertical
        icon: IconBolt
      - title: El prompting como habilidad
        duration: Semana 2
        objectives:
          - "Patrones de prompting: cadena de pensamiento, few-shot, persona, output estructurado"
          - Prompting para emails, informes, investigación y resúmenes de reuniones
          - Gestión efectiva del contexto en IA
          - Construcción de una biblioteca personal de prompts
        projects: Transforma tus prompts de la semana 1 en plantillas avanzadas y reutilizables, y diseña tus primeros 3 a 5 prompts para las tareas reales que haces cada semana.
        orientation: vertical
        icon: IconCode
      - title: Tu asistente personal de IA
        duration: Semana 3
        objectives:
          - Qué son los agentes de IA y cómo funcionan las habilidades
          - Instalación y configuración de OpenClaw
          - Creación de habilidades personalizadas a partir de plantillas de prompts
          - Conexión de tu asistente a Google Drive, Gmail o Notion
        projects: Aprende a usar OpenClaw, el asistente de IA de código abierto más potente del mercado. Sincronizarás la IA con tu espacio de trabajo (Drive, Notion, Gmail) para crear un flujo privado basado en chat que gestione tus datos en piloto automático.
        orientation: vertical
        icon: IconRobot
      - title: Pipelines de automatización con n8n
        duration: Semana 4
        objectives:
          - "Fundamentos de n8n: nodos, disparadores y flujos de trabajo"
          - Conexión de n8n con Gmail, Slack, Google Sheets y webhooks
          - Integración de n8n con un agente de IA para pasos de toma de decisiones inteligentes
          - "Preparación del proyecto final: mapea y construye tu automatización"
        projects: Conecta tus aplicaciones con n8n para crear una automatización en vivo. Harás que Gmail, Sheets y Slack se comuniquen entre sí, dejando tu rutina semanal en piloto automático y recuperando más de 3 horas libres cada semana.
        orientation: vertical
        icon: IconLayoutKanban
      - title: Flujo de trabajo automatizado con IA
        duration: Proyecto Capstone
        objectives:
          - Una automatización en vivo en n8n que resuelve una tarea personal o profesional real
          - Al menos un paso de toma de decisiones con IA integrado en el flujo de trabajo
          - Demo en vivo presentada al instructor y a los compañeros
        projects: Lanza una automatización totalmente funcional para tu trabajo real. Dominarás por completo la habilidad de crear flujos de trabajo automatizados que operan las 24 horas, los 7 días de la semana.
        orientation: horizontal
        icon: IconChartBar
    marginY:
      desktop: md
    paddingY:
      desktop: lg
    section_id: syllabus-aifluency
