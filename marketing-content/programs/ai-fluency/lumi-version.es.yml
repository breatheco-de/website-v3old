  - type: syllabus
    variant: program-modules
    program_title: Cómo aprenderás en 4 semanas
    program_description: "Aprendes haciendo, no memorizando. Cada semana: un módulo a tu ritmo + una clase en vivo con tu instructor para practicar, resolver dudas y aplicarlo directo a tu trabajo real."
    tech_logos:
      - name: OpenAI
        icon: openai
      - name: n8n
        icon: n8n
      - name: Git
        icon: git
    module_cards:
      - title: Aprende IA desde la base
        duration: Semana 1
        objectives:
          - Qué son los LLMs y cómo funcionan
          - Por qué la elección del modelo importa en costo y calidad
          - La diferencia entre un chatbot, asistente y agente
          - "Fundamentos del prompting: rol, contexto, formato, restricciones"
          - "Auditoría laboral: identifica tus principales candidatos a automatización"
        projects: Identifica las tareas más repetitivas de tu trabajo y crea 5 prompts esenciales para resolverlas. Dominarás la estructura clave (rol, contexto y restricciones) necesaria para que cualquier IA sea útil en tu rutina diaria.
        orientation: vertical
        icon: IconBolt
      - title: Experto en prompting en 7 días
        duration: Semana 2
        objectives:
          - "Patrones de prompting: cadena de pensamiento, few-shot, persona, output estructurado"
          - Prompting para emails, informes, investigación y resúmenes de reuniones
          - Gestión efectiva del contexto en IA
          - Construcción de una biblioteca personal de prompts
        projects: Convierte tus prompts en plantillas avanzadas y reutilizables para que la IA te de la respuesta que realmente esperas.
        orientation: vertical
        icon: IconCode
      - title: Construye tu asistente virtual
        duration: Semana 3
        objectives:
          - Instalación y configuración de OpenClaw. El asistente de IA más potente del mercado
          - Qué son los agentes de IA y cómo funcionan las "skills"
          - Creación de "skills" personalizadas a partir de plantillas de prompts
          - Conexión de tu asistente a Google Drive, Gmail o Notion
        projects: Haz que la IA trabaje por ti. Conectarás a la IA con tu espacio de trabajo (Drive, Notion, Gmail) para crear un flujo de trabajo.
        orientation: vertical
        icon: IconRobot
      - title: Automatiza tus procesos con n8n
        duration: Semana 4
        objectives:
          - "Fundamentos de n8n: nodos, disparadores y flujos de trabajo"
          - Conexión de n8n con Gmail, Slack, Google Sheets y webhooks
          - Integración de n8n con un agente de IA para pasos de toma de decisiones inteligentes
          - "Preparación del proyecto final: mapea y construye tu automatización"
        projects: Automatiza tareas repetitivas de tu trabajo con n8n, conecta tu correo electrónico, hojas de cálculo y google drive para que tu rutina diaria se ejecute en piloto automático.
        orientation: vertical
        icon: IconLayoutKanban
      - title: Flujo de trabajo automatizado con IA
        duration: Proyecto Capstone
        objectives:
          - Una automatización en vivo en n8n que resuelve una tarea personal o profesional real
          - Al menos un paso de toma de decisiones con IA integrado en el flujo de trabajo
          - Demo en vivo presentada al instructor y a los compañeros
        projects: ¡Llegó la hora de juntar todas las piezas! crea una gran automatización en n8n que conecte varias herramientas y que use inteligencia artificial para tomar decisiones. Crea un flujo de trabajo capaz de ejecutarse solo y de trabajar 24/7.
        orientation: horizontal
        icon: IconChartBar
