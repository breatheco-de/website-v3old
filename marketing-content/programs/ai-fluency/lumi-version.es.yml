        rating: 5
        comment: Honestly, I felt like everyone on my sales team was moving faster than me, closing deals while I was buried in admin work. I researched 4Geeks, took this course, and it completely leveled the playing field. Learning to plug AI into my daily routine cut my prospecting time in half and made me the most efficient person on the floor.
        outcome: Top sales performer
      - name: Matthew Miller
        role: Marketing Specialist
        company: Freelance
        rating: 5
