meta:
  page_title: {{ single.title }}
  description: {{ single.description }}
sections:
  - type: hero
    version: "1.0"
    variant: singleColumn
    title: {{ single.title | how to title }}
    subtitle: {{ single.description | how to subtitle }}
    section_id: hero-sndk7v
    paddingY:
      desktop: none
  - type: article
    version: v1.0
    show_toc: false
    max_width: md
    content: {{ single.content | how to content }}
    section_id: article-gnx7dr
    paddingY:
      desktop: sm
    maxWidth:
      desktop: xl
