redirects:
  - from: /us/([a-z\-_]+)/([a-z\-_\d]+)
    to: /en/blog/$1/$2
  - from: /us/(.*)
    to: /en/$1
  - from: /es/([a-z\-_]+)/([a-z\-_\d]+)
    to: /es/blog/$1/$2
    priority: fallback
  - from: /es/landing/carne-joven
    to: https://old.4geeksacademy.com/es/landing/carne-joven
  - from: /interactive-exercise/(.*)
    to: /en/interactive-exercise/$1
  - from: /how-to/(.*)
    to: /en/how-to/$1
  - from: /es/downloadable/(.*)
    to: /es/descargable/$1