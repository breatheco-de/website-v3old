    id: faq-mc56sy
    hardcoded_entries:
      - question: ¿Cuánto tiempo lleva aprender Data Science desde cero?
        answer: Con formación intensiva puedes dominar los fundamentos en 4-6 meses. El bootcamp de Data Science & ML de 4Geeks Academy dura 16 semanas con mentoring ilimitado, cubriendo desde Python básico hasta deep learning y deployment de modelos.
      - question: ¿Qué diferencia hay entre Data Science y Data Analytics?
        answer: Data Science incluye machine learning e inteligencia artificial para generar insights futuros. Data Analytics se enfoca en análisis descriptivo de datos históricos. Los Data Scientists construyen algoritmos; los Data Analysts interpretan tendencias existentes.
      - question: ¿Necesito saber matemáticas avanzadas para ser Data Scientist?
        answer: Requieres estadística, álgebra lineal y cálculo básico, pero no ser matemático puro. Lo crucial es entender correlación, regresión y distribuciones. 4Geeks Academy enseña las matemáticas aplicadas con enfoque práctico en proyectos reales.
