meta:
  page_title: {{ single.title }} | 4Geeks
  description: {{ single.description }}
  og_image: {{ single.image }}
sections:
  - type: breadcrumb
    section_id: breadcrumb-blog-es
    items:
      - label: Inicio
        url: /
      - label: Blog
        url: /es/blog
      - label: {{ single.title | Blog }}
  - type: hero
    version: "1.0"
    variant: singleColumn
    badge: {{ single.category | Blog }}
    title: {{ single.title | Blog title }}
    subtitle: {{ single.description | blog description }}
    image:
      src: {{ single.image | https://storage.googleapis.com/4geeks-academy-website/media/Group-original_1765419144159.webp }}
    image_full_width: false
    section_id: hero-4dyjfe
    id: hero-j3g7yh
  - type: article
    section_id: article-631g5w
    show_toc: true
    toc_position: side
    max_width: lg
    content: {{ single.content }}
  - type: cta_banner
    version: "1.0"
    variant: form
    background: hsl(var(--primary))
    title: Da el siguiente paso hacia tu carrera en tecnología
    subtitle: Join thousands of graduates who have transformed their careers with 4Geeks Academy.
    form:
      variant: stacked
      conversion_name: student_application
      submit_label: Get Started
      button_className: bg-primary text-white hover:bg-white/90 border-white
      terms_className: text-white/80
      fields:
        email:
          visible: true
          required: true
          placeholder: Your email address
        first_name:
          visible: true
          required: true
          placeholder: First name
        last_name:
          visible: true
          required: true
          placeholder: Last name
        phone:
          visible: true
          required: true
        program:
          visible: true
          required: true
          default: auto
      success:
        message: Thank you! We'll be in touch soon.
    paddingY:
      desktop: md
    form_background: hsl(var(--card))
    terms_color: hsl(var(--primary))
    section_id: cta_banner-jsutuw
