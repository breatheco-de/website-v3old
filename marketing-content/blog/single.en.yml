meta:
  page_title: {{ single.title }} | 4Geeks Academy
  description: {{ single.description }}
  og_image: {{ single.image }}
sections:
  - type: hero
    version: "1.0"
    variant: singleColumn
    badge: {{ single.category | Blog }}
    title: {{ single.title | Blog title }}
    subtitle: {{ single.description | blog description }}
    image:
      src: {{ single.image | https://storage.googleapis.com/4geeks-academy-website/media/Group-original_1765419144159.webp }}
    image_full_width: false
  - type: article
    show_toc: true
    toc_position: side
    max_width: lg
    content: {{ single.content }}
  - type: ai_learning
    version: "1.0"
    variant: feature-tabs
    badge: Why 4Geeks?
    title: Why Learn with 4Geeks?
    description: We've developed tools to keep you motivated, prevent you from getting stuck, and accelerate your learning process.
    video_url: https://www.youtube.com/watch?v=6m1Jyya7eCc
    features:
      - icon: Robot
        title: Learn with AI
        description: Our AI reviews your code to give you instant feedback, helps with the exercises, and more!
      - icon: Headset
        title: Unlimited 1:1 mentoring sessions
        description: Access unlimited mentorship sessions with our experts whenever you need guidance.
      - icon: Users
        title: Learn with the community
        description: Learning alongside others is more fun and helps you progress faster. Join our active community.
