meta:
  page_title: {{ single.title }} | 4Geeks
  description: {{ single.description }}
  og_image: {{ single.image }}
sections:
  - type: hero
    section_id: hero-cweekr
    version: "1.0"
    variant: singleColumn
    badge: software-engineer-salary
    title: {{ single.title | blog title }}
    subtitle: {{ single.description | blog subtitle }}
    image_full_width: false
    image:
      src: {{ single.image | https://storage.googleapis.com/4geeks-academy-website/media/blog_posts-learnpack-logo-jpg-d58de33d-736x414.webp }}
  - type: article
    section_id: article-2i1h11
    show_toc: true
    toc_position: side
    max_width: xl
    content: {{ single.content | blog content }}
  - type: cta_banner
    version: "1.0"
    variant: form
    background: hsl(var(--primary))
    title: Start Your AI Career Today
    subtitle: Join thousands of graduates who have transformed their careers with 4Geeks Academy.
    form:
      variant: stacked
      submit_label: Get Started
      button_className: bg-white text-primary hover:bg-white/90 border-white
      terms_className: text-white/80
      show_terms: true
      fields:
        email:
          visible: true
          required: true
          placeholder: Your email address
        first_name:
          visible: true
          required: true
          placeholder: First name
        last_name:
          visible: true
          required: true
          placeholder: Last name
      success:
        message: Thank you! We'll be in touch soon.
    section_id: cta_banner-grae49
    paddingY:
      desktop: sm
    form_background: hsl(var(--primary))
  - type: breadcrumb
    version: v1.0
    items:
      - label: Home
        url: /
      - label: Career Programs
        url: /en/career-programs
      - label: Full Stack Developer
    section_id: breadcrumb-b93k4j
    paddingY:
      desktop: sm
    id: breadcrumb-lo787s
