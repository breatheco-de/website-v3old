meta:
  page_title: {{ single.title }} | 4Geeks Academy
  description: {{ single.description }}
  og_image: {{ single.image }}
sections:
  - type: hero
    version: "1.0"
    variant: singleColumn
    badge: Bootcamp that launch careers
    title: {{ single.title | Blog title }}
    subtitle: {{ single.description | blog description }}
    image:
      src: "{{ single.image | https://storage.googleapis.com/4geeks-academy-website/media/the-academy-header_1770614327963.png }}"
      alt: "{{ single.title | Blog post image }}"
    image_full_width: false
  - type: article
    show_toc: true
    toc_position: side
    max_width: lg
    content: {{ single.content }}
