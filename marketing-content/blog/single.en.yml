meta:
  page_title: {{ single.title }} | 4Geeks
  description: {{ single.description }}
  og_image: {{ single.image }}
sections:
  - type: hero
    section_id: hero-cweekr
    version: "1.0"
    variant: singleColumn
    badge: software-engineer-salary
    title: {{ single.title | blog title }}
    subtitle: {{ single.description | blog subtitle }}
    image_full_width: false
    image:
      src: {{ single.image | undefined }}
  - type: article
    section_id: article-2i1h11
    show_toc: true
    toc_position: side
    max_width: xl
    content: {{ single.content | blog content }}
