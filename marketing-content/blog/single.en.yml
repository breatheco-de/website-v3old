meta:
  page_title: {{ single.title }} | 4Geeks Academy
  description: {{ single.description }}
  og_image: {{ single.image }}
sections:
  - type: hero
    version: "1.0"
    variant: singleColumn
    badge: {{ single.category | Blog }}
    title: {{ single.title | Blog title }}
    subtitle: {{ single.description | blog description }}
    image:
      src: {{ single.image | https://storage.googleapis.com/4geeks-academy-website/media/Group-original_1765419144159.webp }}
    image_full_width: false
  - type: article
    show_toc: true
    toc_position: side
    max_width: lg
    content: {{single.content}}
  - type: cta_banner
    version: "1.0"
    variant: form
    background: hsl(var(--primary))
    title: {{ single.title | Start Your AI Career Today }}
    subtitle: Join thousands of graduates who have transformed their careers with 4Geeks Academy.
    form:
      variant: stacked
      submit_label: Get Started
      button_className: bg-white text-primary hover:bg-white/90 border-white
      terms_className: text-white/80
      show_terms: true
      fields:
        email:
          visible: true
          required: true
          placeholder: Your email address
        first_name:
          visible: true
          required: true
          placeholder: First name
        last_name:
          visible: true
          required: true
          placeholder: Last name
      success:
        message: Thank you! We'll be in touch soon.
