provider:
  api_key_env: GROQ_API_KEY
  base_url_env: GROQ_BASE_URL
model: llama-3.3-70b-versatile
temperature: 0.3
max_tokens: 4000
question_tags:
  - program-info
  - pricing-financing
  - admissions-process
  - schedule-format
  - career-outcomes
  - location-campus
  - technical-curriculum
  - general-inquiry
agent_tools:
  - name: get_program_details
    description: Fetch full details for a specific program by slug
    enabled: true
  - name: get_location_details
    description: Fetch details for a specific campus location by slug
    enabled: true
  - name: get_upcoming_cohorts
    description: Fetch upcoming cohort start dates
    enabled: true
  - name: get_faqs
    description: Fetch FAQ entries, optionally filtered by program or location
    enabled: true
  - name: get_pricing
    description: Fetch pricing and financing information for a program
    enabled: true
chat_bubble:
  enabled: false
  page_patterns: []
  content_types:
    - program
    - location
  agent_name: Rigobot
  agent_icon: https://storage.googleapis.com/4geeks-academy-website/media/course-report_1765590146414.webp
