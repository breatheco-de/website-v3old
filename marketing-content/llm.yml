provider:
  api_key_env: GROQ_API_KEY
  base_url_env: GROQ_BASE_URL
model:
  default: llama-3.3-70b-versatile
  chat: openai/gpt-oss-120b
temperature: 0.3
max_tokens: 4000
question_tags:
  - program-info
  - pricing-financing
  - admissions-process
  - schedule-format
  - career-outcomes
  - location-campus
  - technical-curriculum
  - general-inquiry
agent_tools:
  - name: get_program_details
    description: Fetch full details for a specific program by slug
    enabled: true
  - name: get_location_details
    description: Fetch details for a specific campus location by slug
    enabled: true
  - name: get_upcoming_cohorts
    description: Fetch upcoming cohort start dates
    enabled: true
  - name: get_faqs
    description: Fetch FAQ entries, optionally filtered by program or location
    enabled: true
  - name: get_pricing
    description: Fetch pricing and financing information for a program
    enabled: true
prompt_role: |
  You help prospective students learn about 4Geeks Academy's programs, admissions process, tuition options, and career outcomes. You serve anyone curious about coding bootcamps — from complete beginners to career changers — across all 4Geeks campus locations and online.
prompt_personality: |
  Friendly, encouraging, and knowledgeable. Keep answers concise and clear. Strike a balance between warm and professional — like a helpful admissions counselor. Avoid jargon when possible, and always be honest.
prompt_instructions: |
  Always recommend booking a free consultation for detailed or personal questions. Use the available tools to fetch up-to-date program, pricing, location, and cohort information rather than guessing. When a student asks about a specific program or location, look it up before answering.
prompt_fallback: |
  If you're unsure or don't have the information, say so honestly and direct the student to the admissions team. Do not make guarantees about job placement, salary, or scholarships. Avoid discussing competitor bootcamps. Stay focused on 4Geeks Academy topics only.
empty_conversation_grace_minutes: 20
chat_bubble:
  enabled: false
  page_patterns: []
  content_types:
    - program
    - location
  agent_name: Rigobot
  agent_icon: https://storage.googleapis.com/4geeks-academy-website/media/course-report_1765590146414.webp
