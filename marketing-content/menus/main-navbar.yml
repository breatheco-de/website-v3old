            href: /en/career-programs/ai-engineering
            icon: brain
          - title: Data Science and Machine Learning with AI
            description: Master AI-powered data analysis with Python. Build intelligent models using cutting-edge Machine Learning and AI techniques to solve real-world problems.
            cta: View program
            href: /en/career-programs/data-science-ml
            icon: chart
          - title: Cybersecurity
            description: Become a cybersecurity specialist, equipped to identify and mitigate system vulnerabilities, aligned with ISO and other standards.
            cta: View program
            href: /en/career-programs/cybersecurity
            icon: shield
          - title: Full Stack with AI
            description: Become a Full Stack developer using AI tools like Cursor and Vercel v0. Master in-demand AI skills and land a job as a developer.
            cta: View program
            href: /en/career-programs/full-stack
            icon: code
