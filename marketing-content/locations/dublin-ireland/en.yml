meta:
  page_title: 4Geeks Academy Dublin | Coding Bootcamp in Ireland
  description: Join 4Geeks Dublin coding bootcamp. Learn Full Stack Development, AI, or Data Science with unlimited mentorship and job guarantee.
  robots: index, follow
  og_image: /images/locations/dublin-og.jpg
  priority: 0.8
  change_frequency: monthly
  redirects:
    - /us/coding-campus/coding-bootcamp-dublin-ireland
sections:
  - type: hero
    version: "1.0"
    variant: singleColumn
    title: Launch an AI-Ready Tech Career in Dublin
    subtitle: Train for in-demand tech roles, including AI Engineering, in Ireland's capital and a major European tech hub. Live instruction, hands-on projects, and career support for real hiring.

    badge: Dublin Campus
    cta_buttons:
      - text: Apply Now
        url: "#bottom"
        variant: primary
      - text: Download Syllabus
        url: "#syllabus-modal"
        variant: outline
    marginY:
      desktop: none lg
    paddingY:
      desktop: md none
    background: linear-gradient(to bottom, hsl(210 100% 50% / 0.05), transparent)
  - type: modal
    version: "1.0"
    section_id: syllabus-modal
    heading: Start Your Application
    description: Fill out the form below and we'll get back to you within 24 hours.
    show_close: true
    size: md
    form:
      variant: stacked
      submit_label: Submit Application
      tags: request_more_info
      automations: soft
      fields:
        email:
          visible: true
          required: true
        first_name:
          visible: true
          required: true
        phone:
          visible: true
          required: false
        program:
          visible: true
          required: true
          default: auto
      success:
        message: Thanks! We'll be in touch within 24 hours.
  - type: awards_marquee
    version: v1.0
    speed: 40
    gradient: true
    gradientWidth: 100
    items:
      - id: switchup-2025
        logo: /attached_assets/switchup_1765590146414.webp
        alt: SwitchUp - Best Coding Bootcamps 2025
        logoHeight: 56px
      - id: course-report-2024
        logo: /attached_assets/course-report_1765590146414.webp
        alt: Course Report - Best Coding Bootcamp 2024
        logoHeight: 56px
      - id: tech-hub
        logo: /attached_assets/south-florida-tech-hub_1765548979070.jpeg
        alt: South Florida Tech Hub
        logoHeight: 56px
      - id: ebootcamp
        logo: /attached_assets/ebootcamp-top_1765549056325.png
        alt: eBootcamp Top
        logoHeight: 56px
      - id: premios-tecnologia
        logo: /attached_assets/premios_tecnologia_sigloxxi_1765549146476.png
        alt: Premios Tecnologia Siglo XXI
        logoHeight: 56px
      - id: newsweek
        logo: /attached_assets/newsweek_1764709608255.webp
        alt: Newsweek
        logoHeight: 56px
      - id: reviews-coursereport
        logo: /attached_assets/reviews_1765549549051.png
        alt: 4.9 on Course Report Reviews
        logoHeight: 56px
      - id: excelencia-educativa
        logo: /attached_assets/exelencia-educativa-es_1765549347699.png
        alt: Excelencia Educativa - Institutional Quality
        logoHeight: 56px
    marginY:
      desktop: lg none
  - type: banner
    version: "1.0"
    logo: /attached_assets/rigobot-logo_1764707022198.webp
    avatars:
      - https://randomuser.me/api/portraits/women/1.jpg
      - https://randomuser.me/api/portraits/men/2.jpg
      - https://randomuser.me/api/portraits/women/3.jpg
      - https://randomuser.me/api/portraits/men/4.jpg
    title: At the Center of Dublin's Tech Momentum
    description: Dublin is a major European tech hub with European headquarters for global tech giants. You have unlimited one-on-one mentoring, live chat support, hundreds of interactive exercises and videos, real-time streaming classes, and a global community of graduates. From our Dublin presence, we connect you with local employers and the broader European tech ecosystem.
    background: gradient
    marginY:
      desktop: lg none
  - type: two_column
    proportions:
      - 6
      - 6
    alignment: center
    left:
      video: https://youtu.be/ln3bQsV1BaQ
    right:
      heading: Hernán García's Experience with 4Geeks Academy in Dublin
      sub_heading: Navigating Dublin's Expansive Tech Realm for Career Success
      description: The demand for software engineers in Dublin has surged by 20% in the last year alone. Coding skills have become indispensable, with a 25% rise in job listings requiring programming proficiency. With a 95% job placement rate within six months of graduation, our programs ensure tangible outcomes for career advancement.
      button:
        text: Watch the full interview
        url: https://youtu.be/ln3bQsV1BaQ
        variant: primary
        icon: Rocket
    gap: "8"
    marginY:
      desktop: none sm
    paddingY:
      desktop: none md
  - type: course_selector
    version: "1.0"
    variant: default
    heading: Programs Covered by the Job Guarantee
    subheading: The Job Guarantee applies to select 4Geeks programs designed for direct hiring outcomes.
    courses:
      - name: Full Stack Development
        duration: 9 months part-time
        label: Updated in 2025
        title: Full Stack Software Development
        badges:
          - icon: Code
            text: React, Node.js & Python
        tags:
          - icon: Plus
            text: API Development
        description: Master modern web development from frontend to backend. Build production-ready applications using industry-standard tools and frameworks.
        price: {{ price_fullstack | $299 }}
        original_price: $588
        price_info: with 4Geeks Installments
        cta_text: Discover program
        cta_url: /en/full-stack
        course_background: hsl(var(--primary) / 0.4)
      - name: AI and Machine Learning
        duration: 9 months part-time
        label: Updated in 2025
        title: Data Science and Machine Learning
        badges:
          - icon: Brain
            text: LLMs & Generative AI training
        description: Work with real datasets to analyze data, build predictive models, and apply machine learning techniques used by modern data teams.
        price: {{ price_datascience | 299$ }}
        original_price: $588
        price_info: with 4Geeks Installments
        cta_text: Discover program
        cta_url: /en/ai-machine-learning
        course_background: accent
      - name: Cybersecurity
        duration: 9 months part-time
        label: Updated in 2025
        title: Cybersecurity
        badges:
          - icon: Code
            text: Threat detection & system protection
        description: Develop the skills to identify threats, secure systems, and support security operations aligned with industry standards.
        price: {{ price_cybersecurity | 299$ }}
        original_price: $588
        price_info: with 4Geeks Installments
        cta_text: Discover program
        cta_url: /en/cybersecurity
        course_background: hsl(var(--color-pink))
  - type: two_column_accordion_card
    variant: image_background
    version: "1.0"
    title: Everything You Need to Succeed in an AI-Driven Industry
    description: AI-ready training, expert guidance, and long-term support designed for the modern tech landscape.
    bullets:
      - heading: 1:1 Mentorship, Unlimited and for Life
        text: Get personalized technical guidance whenever you need it. Work one-on-one with experienced mentors during the program and continue receiving support long after you graduate.
      - heading: AI-Powered Learning Support
        text: Get instant feedback from RigoBot, our built-in AI learning assistant. Practice, debug, and improve continuously with guidance tailored to your learning path.
      - heading: Career Support, Unlimited and for Life
        text: Receive expert, personalized career coaching focused on getting you hired. From job strategy and positioning to interviews and negotiation, support evolves with your goals and experience.
      - heading: An Active Global Tech Community
        text: Join a supportive Slack community of students, mentors, and alumni. Ask questions, share opportunities, and stay connected to a global network well beyond graduation.
    image: /attached_assets/caracas-graduates_1765387638222.png
    image_alt: Student working on AI project
    image_object_fit: cover
    paddingY:
      desktop: md none
  - type: testimonials_slide
    title: Proven Paths to Tech Careers
    description: These student journeys show how structured learning, AI-powered support, and expert career coaching lead to real outcomes.
    background: bg-sidebar
  - type: split_cards
    variant: primary-left
    primary:
      heading: The Confidence of a Job Guarantee
      description: |
        The strongest proof that our approach works? We're willing to stand behind it. Our optional Job Guarantee is designed to give students extra confidence when transitioning into tech. While many schools talk about career support, we commit to outcomes: get hired into a tech role within 9 months of graduation, or receive a full tuition refund. Conditions apply.
      badge: Results-Backed Promise
    secondary:
      benefits:
        - text: {{ global_job_placement_rate | 84 }}% hiring rate among graduates
        - text: 3–6 months average time to get hired
        - text: {{ global_salary_increase | 55 }}% average salary increase in tech roles
    background: hsl(var(--secondary))
    marginY:
      desktop: none xl
  - type: why_learn_ai
    variant: laptop-edge
    title: Why Dublin Is a Smart Place to Launch Your Tech Career
    subtitle: A major European tech hub with real hiring momentum
    description: "Dublin is home to European headquarters for Google, Meta, LinkedIn, and more. You have unlimited one-on-one mentoring, live chat support, and a global community of graduates.<br><div><div><ul><li><span style=\"font-size: 0.875rem; color: rgb(0, 7, 26);\">European HQ for major global tech companies</span></li><li>Native English-speaking tech hub in Europe with strong government support</li><li>Growing demand for software, AI, and data skills across sectors</li></ul></div><div>From our Dublin presence, we connect you with local employers, tech events, and the broader European ecosystem so you build relationships that support your entry and long-term growth in tech.</div></div>"
  - type: mentorship
    version: v1.0
    title: Mentorship & Support
    subtitle: You're never alone in your learning journey
    cards:
      - icon: user
        title: 1-on-1 Mentorship
        description: Weekly sessions with experienced developers who guide you through challenges and help you grow professionally.
      - icon: users
        title: Career Coaching
