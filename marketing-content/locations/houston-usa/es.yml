    background: bg-sidebar
  - type: split_cards
    section_id: split_cards-08966i
    variant: primary-left
    primary:
      heading: La Confianza de una Garantía de Empleo*
      description: |-
        ¿La prueba más fuerte de que nuestro enfoque funciona? Estamos dispuestos a respaldarlo. Nuestra Garantía de Empleo opcional está diseñada para dar confianza extra a los estudiantes al transitar al mundo tech. Mientras muchas escuelas hablan de apoyo profesional, nosotros nos comprometemos con resultados: consigue empleo en un rol tech en 9 meses después de graduarte, o recibe reembolso completo de matrícula.&nbsp;
        <br><!--StartFragment--><span style="font-family: &quot;Google Sans&quot;, Roboto, Arial, sans-serif; white-space-collapse: preserve;">*No aplica para todos los mercados, países o estados donde opera 4Geeks. <a href="https://storage.googleapis.com/4geeks-academy-website/PDF%20and%20Docs/job-guaranteee-es.pdf">Condiciones aplican.</a></span><!--EndFragment-->
      badge: Promesa Respaldada por Resultados
    secondary:
      benefits:
        - text: {{ global.global_job_placement_rate | 84% }} tasa de contratación entre graduados
        - text: 3–6 meses tiempo promedio para conseguir empleo
        - text: {{ global.global_salary_increase | 55% }} aumento salarial promedio en roles tech
    marginY:
      desktop: none xl
    background: hsl(var(--secondary))
