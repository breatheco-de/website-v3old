      - heading: AI-Powered Learning Support
        text: >-
          Get instant feedback from RigoBot, our built-in AI learning assistant. Practice, debug, and improve
          continuously with guidance tailored to your learning path.
      - heading: Career Support, Unlimited and for Life
        text: >-
          Receive expert, personalized career coaching focused on getting you hired. Tailor-made advice and training for
          your unique profile and specific job offers.
      - heading: An Active Global Tech Community
        text: >-
          When you learn online with 4Geeks in Europe, you get access to our full platform and any of our locations
          worldwide.
