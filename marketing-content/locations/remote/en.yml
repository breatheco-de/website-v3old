meta:
  page_title: 4Geeks Academy | Remote Coding Bootcamp
  description: Learn to code from anywhere with 4Geeks Academy. Unlimited 1:1 support, AI-powered learning, and lifetime career support. Full Stack, Data Science, or Cybersecurity—job guarantee available.
  robots: index, follow
  og_image: /images/locations/remote-og.jpg
  priority: 0.8
  change_frequency: monthly
  redirects:
    - /us/coding-campus/online-coding-bootcamp
sections:
  - type: hero
    version: "1.0"
    variant: singleColumn
    title: Learn To Code Online
    subtitle: Learn to code online with unlimited 1:1 support, cutting-edge AI-powered learning, and lifetime career support. Live instruction and job support—from anywhere.
    badge: Online Campus
    cta_buttons:
      - text: Apply Now
        url: "#bottom"
        variant: primary
      - text: Download Syllabus
        url: "#syllabus-modal"
        variant: outline
    marginY:
      desktop: none lg
    paddingY:
      desktop: md none
    background: linear-gradient(to bottom, hsl(210 100% 50% / 0.05), transparent)
  - type: modal
    version: "1.0"
    section_id: syllabus-modal
    heading: Start Your Application
    description: Fill out the form below and we'll get back to you within 24 hours.
    show_close: true
    size: md
    form:
      variant: stacked
      submit_label: Submit Application
      tags: request_more_info
      automations: soft
      fields:
        email:
          visible: true
          required: true
        first_name:
          visible: true
          required: true
        phone:
          visible: true
          required: false
        program:
          visible: true
          required: true
          default: auto
      success:
        message: Thanks! We'll be in touch within 24 hours.
  - type: awards_marquee
    version: v1.0
    speed: 40
    gradient: true
    gradientWidth: 100
    items:
      - id: switchup-2025
        logo: /attached_assets/switchup_1765590146414.webp
        alt: SwitchUp - Best Coding Bootcamps 2025
        logoHeight: 56px
      - id: course-report-2024
        logo: /attached_assets/course-report_1765590146414.webp
        alt: Course Report - Best Coding Bootcamp 2024
        logoHeight: 56px
      - id: tech-hub
        logo: /attached_assets/south-florida-tech-hub_1765548979070.jpeg
        alt: South Florida Tech Hub
        logoHeight: 56px
      - id: ebootcamp
        logo: /attached_assets/ebootcamp-top_1765549056325.png
        alt: eBootcamp Top
        logoHeight: 56px
      - id: premios-tecnologia
        logo: /attached_assets/premios_tecnologia_sigloxxi_1765549146476.png
        alt: Premios Tecnologia Siglo XXI
        logoHeight: 56px
      - id: newsweek
        logo: /attached_assets/newsweek_1764709608255.webp
        alt: Newsweek
        logoHeight: 56px
      - id: reviews-coursereport
        logo: /attached_assets/reviews_1765549549051.png
        alt: 4.9 on Course Report Reviews
        logoHeight: 56px
      - id: excelencia-educativa
        logo: /attached_assets/exelencia-educativa-es_1765549347699.png
        alt: Excelencia Educativa - Institutional Quality
        logoHeight: 56px
    marginY:
      desktop: lg none
  - type: banner
    version: "1.0"
    logo: /attached_assets/rigobot-logo_1764707022198.webp
    avatars:
      - https://randomuser.me/api/portraits/women/1.jpg
      - https://randomuser.me/api/portraits/men/2.jpg
      - https://randomuser.me/api/portraits/women/3.jpg
      - https://randomuser.me/api/portraits/men/4.jpg
    title: Your Tech Career Starts Here—Anywhere
    description: No matter where you live, 4Geeks Academy gives you access to live mentorship, real-world learning, and career coaching. Our flexible schedule and future-focused curriculum help you grow from anywhere. Join thousands of graduates who've built new futures in tech.
    background: gradient
    marginY:
      desktop: lg none
  - type: two_column
    proportions:
      - 6
      - 6
    alignment: center
    left:
      video: https://youtu.be/EcqasocRKHo
    right:
      heading: Your Tech Career Starts Here—Anywhere in America
      sub_heading: Alissa on Why 4Geeks Is a Great Option for Learners Across the U.S.
      description: No matter where you are, 4Geeks Academy gives you access to live mentorship, real-world learning, and career coaching. Learn AI-aligned skills through guided instruction, work on practical projects, and get expert career support tailored to your goals.
      button:
        text: Watch the full interview
        url: https://youtu.be/EcqasocRKHo
        variant: primary
        icon: Rocket
    gap: "8"
    marginY:
      desktop: none sm
    paddingY:
      desktop: none md
  - type: course_selector
    version: "1.0"
    variant: default
    heading: Programs Covered by the Job Guarantee
    subheading: The Job Guarantee applies to select 4Geeks programs designed for direct hiring outcomes.
    courses:
      - name: Full Stack Development
        duration: 9 months part-time
        label: Updated in 2025
        title: Full Stack Software Development
        badges:
          - icon: Code
            text: React, Node.js & Python
        tags:
          - icon: Plus
            text: API Development
        description: Master modern web development from frontend to backend. Build production-ready applications using industry-standard tools and frameworks.
        price: {{ price_fullstack | $299 }}
        original_price: $588
        price_info: with 4Geeks Installments
        cta_text: Discover program
        cta_url: /en/full-stack
        course_background: hsl(var(--primary) / 0.4)
      - name: AI and Machine Learning
        duration: 9 months part-time
        label: Updated in 2025
        title: Data Science and Machine Learning
        badges:
          - icon: Brain
            text: LLMs & Generative AI training
        description: Work with real datasets to analyze data, build predictive models, and apply machine learning techniques used by modern data teams.
        price: {{ price_datascience | 299$ }}
        original_price: $588
        price_info: with 4Geeks Installments
        cta_text: Discover program
        cta_url: /en/ai-machine-learning
        course_background: accent
      - name: Cybersecurity
        duration: 9 months part-time
        label: Updated in 2025
        title: Cybersecurity
        badges:
          - icon: Code
            text: Threat detection & system protection
        description: Develop the skills to identify threats, secure systems, and support security operations aligned with industry standards.
        price: {{ price_cybersecurity | 299$ }}
        original_price: $588
        price_info: with 4Geeks Installments
        cta_text: Discover program
        cta_url: /en/cybersecurity
        course_background: hsl(var(--color-pink))
  - type: two_column_accordion_card
    variant: image_background
    version: "1.0"
    title: Everything You Need to Succeed in an AI-Driven Industry
    description: AI-ready training, expert guidance, and long-term support designed for the modern tech landscape.
    bullets:
      - heading: 1:1 Mentorship, Unlimited and for Life
        text: Get personalized technical guidance whenever you need it. Our expert mentors are available online, ready to help you from day one to forever.
      - heading: AI-Powered Learning Support
        text: Get instant feedback from RigoBot, our built-in AI learning assistant. Practice, debug, and improve continuously with guidance tailored to your learning path.
      - heading: Career Support, Unlimited and for Life
        text: Receive expert, personalized career coaching focused on getting you hired. From job strategy and positioning to interviews and negotiation, support evolves with your goals and experience.
      - heading: An Active Global Tech Community
        text: Join a supportive Slack community of students, mentors, and alumni. Ask questions, share opportunities, and stay connected to a global network well beyond graduation.
    image: /attached_assets/caracas-graduates_1765387638222.png
    image_alt: Student working on AI project
    image_object_fit: cover
    paddingY:
      desktop: md none
  - type: testimonials_slide
    title: Proven Paths to Tech Careers
    description: These student journeys show how structured learning, AI-powered support, and expert career coaching lead to real outcomes.
    background: bg-sidebar
  - type: split_cards
    variant: primary-left
    primary:
      heading: The Confidence of a Job Guarantee
      description: |
        The strongest proof that our approach works? We're willing to stand behind it. Our optional Job Guarantee is designed to give students extra confidence when transitioning into tech. Complete all stages of our career support process, access a network of +5K hiring partners, and get hired into a tech role within 9 months of graduation—or receive a full tuition refund. Conditions apply.
      badge: Results-Backed Promise
    secondary:
      benefits:
        - text: {{ global_job_placement_rate | 84 }}% hiring rate among graduates
        - text: 3–6 months average time to get hired
        - text: {{ global_salary_increase | 55 }}% average salary increase in tech roles
    background: hsl(var(--secondary))
    marginY:
      desktop: none xl
  - type: why_learn_ai
    variant: laptop-edge
    title: Why Learn to Code with 4Geeks from Anywhere
    subtitle: Unlimited mentorship, global community, real results
    description: "Learn online the real way—not by being told to 'watch the video and figure it out.' At 4Geeks Academy, you'll get unlimited 1-on-1 mentoring, live chat support 12 hours a day, hundreds of interactive exercises and videos, real-time streaming classes, and access to our global graduate network. When you learn with us remotely, you get access to our full platform and any of our locations worldwide."
  - type: mentorship
    version: v1.0
    title: Mentorship & Support
    subtitle: You're never alone in your learning journey
    cards:
      - icon: user
        title: 1-on-1 Mentorship on Demand
        description: Get 1:1 support for all your coding needs. Our expert mentors respond within 30 minutes or less—you never get stuck.
      - icon: users
        title: Career Coaching
        description: Dedicated career coaches help you build your resume, prepare for interviews, and connect with hiring partners. Tailor-made support for your profile and job offers.
      - icon: headset
        title: 24/7 Community Support
        description: Join our Slack community of students and alumni. Get help anytime from peers who understand your journey.
  - type: testimonials
    version: "1.0"
    title: Remote Graduate Success Stories
    filter_by_location: remote
    marginY:
      desktop: none lg
  - type: testimonials
    version: v1.0
    title: What Our Students Say
    subtitle: Hear directly from graduates who transformed their careers
    rating_summary:
      average: {{ global_review_rating | 4.9 }}
      count: {{ global_review_count | 2,847 }}
    items:
      - name: Maria Rodriguez
        role: Software Engineer
        company: Google
        rating: 5
        comment: This program changed my life. I went from zero coding experience to landing my dream job in 6 months.
        outcome: Hired in 4 months
      - name: James Chen
        role: Full Stack Developer
        company: Spotify
        rating: 5
        comment: The mentorship was incredible. Having unlimited access to senior developers made all the difference.
        outcome: 3x salary increase
      - name: Sarah Williams
        role: Frontend Developer
        company: Meta
        rating: 5
        comment: The AI-powered learning tools helped me understand complex concepts faster than any other course I've tried.
        outcome: Career change at 35
      - name: Carlos Mendez
        role: Backend Engineer
        company: Amazon
        rating: 4
        comment: Practical projects and real-world scenarios prepared me better than my computer science degree.
        outcome: Remote work achieved
      - name: Emily Thompson
        role: DevOps Engineer
        company: Netflix
        rating: 5
        comment: The career support team helped me negotiate a 50% higher salary than I expected.
        outcome: 50% salary boost
      - name: David Kim
        role: Tech Lead
        company: Uber
        rating: 5
        comment: Started as a complete beginner, now leading a team of developers. Forever grateful.
        outcome: Promoted in 1 year
  - type: faq
    title: Frequently Asked Questions
    related_features:
      - certification
      - job-guarantee
    marginY:
      desktop: lg none
    background: hsl(var(--muted))
    paddingY:
      desktop: md lg
  - type: cta_banner
    version: "1.0"
    title: Ready to Start Your Tech Career from Anywhere?
    subtitle: Join our next cohort and transform your future.
    cta_text: Apply Now
    cta_url: /apply?location=remote
    background: hsl(var(--primary))
    variant: form
    form:
      variant: stacked
      submit_label: Apply Now
      tags: website-lead
      automations: hard
      fields:
        email:
          visible: true
          required: true
          placeholder: Your email address
        first_name:
          visible: true
          required: true
          placeholder: First name
        phone:
          visible: true
          required: false
          placeholder: Phone number
        program:
          visible: true
          required: true
          default: auto
      success:
        message: Thank you! We'll be in touch soon.
      consent:
        email: true
        marketing: true
        marketing_text: I agree to receive information about courses and promotions
      show_terms: true
      button_className: bg-white text-primary hover:bg-white/90 border-white
      terms_className: text-white/80
    marginY:
      desktop: lg none
    paddingY:
      desktop: md
