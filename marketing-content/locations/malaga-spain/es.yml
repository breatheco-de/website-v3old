  - type: two_column_accordion_card
    variant: image_background
    version: '1.0'
    title: Todo lo que Necesitas para Triunfar en una Industria Impulsada por IA
    description: Capacitación lista para IA, guía experta y soporte a largo plazo diseñado para el panorama tech moderno.
    bullets:
      - heading: Mentoría 1:1 Ilimitada y de por Vida
        text: Obtén orientación técnica personalizada cuando la necesites. Trabaja uno a uno con mentores experimentados durante el programa y continúa recibiendo soporte mucho después de graduarte.
      - heading: Soporte de Aprendizaje Impulsado por IA
        text: Recibe feedback instantáneo de RigoBot, nuestro asistente de aprendizaje IA integrado. Practica, depura y mejora continuamente con guía adaptada a tu camino de aprendizaje.
      - heading: Soporte Profesional Ilimitado y de por Vida
        text: Recibe coaching profesional personalizado enfocado en conseguirte empleo. Desde estrategia laboral y posicionamiento hasta entrevistas y negociación, el soporte evoluciona con tus metas y experiencia.
      - heading: Una Comunidad Tech Global Activa
        text: Únete a nuestra comunidad Slack de apoyo con estudiantes, mentores y alumni. Haz preguntas, comparte oportunidades y mantente conectado a una red global mucho más allá de la graduación.
    image: /attached_assets/caracas-graduates_1765387638222.png
    image_alt: Estudiante trabajando en proyecto de IA
    image_object_fit: cover
    paddingY:
      desktop: md none
  - type: testimonials_slide
    title: Caminos Probados hacia Carreras Tech
    description: Estos journeys de estudiantes muestran cómo el aprendizaje estructurado, soporte impulsado por IA y coaching experto llevan a resultados reales.
    background: bg-sidebar
  - type: split_cards
    variant: primary-left
    primary:
      heading: La Confianza de una Garantía de Empleo
      description: |
        ¿La prueba más fuerte de que nuestro enfoque funciona? Estamos dispuestos a respaldarlo. Nuestra Garantía de Empleo opcional está diseñada para dar confianza extra a los estudiantes al transitar al mundo tech. Mientras muchas escuelas hablan de apoyo profesional, nosotros nos comprometemos con resultados: consigue empleo en un rol tech en 9 meses después de graduarte, o recibe reembolso completo de matrícula. Condiciones aplican.
      badge: Promesa Respaldada por Resultados
    secondary:
      benefits:
        - text: 84% tasa de contratación entre graduados
        - text: 3–6 meses tiempo promedio para conseguir empleo
        - text: 55% aumento salarial promedio en roles tech
    background: hsl(var(--secondary))
    marginY:
      desktop: none xl
  - type: why_learn_ai
    variant: laptop-edge
    title: Por Qué Málaga es un Lugar Inteligente para Lanzar tu Carrera Tech
    subtitle: Un ecosistema tech en auge con momentum real de contratación
    description: 'La ciudad ha presenciado un crecimiento sustancial de la demanda de conocimientos en programación, a medida que la tecnología se integra cada vez más en diversos sectores. Los bootcamps de programación han surgido como contribuyentes clave a esta tendencia.<br><div><div><ul><li><span style="font-size: 0.875rem; color: rgb(0, 7, 26);">Málaga-Fort Worth alberga numerosas empresas Fortune 500 y un sector tech en rápida expansión</span></li><li>Fuerte demanda de contratación en diversas industrias, desde energía y salud hasta startups</li><li>Demanda creciente de habilidades en software, IA y datos en toda la región</li></ul></div><div>Desde nuestro campus en Málaga, te conectamos con empleadores locales, eventos tech y un ecosistema vibrante para que construyas relaciones que apoyen tu entrada y crecimiento a largo plazo en tech.</div></div>'
