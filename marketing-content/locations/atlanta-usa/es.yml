  - type: course_selector
    version: "1.0"
    variant: solid
    heading: Explora Nuestros Programas
    subheading: Formación alineada con la industria, diseñada para lanzar tu carrera en tecnología
    courses:
      - name: Ingeniería de IA
        icon: Brain
        duration: 24 semanas
        label: Actualizado en 2026
        title: Ingeniería de IA
        badges:
          - icon: Cpu
            text: LLMs, Agentes de IA y Automatización
          - icon: Database
            text: Sistemas de IA en Producción
        description: Construye y escala productos nativos de IA mientras dominas sistemas, flujos de trabajo y estrategias de despliegue en el mundo real.
        cta_text: Ver Detalles del Programa
        cta_url: /es/programas-de-carrera/ingenieria-ia
        course_background: hsl(var(--accent))
      - name: Desarrollo Full Stack con IA
        icon: Code
        duration: 20 semanas
        label: Actualizado en 2026
        title: Desarrollo de Software Full Stack
        badges:
          - icon: Code
            text: React, Node.js y Python
        tags:
          - icon: Plus
            text: Desarrollo de APIs
          - icon: ""
            text: ""
        description: Domina el desarrollo web moderno de frontend a backend y construye aplicaciones listas para producción con herramientas estándar de la industria.
        cta_text: Ver Detalles del Programa
        cta_url: /es/programas-de-carrera/desarrollo-full-stack
        course_background: hsl(var(--destructive))
      - name: Ciencia de Datos y ML
        icon: ChartLine
        duration: 16 semanas
        label: Actualizado en 2026
        title: Ciencia de Datos y Machine Learning con IA
        badges:
          - icon: BrainCircuit
            text: Machine Learning y Modelos de IA
          - icon: BarChart
            text: Análisis y Visualización de Datos
        description: Aprende a analizar conjuntos de datos complejos, construir modelos inteligentes y desplegar soluciones impulsadas por IA para problemas del mundo real.
        cta_text: Ver Detalles del Programa
        cta_url: /es/programas-de-carrera/ciencia-de-datos-ml
        course_background: hsl(var(--primary))
      - name: Ciberseguridad
        icon: Shield
        duration: 16 semanas
        label: Actualizado en 2026
        title: Ciberseguridad
        badges:
          - icon: Lock
            text: Detección de Amenazas y Seguridad de Redes
          - icon: Server
            text: Seguridad en la Nube
        description: Desarrolla habilidades prácticas para proteger sistemas, asegurar infraestructura y responder a amenazas modernas de ciberseguridad.
        cta_text: Ver Detalles del Programa
        cta_url: /es/programas-de-carrera/ciberseguridad
        course_background: hsl(var(--secondary-foreground))
  - type: two_column_accordion_card
    variant: image_background
    version: "1.0"
    title: Todo lo que necesitas para crecer en la industria tech de hoy
    description: Formación orientada a IA, mentoría experta y apoyo continuo, diseñados para el ecosistema tech actual.
    bullets:
      - heading: Mentoría 1:1 ilimitada y de por vida
        text: Recibe orientación técnica personalizada cuando la necesites. Trabaja uno a uno con mentores expertos durante el programa y continúa recibiendo apoyo incluso después de graduarte.
      - heading: Aprendizaje potenciado por IA
        text: Obtén feedback inmediato de Rigobot, nuestro tutor de IA integrado. Practica, haz debugging y mejora de forma continua con guía adaptada a tu progreso.
      - heading: Acompañamiento profesional ilimitado y de por vida
        text: Recibe coaching de carrera personalizado enfocado en que consigas empleo. Desde estrategia y posicionamiento profesional hasta entrevistas y negociación salarial, el acompañamiento evoluciona contigo y con tus metas.
      - heading: Comunidad tech global activa
        text: Únete a nuestra comunidad en Slack de estudiantes, mentores y graduados. Haz preguntas, comparte oportunidades y mantente conectado a una red global incluso después de graduarte.
    image: /attached_assets/caracas-graduates_1765387638222.png
    image_alt: Estudiante trabajando en un proyecto de IA
    image_object_fit: cover
    paddingY:
      desktop: md none
  - type: testimonials_slide
    title: Caminos Probados hacia Carreras Tech
    description: Estos journeys de estudiantes muestran cómo el aprendizaje estructurado, soporte impulsado por IA y coaching experto llevan a resultados reales.
    background: bg-sidebar
  - type: split_cards
    variant: primary-left
    primary:
      heading: La Confianza de una Garantía de Empleo
      description: |
        ¿La prueba más fuerte de que nuestro enfoque funciona? Estamos dispuestos a respaldarlo. Nuestra Garantía de Empleo opcional está diseñada para dar confianza extra a los estudiantes al transitar al mundo tech. Mientras muchas escuelas hablan de apoyo profesional, nosotros nos comprometemos con resultados: consigue empleo en un rol tech en 9 meses después de graduarte, o recibe reembolso completo de matrícula. Condiciones aplican.
      badge: Promesa Respaldada por Resultados
    secondary:
      benefits:
        - text: 84% tasa de contratación entre graduados
        - text: 3–6 meses tiempo promedio para conseguir empleo
        - text: 55% aumento salarial promedio en roles tech
    background: hsl(var(--secondary))
    marginY:
      desktop: none xl
  - type: why_learn_ai
    variant: laptop-edge
    title: Por Qué Atlanta es un Lugar Inteligente para Lanzar tu Carrera Tech
    subtitle: Un ecosistema tech floreciente con fuerte demanda de contratación
    description: "El ecosistema tecnológico de Atlanta florece con más de 850 empresas tecnológicas y más de 70,000 trabajadores de tecnología. Es un mercado con demanda real de talento técnico.<br><div><div><ul><li><span style=\"font-size: 0.875rem; color: rgb(0, 7, 26);\">Grandes empresas tecnológicas como Google y Facebook han establecido locales atraídos por la diversa fuerza laboral de la ciudad</span></li><li>Atlanta compite por convertirse en un hub tech líder del Sur, con creciente demanda de conocimientos en programación de empresas en expansión</li><li>Fuerte demanda de habilidades en software, IA y datos en sectores como fintech, logística y empresas tech</li></ul></div><div>Desde nuestro campus en Atlanta, te conectamos con empleadores locales, socios de contratación y eventos tech—para que construyas relaciones que apoyen tu entrada y crecimiento a largo plazo en tech.</div></div>"
