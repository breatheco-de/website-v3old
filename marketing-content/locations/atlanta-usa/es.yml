    left:
      video: https://youtu.be/EcqasocRKHo
    right:
      heading: Aprende a programar desde Atlanta
      sub_heading: Alissa nos cuenta por qué 4Geeks Academy es la mejor opción
      description: Cursos interactivos enfocados en habilidades técnicas esenciales para el mundo digital actual. Proyectos prácticos donde obtendrás dominio de las herramientas. Plan de estudios alineado con la industria y apoyo profesional para navegar la próspera industria tecnológica de Atlanta.
