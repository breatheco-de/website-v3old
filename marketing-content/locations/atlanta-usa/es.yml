    description: El ecosistema tecnológico de Atlanta florece con más de 850 empresas tecnológicas y más de 70,000 trabajadores de tecnología. Grandes empresas tecnológicas como Google y Facebook han establecido locales atraídos por la diversa fuerza laboral de la ciudad. Desde nuestro campus en Atlanta, conectamos a estudiantes con empleadores locales, socios de contratación y eventos tech—para que construyas relaciones que apoyen tu entrada y crecimiento a largo plazo en tech.
    background: gradient
    marginY:
