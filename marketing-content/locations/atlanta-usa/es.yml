meta:
  page_title: 4Geeks Academy Atlanta | Bootcamp de Programación en Georgia
  description: Únete al bootcamp de programación 4Geeks en Atlanta. Aprende Desarrollo Full Stack, IA o Ciencia de Datos con mentoría ilimitada y garantía de empleo.
  robots: index, follow
  og_image: /images/locations/atlanta-og.jpg
  priority: 0.8
  change_frequency: monthly
  redirects:
    - /es/coding-campus/bootcamp-programacion-atlanta
sections:
  - type: hero
    version: "1.0"
    variant: singleColumn
    title: Lanza una Carrera Tech Lista para IA en Atlanta
    subtitle: Capacítate para roles tech demandados, incluyendo Ingeniería de IA, en uno de los hubs tech de más rápido crecimiento del sureste. Instrucción en vivo, proyectos prácticos y soporte profesional para contrataciones reales.
    badge: Campus Atlanta
    cta_buttons:
      - text: Aplicar Ahora
        url: "#bottom"
        variant: primary
      - text: Descargar Programa
        url: "#syllabus-modal"
        variant: outline
    marginY:
      desktop: none lg
    paddingY:
      desktop: md none
    background: linear-gradient(to bottom, hsl(210 100% 50% / 0.05), transparent)
  - type: modal
    version: "1.0"
    section_id: syllabus-modal
    heading: Comienza tu Aplicación
    description: Completa el formulario y nos pondremos en contacto contigo en 24 horas.
    show_close: true
    size: md
