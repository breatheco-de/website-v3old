# Schema.org Structured Data Configuration
# =========================================
# This file defines the base JSON-LD schemas used across the website.
# Pages can include these schemas and optionally override specific properties.
#
# USAGE IN PROGRAMS, LANDINGS, AND OTHER YAML FILES:
# ---------------------------------------------------
#
# 1. BASIC INCLUDE (inherits all properties from base schema):
#
#    schema:
#      include:
#        - "organization"
#        - "website"
#        - "courses:full-stack"
#
# 2. WITH OVERRIDES (customize specific properties):
#
#    schema:
#      include:
#        - "organization"
#        - "courses:full-stack"
#      overrides:
#        courses:full-stack:
#          name: "Full Stack Developer Bootcamp - Miami"
#          description: "Join our Miami campus for in-person training..."
#          location:
#            type: "Place"
#            name: "4Geeks Academy Miami"
#            address: "1395 Brickell Ave, Miami, FL 33131"
#
# 3. LANDING PAGE EXAMPLE (webinar/event with custom event schema):
#
#    schema:
#      include:
#        - "organization"
#      overrides:
#        organization:
#          name: "4Geeks Academy - Special Event"
#      custom:
#        - type: "Event"
#          name: "Free AI Coding Webinar"
#          start_date: "2024-03-15T18:00:00-05:00"
#          end_date: "2024-03-15T19:00:00-05:00"
#          event_attendance_mode: "OnlineEventAttendanceMode"
#          location:
#            type: "VirtualLocation"
#            url: "https://4geeks.com/webinar/ai-learning"
#
# 4. PROGRAM PAGE EXAMPLE (with course offers):
#
#    schema:
#      include:
#        - "organization"
#        - "website"
#        - "courses:full-stack"
#      overrides:
#        courses:full-stack:
#          offers:
#            type: "Offer"
#            price: "7999"
#            price_currency: "USD"
#            availability: "InStock"
#            valid_from: "2024-01-01"
#
# 5. ADDING NEW SCHEMAS (not in this file):
#
#    Use the "custom" array to add schemas that don't exist in schema-org.yml:
#
#    schema:
#      include:
#        - "organization"
#        - "courses:full-stack"
#      custom:
#        - type: "FAQPage"
#          main_entity:
#            - question: "How long is the bootcamp?"
#              answer: "The program is 16 weeks part-time."
#            - question: "Do you offer financing?"
#              answer: "Yes, we offer multiple payment plans."
#        - type: "BreadcrumbList"
#          items:
#            - name: "Home"
#              url: "https://4geeks.com"
#              position: 1
#            - name: "Programs"
#              url: "https://4geeks.com/programs"
#              position: 2
#            - name: "Full Stack"
#              position: 3
#
#    Each item in the "custom" array becomes a separate JSON-LD block.
#
# NESTED SCHEMA REFERENCES:
# -------------------------
# Use colon notation to reference nested schemas:
#   - "courses:full-stack" → courses.full-stack
#   - "courses:data-science" → courses.data-science
#   - "item_lists:career-programs" → item_lists.career-programs
#
# PROVIDER REFERENCES:
# --------------------
# Use "@organization" to reference the organization schema as provider:
#   provider: "@organization"
#
# LOCALIZATION:
# -------------
# Each schema can have locale-specific overrides under "locales":
#   locales:
#     es:
#       name: "Nombre en Español"
#       description: "Descripción en español..."

# Organization schema - represents 4Geeks Academy as an entity
organization:
  type: EducationalOrganization
  name: 4Geeks Academy
  url: https://4geeksacademy.com
  logo: https://storage.googleapis.com/4geeks-academy-website/media/4geeks-devs-logo_1763162063433.png
  description: >-
    4Geeks Academy is a coding bootcamp that helps people transition into tech careers with AI-powered learning tools,
    unlimited mentorship, and career support.
  founding_date: '2015'
  founders:
    - name: Alejandro Sanchez
    - name: Marcelo Ricigliano
  same_as:
    - https://twitter.com/4GeeksAcademy
    - https://www.linkedin.com/school/4geeksacademy/
    - https://www.facebook.com/4geeksacademy
    - https://www.instagram.com/4geeksacademy/
    - https://www.youtube.com/c/4GeeksAcademy
    - https://github.com/4GeeksAcademy
  aggregate_rating:
    rating_value: 4.5
    review_count: 2500
    best_rating: 5
    worst_rating: 1
  contact_point:
    type: ContactPoint
    contact_type: customer service
    email: info@4geeksacademy.com
  address:
    type: PostalAddress
    address_country: US
  locales:
    es:
      description: >-
        4Geeks Academy es un bootcamp de programación que ayuda a las personas a hacer la transición a carreras
        tecnológicas con herramientas de aprendizaje impulsadas por IA, mentoría ilimitada y apoyo profesional.
website:
  type: WebSite
  name: 4Geeks Academy
  url: https://4geeksacademy.com
  description: >-
    Learn to code with AI-powered tools, unlimited mentorship, and career support. Join thousands of graduates who have
    transformed their careers.
  default_social_image: https://storage.googleapis.com/4geeks-academy-website/media/4geeks-og-image.png
  # search_action disabled: /search currently returns 404 on 4geeksacademy.com
  # search_action:
  #   target: https://4geeksacademy.com/search?q={search_term_string}
  #   query_input: required name=search_term_string
  locales:
    es:
      description: >-
        Aprende a programar con herramientas impulsadas por IA, mentoría ilimitada y apoyo profesional. Únete a miles de
        graduados que han transformado sus carreras.
courses:
  full-stack:
    type: Course
    name: Full Stack Development with AI
    description: >-
      Become a Full Stack Developer with unlimited 1:1 mentorship, career guidance, and hands-on projects. Launch a
      career with $65K+ starting salaries.
    provider: '@organization'
    educational_level: Beginner to Advanced
    time_required: PT384H
    teaches:
      - HTML5
      - CSS3
      - JavaScript
      - React
      - Python
      - Flask
      - SQLAlchemy
      - REST APIs
      - Git
      - JWT Authentication
      - Agile Methodologies
    locales:
      es:
        name: Desarrollador Full Stack
        description: >-
          Conviértete en Desarrollador Full Stack con mentoría ilimitada 1:1, orientación profesional y proyectos
          prácticos. Inicia una carrera con salarios iniciales de $65K+.
  data-science:
    type: Course
    name: Data Science and Machine Learning
    description: >-
      Learn data science and machine learning at your own pace with AI-powered tools, unlimited mentorship, and a global
      community. Master Python, TensorFlow, and predictive modeling.
    provider: '@organization'
    educational_level: Intermediate
    time_required: PT432H
    teaches:
      - Python
      - Pandas
      - NumPy
      - Scikit-learn
      - TensorFlow
      - Machine Learning
      - Data Visualization
      - SQL
      - Git
      - Predictive Modeling
      - Jupyter Notebooks
      - Matplotlib
      - Seaborn
      - BeautifulSoup
    locales:
      es:
        name: Ciencia de Datos y Machine Learning
        description: >-
          Aprende ciencia de datos y machine learning a tu propio ritmo con herramientas potenciadas por IA, mentoría
          ilimitada y una comunidad global. Domina Python, TensorFlow y modelado predictivo.
  cybersecurity:
    type: Course
    name: Cybersecurity Specialist
    description: >-
      Launch a high-paying career in cybersecurity. Learn to defend systems and respond to real-world cyber threats with
      a hands-on, AI-integrated curriculum—designed by leading cybersecurity experts.
    provider: '@organization'
    educational_level: Beginner to Intermediate
    time_required: PT384H
    teaches:
      - Network Security
      - Linux Administration
      - Python
      - Penetration Testing
      - Threat Detection
      - OSINT
      - Shell Scripting
      - Security Operations
      - Git
      - EJPT Certification Prep
    locales:
      es:
        name: Especialista en Ciberseguridad
        description: >-
          Inicia una carrera bien remunerada en ciberseguridad. Aprende a defender sistemas y responder a amenazas
          cibernéticas reales con un currículo práctico e integrado con IA, diseñado por expertos líderes en
          ciberseguridad.
  ai-engineering:
    type: Course
    name: AI Engineering
    description: >-
      Master AI engineering with hands-on projects building production-ready AI applications. Learn RAG systems,
      multi-agent orchestration, prompt engineering, and real-time AI deployment using Python, LangChain, and modern AI
      frameworks.
    provider: '@organization'
    educational_level: Intermediate to Advanced
    time_required: PT400H
    teaches:
      - Python
      - LangChain
      - RAG Systems
      - Multi-Agent Orchestration
      - Prompt Engineering
      - Vector Databases
      - AI APIs
      - LLM Fine-tuning
      - Real-time AI Applications
    locales:
      es:
        name: Ingeniería de IA
        description: >-
          Domina la ingeniería de IA con proyectos prácticos construyendo aplicaciones de IA listas para producción.
          Aprende sistemas RAG, orquestación multi-agente, ingeniería de prompts y despliegue de IA en tiempo real
          usando Python, LangChain y frameworks modernos de IA.
item_lists:
  career-programs:
    type: ItemList
    name: Career Programs
    description: Complete career programs designed to transform beginners into professional developers
    item_list_order: ItemListOrderDescending
    items:
      - ref: courses:full-stack
        position: 1
      - ref: courses:data-science
        position: 2
      - ref: courses:ai-engineering
        position: 3
    locales:
      es:
        name: Programas de Carrera
        description: Programas de carrera completos diseñados para transformar principiantes en desarrolladores profesionales
