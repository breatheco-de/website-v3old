        image_object_fit: cover
        image_object_position: center
        title: CRUSA Forte Scholarship
        subtitle: Empowering Costa Rican talent through tech education
        description: In partnership with Fundación CRUSA, we launched the Forte Scholarship program to train the next generation of software developers in Costa Rica.
