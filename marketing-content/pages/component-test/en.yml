      benefits:
        - text: Generate design ideas in seconds
        - text: Automate routine tasks and focus on creativity
        - text: Secure your career for the future
  - type: split_cards
    variant: primary-right
    background: muted
    primary:
      heading: The Confidence of a Job Guarantee
      description: We back our model with a Job Guarantee. Get hired within 9 months, or we refund your tuition in full. That's how much we believe in our program.
    secondary:
      benefits:
        - text: Industry-aligned, AI-ready curriculum
        - text: Unlimited, personalized mentorship
        - text: Career support that never expires
  - type: partnership_carousel
    heading: Our Global Partnerships
    subtitle: Collaborating with leading institutions to bring coding education worldwide
