            url: https://example.com/article-1
        cta:
          text: Learn More
          url: /en/costa-rica
          variant: primary
      - image_id: united_way_event
        image_object_fit: cover
        image_object_position: center bottom
        title: United Way Miami Partnership
        subtitle: Breaking barriers to tech careers in South Florida
        description: Together with United Way Miami, we provide coding bootcamp scholarships to low-income residents, helping them transition into high-paying tech careers.
        stats:
          - value: 150+
            label: Students trained
          - value: 92%
            label: Completion rate
        cta:
          text: See Impact
          url: /en/united-way
          variant: primary
