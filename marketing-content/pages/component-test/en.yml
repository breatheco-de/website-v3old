  - type: split_cards
    variant: primary-left
    primary:
      badge: AI-Powered Learning
      heading: Design Smarter with AI Copilots
      description: Go beyond traditional design. Learn to use tools like ChatGPT, Claude, and Figma's AI features to generate ideas, refine your designs, and create exceptional experiences faster than ever.
