  - type: apply_form
    section_id: apply_form-s655dh
    version: '1.0'
    hero:
      title: Tu Futuro en Tech Comienza Aquí
      subtitle: Estás a un paso de tu nueva carrera en tecnología — ¡felicidades! Completa el formulario a continuación, y nuestro equipo de admisiones te guiará en los siguientes pasos.
      note: (Y no te preocupes — aún no te estás comprometiendo a nada, solo estamos iniciando la conversación.)
    form:
      variant: stacked
      conversion_name: student_application
      submit_label: APLICAR
      fields:
        email:
          visible: true
          required: true
          placeholder: Ingresa tu correo electrónico
        first_name:
          visible: true
          required: true
          placeholder: Ingresa tu nombre
        last_name:
          visible: true
          required: true
          placeholder: Ingresa tu apellido
        phone:
          visible: true
          required: true
          placeholder: Ingresa tu número de teléfono
        program:
          visible: true
          required: true
        region:
          visible: true
          required: true
        location:
          visible: true
          required: true
      turnstile:
        enabled: true
