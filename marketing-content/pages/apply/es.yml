      title: ¿Qué Pasa Después?
      items:
        - title: Confirmación instantánea
          description: Te enviaremos el programa de estudios por correo electrónico de inmediato.
        - title: Seguimiento personalizado
          description: Nuestro equipo de admisiones te contactará por mensaje y teléfono para programar una llamada rápida.
        - title: Pregúntanos lo que quieras
          description: Programas, horarios, financiamiento, apoyo profesional — te guiaremos por tus opciones y compartiremos todos los detalles.
        - title: Decide con confianza
          description: Tendrás toda la información que necesitas para elegir el camino correcto para ti. Y estamos aquí para ayudarte.
      closing: ¡Ahora estás listo para tomar la mejor decisión para tu carrera!
