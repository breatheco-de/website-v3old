      # 4Geeks Academy Terms and Conditions


      ## Website Owner


      This Legal Notice regulates the use of the Website, as well as its access, navigation and, in general, the
      relationship between the owner of the Website and any person who accesses it (hereinafter referred to individually
      as the "User" or collectively as the "Users").


      The Website provides Users with general information about 4GEEKS and its activities (hereinafter, the "Content"),
      all in accordance with this Legal Notice. Being a professional website, its content is not directed to Users who
      are minors.


      ## Purpose, Scope and Duration


      Access to certain content or services that may be provided in the future could be subject to specific conditions
      which, depending on the case, will replace, complete and/or modify these general conditions and, in case of
      contradiction, will prevail.


      4GEEKS reserves the right to modify, at any time and without prior notice, the presentation, configuration and
      content of the Website or the conditions required for its access and/or use, as well as to interrupt, suspend or
      terminate access to the Website content, without the User being entitled to claim any compensation.


      The temporary validity of this Legal Notice coincides with the time of its publication, until it is totally or
      partially modified. Once modified, the new Legal Notice published on this Website will become effective.


      Access, navigation and use of the Website by a User implies express and unreserved acceptance of all the terms of
      this Legal Notice and any applicable conditions, with the same validity and effectiveness as any written and
      signed contract.


      ## Access


      Use of the Website is free of charge, without prejudice to the cost of connection through the telecommunications
      network accessed by the User.


      4GEEKS shall not be responsible for damages of any kind caused to the User due to failures or disconnections in
      telecommunications networks that result in suspension, cancellation or interruption of access to the Website.


      ## Job Guarantee Conditions


      The conditions applicable to the Job Guarantee program are regulated in a separate legal document.


      Users interested in reviewing the specific terms, requirements and eligibility criteria of the Job Guarantee
      program must consult the dedicated document available on this Website.


      For further reference, you may visit the Terms and Conditions page directly.
