      - toronto-canada
  - type: testimonials_slide
    title: Graduados Reales, Resultados Profesionales Reales
    description: Descubre cómo nuestros graduados transformaron sus carreras con aprendizaje personalizado y apoyo profesional.
    background: hsl(var(--card))
    marginY:
      desktop: none
    paddingY:
      desktop: none
  - type: faq
    title: Preguntas Frecuentes
    related_features:
      - online-platform
      - certification
      - mentors-and-teachers
    marginY:
      desktop: none md
    paddingY:
