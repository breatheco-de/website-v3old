    title: Real Outcomes for Our Graduates
    subtitle: 4Geeks grads across the U.S., LATAM, and beyond launch careers in AI engineering, software development, data, and cybersecurity, landing jobs and increasing earning potential.
    items:
      - icon: Briefcase
        value: {{ global.global_job_placement_rate | 84 }}%
        title: Job placement rate
      - icon: Graduation
        value: 3-6 months
        title: Average time to get hired
      - icon: GrowthChart
        value: {{ global.global_salary_increase | 55 }}%
        title: Average salary increase after graduation
