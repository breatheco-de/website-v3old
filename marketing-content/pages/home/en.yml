    icon_color: "#0097CD"
    background: hsl(var(--secondary))
    section_id: features_grid-95o7vf
    marginY:
      desktop: none md
  - type: career_support_explain
    section_id: career_support_explain-xpc3k2
    version: v1.0
    heading: Get Hired. With Career Support Built for the AI Era.
    description: Our career support program is designed to help you land your first job in tech
    background: hsl(var(--sidebar-background))
    tabs:
      - tab_label: Job-Ready, Faster
        layout: three_columns
        col1_subtitle: Build a Recruiter-Ready Profile, Smarter.
        col1_description: |-
          Prepare for real hiring processes using a combination of AI tools and 1-on-1 coaching.
          RigoBot reviews your resume and LinkedIn in real-time. Career mentors help you refine your story, portfolio, and interview performance for optimal  impact.
        col1_tagline: We'll help you create tailored job search materials
        col1_boxes:
          - icon: IconBrandLinkedin
            text: LinkedIn
          - icon: IconFileText
            text: Resume
          - icon: IconBriefcase
            text: Portfolio
          - icon: IconMail
            text: Cover letter
        col2_heading: Career Strategy, Built Around You
        col2_bullets:
          - icon: IconRobot
            text: 24/7 feedback from RigoBot to audit your LinkedIn and resume
          - icon: IconUsers
            text: 1-on-1 career coaching and strategy sessions
          - icon: IconMicrophone
            text: Mock interviews and technical interview prep
        col3_image_id: 4geeks_member
        col3_object_fit: cover
        col3_object_position: center
      - tab_label: Real Hiring Access
        layout: two_column_cards
        title: Access the Hidden Job Market.
        left_text: Once your profile is ready, visibility becomes the focus. We connect you directly with hiring partners and decision-makers. Your profile is shared with companies actively recruiting 4Geeks graduates, supported by a targeted networking strategy.
        left_image_id: career_team_women
        left_image_object_fit: cover
        left_image_object_position: center
        left_stat:
          value: {{ global.number_of_hiring_partners_aprox | 250 }}+
          label: companies in 4Geeks employer network
        right_bullets:
          - icon: IconUserPlus
            text: Direct referrals to hiring partners
          - icon: IconTargetArrow
            text: Curated job matches based on your profile
          - icon: IconMessageChatbot
            text: Networking and recruiter conversation coaching
        right_logos:
          - image_id: logo_google
            alt: Google
          - image_id: logo_meta
            alt: Meta
          - image_id: logo_microsoft
            alt: Microsoft
          - image_id: logo_uber
            alt: Uber
          - image_id: logo_ebay
            alt: eBay
          - image_id: logo_kpmg
            alt: KPMG
      - tab_label: Proof That Converts
        layout: text_and_image
        title: Projects that Demonstrate Real Skill.
        left_description: |-
          Visibility gets attention. Proof closes the gap.
          Graduate with a portfolio that shows what you can actually build. From hands-on projects to a capstone that solves real business problems, your work becomes clear evidence of your ability.
        left_bullets:
          - icon: IconBriefcase
            text: Industry-aligned, real-world projects
          - icon: IconPresentation
            text: A showcase-ready capstone project
          - icon: IconBrandGithub
            text: GitHub optimization and professional code review
        right_image_id: geekforce_valentina_ancieta
        right_image_object_fit: cover
        right_image_object_position: center
      - tab_label: Your Best-Fit Role
        layout: text_with_testimonials_carousel
        title: Turn Your Background into an Advantage.
        left_description: |-
          Once offers are on the table, we help you choose and negotiate with confidence.
          Your previous experience matters. We map transferable skills, focus your job search on the right roles, and support you through salary negotiation and long-term growth.
        left_bullets:
          - icon: IconTransfer
            text: Transferable skills mapping
          - icon: IconMap
            text: Personalized career roadmap
          - icon: IconCoin
            text: Salary negotiation coaching
          - icon: IconUsers
            text: Ongoing alumni career support
        testimonials:
          - image_id: mailinh_tran
            image_object_fit: cover
            image_object_position: center
            contributor_logos:
              - image_id: clark_university
            description: MaiLinh Tran is an entrepreneur with a passion for technology, now focusing on the dev side of her endeavor.
            achievement: She launched her own startup, is hiring new tech talent, and coordinates an entire team of developers.
          - image_id: martin_coimbra
            image_object_fit: cover
            image_object_position: center top
            contributor_logos:
              - image_id: logo_utec
            description: Martín joined the first program we launched together with UTEC and IDB. He landed a better-paying job, a career he is passionate about, and a whole new professional life.
            achievement: He achieved a 100% salary increase.
          - image_id: melanie_galaretto
            image_object_fit: cover
            image_object_position: center
            contributor_logos:
              - image_id: logo_utec
              - image_id: bid_logo
            description: Melanie is a young professional who dreamed of achieving the life she now has. She is a resourceful and committed software developer working at a software company in her home country.
            achievement: She achieved a 100% salary increase.
