  - type: two_column_accordion_card
    variant: image_background
    version: "1.0"
    title: The Most Personalized Path to a Tech Career.
    description: Most programs teach everyone the same way. We don't. Unlimited 1:1 mentorship, AI-powered learning that adapts to your level, and career support that continues long after graduation — all designed to get you hired faster.
    bullets:
      - heading: Hyper-Personalized Learning
        text: Small student-to-teacher ratios, unlimited mentor access, and AI-guided feedback that adapts to your pace and level — accelerating your path to job-ready.
      - heading: Lifelong Mentorship and Career Support
        text: 1:1 guidance from expert mentors and career coaches that doesn't stop at graduation. Get hired, stay competitive, and keep growing as the market evolves.
      - heading: AI-Native Curriculum Built for 2026 and Beyond
        text: Learn the AI tools, workflows, and engineering skills that companies are actively hiring for right now — not what was relevant three years ago.
    image: https://storage.googleapis.com/4geeks-academy-website/media/community_1764717588840.png
    image_alt: Student learning with mentor support
    video:
      url: https://storage.googleapis.com/4geeks-academy-website/media/loop-1.mp4
    reverse: true
    section_id: two_column_accordion_card-d26z2a
