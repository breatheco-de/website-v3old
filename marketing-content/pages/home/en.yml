slug: home
template: default
title: The AI Reskilling Platform
settings:
  loading:
    eager_count: 3
meta:
  robots: index, follow
  priority: 1
  change_frequency: daily
  page_title: 4Geeks Academy | The AI Reskilling Platform
  description: Transform your career with AI-powered learning. Get personalized education, expert mentorship, and career support to launch your tech career.
  redirects:
    - /home
    - /us/index
    - /us/programs
    - /en/programs
schema:
  include:
    - organization
    - website
sections:
  - type: hero
    variant: showcase
    title: Where AI Careers Are Built.
    subtitle: AI-native programs in AI Engineering, Data Science, Software Development and Cybersecurity for high-demand roles in tech.
    trust_bar:
      rating: {{ global.global_review_rating | 4.9 }}/5
      rating_count: 3,000+
      trusted_text: Trusted by students worldwide
    cta_button:
      text: Explore our Programs
      url: "#course_selector-ht6wh3"
      variant: primary
      icon: ""
    left_images:
      - src: https://storage.googleapis.com/4geeks-academy-website/media/community_1764717588840.png
        alt: Community illustration
      - src: https://storage.googleapis.com/4geeks-academy-website/media/caracas-graduates_1765387638222.png
        alt: Caracas graduates celebration
    right_images:
      - src: https://storage.googleapis.com/4geeks-academy-website/media/fernando-funez_1765315920677.jpg
        alt: Fernando Funez testimonial
      - src: https://storage.googleapis.com/4geeks-academy-website/media/feliz-empresario-laptop_1765406479465.png
        alt: Happy professional with laptop
    show_arrow: true
    section_id: hero-24ohep
    marginY:
      desktop: sm none
    background: linear-gradient(to bottom right, hsl(var(--primary) / 0.05), transparent, hsl(var(--chart-2) / 0.05))
    paddingY:
      desktop: sm none
