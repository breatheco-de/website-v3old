  - type: comparison_table
    section_id: comparison_table-9ssv52
    version: "2.0"
    columns:
      - name: Category
        highlight: true
      - name: AI Engineering
      - name: AI Fluency
      - name: AI Flex
    rows:
      - feature: Who It's For
        values:
          - For anyone who wants to change careers and build AI systems. No prior technical experience required. Ideal for career switchers and professionals ready to move into a new field.
          - For marketers, lawyers, consultants, executives, and any professional with cognitive work who wants to do more in less time using AI. No coding required.
          - For anyone who wants to build AI skills at their own pace, choosing what they learn and when. No fixed schedule, no pressure to commit to a full program.
      - feature: Why Now
        values:
          - AI Engineer is the fastest-growing job of 2026. Demand for qualified professionals is outpacing supply, and salaries reflect it.
          - Demand for AI fluency has grown 7x in two years, faster than any other skill (McKinsey, 2025). Every professional role is affected. It's an opportunity like no other to get ahead.
          - "Workers with AI skills earn a 56% wage premium over those without (PwC, 2025). That gap exists across every field and every role. The catalog covers the skills that drive it: AI, data science, engineering, automation, and beyond."
      - feature: What You'll Build
        values:
          - Agents with tool calling, RAG pipelines, multi-agent systems with LangGraph, APIs with FastAPI, automated workflows with n8n, and a full capstone that transforms a real company with AI.
          - A personal prompt library built around your actual work, the skills to identify and automate your most repetitive tasks, and a working n8n pipeline that runs without you. All in 4 weeks, no code.
          - Something real in an area you care about. Each course has its own project. The catalog covers Prompt Engineering, Vibe Coding, No-Code, Data Science, and more.
      - feature: Target Roles
        values:
          - AI Engineer, Forward-Deployed Engineer, AI Systems Engineer, Automation Engineer, AI Software Engineer
          - N/A. Designed to enhance the role you already have, not to change it.
          - A complement to any professional career. Can also serve as a starting point toward AI Engineering for those who want to go deeper.
      - feature: Average U.S. Salary
        values:
          - $95K–$155K (entry-level, US market)
          - Productivity and effectiveness gains in your current role, with real impact on your output and earning potential over time.
          - Strengthens your position in your current field. Each course adds a concrete, demonstrable skill with its own certificate.
      - feature: Duration
        values:
          - Part-time 24 weeks or 15-week intensive
          - 4 weeks, 1 live class per week plus self-paced modules
          - No fixed end date. Progress at your own pace. Each course has its own estimated hours.
      - feature: Cost
        values:
          - $14,999. Discounts, scholarships, and financing available.
          - $900. Discounts and financing available.
          - "Basic: $129/month for 1 student. Pro: $900/year for up to 2 students."
      - feature: Payment Plans
        values:
          - 10% discount for upfront payment, monthly plans, and financing via Klarna and Affirm.
          - 10% discount for upfront payment, monthly plans, and financing via Klarna and Affirm.
          - Basic is month-to-month, cancel anytime. Pro is billed annually. Financing available via Klarna and Affirm on Pro.
      - feature: Job Guarantee
        values:
          - Available as an optional add-on for $2,000. US and Canada only.
          - N/A.
          - N/A.
      - feature: Best For You If
        values:
          - You want a new job in tech, with engineering-level pay, building the systems others simply use. Works even if you don't know how to code today.
          - You want to work faster, deliver more, and strengthen your position, without switching careers or learning to code.
          - "You want to learn on your own terms: choosing the subjects, setting the pace, committing when it makes sense for you."
      - feature: Were You Looking for Another Program?
        values:
          - Cybersecurity, Data Science, and Full Stack modules live inside AI Engineering. The market absorbed them, and today they are built on the same foundation of agents, LLMs, and automation.
          - If you were looking for Cybersecurity or Data Science for your current job, AI Fluency gives you the tools to use AI in your professional context without changing careers.
          - Full Stack Dev, Data Science and ML, and No-Code are available as individual courses in the AI Flex catalog. Explore them before committing to a full program.
      - feature: Ready to Get Started?
        values:
          - cta:
              - text: Apply Now
                url: /en/apply
                variant: primary
              - text: View full program
                url: /en/career-programs/ai-engineering
                variant: outline
          - cta:
