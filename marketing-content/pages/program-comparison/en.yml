    rows:
      - feature: Who It's For
        values:
          - For anyone who wants to change careers and build AI systems. No prior technical experience required. Ideal for developers, career switchers, and technical professionals.
          - For marketers, lawyers, consultants, executives, and any professional with cognitive work who still does manually what AI can do better. No coding required.
          - For anyone who wants to explore before committing. Choose up to 4 courses from the catalog, at your own pace, with the option to credit what you've learned if you later decide on the full bootcamp.
      - feature: Why Now
        values:
          - 73% of Fortune 500 companies are hiring AI Engineers today. Salaries grew 40% in two years. This isn't a trend — it's the new backbone of software, and Cybersecurity, Full Stack, and Data Science roles today are all built on this foundation.
          - Professionals who use AI productively complete tasks 40–60% faster (MIT, BCG). A productivity gap between colleagues already exists. Those who don't adapt aren't competing on equal footing.
          - The catalog runs from Prompt Engineering to Data Science and ML. Each course comes with its own certificate — and they all count if you later decide to do the full AI Engineering Bootcamp.
      - feature: What You'll Build
        values:
          - Agents with tool calling, RAG pipelines, multi-agent systems with LangGraph, APIs with FastAPI, automated workflows with n8n, and a full capstone that transforms a real company with AI.
          - A personal prompt library for your actual work, a working automation in n8n, and elimination of your 3 most repetitive tasks. All in 4 weeks, no code.
          - Something real in an area you care about. Choose Vibe Coding and you build an app. Choose Prompt Engineering and you leave with a library ready to use tomorrow. Choose No-Code and you have an active workflow. Each course has its own project. We recommend 4 courses based on your profile, but you have access to the full catalog.
      - feature: Target Roles
        values:
          - AI Engineer, Forward-Deployed Engineer, AI Systems Engineer, Automation Engineer, AI Software Engineer
          - N/A. Designed to enhance the role you already have, not to change it.
          - Varies based on courses chosen. Can be a path toward AI Engineering or a complement to any technical career.
      - feature: Average U.S. Salary
        values:
          - $100K to $160K
          - Productivity gain in your current role. The PwC 2025 reports a salary premium of +56% for AI-skilled workers over same-role peers.
          - Productivity gain in your current role. The PwC 2025 reports a salary premium of +56% for AI-skilled workers over same-role peers.
      - feature: Duration
        values:
          - Part-Time 24 weeks or 15-week intensive
          - 4 weeks, 1 live class per week plus self-paced modules
          - No fixed duration — progress at your own pace. Each course has its own estimated hours (6 to 22 hrs).
      - feature: Cost
        values:
          - $14,999 (discounts and scholarships available)
          - {{ global.ai.fluency.price | $900 }} (Discounts and installment payments available)
          - $129/month. Or $900 for the annual plan, for two students.
      - feature: Payment Plans
        values:
          - Monthly plans, upfront payment discount.
          - Pay in full with 10% off or in 4 interest-free installments.
          - Quarterly, semi-annual, or annual. Annual plan includes 25% off. No contracts — cancel anytime.
      - feature: Job Guarantee
        values:
          - Available for an additional $2,000.
          - N/A.
          - N/A.
      - feature: Best For You If
        values:
          - You want a new job in tech, with engineering-level pay, building the systems others simply use. Works even if you don't know how to code today.
          - You already have a job and want to be the most productive person on your team using AI. You don't want to learn code — you want results this week.
          - You're not sure what you want to learn. You prefer to try before committing, or you need a specific skill without doing a full bootcamp.
      - feature: Were You Looking for Another Program?
        values:
          - Cybersecurity, Data Science, and Full Stack modules live inside AI Engineering. The market absorbed them — today they're built on the same foundation of agents, LLMs, and automation.
          - If you were looking for Cybersecurity or Data Science for your current job, AI Fluent gives you the tools to use AI in your professional context without changing careers.
          - Fullstack Dev, Data Science and ML, and No-Code are available as individual courses in the AI Flex catalog. Explore them before committing to a bootcamp.
      - feature: Ready to Get Started?
        values:
          - cta:
              - text: Apply Now
                url: /en/apply
                variant: primary
              - text: View full program
                url: /en/career-programs/ai-engineering
                variant: outline
          - cta:
              - text: Learn more
                url: /en/career-programs/ai-fluency
                variant: primary
          - cta:
              - text: Start free — 7 days
                url: /en/ai-flex
                variant: primary
              - text: View catalog
                url: /en/ai-flex/catalog
                variant: outline
