    version: "1.0"
    title: Choose Your Tech Career Path
    subtitle: Compare our programs to see which skills, roles, and career opportunities align with your goals.
    columns:
      - name: Category
        highlight: true
      - name: AI Engineering
      - name: Full Stack Development with AI
      - name: Data Science & Machine Learning with AI
      - name: Cybersecurity
    rows:
      - feature: What It Is
        values:
          - Learn to design and orchestrate complete AI systems by developing a real AI-native business from architecture to deployment.
          - Learn to build web applications and software from scratch using front-end, back-end, and AI-powered development tools.
          - Learn to gather, analyze, and model data using Python, machine learning, and AI.
          - Learn to protect systems, networks, and data from cyber threats.
      - feature: Why It Matters
        values:
          - Companies are racing to integrate AI into real operations and services. AI engineers design the systems, agents, and workflows that power modern AI-driven businesses.
          - Companies need scalable digital solutions. Full Stack Developers power operations, marketing, and customer experiences. With AI, they automate processes and build smarter software.
          - Businesses rely on data to drive decisions. Data Scientists turn raw data into insights, while machine learning automates predictions and personalizes experiences.
          - Every business faces cyber risks. Cybersecurity experts defend data, ensure compliance, and prevent costly attacks in today's digital-first world.
      - feature: What You'll Learn
        values:
          - AI system architecture, LLM integrations, AI agents, workflow automation, APIs, databases, modern AI development tools, and AI-assisted engineering workflows.
          - HTML, CSS, JavaScript, Python, React, databases, APIs, GitHub workflows, and AI tools like OpenAI/GPT, Cursor, Vercel v0.
          - Python, SQL, statistics, data visualization, machine learning, AI tools, and real-world modeling techniques.
          - Network security, ethical hacking, risk assessment, threat analysis, incident response, and tools like Wireshark and Splunk.
      - feature: Ideal For
        values:
          - Builders who want to design and implement real AI systems and architectures. Great for developers, technical problem-solvers, and career switchers aiming for advanced AI roles.
          - Creative problem-solvers who enjoy building and seeing results come to life.
          - Analytical thinkers who love numbers, trends, and solving patterns.
          - Detail-oriented people who enjoy puzzles, rules, and outsmarting threats.
      - feature: Day-to-Day Work
        values:
          - Design AI-powered systems, orchestrate agent workflows, integrate models into operational pipelines, automate business processes, and deploy scalable AI infrastructure.
          - Build and improve web applications, develop front-end interfaces, implement back-end logic, integrate APIs, and ship new product features.
          - Clean and analyze data, build models, create dashboards, and deliver insights.
          - Monitor networks, test defenses, respond to incidents, and develop security policies.
      - feature: Job Titles
        values:
          - AI Engineer, AI Software Engineer, AI Systems Engineer, Automation Engineer.
          - Full Stack Developer, Front-End Developer, Back-End Developer, AI Software Engineer, Web Developer.
          - Data Analyst, Data Scientist, Machine Learning Engineer, BI Analyst.
          - Cybersecurity Analyst, SOC Analyst, Penetration Tester, Security Consultant.
      - feature: Average U.S. Salary
        values:
