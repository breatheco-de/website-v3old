                variant: primary
              - text: View full program
                url: https://4geeksacademy.com/en/career-programs/ai-fluency
                variant: outline
          - cta:
              - text: Choose Your Plan
                url: {{ global.ai_flex_path_1_url | https://4geeks.com/checkout?plan=ai-flex-plan-pro&cohort=1713&team_seats=1 }}
                variant: primary
              - text: View catalog
                url: https://4geeksacademy.com/en/career-programs/ai-flex
                variant: outline
