    rows:
      - feature: Para quién es
        values:
          - Para quien quiere cambiar de carrera y construir sistemas de IA. No se requiere experiencia técnica previa. Ideal para career switchers y profesionales listos para moverse a un nuevo campo.
          - Para marketers, abogados, consultores, ejecutivos y cualquier profesional con trabajo cognitivo que quiere hacer más en menos tiempo usando IA. Sin código requerido.
          - Para quien quiere desarrollar habilidades en IA a su propio ritmo, eligiendo qué aprender y cuándo. Sin horario fijo ni presión de comprometerse con un programa completo.
      - feature: Por qué ahora
        values:
          - AI Engineer es el trabajo de más rápido crecimiento en 2026. La demanda de profesionales calificados supera la oferta, y los salarios lo reflejan.
          - La demanda de fluidez en IA creció 7x en dos años, más rápido que cualquier otra habilidad (McKinsey, 2025). Cada rol profesional se ve afectado. Es una oportunidad como ninguna otra para adelantarte.
          - "Los trabajadores con habilidades en IA ganan un 56% más que quienes no las tienen (PwC, 2025). Esa brecha existe en cada campo y cada rol. El catálogo cubre las habilidades que la impulsan: IA, data science, ingeniería, automatización y más."
      - feature: Qué vas a construir
        values:
          - Agentes con tool calling, pipelines RAG, sistemas multi-agente con LangGraph, APIs con FastAPI, workflows automatizados con n8n y un capstone completo que transforma una empresa real con IA.
          - Una librería personal de prompts basada en tu trabajo real, las habilidades para identificar y automatizar tus tareas más repetitivas, y un pipeline n8n funcional que corre sin ti. Todo en 4 semanas, sin código.
          - Algo real en un área que te importe. Cada curso tiene su propio proyecto. El catálogo cubre Prompt Engineering, Vibe Coding, No-Code, Data Science y más.
