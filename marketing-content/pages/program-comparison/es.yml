    version: "1.0"
    variant: singleColumn
    title: Encuentra tu mejor camino en tecnología
    badge: Compara nuestros programas
    trust_bar:
      rating: 4.8/5
      rating_count: 2,500+
      trusted_text: Con la confianza de más de 10,000 estudiantes
    award_badges:
      - name: Mejor Bootcamp de Programación
        source: Forbes
        year: "2024"
      - name: Escuela Tecnológica Destacada
        source: Course Report
    background: linear-gradient(to bottom, hsl(210 100% 50% / 0.05), transparent)
    paddingY:
      desktop: md none
  - type: comparison_table
    version: "1.0"
    title: ¿Qué Camino Se Adapta Mejor a Ti?
    subtitle: Compara los programas para ver cuál se alinea con tus intereses, fortalezas y metas. Cada bootcamp de 4Geeks te brindará las habilidades, mentoría y apoyo profesional para prosperar en la carrera que elijas.
    columns:
      - name: Categoría
        highlight: true
      - name: Desarrollo Full Stack con IA
      - name: Ciencia de Datos y Machine Learning con IA
      - name: Ciberseguridad
    rows:
      - feature: Qué Es
        values:
          - Aprende a crear sitios web, aplicaciones y software desde cero con herramientas de front-end, back-end e IA.
          - Aprende a recopilar, analizar y modelar datos usando Python, machine learning e IA.
          - Aprende a proteger sistemas, redes y datos de amenazas cibernéticas.
      - feature: Por Qué Es Importante
        values:
          - Las empresas necesitan soluciones digitales escalables. Los desarrolladores Full Stack impulsan operaciones, marketing y experiencias de cliente. Con IA, automatizan procesos y crean productos más inteligentes.
          - Las empresas dependen de los datos para tomar decisiones. Los científicos de datos transforman datos en información valiosa, mientras que el machine learning automatiza predicciones y personaliza experiencias.
          - Todas las empresas enfrentan riesgos digitales. Los expertos en ciberseguridad protegen datos, garantizan cumplimiento y previenen ataques costosos en un mundo digital.
      - feature: Qué Aprenderás
        values:
          - HTML, CSS, JavaScript, Python, React, bases de datos, APIs, flujos de trabajo en GitHub y herramientas de IA como OpenAI/GPT, Cursor, Vercel v0.
          - Python, SQL, estadística, visualización de datos, machine learning, herramientas de IA y técnicas de modelado del mundo real.
          - Seguridad de redes, hacking ético, evaluación de riesgos, análisis de amenazas, respuesta a incidentes y herramientas como Wireshark y Splunk.
      - feature: Ideal Para
        values:
          - Personas creativas que disfrutan construir y ver resultados hechos realidad.
          - Personas analíticas que aman los números, tendencias y resolver patrones.
          - Personas detallistas que disfrutan los retos, las reglas y anticiparse a amenazas.
      - feature: Trabajo Diario
        values:
          - Crear y probar sitios web y aplicaciones, integrar APIs, colaborar con diseñadores y lanzar funcionalidades.
          - Limpiar y analizar datos, construir modelos, crear dashboards y entregar insights.
          - Monitorear redes, probar defensas, responder a incidentes y desarrollar políticas de seguridad.
      - feature: Puestos de Trabajo
        values:
          - Desarrollador Full Stack, Desarrollador Front-End, Desarrollador Back-End, Ingeniero de Software en IA, Desarrollador Web.
          - Analista de Datos, Científico de Datos, Ingeniero de Machine Learning, Analista BI.
          - Analista de Ciberseguridad, Analista SOC, Pentester, Consultor de Seguridad.
      - feature: Salario Promedio en EE.UU.
        values:
          - $75K a $110K
          - $85K a $130K
          - $80K a $120K
      - feature: Modalidad del Bootcamp
        values:
          - Tiempo Completo (12 semanas) o Medio Tiempo (20 semanas).
          - Medio Tiempo (16 semanas).
          - Medio Tiempo (16 semanas).
      - feature: Modalidad de Estudio
        values:
          - Online o Presencial (ciudades seleccionadas).
          - Online.
          - Online.
      - feature: Costo
        values:
          - $10,999 (descuentos y becas disponibles).
          - $10,999 (descuentos y becas disponibles).
          - $9,999 (descuentos y becas disponibles).
      - feature: Planes de Pago
        values:
          - Planes mensuales, descuentos por pago anticipado, préstamos y opciones basadas en ingresos.
          - Planes mensuales, descuentos por pago anticipado, préstamos y opciones basadas en ingresos.
          - Planes mensuales, descuentos por pago anticipado, préstamos y opciones basadas en ingresos.
      - feature: Garantía de Empleo*
        values:
          - Preguntar por disponibilidad. Condiciones Aplican.
          - Preguntar por disponibilidad. Condiciones Aplican.
          - Preguntar por disponibilidad. Condiciones Aplican.
      - feature: Es Ideal Para Ti Si
        values:
          - "Te encanta crear desde cero: sitios web, aplicaciones o herramientas. Disfrutas resolver problemas y la ingeniería de software impulsada por IA. Ideal para quienes cambian de carrera, freelancers o quienes buscan trabajar en startups y empresas tecnológicas."
          - Disfrutas trabajar con datos, identificar patrones y resolver problemas reales. Ideal si quieres entrar en roles de IA o basados en datos. Un fondo en matemáticas o negocios ayuda, pero no es obligatorio.
          - Quieres una carrera preparada para el futuro protegiendo datos y sistemas. Perfecto si disfrutas la estrategia, los retos o el cumplimiento normativo, o sueñas con trabajar en seguridad informática, fuerzas del orden o defensa.
      - feature: ¿Listo para comenzar?
        values:
