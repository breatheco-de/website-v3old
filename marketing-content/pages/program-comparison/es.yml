              - text: Aplicar ahora
                url: /es/aplica
                variant: primary
              - text: Ver programa completo
                url: /es/programas-de-carrera/ai-engineering
                variant: outline
          - cta:
              - text: Saber más
                url: /es/programas-de-carrera/ai-fluent
                variant: primary
          - cta:
              - text: Empezar gratis, 7 días
                url: /es/ai-flex
                variant: primary
              - text: Ver catálogo
                url: /es/ai-flex/catalogo
                variant: outline
