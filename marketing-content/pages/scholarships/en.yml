    version: "1.0"
    variant: cardHeader
    heading: Available Funding Opportunities
    description: We offer scholarships across select programs and regions to help make tech education more accessible. Opportunities vary by location and program, and can include institutional partnerships, sponsored awards, or merit-based support.
    image: https://storage.googleapis.com/4geeks-academy-website/media/community-support-cropped-800x476-q70.webp
    image_alt: Students supported through scholarship opportunities
    background: bg-primary/5
    cards:
      - icon: Globe
        text: Institutional and government partnerships help expand access to tech education in select regions.
      - icon: Handshake
        text: Corporate and community partners sponsor scholarships to support emerging tech talent.
      - icon: Award
        text: A limited number of merit-based partial scholarships are awarded to qualified applicants based on commitment, potential, and program fit.
