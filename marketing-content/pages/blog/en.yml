slug: blog
template: default
title: Blog
meta:
  page_title: Blog | 4Geeks Academy
  description: Read the latest news, tutorials and articles about coding, technology and education at 4Geeks Academy.
  robots: index, follow
  priority: 0.9
  change_frequency: daily
schema:
  include:
    - organization
    - website
sections:
  - type: listing_cards
    title: Blog
    sub_heading: Articles, tutorials and news about coding and technology
    layout:
      columns: 3
    search:
      enabled: true
      placeholder: Search articles...
    category_filter:
      enabled: true
      all_label: All
    pagination:
      page_size: 12
      page_label: Page
      of_label: of
      items_label: articles
      empty_text: No articles found.
    dynamic_entries:
      content_type: blog
      sort: '-published_at'
      item_template:
        image:
          '[object Object]': null
        title:
          '[object Object]': null
        description:
          '[object Object]': null
        badge:
          '[object Object]': null
        url:
          '[object Object]': null
        meta_left:
          '[object Object]': null
        meta_right:
          '[object Object]': null
        cta_text: Read more
    maxWidth:
      desktop: xl
    section_id: listing_cards-nuobzr
