slug: blog
template: default
title: Blog
meta:
  page_title: Coding Blog | Learn at 4Geeks
  description: Read the latest news, tutorials and articles about coding, technology and education at 4Geeks Academy.
  robots: index, follow
  priority: 0.9
  change_frequency: daily
schema:
  include:
    - organization
    - website
sections:
  - type: list_cards
    section_id: list_cards-nuobzr
    title: Blog
    sub_heading: Articles, tutorials and news about coding and technology
    layout:
      columns: 3
    search:
      enabled: true
      placeholder: Search articles...
    pagination:
      page_size: 12
      page_label: Page
      of_label: of
      items_label: articles
      empty_text: No articles found.
    dynamic_entries:
      content_type: blog
      sort: "-published_at"
      user_filters:
        - item_property_slug: badge
          component_renderer: tags
          all_label: All
      item_template:
        image: {{ single.image }}
        title: {{ single.title }}
        description: {{ single.description }}
        badge: {{ single.category }}
        url: {{ single._resolved_url }}
        meta_left: {{ single.author }}
        meta_right: {{ single.published_at | }}
        cta_text: Read more
    maxWidth:
      desktop: xl
