slug: blog
template: default
title: Blog

meta:
  page_title: "Blog | 4Geeks Academy"
  description: "Read the latest news, tutorials and articles about coding, technology and education at 4Geeks Academy."
  robots: "index, follow"
  priority: 0.9
  change_frequency: daily

schema:
  include:
    - organization
    - website

sections:
  - type: listing_cards
    title: "Blog"
    sub_heading: "Articles, tutorials and news about coding and technology"
    columns: 3
    show_search: true
    show_category_filter: true
    page_size: 12
    search_placeholder: "Search articles..."
    all_label: "All"
    empty_text: "No articles found."
    page_info_template: "Page {page} of {totalPages} · {total} articles"
    dynamic_entries:
      content_type: blog
      sort: "-published_at"
    item_template:
      image: "{{ single.image_url }}"
      title: "{{ single.title }}"
      description: "{{ single.description }}"
      badge: "{{ single.category }}"
      url: "{{ single.url }}"
      meta_left: "{{ single.author }}"
      meta_right: "{{ single.published_at | }}"
      cta_text: "Read more"
