        title: Code Review
        description: Get instant feedback on your code quality, best practices, and potential improvements.
      - icon: Brain
        title: AI Mentoring
        description: Personalized guidance that adapts to your learning style and pace.
      - icon: School
        title: Homework & Exam Prep
        description: Practice problems and explanations to help you ace your assessments.
      - icon: TrendingUp
        title: Skill Building
        description: Targeted exercises to strengthen weak areas and build new competencies.
      - icon: Bug
        title: Debugging Assistant
        description: Step-by-step help to understand and fix errors in your code.
      - icon: Lightbulb
        title: Concept Explanations
        description: Clear, patient explanations of complex programming concepts.
