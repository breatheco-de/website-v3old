slug: egresados-y-proyectos
template: default
title: Alumnos y Proyectos
meta:
  robots: index, follow
  priority: 0.9
  change_frequency: weekly
  page_title: Proyectos de Graduados y Alumni | 4Geeks
  description: "Explora proyectos finales de graduados de 4Geeks Academy: apps y soluciones que muestran habilidades, creatividad y talento listo para el mercado laboral."
  redirects:
    - /es/alumnos-y-proyectos
    - /es/graduados
schema:
  include:
    - organization
    - website
sections:
  - type: hero
    section_id: hero-htlkzb
    version: "1.0"
    variant: singleColumn
    title: Mira lo que construyen nuestros estudiantes
    subtitle: Explora proyectos finales de graduados de 4Geeks Academy. Apps reales y soluciones que muestran las habilidades, creatividad y talento listo para el mercado de nuestros alumni.
    badge: Programa profesional
    cta_buttons:
      - text: Comienza a aprender ahora
        url: "#bottom"
        variant: primary
        icon: Rocket
      - text: Ver currículum
        url: "#apply-modal"
        variant: outline
        icon: Book
    trust_bar:
      rating: {{ global.global_review_rating | 4.9 }}/5
      rating_count: 2,500+
      trusted_text: Confiado por más de {{ global.global_total_alumni | 10.000 }} estudiantes
    award_badges:
      - name: Mejor Bootcamp de Programación
        source: Forbes
        year: "2024"
      - name: Escuela Top de Tecnología
        source: Course Report
  - type: modal
    version: "1.0"
    section_id: apply-modal
    heading: Recibir el Plan de Estudios
    description: Completa el siguiente formulario y nos comunicaremos contigo dentro de 24 horas.
    show_close: true
    size: md
    form:
      variant: stacked
      submit_label: Download
      conversion_name: request_more_info
      automations: soft
      fields:
        email:
          visible: true
          required: true
        first_name:
          visible: true
          required: true
        phone:
          visible: true
          required: false
        program:
          visible: true
          required: true
          default: auto
      success:
        message: Thanks! We'll be in touch within 24 hours.
  - type: project_showcase
    section_id: project_showcase-whj7u0
    version: "1.0"
    items:
      - project_title: Raspberry Sky
        project_url: https://sattelite-beta.vercel.app/
        description: Una plataforma capaz de recibir información (viento, temperatura, geolocalización, etc.) de cohetes lanzados al espacio. También permite enviar tu propio cohete, rastrearlo y recibir mensajes de él.
        creators:
          - name: Luis Rivera
            role: QA Analyst
            github_url: https://github.com/Luis846
            linkedin_url: https://linkedin.com/in/luis-rivera-68779714b/
          - name: Naila Kaliyeva
            role: Web Developer
            github_url: https://github.com/nailakaliyeva
            linkedin_url: https://www.linkedin.com/in/naila-kaliyeva-a8863a181/
        media:
          - type: image
            src: https://storage.googleapis.com/4geeks-academy-website/media/image_1765318479754.png
            alt: Raspberry Sky - Acceso satelital para todos
          - type: video
            src: OZfv9kYl0_o
      - project_title: "IMS: Seguimiento de inventario"
        project_url: https://ims-frontend.vercel.app/react-hello-webapp/private/dashboard
        description: IMS es un sistema de inventario y logística para farmacias construido con Python, Javascript, React e integración con lectores de códigos de barras, SMS, la API de Twilio y sistemas de rastreo GPS.
        creators:
          - name: Jonathan Perez
            role: Business Administration
            github_url: https://github.com/Jphendrix51
          - name: Sebastian Pinto
            role: Pharmacy Owner
            github_url: https://github.com/sebastianpd1
          - name: Paola Castro
            role: Fuel Industry
            github_url: https://github.com/paocastrob
        media:
          - type: image
            src: https://storage.googleapis.com/4geeks-academy-website/media/image_1765318521904.png
            alt: Dashboard IMS
          - type: video
            src: TTjSZ2Lud2E
      - project_title: WonderTracker
        project_url: https://wandertrackerfront-end-gmihov001.vercel.app/
        description: Una plataforma que mantiene tu información de viaje y documentos guardados en un sistema totalmente seguro. Permite rastrear lugares visitados y guardar información importante.
        creators:
          - name: Fernando Funes
            role: Web Developer
            github_url: https://github.com/ferfunes
          - name: George Mihov
            role: Web Developer and Mentor
            github_url: https://github.com/gmihov001
            linkedin_url: https://www.linkedin.com/in/gmihov/
        media:
          - type: image
            src: https://storage.googleapis.com/4geeks-academy-website/media/image_1765318556862.png
            alt: WonderTracker - Planea Viajes, Guarda Recuerdos
          - type: image
            src: https://storage.googleapis.com/4geeks-academy-website/media/fernando-funez_1765315920677.jpg
            alt: Miembro del equipo WonderTracker
      - project_title: reMindful
        project_url: https://re-mindful.vercel.app/
        description: Conciencia sobre reciclaje considerando todos los pasos necesarios. Una app que integra software y hardware para pesar plástico, vidrio o basura en un contenedor y su impacto en el reciclaje y el medio ambiente.
        creators:
          - name: Jordan Aguiriano
            role: Web Developer
            github_url: https://github.com/JordanAguiriano
          - name: Gabriela Rodriguez
            role: Web Developer
            github_url: https://github.com/gabsssrod
        media:
          - type: image
            src: https://storage.googleapis.com/4geeks-academy-website/media/image_1765318600261.png
            alt: reMindful - Reduce, Reusa, Recicla
          - type: video
            src: cKcZD0_1IKk
    background: hsl(210 100% 50% / 0.05)
  - type: about
    section_id: about-bvkaqq
    version: "1.0"
    height: 420px
    title: Más Sobre 4Geeks
    description: 4Geeks Academy fue fundada en 2015. Lo que comenzó como un proyecto interno para entrenar desarrolladores se ha convertido en nuestra pasión. 4Geeks es hoy un Coding Bootcamp en USA que busca construir un nuevo marco para la Educación en Código. 4Geeks Academy tiene ubicaciones en 12 ciudades, 13 campus activos y más de 600 graduados.
    link_text: Leer Más
    link_url: /es/sobre-la-academia
    image_src: https://storage.googleapis.com/4geeks-academy-website/media/our-story_1765323971104.webp
    image_alt: Fundadores de 4Geeks Academy
    marginY:
      desktop: none lg
    background: hsl(210 100% 50% / 0.05)
  - type: faq
    section_id: faq-ipauts
    title: Preguntas frecuentes
    dynamic_entries:
      database: frequently_asked_questions
      limit: 9
      permanent_filters:
        - item_property_slug: related_features
          value:
            - content-and-syllabus
        - item_property_slug: locations
          value: all
    marginY:
      desktop: none md
  - type: cta_banner
    version: "1.0"
    title: Da el siguiente paso hacia tu carrera en tecnología
    subtitle: Recibe información personalizada del programa y los próximos pasos.
    variant: form
    form:
      variant: stacked
      submit_label: Obtener los detalles
      conversion_name: request_more_info
      fields:
        email:
          visible: true
          required: true
          placeholder: Tu correo electrónico
        first_name:
          visible: true
          required: true
          placeholder: Nombre
        phone:
          visible: true
          required: true
          placeholder: Número de teléfono
        program:
          visible: true
          required: true
          default: auto
      success:
        message: ¡Gracias! Nos pondremos en contacto contigo pronto.
      consent:
        email: true
        marketing: true
      show_terms: true
      button_className: bg-primary
    form_background: hsl(var(--card))
    terms_color: hsl(var(--primary))
    paddingY:
      desktop: md
    marginY:
      desktop: lg none
    background: hsl(var(--primary))
    section_id: cta_banner-13z48a
  - type: sticky_cta
    version: "1.0"
    heading: ¿Listo para empezar tu carrera en tech?
    button_label: Aplicar ahora
    show_dismiss: false
    form:
      variant: inline
      conversion_name: student_application
      submit_label: Enviar solicitud
      automations: strong
      fields:
        email:
          visible: true
          required: true
          placeholder: Correo electrónico
        first_name:
          visible: true
          required: true
          placeholder: Nombre
        last_name:
          visible: true
          required: true
          placeholder: Apellido
        phone:
          visible: true
          required: true
        program:
          visible: true
          required: true
      success:
        message: ¡Gracias! Nos pondremos en contacto en 24 horas.
    load: eager
    section_id: sticky_cta-32l479
