  - type: features_quad
    section_id: features_quad-loz8eb
    version: "1.0"
    variant: laptopEdge
    heading: Who's Eligible?
    description: "You'll qualify for the Job Guarantee if you:"
    cards:
      - icon: IconBriefcaseFilled
        title: {{ global.who_is_eligible_work_authorization | Have U.S. work authorization }}
      - icon: IconCircleDashedCheck
        title: Complete all coursework and projects
      - icon: IconBrain
        title: Pass our logic test
      - icon: IconArrowGuideFilled
        title: Follow our career development process
    background: hsl(var(--muted))
    marginY:
      desktop: none md
    paddingY:
      desktop: none
  - type: numbered_steps
    section_id: numbered_steps-2ramas
    version: "1.0"
    variant: bubbleText
    title: How the Refund Works
    description: "We've made it simple: if you complete all the required steps, and you don't land a qualifying job within 9 months after graduation, we'll refund 100% of your tuition."
    description_link:
      text: Conditions apply.
      url: https://storage.googleapis.com/4geeks-academy-website/PDF%20and%20Docs/job-guarantee-en.pdf
    steps:
      - icon: Optimization
        text: Notify us that you weren't hired into any qualifying role within 9 months of graduation.
        title: Notification
      - icon: Interview
        text: Our team thoroughly verifies that you have successfully completed all Job Guarantee requirements.
        title: Verification
      - icon: JobSearch
        text: You will receive your full refund within 30 days from the date your request is approved.
        title: Full Refund
  - type: cta_banner
    section_id: cta_banner-63cdpc
    version: "1.0"
    title: Take the Next Step Toward Your Tech Career
    subtitle: Get pricing, program details, and personalized guidance.
    background: hsl(var(--primary))
    variant: form
    form:
      variant: stacked
      submit_label: Get the details
      tags: request_more_info
      fields:
        email:
          visible: true
          required: true
          placeholder: Your email address
        first_name:
          visible: true
          required: true
          placeholder: First name
        phone:
          visible: true
          required: true
          placeholder: Phone number
        program:
          visible: true
          required: true
      success:
        message: Thank you! We'll be in touch soon.
      consent:
        email: true
        marketing: true
        marketing_text: I agree to receive information about courses and promotions
      show_terms: true
      button_className: bg-white text-primary hover:bg-white/90 border-white
      terms_className: text-white/80
    marginY:
      desktop: lg none
    paddingY:
      desktop: md
  - type: sticky_cta
    section_id: sticky_cta-6wt8wr
    version: "1.0"
    heading: Ready to start your tech career?
    button_label: Apply Now
    show_dismiss: false
    form:
      variant: inline
      conversion_name: student_application
      submit_label: Submit Application
      tags: website-lead
      automations: strong
      fields:
        email:
          visible: true
          required: true
        first_name:
          visible: true
          required: true
        last_name:
          visible: true
          required: false
        phone:
          visible: true
          required: false
        program:
          visible: false
          required: false
          default: ai-engineering
      success:
        message: Thanks! We'll be in touch within 24 hours.
