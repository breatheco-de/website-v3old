slug: job-guarantee
template: default
title: Job Guarantee
meta:
  robots: index, follow
  priority: 0.9
  change_frequency: weekly
  page_title: 4Geeks Job Guarantee Program | Get Hired or Refund
  description: Get into tech with our Job Guarantee. Get hired within 9 months of graduation, or we will refund your tuition.
  redirects:
    - /job-guarantee
    - /en/landing/job-guarantee
context:
  when_to_use: For visitors who are skeptical about bootcamp outcomes or need reassurance about their career investment.
  target_audience: Risk-averse career changers who need strong guarantees before committing to education investment.
  goals:
    - Build trust through transparent guarantee terms
    - Address skepticism about bootcamp effectiveness
    - Highlight success rates and employer partnerships
    - Make the financial commitment feel secure
schema:
  include:
    - organization
    - website
sections:
  - type: hero
    section_id: hero-e69bee
    version: "1.0"
    variant: simpleTwoColumn
    title: Get Into Tech With Our Job Guarantee*
    subtitle: "&nbsp;Built to give you extra confidence as you invest in your career. Get hired within 9 months of graduation, or we'll refund 100% of your tuition.&nbsp;<div bis_skin_checked=\"1\"><span style=\"font-size: 0.75rem;\"><span><span>*Not available in all regions.&nbsp;<a href=\"https://storage.googleapis.com/4geeks-academy-website/PDF%20and%20Docs/job-guarantee-en.pdf\"><span><span><span><span>Terms and conditions apply.</span></span></span></span></a></span></span></span><a href=\"https://storage.googleapis.com/4geeks-academy-website/PDF%20and%20Docs/job-guarantee-en.pdf\"><span style=\"font-size: 1rem;\"><span><span style=\"font-size: 0.875rem;\"><span></span></span></span></span></a></div>"
    image:
      src: https://storage.googleapis.com/4geeks-academy-website/media/students_collaborating-479x280.webp
      alt: Students collaborating in a tech workspace
    cta_buttons:
      - text: Get more info
        url: "#bottom"
        variant: primary
    background: linear-gradient(to bottom, hsl(210 100% 50% / 0.05), transparent)
    paddingY:
      desktop: lg none
    marginY:
      desktop: none md
    image_alt: Students collaborating in a tech workspace
  - type: features_grid
    section_id: features_grid-aay8s3
    version: "1.0"
    variant: cardHeader
    heading: Why The Job Guarantee
    description: The Job Guarantee is based on real outcomes and a hiring-focused model. Our programs, teaching approach, and career support are designed around how people actually get hired in today’s tech job market. Over the years, we’ve helped more than 3,500 graduates launch their tech careers across roles and industries.
    image: https://storage.googleapis.com/4geeks-academy-website/media/placeholder_career_guidance-350x255.webp
    image_alt: 4Geeks Academy community support
    background: bg-primary/5
    cards:
      - icon: BriefcaseFilled
        text: Consistent hiring outcomes across our graduate community
      - icon: BrandStackshare
        text: Strong and ongoing demand for skilled tech professionals
      - icon: ChalkboardTeacher
        text: Structured training paired with hands-on, ongoing career support
  - type: graduates_stats
    section_id: graduates_stats-rdqav1
    version: v1.0
    variant: fullBleed
    heading: Results That Back Our Job Guarantee
    subheading: "These numbers reflect real graduates and real hires. Our Job Guarantee is built around one outcome: succesfully launching your tech career."
    stats:
      - value: {{ global.global_job_placement_rate | 84 }}
        unit: "%"
        label: Job placement rate
      - value: 3-6
        unit: months
        label: Average time to get hired
      - value: {{ global.global_salary_increase | 55 }}%
        label: Salary increase after graduation
    collage_images:
      - image_id: graduates_team_1
        col_span: 4
        row_span: 2
        col_start: 6
        row_start: 1
      - image_id: graduates_team_2-288x210-288x210
        col_span: 3
        row_span: 2
        col_start: 10
        row_start: 1
      - image_id: graduates_coding
        col_span: 5
        row_span: 2
        col_start: 4
        row_start: 3
      - image_id: graduates_friends-288x210
        col_span: 4
        row_span: 2
        col_start: 9
        row_start: 3
    featured_images:
      - image_id: graduates_celebration
        col_span: 5
        row_span: 2
        col_start: 1
        row_start: 1
      - image_id: graduates_workspace
        col_span: 3
        row_span: 2
        col_start: 1
        row_start: 3
    background: bg-muted/30
    image_bordered: true
    paddingY:
      desktop: none
  - type: course_selector
    section_id: course_selector-92t02r
    version: "1.0"
    variant: solid
    heading: Career Programs with the Job Guarantee Option
    subheading: Add the Job Guarantee for extra peace of mind as you launch your career. Eligibility requirements apply.
    courses:
      - name: AI Engineering
        icon: Brain
        duration: {{ global.ai_engineering_week_duration | 24 }} weeks
        label: Updated in 2026
        title: AI Engineering
        badges:
          - icon: DollarSign
            text: APIS, automation, telemetry
        description: Build and scale a fully AI-native business while learning production-ready AI systems and workflows.
        price_period: " "
        cta_text: Program details
        cta_url: /en/career-programs/ai-engineering
        course_background: hsl(var(--accent))
      - name: Full Stack Development with AI
        duration: {{ global.fullstack_week_duration | 20 }} weeks
        label: Updated in 2026
        title: Full Stack Software Development
        badges:
          - icon: Code
            text: React, Node.js & Python
        tags:
          - icon: Plus
            text: API Development
        description: Master modern web development from frontend to backend. Build production-ready applications using industry-standard tools and frameworks.
        price_period: " "
        cta_text: Program details
        cta_url: /en/career-programs/full-stack
        course_background: hsl(var(--destructive))
      - name: Data Science and Machine Learning
        duration: {{ global.data_science_week_duration | 16 }} weeks
        label: Updated in 2026
        title: Data Science and Machine Learning
        badges:
          - icon: Brain
            text: Python, TensorFlow, SQL
        description: Work with real datasets to analyze data, build predictive models, and apply machine learning techniques used by modern data teams.
        price_period: " "
        cta_text: Program details
        cta_url: /en/career-programs/ai-machine-learning
        course_background: hsl(var(--primary))
      - name: Cybersecurity
        duration: {{ global.cybersecurity_week_duration | 16 }} weeks
        label: Updated in 2026
        title: Cybersecurity
        badges:
          - icon: Code
            text: Threat detection & system protection
        description: Develop the skills to identify threats, secure systems, and support security operations aligned with industry standards.
        price_period: " "
        cta_text: Program details
        cta_url: /en/career-programs/cybersecurity
        course_background: hsl(var(--secondary-foreground))
    showOnLocations:
      - barcelona-spain
      - berlin-germany
