              - image_id: bid_logo
            description: Melanie is a young professional who dreamed of achieving the life she now has. She is a resourceful and committed software developer working at a software company in her home country.
            achievement: She achieved a 100% salary increase.
  - type: numbered_steps
    section_id: numbered_steps-2brbw1
    version: "1.0"
    variant: bubbleText
    title: From Profile to Offer in Three Steps.
    description: A structured three-step process designed to get you hired fast, with coaching and support at every stage.
    steps:
      - icon: Optimization
        title: Profile Optimization
        bullets:
          - Polish your LinkedIn, GitHub, and portfolio to attract recruiters and clear ATS filters.
          - Build a resume that highlights your strengths and passes automated screening.
          - Graduate with a recruiter-ready profile that proves what you can do.
      - icon: Interview
        title: Interview Preparation
        bullets:
          - Build confidence with mock technical and behavioral interviews.
          - Practice coding and problem-solving with structured, graded exercises.
          - Develop a tailored strategy for every interview you walk into.
      - icon: JobSearch
        title: Strategic Job Search
        bullets:
          - Build a personalized job search plan aligned with your target role and market.
          - Navigate AI-driven hiring platforms, from resume scanners to automated interviews.
          - Get connected directly to employers actively hiring 4Geeks graduates.
