  - type: career_support_explain
    maxWidth:
      desktop: 6xl
    section_id: career_support_explain-0c1gr4
    version: v1.0
    heading: How We Get You from Enrolled to Employed.
    description: null
    background: hsl(var(--secondary))
    tabs:
      - tab_label: Job-Ready, Faster
        layout: three_columns
        col1_subtitle: Build a Profile That Gets You Hired.
        col1_description: We prepare you for how hiring actually works today. AI-optimized resume and LinkedIn, and a portfolio that proves your skills to recruiters and ATS systems alike.
        col1_tagline: "Your job search materials, built to convert:"
        col1_boxes:
          - icon: IconBrandLinkedin
            text: LinkedIn
          - icon: IconFileText
            text: Resume
          - icon: briefcase-business
            text: Portfolio
          - icon: IconMail
            text: Cover letter
        col2_heading: Career Strategy, Built Around You
        col2_bullets:
          - icon: IconRobot
            text: 24/7 AI feedback from Rigobot to audit your LinkedIn and resume
          - icon: IconUsers
            text: 1:1 career coaching and strategy sessions
          - icon: IconMicrophone
            text: Mock interviews and technical interview prep
        col3_image_id: 4geeks_member
        col3_object_fit: cover
        col3_object_position: center
      - tab_label: A Portfolio That Converts
        layout: text_and_image
        title: A Portfolio That Converts.
        left_description: Visibility gets attention. Proof closes the gap. Graduate with a portfolio that demonstrates your job-ready skills, from hands-on projects to a capstone that solves real business problems.
        left_bullets:
          - icon: briefcase-business
            text: Industry-aligned, real-world projects
          - icon: IconPresentation
            text: A showcase-ready capstone project
          - icon: github
            text: GitHub optimization and professional code review
        right_image_id: geekforce_valentina_ancieta
        right_image_object_fit: cover
        right_image_object_position: center
      - tab_label: Direct Employer Access
        layout: two_column_cards
        title: Direct Access to Employers Hiring Now.
        left_text: Once your profile is ready, we connect you directly with hiring partners. Your profile is shared with companies actively recruiting 4Geeks graduates, supported by a targeted networking strategy.
        left_image_id: career_team_women
        left_image_object_fit: cover
        left_image_object_position: center
        left_stat:
          value: 300+
          label: employers in the 4Geeks network
        right_bullets:
          - icon: IconUserPlus
            text: Direct referrals to employers in our network
          - icon: target
            text: Curated job matches based on your profile
          - icon: bot-message-square
            text: Recruiter and networking conversation coaching
        right_logos:
          - image_id: logo_google
            alt: Google
          - image_id: logo_meta-761x243-q70
            alt: Meta
          - image_id: logo_microsoft
            alt: Microsoft
          - image_id: logo_uber
            alt: Uber
          - image_id: logo_ebay-400x160-q70
            alt: eBay
          - image_id: logo_kpmg
            alt: KPMG
      - tab_label: Your Best-Fit Role
        layout: text_with_testimonials_carousel
        title: Turn Your Background into an Advantage.
        left_description: Once offers are on the table, we help you choose and negotiate with confidence. Your previous experience matters. We map your transferable skills, focus your search on the right roles, and support you through salary negotiation and your long-term career goals.
        left_bullets:
          - icon: folder-sync
            text: Transferable skills mapping
          - icon: IconMap
            text: Personalized career roadmap
          - icon: IconCoin
            text: Salary negotiation coaching
          - icon: IconUsers
            text: Career support available for life
        testimonials:
          - image_id: mailinh_tran
            image_object_fit: cover
            image_object_position: center
            contributor_logos:
              - image_id: clark_university-500x156-q60
            description: MaiLinh Tran is an entrepreneur with a passion for technology, now focusing on the dev side of her endeavor.
            achievement: She has launched her startup, is capable of hiring new tech talent, and coordinates a dev team!
          - image_id: martin_coimbra
            image_object_fit: cover
            image_object_position: center top
            contributor_logos:
              - image_id: logo_utec-545x305-q70
            description: Martín joined the first program we launched together with UTEC and IDB. He landed a better-paying job, a career he is passionate about, and a whole new professional life.
            achievement: He achieved a 100% salary increase.
          - image_id: melanie_galaretto
            image_object_fit: cover
            image_object_position: center
            contributor_logos:
