  - type: career_support_explain
    version: v1.0
    heading: Geek FORCE career coaching
    description: Acompañamiento profesional diseñado para ayudarte a conseguir tu primer empleo en tecnología y construir una carrera con dirección.
    background: hsl(var(--secondary))
    tabs:
      - tab_label: Lanza tu carrera
        layout: three_columns
        col1_subtitle: Construye un perfil que realmente destaque.
        col1_description: |-
          Prepárate para procesos reales de selección combinando herramientas con IA y coaching 1:1.
          Juntos diseñamos una estrategia clara para posicionarte frente a reclutadores y acceder a oportunidades alineadas con tu perfil.
        col1_tagline: Convertimos tu perfil en una ventaja competitiva.
        col1_boxes:
          - icon: IconBrandLinkedin
            text: LinkedIn
          - icon: IconFileText
            text: Currículum
          - icon: IconBriefcase
            text: Portafolio
          - icon: IconMail
            text: Carta de presentación
        col2_heading: Estrategia Profesional Personalizada
        col2_bullets:
          - icon: IconRobot
            text: Auditoría con IA y recomendaciones prácticas para tu LinkedIn y currículum
          - icon: IconUsers
            text: Sesiones de career coaching 1:1 enfocadas en tu posicionamiento profesional
          - icon: IconMicrophone
            text: Simulaciones y preparación para entrevistas técnicas y conductuales
        col3_image_id: 4geeks_member
        col3_object_fit: cover
        col3_object_position: center
      - tab_label: Oportunidades Reales
        layout: two_column_cards
        title: Accede a oportunidades más allá de las bolsas tradicionales.
        left_text: Una vez que tu perfil está listo, activamos tu visibilidad. Compartimos tu perfil con empresas que buscan talento formado en 4Geeks y te conectamos con nuestra red de empleadores mediante una estrategia de networking dirigida y estratégica.
        left_image_id: career_team_women
        left_image_object_fit: cover
        left_image_object_position: center
        left_stat:
          value: 250+
          label: empresas en nuestra red de empleadores
        right_bullets:
          - icon: IconUserPlus
            text: Referencias directas a socios de contratación
          - icon: IconTargetArrow
            text: Oportunidades alineadas con tu perfil y objetivos
          - icon: IconMessageChatbot
            text: Coaching en networking y conversaciones con reclutadores
        right_logos:
          - image_id: logo_google
            alt: Google
          - image_id: logo_meta
            alt: Meta
          - image_id: logo_microsoft
            alt: Microsoft
          - image_id: logo_uber
            alt: Uber
          - image_id: logo_ebay
            alt: eBay
          - image_id: logo_kpmg
            alt: KPMG
      - tab_label: Proyectos que Convencen
        layout: text_and_image
        title: Demuestra tu capacidad con proyectos reales.
        left_description: |-
          La visibilidad abre puertas. La evidencia genera confianza.
          Gradúate con un portafolio sólido que refleje lo que realmente sabes construir. Desde proyectos aplicados hasta un proyecto final que resuelve desafíos reales de negocio, tu trabajo se convierte en prueba concreta de tu valor profesional.
        left_bullets:
          - icon: IconBriefcase
            text: Proyectos alineados con estándares actuales de la industria
          - icon: IconPresentation
            text: Proyecto final listo para presentar en procesos de selección
          - icon: IconBrandGithub
            text: Optimización de GitHub y revisión profesional de código
        right_image_id: geekforce_valentina_ancieta
        right_image_object_fit: cover
        right_image_object_position: center
      - tab_label: Tu Rol Ideal
        layout: text_with_testimonials_carousel
        title: Construye una carrera alineada con tus fortalezas.
        left_description: |-
          No se trata solo de conseguir una oferta, sino la adecuada.
          Analizamos tu experiencia previa, identificamos habilidades transferibles y definimos una estrategia clara para enfocar tu búsqueda. Te acompañamos también en la negociación salarial y en tu crecimiento profesional a largo plazo.
        left_bullets:
          - icon: IconTransfer
            text: Identificación y mapeo de habilidades transferibles
          - icon: IconMap
            text: Hoja de ruta profesional personalizada
          - icon: IconCoin
            text: Coaching en negociación salarial
          - icon: IconUsers
            text: Soporte de carrera continuo para egresados
        testimonials:
          - image_id: mailinh_tran
            image_object_fit: cover
            image_object_position: center
            contributor_logos:
              - image_id: clark_university
            description: MaiLinh Tran es emprendedora y hoy lidera el desarrollo tecnológico de su propio proyecto.
            achievement: Lanzó su startup y coordina su propio equipo técnico.
          - image_id: martin_coimbra
            image_object_fit: cover
            image_object_position: center top
            contributor_logos:
              - image_id: logo_utec
            description: Martín participó en nuestro programa junto a UTEC e IDB y transformó su trayectoria profesional.
            achievement: Logró un aumento salarial del 100%.
          - image_id: melanie_galaretto
            image_object_fit: cover
            image_object_position: center
            contributor_logos:
              - image_id: logo_utec
              - image_id: bid_logo
            description: Melanie construyó una carrera sólida como desarrolladora de software en su país.
            achievement: Logró un aumento salarial del 100%.
  - type: graduates_stats
    heading: Colocación laboral
    subheading: Convertimos tu educación en empleo. Mira el impacto real de nuestro acompañamiento.
    stats:
      - value: {{ global_job_placement_rate | 84 }}%
        label: Tasa de colocación laboral
      - value: {{ global_salary_increase | 55 }}%
        label: Aumento salarial promedio después de graduarte
      - value: 3-6 meses
        label: Tiempo promedio para conseguir empleo
    collage_images:
      - image_id: graduates_team_1
        col_span: 5
        row_span: 2
      - image_id: graduates_team_2
        col_span: 7
        row_span: 2
      - image_id: graduates_coding
        col_span: 6
        row_span: 2
      - image_id: graduates_friends
        col_span: 6
        row_span: 2
  - type: numbered_steps
    version: "1.0"
    variant: bubbleText
    title: Consigue empleo con nuestro proceso de desarrollo de carrera en 3 pasos
    description: Nuestro proceso estructurado está diseñado para que consigas empleo — rápido.
    steps:
      - icon: Optimization
        title: Optimización de perfil
        bullets:
          - Perfecciona LinkedIn, GitHub y portafolio para atraer reclutadores y pasar filtros basados en IA.
          - Crea un currículum que supere los sistemas de seguimiento de candidatos (ATS) y destaque tus fortalezas.
          - Muestra tus habilidades con un portafolio listo para reclutadores.
      - icon: Interview
        title: Preparación para entrevistas
        bullets:
          - Gana confianza con entrevistas técnicas y conductuales simuladas.
          - Practica código y resolución de problemas con ejercicios auto-calificados.
          - Desarrolla estrategias personalizadas para tus entrevistas próximas.
      - icon: JobSearch
        title: Búsqueda estratégica de empleo
        bullets:
          - Crea un plan de búsqueda de empleo personalizado alineado con tus metas.
          - Navega plataformas de contratación con IA, desde escáneres de currículum hasta entrevistas automatizadas.
          - Conéctate con nuestra extensa red global de socios de contratación.
    background: bg-background
    paddingY:
      desktop: md none
  - type: why_learn_ai
    variant: default
    title: Garantía de empleo* opcional para mayor confianza
    subtitle: Respaldamos tu resultado profesional con un compromiso más fuerte
    description: "<span style=\"font-size: 1.125rem;\"><span><span>Agrega nuestra Garantía de Empleo opcional para mayor tranquilidad. Si no consigues un empleo calificado dentro de los 9 meses posteriores a tu graduación, recibirás el reembolso completo de la matrícula.&nbsp;<div><span><span><span style=\"font-size: 0.875rem;\">*La Garantía de Empleo no está disponible en todas las regiones. <a href=\"https://storage.googleapis.com/4geeks-academy-website/PDF%20and%20Docs/job-guarantee-en.pdf\">Términos y condiciones aplican.</a></span></span></span></div></span></span></span><div><span style=\"font-size: 0.875rem;\"><span style=\"font-size: 1rem;\"></span></span></div>"
    cta:
      text: Más Información
      url: /en/job-guarantee
      variant: primary
