  - type: career_support_explain
    maxWidth:
      desktop: 6xl
    section_id: career_support_explain-q2psrx
    version: v1.0
    heading: Consigue empleo. Con soporte de carrera para la era de la IA
    description: Nuestro programa de soporte de carrera está diseñado para ayudarte a conseguir tu primer empleo en tecnología
    background: hsl(var(--sidebar-background))
    tabs:
      - tab_label: Listo para Trabajar, Más Rápido
        layout: three_columns
        col1_subtitle: Construye un perfil atractivo para reclutadores.
        col1_description: |-
          Prepárate para procesos reales de contratación usando una combinación de herramientas de IA y coaching 1:1.
          RigoBot revisa tu currículum y LinkedIn en tiempo real. Los mentores de carrera te ayudan a perfeccionar tu historia, portafolio y desempeño en entrevistas.
        col1_tagline: Te ayudaremos a crear materiales de búsqueda de empleo
        col1_boxes:
          - icon: IconBrandLinkedin
            text: LinkedIn
          - icon: IconFileText
            text: Currículum
          - icon: IconBriefcase
            text: Portafolio
          - icon: IconMail
            text: Carta de presentación
        col2_heading: Estrategia de carrera, construida para ti
        col2_bullets:
          - icon: IconRobot
            text: Retroalimentación 24/7 de RigoBot para auditar tu LinkedIn y currículum
          - icon: IconUsers
            text: Sesiones de coaching y estrategia de carrera 1:1
          - icon: IconMicrophone
            text: Entrevistas simuladas y preparación para entrevistas técnicas
        col3_image_id: 4geeks_member
        col3_object_fit: cover
        col3_object_position: center
      - tab_label: Acceso a contratación real
        layout: two_column_cards
        title: Accede al mercado laboral oculto.
        left_text: Una vez que tu perfil esté listo, la visibilidad pasa a ser el foco. Te conectamos directamente con empresas aliadas y tomadores de decisiones. Tu perfil se comparte con empresas que activamente buscan egresados de 4Geeks, respaldado por una estrategia de networking dirigida.
        left_image_id: career_team_women
        left_image_object_fit: cover
        left_image_object_position: center
        left_stat:
          value: {{ global.number_of_hiring_partners_aprox | 250 }}+
          label: empresas en la red de empleadores de 4Geeks
        right_bullets:
          - icon: IconUserPlus
            text: Referidos directos a empresas aliadas
          - icon: IconTargetArrow
            text: Ofertas laborales curadas según tu perfil
          - icon: IconMessageChatbot
            text: Coaching en networking y conversaciones con reclutadores
        right_logos:
          - image_id: logo_google
            alt: Google
          - image_id: logo_meta
            alt: Meta
          - image_id: logo_microsoft
            alt: Microsoft
          - image_id: logo_uber
            alt: Uber
          - image_id: logo_ebay-400x160-q70
            alt: eBay
          - image_id: logo_kpmg
            alt: KPMG
      - tab_label: Pruebas que convierten
        layout: text_and_image
        title: Proyectos que demuestran habilidad real.
        left_description: |-
          La visibilidad atrae atención. Las pruebas cierran la brecha.
          Gradúate con un portafolio que muestre lo que realmente puedes construir. Desde proyectos prácticos hasta un proyecto final que resuelve problemas reales de negocio, tu trabajo se convierte en evidencia clara de tu capacidad.
        left_bullets:
          - icon: IconBriefcase
            text: Proyectos alineados con la industria y el mundo real
          - icon: IconPresentation
            text: Un proyecto final listo para mostrar
          - icon: IconBrandGithub
            text: Optimización de GitHub y revisión profesional de código
        right_image_id: geekforce_valentina_ancieta
        right_image_object_fit: cover
        right_image_object_position: center
      - tab_label: El Rol Ideal para Ti
        layout: text_with_testimonials_carousel
        title: Convierte tu trayectoria en una ventaja.
        left_description: |-
          Cuando las ofertas lleguen, te ayudamos a elegir y negociar con confianza.
          Tu experiencia previa importa. Mapeamos habilidades transferibles, enfocamos tu búsqueda en los roles correctos y te apoyamos en la negociación salarial y el crecimiento a largo plazo.
        left_bullets:
          - icon: IconTransfer
            text: Mapeo de habilidades transferibles
          - icon: IconMap
            text: Hoja de ruta profesional personalizada
          - icon: IconCoin
            text: Coaching en negociación salarial
          - icon: IconUsers
            text: Soporte de carrera continuo para egresados
        testimonials:
          - image_id: mailinh_tran
            image_object_fit: cover
            image_object_position: center
            contributor_logos:
              - image_id: clark_university
            description: MaiLinh Tran es una emprendedora apasionada por la tecnología, ahora enfocada en el lado de desarrollo de su proyecto.
            achievement: ¡Lanzó su startup, contrata nuevo talento tech y coordina un equipo de desarrollo completo!
          - image_id: martin_coimbra
            image_object_fit: cover
            image_object_position: center top
            contributor_logos:
              - image_id: logo_utec
            description: Martín se unió al primer programa que lanzamos junto con UTEC e IDB. Consiguió un empleo mejor remunerado, una carrera que le apasiona y toda una nueva vida profesional.
            achievement: Logró un aumento salarial del 100%.
          - image_id: melanie_galaretto
            image_object_fit: cover
            image_object_position: center
            contributor_logos:
              - image_id: logo_utec
              - image_id: bid_logo
            description: Melanie es una joven profesional que soñaba con lograr la vida que ahora tiene. Es una desarrolladora de software ingeniosa y comprometida trabajando en una empresa de software en su país natal.
            achievement: Logró un aumento salarial del 100%.
  - type: graduates_stats
    maxWidth:
      desktop: 6xl
    section_id: graduates_stats-w0h8h4
    heading: Colocación laboral
    subheading: Convertimos tu educación en empleo. Mira el impacto real de nuestro acompañamiento.
    stats:
