slug: soporte-profesional-geekforce
template: default
title: Soporte Profesional GeekForce
meta:
  robots: index, follow
  priority: 0.9
  change_frequency: weekly
  page_title: Apoyo Profesional de GeekForce | 4Geeks Academy
  description: Obtén soporte ilimitado 1:1 en carrera diseñado para tu perfil y metas únicas, de por vida. Desde construcción de resume y portafolio hasta entrevistas y plataformas de contratación impulsadas por IA.
  redirects:
    - /es/geekforce
schema:
  include:
    - organization
    - website
sections:
  - type: hero
    variant: productShowcase
    title: Career coaching ilimitado
    subtitle: para impulsar tu carrera en tecnología
    brand_mark:
      prefix: Geek
      highlight: FORCE
      suffix: ":"
      color: chart-5
    description: Mentoría profesional ilimitada 1:1 adaptada a tu perfil. Desde tu CV y portafolio hasta entrevistas y plataformas de contratación con IA, te acompañamos para que consigas tu primer empleo en tecnología y sigas avanzando en tu carrera.
    marquee:
      items:
