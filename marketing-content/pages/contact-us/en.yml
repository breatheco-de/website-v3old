slug: contact-us
template: default
title: Contact Us
meta:
  robots: index, follow
  priority: 0.8
  page_title: Contact Us | 4Geeks Academy
  description: Get in touch with 4Geeks Academy. Find our office locations, phone numbers, and email addresses worldwide.
sections:
  - type: hero
    version: "1.0"
    variant: singleColumn
    title: Empowering Talent for the AI Era
    subtitle: 4Geeks Academy is a global tech academy with 8 campuses across the U.S., Latin America, and Europe, training the next generation of tech professionals in AI-powered Full-Stack Development, Data Science & ML, and Cybersecurity.
    badge: Bootcamps that launch careers
  - type: hero
    version: "1.0"
    variant: simpleTwoColumn
    title: Get into tech with our Job Guarantee
    subtitle: Your success is our mission. Get hired within 9 months of graduation, or we will refund your tuition. Conditions apply.
    image:
      src: /attached_assets/generated_images/Students_collaborating_workspace_d1560810.webp
      alt: Students collaborating in a tech workspace
    cta_buttons:
      - text: Apply now
        url: "#apply"
        variant: primary
        icon: Rocket
      - text: Download Details
        url: "#syllabus"
        variant: outline
        icon: Download
    background: bg-gradient-to-b from-primary/5 to-background
  - type: contact_us_info
    version: "1.0"
    title: Tell us about you
    background: hsl(var(--sidebar-background))
    form:
      variant: stacked
      submit_label: Get Started
      tags: contact-us
      automations: soft
      fields:
        email:
          visible: true
          required: true
          placeholder: Your email address
        first_name:
          visible: true
          required: true
          placeholder: First name
        last_name:
          visible: true
          required: true
          placeholder: Last name
        client_comments:
          visible: true
          required: true
          placeholder: Comments
      success:
        message: Thank you! We'll be in touch soon.
      show_terms: true
    locations:
      - code: US
        name: USA
        address: 1801 SW 3rd Av, Miami, FL 33129.
        phone: +1 (786) 416-6640
        email: info@4GeeksAcademy.com
      - code: ES
        name: Madrid
        address: Calle Edison, 3. 28006 Madrid, España.
        phone: +34 (910) 86 69 83
        email: es@4geeksacademy.com
      - code: CL
        name: Chile
        address: Santiago Av. Manquehue Sur 350.
        phone: +56 (9) 7284 8039
        email: chile@4GeeksAcademy.com
      - code: CR
        name: Costa Rica
        email: puravida@4GeeksAcademy.com
      - code: VE
        name: Venezuela
        email: venezuela@4GeeksAcademy.com
