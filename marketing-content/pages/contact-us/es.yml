slug: contactanos
template: default
title: Contact 4Geeks
meta:
  robots: index, follow
  priority: 0.8
  change_frequency: weekly
  page_title: Contáctanos en 4Geeks para más info
  description: Contact 4Geeks Academy - Aprende más sobre este tema en 4Geeks Academy.
  redirects:
    - /contactanos
schema:
  include:
    - organization
    - website
sections:
  - type: hero
    section_id: hero-v9dqc2
    version: "1.0"
    variant: singleColumn
    title: Contact Us
    subtitle: ¿Tienes alguna consulta? Estaremos encantados de responderla lo antes posible. También te invitamos a revisar nuestra página de <a href="/es/faq">Preguntas Frecuentes</a>.
    badge: Contacto
    marginY:
      desktop: none
    paddingY:
      desktop: md sm
    background: hsl(var(--muted))
  - type: contact_us_info
    version: "1.0"
    title: Cuéntanos sobre ti
    form:
      variant: stacked
      submit_label: Enviar
      conversion_name: contact_us
      tags: contact-us
      automations: soft
      fields:
        email:
          visible: true
          required: true
          placeholder: Email
        first_name:
          visible: true
          required: true
          placeholder: Nombre
        last_name:
          visible: true
          required: true
          placeholder: Apellido
        client_comments:
          visible: true
          required: true
          placeholder: Escribe tu mensaje aquí
      success:
        message: Thank you! We'll be in touch soon.
      show_terms: true
    locations:
      - code: US
        name: USA
        address: {{ global.address_miami | 1801 SW 3rd Av, Miami, FL 33129. }}
        phone: +1 (786) 416-6640
        email: info@4GeeksAcademy.com
      - code: ES
        name: Madrid
        address: Calle Edison, 3. 28006 Madrid, España.
        phone: +34 (910) 86 69 83
        email: es@4geeksacademy.com
      - code: CL
        name: Chile
        address: Av. Manquehue Sur 350, oficina 110, Las Condes Región Metropolitana, Chile.
        phone: +56 (9) 7284 8039
        email: chile@4GeeksAcademy.com
      - code: CR
        name: Costa Rica
        email: puravida@4GeeksAcademy.com
      - code: VE
        name: Venezuela
        email: venezuela@4GeeksAcademy.com
    section_id: contact_us_info-0hh78p
    paddingY:
      desktop: md
  - type: sticky_cta
    version: "1.0"
    heading: ¿Listo para empezar tu carrera en tech?
    button_label: Aplicar ahora
    show_dismiss: false
    form:
      variant: inline
      conversion_name: student_application
      submit_label: Enviar solicitud
      tags: website-lead
      automations: strong
      fields:
        email:
          visible: true
          required: true
          placeholder: Correo electrónico
        first_name:
          visible: true
          required: true
          placeholder: Nombre
        last_name:
          visible: true
          required: true
          placeholder: Apellido
        phone:
          visible: true
          required: true
        program:
          visible: true
          required: true
      success:
        message: ¡Gracias! Nos pondremos en contacto en 24 horas.
    load: eager
    section_id: sticky_cta-4pmi55
