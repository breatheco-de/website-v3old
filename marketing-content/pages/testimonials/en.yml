slug: testimonials
template: default
title: testimonials
meta:
  robots: index, follow
  priority: 0.8
  change_frequency: weekly
  page_title: Student Testimonials & Reviews | 4Geeks
  description: testimonials - Learn more about this topic at 4Geeks Academy.
  redirects:
    - /testimonials
schema:
  include:
    - organization
    - website
sections:
  - type: hero
    section_id: hero-ch3r4v
    version: "1.0"
    variant: singleColumn
    title: Real Reviews from 4Geeks Graduates
    subtitle: Our graduates share how they built in-demand skills, gained confidence, and launched new careers in tech with the support of the 4Geeks community.
    badge: Student Testimonials & Career Outcomes
    trust_bar:
      rating: {{ global.global_review_rating | 4.9 }}/5
      rating_count: 2,500+
      trusted_text: Trusted by {{ global.global_total_alumni | 10,000 }}+ students
    award_badges:
      - name: Best Coding Bootcamp
        source: Forbes
        year: "2024"
      - name: Top Tech School
        source: Course Report
    background: linear-gradient(to bottom, hsl(210 100% 50% / 0.05), transparent)
    paddingY:
      desktop: md none
    marginY:
      desktop: none md
  - type: awards_marquee
    section_id: awards_marquee-v4s6g5
    version: v1.0
    speed: 40
    gradient: true
    gradientWidth: 100
    items:
      - id: switchup-2025
        logo: https://storage.googleapis.com/4geeks-academy-website/media/switchup_1765590146414.webp
        alt: SwitchUp - Best Coding Bootcamps 2025
        logoHeight: 56px
      - id: course-report-2024
        logo: https://storage.googleapis.com/4geeks-academy-website/media/course-report_1765590146414.webp
        alt: Course Report - Best Coding Bootcamp 2024
        logoHeight: 56px
      - id: tech-hub
        logo: https://storage.googleapis.com/4geeks-academy-website/media/south-florida-tech-hub_1765548979070.jpeg
        alt: South Florida Tech Hub
        logoHeight: 56px
      - id: ebootcamp
        logo: https://storage.googleapis.com/4geeks-academy-website/media/ebootcamp-top_1765549056325.png
        alt: eBootcamp Top
        logoHeight: 56px
      - id: premios-tecnologia
        logo: https://storage.googleapis.com/4geeks-academy-website/media/premios_tecnologia_sigloxxi_1765549146476.png
        alt: Premios Tecnologia Siglo XXI
        logoHeight: 56px
      - id: newsweek
        logo: https://storage.googleapis.com/4geeks-academy-website/media/newsweek_1764709608255.webp
        alt: Newsweek
        logoHeight: 56px
      - id: reviews-coursereport
        logo: https://storage.googleapis.com/4geeks-academy-website/media/reviews_1765549549051.png
        alt: 4.9 on Course Report Reviews
        logoHeight: 56px
      - id: excelencia-educativa
        logo: https://storage.googleapis.com/4geeks-academy-website/media/exelencia-educativa-es_1765549347699.png
        alt: Excelencia Educativa - Institutional Quality
        logoHeight: 56px
    marginY:
      desktop: md none
  - type: testimonials_grid
    section_id: testimonials_grid-fwe7od
    version: v1.0
    title: What Our Students Say
    subtitle: 4Geeks alumni share their experiences, career wins, and how the program helped them break into tech.
    title_color: hsl(var(--foreground))
    subtitle_color: hsl(var(--muted-foreground))
    default_box_color: hsl(var(--muted))
    default_name_color: hsl(var(--foreground))
    default_role_color: hsl(var(--muted-foreground))
    default_comment_color: hsl(var(--muted-foreground))
    default_star_color: hsl(45 93% 47%)
    columns: 3
    background: hsl(var(--background))
  - type: faq
    section_id: faq-zkzeww
    version: v1.0
    title: Frequently Asked Questions
    related_features:
      - outcomes
    marginY:
      desktop: none md
  - type: cta_banner
    section_id: cta_banner-s3c8ka
    version: "1.0"
    title: Take the Next Step Toward Your Tech Career
    subtitle: Get pricing, program details, and personalized guidance.
    background: hsl(var(--primary))
    variant: form
    form:
      variant: stacked
      submit_label: Get the details
      tags: request_more_info
      fields:
        email:
          visible: true
          required: true
          placeholder: Your email address
        first_name:
          visible: true
          required: true
          placeholder: First name
        phone:
          visible: true
          required: false
          placeholder: Phone number
        program:
          visible: true
          required: true
      success:
        message: Thank you! We'll be in touch soon.
      consent:
        email: true
        marketing: true
        marketing_text: I agree to receive information about courses and promotions
      show_terms: true
      button_className: bg-white text-primary hover:bg-white/90 border-white
      terms_className: text-white/80
    marginY:
      desktop: lg none
    paddingY:
      desktop: md
  - type: sticky_cta
    section_id: sticky_cta-790cj6
    version: "1.0"
    heading: Ready to start your tech career?
    button_label: Apply Now
    show_dismiss: false
    form:
      variant: inline
      conversion_name: student_application
      submit_label: Submit Application
      tags: website-lead
      automations: strong
      fields:
        email:
          visible: true
          required: true
        first_name:
          visible: true
          required: true
        last_name:
          visible: true
          required: false
        phone:
          visible: true
          required: false
        program:
          visible: false
          required: false
          default: ai-engineering
      success:
        message: Thanks! We'll be in touch within 24 hours.
