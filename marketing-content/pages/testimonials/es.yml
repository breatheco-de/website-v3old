slug: testimonios
template: default
title: testimonials
meta:
  robots: index, follow
  priority: 0.8
  change_frequency: weekly
  page_title: Testimonios de Estudiantes | 4Geeks
  description: testimonials - Aprende más sobre este tema en 4Geeks Academy.
  redirects: []
schema:
  include:
    - organization
    - website
sections:
  - type: hero
    section_id: hero-21rn0v
    version: "1.0"
    variant: singleColumn
    title: Reseñas reales de graduados de 4Geeks
    subtitle: Nuestros graduados comparten cómo desarrollaron habilidades demandadas, ganaron confianza y lanzaron nuevas carreras en tecnología con el apoyo de la comunidad de 4Geeks.
    badge: Testimonios de estudiantes y resultados profesionales
    trust_bar:
      rating: {{ global.global_review_rating | 4.9 }}/5
      rating_count: 2,500+
      trusted_text: Con la confianza de más de {{ global.global_total_alumni | 10.000 }} estudiantes
    award_badges:
      - name: Best Coding Bootcamp
        source: Forbes
        year: "2024"
      - name: Top Tech School
        source: Course Report
    background: linear-gradient(to bottom, hsl(210 100% 50% / 0.05), transparent)
    paddingY:
      desktop: md none
    marginY:
      desktop: none md
  - type: awards_marquee
    section_id: awards_marquee-qwcfyk
    version: v1.0
    speed: 40
    gradient: true
    gradientWidth: 100
    items:
      - id: switchup-2025
        logo: https://storage.googleapis.com/4geeks-academy-website/media/switchup_1765590146414.webp
        alt: SwitchUp - Best Coding Bootcamps 2025
        logoHeight: 56px
      - id: course-report-2024
        logo: https://storage.googleapis.com/4geeks-academy-website/media/course-report_1765590146414.webp
        alt: Course Report - Best Coding Bootcamp 2024
        logoHeight: 56px
      - id: tech-hub
        logo: https://storage.googleapis.com/4geeks-academy-website/media/south_florida_tech_hub-512x288-q70.webp
        alt: South Florida Tech Hub
        logoHeight: 56px
      - id: ebootcamp
        logo: https://storage.googleapis.com/4geeks-academy-website/media/ebootcamp_top-601x488-q70.webp
        alt: eBootcamp Top
        logoHeight: 56px
      - id: premios-tecnologia
        logo: https://storage.googleapis.com/4geeks-academy-website/media/premios_tecnologia_sigloxxi_1765549146476.png
        alt: Premios Tecnologia Siglo XXI
        logoHeight: 56px
      - id: newsweek
        logo: https://storage.googleapis.com/4geeks-academy-website/media/newsweek_badge-800x550-q55.webp
        alt: Newsweek
        logoHeight: 56px
      - id: reviews-coursereport
        logo: https://storage.googleapis.com/4geeks-academy-website/media/reviews_1765549549051.png
        alt: 4.9 on Course Report Reviews
        logoHeight: 56px
      - id: excelencia-educativa
        logo: https://storage.googleapis.com/4geeks-academy-website/media/exelencia_educativa-544x226-q70.webp
        alt: Excelencia Educativa - Institutional Quality
        logoHeight: 56px
    marginY:
      desktop: md none
  - type: testimonials_grid
    section_id: testimonials_grid-wocekd
    version: v1.0
    title: Lo que dicen nuestros estudiantes
    subtitle: Alumni de 4Geeks comparten sus experiencias, logros profesionales y cómo el programa les ayudó a entrar en la industria tecnológica.
    title_color: hsl(var(--foreground))
    subtitle_color: hsl(var(--muted-foreground))
    default_box_color: hsl(var(--muted))
    default_name_color: hsl(var(--foreground))
    default_role_color: hsl(var(--muted-foreground))
    default_comment_color: hsl(var(--muted-foreground))
    default_star_color: hsl(45 93% 47%)
    columns: 3
    background: hsl(var(--background))
  - type: faq
    section_id: faq-cumj8r
    version: v1.0
    title: Preguntas frecuentes
    related_features:
      - outcomes
    marginY:
      desktop: none md
  - type: cta_banner
    version: "1.0"
    title: Da el siguiente paso hacia tu carrera en tecnología
    subtitle: Recibe información personalizada del programa y los próximos pasos.
    variant: form
    form:
      variant: stacked
      submit_label: Obtener los detalles
      tags: request_more_info
      fields:
        email:
          visible: true
          required: true
          placeholder: Tu correo electrónico
        first_name:
          visible: true
          required: true
          placeholder: Nombre
        phone:
          visible: true
          required: true
          placeholder: Número de teléfono
        program:
          visible: true
          required: true
          default: auto
      success:
        message: ¡Gracias! Nos pondremos en contacto contigo pronto.
      consent:
        email: true
        marketing: true
        marketing_text: Acepto recibir información por email, WhatsApp y/o otros canales sobre talleres, eventos, cursos y materiales de marketing. Nunca compartiremos tus datos y puedes darte de baja cuando quieras.
      show_terms: true
      button_className: bg-primary
    form_background: hsl(var(--card))
    terms_color: hsl(var(--primary))
    paddingY:
      desktop: md
    marginY:
      desktop: lg none
    background: hsl(var(--primary))
    section_id: cta_banner-kxo25m
  - type: sticky_cta
    version: "1.0"
    heading: ¿Listo para empezar tu carrera en tech?
    button_label: Aplicar ahora
    show_dismiss: false
    form:
      variant: inline
      conversion_name: student_application
      submit_label: Enviar solicitud
      tags: website-lead
      automations: strong
      fields:
        email:
          visible: true
          required: true
          placeholder: Correo electrónico
        first_name:
          visible: true
          required: true
          placeholder: Nombre
        last_name:
          visible: true
          required: true
          placeholder: Apellido
        phone:
          visible: true
          required: true
        program:
          visible: true
          required: true
      success:
        message: ¡Gracias! Nos pondremos en contacto en 24 horas.
    load: eager
    section_id: sticky_cta-csl419
