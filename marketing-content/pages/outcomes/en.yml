  - type: cta_banner
    section_id: cta_banner-khrszu
    version: "1.0"
    title: Take the Next Step Toward your Tech Career
    subtitle: Get pricing, program details, and personalized guidance.
    background: hsl(var(--primary))
    variant: form
    form:
      variant: stacked
      submit_label: Get the details
      tags: request_more_info
      fields:
        email:
          visible: true
          required: true
          placeholder: Your email address
        first_name:
          visible: true
          required: true
          placeholder: First name
        phone:
          visible: true
          required: true
          placeholder: Phone number
        program:
          visible: true
          required: true
      success:
