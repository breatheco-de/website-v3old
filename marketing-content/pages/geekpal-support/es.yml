slug: soporte-geekpal
template: default
title: Soporte GeekPAL
meta:
  robots: index, follow
  priority: 0.9
  change_frequency: weekly
  page_title: Soporte GeekPAL | 4Geeks Academy
  description: Obtén mentoría ilimitada 1:1 en programación y acompañamiento con IA de Rigobot 24/7. Nunca programes solo, recibe retroalimentación instantánea y únete a una comunidad global de desarrolladores.
  redirects:
    - /es/geekpal
schema:
  include:
    - organization
    - website
sections:
  - type: hero
    version: "1.0"
    variant: productShowcase
    title: Mentoría en programación potenciada por IA
    welcome_text: Bienvenido a
    brand_mark:
      prefix: Geek
      highlight: PAL
      suffix: ":"
      color: destructive
    description: Accede a mentoría ilimitada en programación, soporte inteligente con IA disponible 24/7 y una comunidad global de desarrolladores para acelerar tu aprendizaje y avanzar en tu carrera en tecnología.
    bullets:
      - text: Mentoría ilimitada 1:1 en programación
      - text: Soporte personalizado con IA 24/7
      - text: Acceso de por vida
      - text: Comunidad global de desarrolladores
    video:
      url: https://youtu.be/D5nUZNL52-Q
      ratio: "3:4"
      muted: true
      autoplay: false
      loop: true
    paddingY:
      mobile: none lg
      desktop: md lg
  - type: banner
    version: "1.0"
    logo: https://storage.googleapis.com/4geeks-academy-website/media/rigobot-logo_1764707022198.webp
    avatars:
      - https://randomuser.me/api/portraits/women/1.jpg
      - https://randomuser.me/api/portraits/men/2.jpg
      - https://randomuser.me/api/portraits/women/3.jpg
      - https://randomuser.me/api/portraits/men/4.jpg
    title: Avanza sin bloqueos. Aprende con confianza.
    description: El mayor obstáculo al aprender tecnología no es la dificultad, sino quedarse sin apoyo en el momento clave. GeekPAL está siempre disponible para ti, ofreciéndote orientación inmediata cuando la necesitas, para que avances de forma constante y segura.
    background: gradient
  - type: human_and_ai_duo
    version: "1.0"
    heading: "Mentores expertos + IA: Acelera tu aprendizaje en programación"
    description: El aprendizaje en programación es más efectivo cuando la experiencia humana y la IA trabajan en conjunto. En 4Geeks, avanzas con mentoría 1:1 ilimitada y el soporte inteligente de Rigobot, disponibles cuando los necesites.
    bullet_groups:
      - title: "Nuestro Equipo de Mentores Expertos ofrece:"
        image: https://storage.googleapis.com/4geeks-academy-website/media/profile-pic6_1764775742734.webp
        bullets:
          - text: Orientación personalizada
          - text: Resolución de problemas en vivo
          - text: Asistencia experta para corregir errores
          - text: Perspectiva de la industria y asesoría profesional
      - title: "Rigobot + Learnpack:"
        bullets:
          - text: Feedback y tutoría instantánea 24/7
          - text: Ajusta sus recomendaciones a tus habilidades y progreso
          - text: Soporte para debugging y resolución de problemas
          - text: Cientos de ejercicios prácticos y pruebas de programación
    images:
      - src: https://storage.googleapis.com/4geeks-academy-website/media/student-1-asian.png
        alt: Estudiante asiático aprendiendo a programar
        object_fit: cover
        object_position: 40%20%
        border_radius: 0.5rem
      - src: https://storage.googleapis.com/4geeks-academy-website/media/student-2-latin.png
        alt: Estudiante latino trabajando en un proyecto
        object_fit: cover
        object_position: 50%30%
        border_radius: 0.5rem
      - src: https://storage.googleapis.com/4geeks-academy-website/media/student-3-african.png
        alt: Estudiante africano colaborando con su equipo
        object_fit: cover
        object_position: 50%15%
        border_radius: 0.5rem
      - src: https://storage.googleapis.com/4geeks-academy-website/media/student-4-lady-latin.png
        alt: Estudiante latina celebrando su éxito
        object_fit: cover
        object_position: 50%30%
        border_radius: 0.5rem
    image: https://storage.googleapis.com/4geeks-academy-website/media/Group_6685_(1)_1765300162049.png
    image_alt: Mujer trabajando en laptop en un café
    background: bg-background
    paddingY:
      mobile: sm none
      desktop: md none
  - type: community_support
    version: "1.0"
    heading: Aprende acompañado por una comunidad global
    description: 4Geeks es más que un programa; es una red activa de profesionales tech, mentores y geeks que te ayudan a seguir avanzando en tu carrera.
    bullet_groups:
      - title: Comunidad en Slack
        description: Recibe ayuda en tiempo real de mentores, alumni y compañeros a través de nuestros canales activos y temáticos, desde soporte técnico, hasta bolsas de empleo y consejos de carrera (¡y sí, también hay humor geek!).
        icon: BrandSlack
        badge: 6,000+ Miembros
        accent_color: primary
      - title: 4Geeks.com
        description: Sigue desarrollando tus habilidades con recursos adicionales, eventos en vivo y proyectos colaborativos. Conecta con personas que ya estuvieron donde tú estás y saben cómo ayudarte a llegar a donde quieres ir.
        icon: Rigobot
        accent_color: primary
    image: https://storage.googleapis.com/4geeks-academy-website/media/Group-6606.webp
    image_alt: Comunidad global de desarrolladores 4Geeks
    background: bg-primary/5
    paddingY:
      desktop: none md
  - type: two_column
    proportions:
      - 12
      - 0
    background: bg-background
    alignment: center
    left:
      video: https://www.youtube.com/watch?v=MBXqEnhodx0
      video_width: 900px
      heading: Escucha a nuestros graduados
      description: Escucha a Joao hablar sobre su experiencia durante y después de nuestro bootcamp y cómo el acceso ilimitado a mentoría en programación marcó una gran diferencia en su carrera.
      justify: center
      text_align: center
      font_size: lg
    heading_above_on_md: false
    gap: "8"
    paddingY:
      desktop: lg md
  - type: testimonials_slide
    title: Carreras reales que comenzaron aquí
    description: Descubre cómo nuestros estudiantes alcanzaron sus metas
    marginY:
      desktop: none
    paddingY:
      desktop: md none
  - type: faq
    title: Preguntas frecuentes
    related_features:
      - mentors-and-teachers
      - career-support
    item_overrides:
      cmo-estn-estructuradas-las-clases-en-vivo:
        hideOnLocations:
          - barcelona-spain
          - berlin-germany
          - dublin-ireland
          - hamburg-germany
          - lisbon-portugal
