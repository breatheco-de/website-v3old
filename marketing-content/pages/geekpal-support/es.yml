          - munich-germany
          - rome-italy
          - valencia-spain
      consigo-trabajo-despus-de-completar-el-programa:
        hideOnLocations:
          - barcelona-spain
          - berlin-germany
          - dublin-ireland
          - hamburg-germany
          - lisbon-portugal
          - madrid-spain
          - malaga-spain
          - milan-italy
          - munich-germany
          - rome-italy
          - valencia-spain
    marginY:
      desktop: none
    paddingY:
      desktop: none md
  - type: sticky_cta
    version: "1.0"
    heading: ¿Listo para empezar tu carrera en tech?
    button_label: {{ global.call_to_action_apply | Aplicar ahora }}
    show_dismiss: false
    form:
      variant: inline
      conversion_name: student_application
      submit_label: Enviar solicitud
      tags: website-lead
      fields:
        email:
          visible: true
          required: true
        first_name:
          visible: true
          required: true
          placeholder: Nombre Completo
        last_name:
          visible: true
          required: false
        phone:
          visible: true
          required: true
          placeholder: Número telefónico
        program:
          visible: true
          required: true
          default: auto
          placeholder: Selecciona un programa
      success:
        message: ¡Gracias! Nos pondremos en contacto en 24 horas.
  - type: cta_banner
    version: "1.0"
    title: Da el siguiente paso hacia tu carrera en tecnología
    subtitle: Recibe información personalizada del programa y los próximos pasos.
    background: hsl(var(--primary))
    variant: form
    form:
      variant: stacked
      submit_label: Obtener los detalles
      tags: request_more_info
      automations: hard
      fields:
        email:
          visible: true
          required: true
          placeholder: Tu correo electrónico
        first_name:
          visible: true
          required: true
          placeholder: Nombre
        phone:
          visible: true
          required: true
          placeholder: Número de teléfono
        program:
          visible: true
          required: true
          default: auto
      success:
        message: ¡Gracias! Nos pondremos en contacto contigo pronto.
      consent:
        email: true
        marketing: true
        marketing_text: Acepto recibir información por email, WhatsApp y/o otros canales sobre talleres, eventos, cursos y materiales de marketing. Nunca compartiremos tus datos y puedes darte de baja cuando quieras.
      show_terms: true
      button_className: bg-primary
    form_background: hsl(var(--card))
    terms_color: hsl(var(--primary))
    marginY:
      desktop: lg none
    paddingY:
      desktop: md
