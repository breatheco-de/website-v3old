        subtitle: Impulsando el desarrollo del talento en Costa Rica
        description: En colaboración con Forte y Crusa, 4Geeks Academy se ha asociado con el modelo FORTE para potenciar el desarrollo del talento en Costa Rica. Este programa ha capacitado a más de 35 estudiantes en tecnologías digitales de alta demanda, con enfoque en mujeres de áreas con alto desempleo. Los participantes reciben capacitación gratuita, lo que les permite acceder a mejores empleos en la industria 4.0 y contribuir al crecimiento económico del país.
