slug: alianzas
template: default
title: Aliados de 4Geeks
meta:
  robots: index, follow
  priority: 0.8
  change_frequency: weekly
  page_title: Aliados de 4Geeks | 4Geeks
  description: socios - Aprende más sobre este tema en 4Geeks Academy.
  redirects: []
schema:
  include:
    - organization
    - website
sections:
  - type: hero
    section_id: hero-jm0vbs
    version: "1.0"
    variant: simpleTwoColumn
    title: Construyendo el futuro de la tecnología, juntos
    subtitle: 4Geeks Academy se asocia con universidades, organizaciones sin fines de lucro, iniciativas laborales y organizaciones globales para ampliar el acceso a la educación tecnológica, colocar talento diverso y cerrar la brecha de habilidades digitales, creando caminos profesionales más fuertes y una fuerza laboral lista para la era de la IA.
    image:
      src: https://storage.googleapis.com/4geeks-academy-website/media/our-story_1765323971104.webp
      alt: Estudiantes colaborando en un espacio de trabajo tecnológico
    cta_buttons:
      - text: Únete a nuestra red de alianzas
        url: "#apply-modal"
        variant: primary
        icon: Rocket
    background: linear-gradient(to bottom, hsl(210 100% 50% / 0.05), transparent)
    marginY:
      desktop: none lg
    paddingY:
      desktop: md none
  - type: modal
    version: "1.0"
    section_id: apply-modal
    heading: Obtener curriculum
    description: Fill out the form below and we'll get back to you within 24 hours.
    show_close: true
    size: md
    form:
      variant: stacked
      submit_label: Download
      tags: request_more_info
      automations: soft
      fields:
        email:
          visible: true
          required: true
        first_name:
          visible: true
          required: true
        phone:
          visible: true
          required: false
        program:
          visible: true
          required: true
          default: auto
      success:
        message: ¡Gracias! Nos pondremos en contacto dentro de 24 horas.
  - type: features_quad
    section_id: features_quad-gfp76k
    version: "1.0"
    variant: default
    heading: ¿Por qué asociarse con 4Geeks?
    description: Cada colaboración está diseñada para generar resultados medibles para organizaciones y comunidades, creando oportunidades, expandiendo el acceso a la educación tecnológica y fortaleciendo la fuerza laboral tecnológica del futuro.
    cards:
      - icon: Trophy
        title: Becas y financiamiento
        description: Elimina barreras financieras y hace que la educación en programación sea accesible para comunidades desfavorecidas.
      - icon: Wallet
        title: Programas de capacitación y recapacitación
        description: Invierte en tu fuerza laboral y prepara a los empleados para el futuro digital.
      - icon: Clock
        title: Procesos de reclutamiento y contratación
        description: Accede directamente a desarrolladores, científicos de datos y especialistas en ciberseguridad listos para el trabajo.
      - icon: Users
        title: Eventos y alcance comunitario
        description: Colabora en hackatones, series de charlas e iniciativas de innovación que amplifican tu marca y misión.
    background: hsl(var(--muted))
    marginY:
      desktop: none lg
  - type: features_grid
    section_id: features_grid-gta6gr
    version: "1.0"
    variant: stats-text
    maxWidth:
      desktop: 6xl
    title: Impacto en números
    subtitle: Más de {{ global.total_scholarships | 20 }} en becas y subvenciones otorgadas
    description: Los socios de 4Geeks Academy empoderan a miles de estudiantes en todo el mundo con acceso a educación tecnológica, mentoría práctica y oportunidades profesionales que generan resultados reales.
    background: hsl(210 100% 50% / 0.05)
    items:
      - value: {{ global.global_job_placement_rate | 84 }}%
        title: Tasa de contratación en 6 meses tras graduarse
      - value: 5K+
        title: Socios contratantes
      - value: {{ global.global_total_alumni | 4000 }}
        title: Estudiantes apoyados en todo el mundo
    marginY:
      desktop: none lg
    paddingY:
      desktop: none
  - type: partnership_carousel
    section_id: partnership_carousel-cz1tz4
    variant: split-card
    vertical_cards: true
    version: v1.0
    heading: Nuestras alianzas globales
    subtitle: Colaborando con instituciones líderes para llevar la educación en programación en todo el mundo
    background: hsl(var(--muted))
    slides:
      - image_id: united_way_event
        object_position: 100% 80%
        title: United Way Miami y 4Geeks
        subtitle: Lanzamiento del Proyecto de Fuerza Laboral de Miami
        description: United Way Miami se ha asociado con 4Geeks Academy para lanzar el Proyecto de Fuerza Laboral de Miami. Este programa transformador fue creado para brindar educación y capacitación de alta calidad a los residentes del condado de Miami-Dade, gracias a una donación multimillonaria de Mackenzie Scott. Los estudiantes admitidos recibirán capacitación en programación sin costos iniciales.
        stats:
