  - type: cta_banner
    version: "1.0"
    title: Ready to become a Partner?
    subtitle: Let’s build scalable pathways to high-growth tech careers together.
    background: hsl(var(--primary))
    variant: form
    form:
      variant: stacked
      submit_label: Start the Conversation
      tags: contact-us
      automations: soft
      fields:
        email:
          visible: true
          required: true
          placeholder: Your email address
        first_name:
          visible: true
          required: true
          placeholder: First name
        phone:
          visible: true
          required: false
          placeholder: Phone number
        client_comments:
          visible: true
          required: true
          placeholder: Comments
      success:
        message: Thank you! We'll be in touch soon.
      consent:
        email: true
        marketing: true
        marketing_text: I agree to receive information about courses and promotions
      show_terms: true
      button_className: bg-white text-primary hover:bg-white/90 border-white
      terms_className: text-white/80
    marginY:
      desktop: lg none
    paddingY:
      desktop: md
  - type: sticky_cta
    version: "1.0"
    heading: Ready to start your tech career?
    button_label: Apply Now
    show_dismiss: false
    form:
      variant: inline
      conversion_name: student_application
      submit_label: Submit Application
      tags: website-lead
      automations: strong
      fields:
        email:
          visible: true
          required: true
        first_name:
          visible: true
          required: true
        last_name:
          visible: true
          required: false
        phone:
          visible: true
          required: false
        program:
          visible: false
