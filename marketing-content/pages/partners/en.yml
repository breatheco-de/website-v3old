slug: partners
template: default
title: partners
meta:
  robots: index, follow
  priority: 0.8
  change_frequency: weekly
  page_title: partners | 4Geeks Academy
  description: partners - Learn more about this topic at 4Geeks Academy.
  redirects:
    - /partners
schema:
  include:
    - organization
    - website
sections:
  - type: hero
    version: "1.0"
    variant: simpleTwoColumn
    title: Building the Futsure of Tech, Together
    subtitle: 4Geeks Academy partners with universities, nonprofits, workforce initiatives, and global organizations to expand access to tech education, place diverse talent, and bridge the digital skills gap, creating stronger career pathways and a workforce ready for the AI era.
    image: https://storage.googleapis.com/4geeks-academy-website/media/Copia de Fav_DSC_1146.JPG
    cta_buttons:
      - text: Join our partnership network
        url: "#apply-modal"
        variant: primary
        icon: Rocket
    background: linear-gradient(to bottom, hsl(210 100% 50% / 0.05), transparent)
    marginY:
      desktop: none lg
    paddingY:
      desktop: md none
  - type: modal
    version: "1.0"
    section_id: apply-modal
    heading: Start Your Application
    description: Fill out the form below and we'll get back to you within 24 hours.
    show_close: true
    size: md
    form:
      variant: stacked
      submit_label: Submit Application
      tags: contact-us
      automations: soft
      fields:
        email:
          visible: true
          required: true
        first_name:
          visible: true
          required: true
        phone:
          visible: true
          required: false
      success:
        message: Thanks! We'll be in touch within 24 hours.
  - type: features_quad
    version: "1.0"
    variant: default
    heading: Why Partner with 4Geeks?
    description: Every collaboration is designed to drive measurable results for organizations and communities, creating opportunities, expanding access to tech education, and strengthening the future tech workforce.
    cards:
      - icon: Trophy
        title: Scholarships & Funding
        description: Break down financial barriers and make coding education accessible to underserved communities.
      - icon: Wallet
        title: Reskilling & Upskilling Programs
        description: Invest in your workforce and prepare employees for the digital-first future.
      - icon: Clock
        title: Recruitment & Hiring Pipelines
        description: Gain direct access to job-ready developers, data scientists, and cybersecurity specialists.
      - icon: Users
        title: Events & Outreach
        description: Partner on hackathons, speaker series, and innovation initiatives that amplify your brand and mission.
    background: hsl(var(--muted))
    marginY:
      desktop: none md
  - type: features_grid
    version: "1.0"
    variant: stats-text
    title: Impact in Numbers
    subtitle: Over {{ global.total_scholarships | $20M }} in scholarships and grants awarded
    description: 4Geeks Academy partners empower thousands of students worldwide with access to tech education, hands-on mentorship, and career opportunities that drive real results.
    background: hsl(210 100% 50% / 0.05)
    items:
      - value: {{ global.global_job_placement_rate | 84 }}%
        title: Job placement rate within 6 months of graduation
      - value: 5000+
        title: Hiring Partners
      - value: 6000+
        title: Students Supported Worldwide
    marginY:
      desktop: none lg
    paddingY:
      desktop: none
  - type: partnership_carousel
    variant: split-card
    vertical_cards: true
    version: v1.0
    heading: Our Global Partnerships
    subtitle: Collaborating with leading institutions to bring coding education worldwide
    background: hsl(var(--muted))
    slides:
      - image_id: united_way_event
        object_position: 100% 80%
        title: United Way Miami and 4Geeks Academy
        subtitle: Launching the Miami Workforce Project
        description: United Way Miami has partnered with 4Geeks Academy to launch the Miami Workforce Project. This transformative program was created to provide top-quality education and training to Miami-Dade County residents and is made possible by a multi-million gift from philanthropist Mackenzie Scott. Admitted students will receive coding training with no upfront costs.
        stats:
          - value: $1mm
            label: Total cost
          - value: "100"
            label: Geeks benefited
        institution_logos:
          - image_id: 4geeks_academy_logo
            alt: 4Geeks Academy logo
        press_references:
          - text: Miami Herald
            url: https://www.miamiherald.com/news/business/article263937731.html
            source: Miami Herald
          - text: Refresh Miami
            url: https://refreshmiami.com/news/miami-based-coding-school-4geeks-is-breaking-down-the-barriers-to-becoming-a-software-developer/
            source: Refresh Miami
          - text: See full project (PDF)
            url: https://storage.googleapis.com/4geeks-academy-website/PDF%20and%20Docs/UWM%20facts%20.pdf
            source: PDF
        cta:
          text: Become a partner
          url: "#bottom"
          variant: primary
      - image_id: crusa_forte_scholarship
        object_position: 100% 80%
        title: Costa Rica Forte and 4Geeks Academy
        subtitle: Boosting talent development in Costa Rica
        description: In collaboration with Forte and Crusa, 4Geeks Academy has partnered with the FORTE model to boost talent development in Costa Rica. This program has trained over 35 students in high-demand digital technologies, focusing on women from areas with high unemployment. Through the program, participants receive free training, enabling them to access better jobs in the 4.0 industry and contribute to the country's economic growth.
        stats:
          - value: $50,000
            label: Total cost
          - value: "35"
            label: Geeks benefited
        institution_logos:
          - image_id: bid_logo
            alt: BID logo
          - image_id: logo_crusa
            alt: CRUSA Foundation logo
          - image_id: 4geeks_academy_logo
            alt: 4Geeks Academy logo
        press_references:
          - text: Periodico Mensaje
            url: https://www.periodicomensaje.com/educacion/11609-mas-de-100-mujeres-concluyeron-formacion-en-tecnologias-digitales-gracias-a-la-alianza-crusa-forte
            source: Periodico Mensaje
          - text: La Republica
            url: https://www.larepublica.net/noticia/mas-de-100-mujeres-se-formaron-en-tecnologias-digitales-para-aumentar-sus-oportunidades-de-empleo
            source: La Republica
          - text: See full project (PDF)
            url: https://storage.googleapis.com/4geeks-academy-website/PDF%20and%20Docs/FORTE%20Report.pdf
            source: PDF
        cta:
          text: Become a partner
          url: "#bottom"
          variant: primary
      - image_id: costa_rica_city
        object_position: 10% 80%
        title: Costa Rica-CINDE and 4Geeks Project
        subtitle: Investing in Costa Rica's tech talent
        description: In collaboration with the Ministry for Science, Technology, Telecommunication and Innovation of Costa Rica, the IDB launched a program to invest in Costa Rica's talent. Together, we're helping around 250 students become skilled software developers, opening doors to better job opportunities after graduation.
        stats:
          - value: $1.5mm
            label: Total cost
          - value: "212"
            label: Geeks benefited
        institution_logos:
          - image_id: logo_crusa
            alt: CRUSA Foundation logo
          - image_id: 4geeks_academy_logo
            alt: 4Geeks Academy logo
        press_references:
          - text: Revista Summa
            url: https://revistasumma.com/costa-rica-y-bid-lanzan-becas-para-aprender-programacion/
            source: Revista Summa
          - text: IDB Press
            url: https://www.iadb.org/es/idb-blog
            source: IDB Press
          - text: Cultura Costa Rica
            url: https://culturacr.net/4geeks-academy-ofrecera-becas-del-100-para-aprender-programacion/
            source: Cultura Costa Rica
          - text: See full project (PDF)
            url: https://storage.googleapis.com/4geeks-academy-website/PDF%20and%20Docs/Costa%20Rica%20CINDE%20and%204Geeks%20(1).pdf
            source: PDF
        cta:
          text: Become a partner
          url: "#bottom"
          variant: outline
      - image_id: uruguay_city
        object_position: 10% 80%
        title: UTEC and 4Geeks
        subtitle: Training Uruguayans in coding
        description: This project was possible thanks to a combined effort between UTEC, IDB, and 4Geeks. The goal was to train Uruguayans in coding and leverage tech-driven growth in the country.
        stats:
          - value: 175k
            label: Total cost
          - value: "60"
            label: Geeks benefited
        institution_logos:
          - image_id: bid_logo
            alt: Interamerican Development Bank logo
          - image_id: logo_utec
            alt: UTEC logo
          - image_id: 4geeks_academy_logo
            alt: 4Geeks Academy logo
        press_references:
          - text: El País
            url: https://storage.googleapis.com/4geeks-academy-website/PDF%20and%20Docs/Costa%20Rica%20CINDE%20and%204Geeks%20(1).pdf
            source: El País
          - text: San José Ahora
            url: https://sanjoseahora.com.uy/2022/03/31/utec-san-jose-brindara-un-nuevo-bootcamp-sobre-machine-learning-e-inteligencia-artificial/
            source: San José Ahora
          - text: Marca País
            url: https://www.uruguayxxi.gub.uy/es/marca-pais/
            source: Marca País
          - text: See full project (PDF)
            url: https://storage.googleapis.com/4geeks-academy-website/PDF%20and%20Docs/Uruguay%20Projects.pdf
            source: PDF
        cta:
          text: Become a partner
          url: "#bottom"
          variant: outline
