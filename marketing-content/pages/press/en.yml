slug: press
template: default
title: press
meta:
  robots: index, follow
  priority: 0.8
  change_frequency: weekly
  page_title: Press & Media | 4Geeks Academy
  description: press - Learn more about this topic at 4Geeks Academy.
  redirects:
    - /press
schema:
  include:
    - organization
    - website
sections:
  - type: hero
    section_id: hero-003lu8
    version: "1.0"
    variant: singleColumn
    title: Our Story, Making News
    badge: Press & Media
    trust_bar:
      rating: {{ global.global_review_rating | 4.8 }}/5
      rating_count: 2,500+
      trusted_text: Trusted by {{ global.global_total_alumni | 10,000 }}+ students
    award_badges:
      - name: Best Coding Bootcamp
        source: Forbes
        year: "2024"
      - name: Top Tech School
        source: Course Report
    background: linear-gradient(to bottom, hsl(210 100% 50% / 0.05), transparent)
    paddingY:
      desktop: md none
  - type: list_press_mentions
    dynamic_entries:
      database: press_mentions
      item_template:
        title: {{ single.title }}
        excerpt: {{ single.excerpt }}
        logo: {{ single.logo }}
        link_url: {{ single.link_url }}
        link_text: {{ single.link_text }}
    paddingY:
      desktop: none md
  - type: value_proof_panel
    section_id: value_proof_panel-5sit3c
    title: Recognized Globally For Excellence
    subtitle: We don't just say we deliver; recognition from trusted sources proves our worth.
    evidence_items:
      - icon: Trophy
        title: Top 5 Coding Bootcamps worldwide
        source: Newsweek, Forbes, SwitchUp, Course Report
      - icon: Award
        title: Best student support & best value
        source: Course Report, SwitchUp
      - icon: Users
        title: 35,000+ graduates across 20+ countries
        description: A global community of successful tech professionals
    media:
      type: image
      src: https://storage.googleapis.com/4geeks-academy-website/media/caracas-graduates_1765387638222.png
      alt: Students collaborating in classroom
      aspect_ratio: "4:3"
      style: rounded
    background: hsl(210 100% 50% / 0.05)
    stacked_header: true
    marginY:
      desktop: none lg
    paddingY:
      desktop: md
  - type: awards_marquee
    section_id: awards_marquee-jv7gmz
    version: v1.0
    speed: 40
    gradient: true
    gradientWidth: 100
    items:
      - id: switchup-2025
        logo: https://storage.googleapis.com/4geeks-academy-website/media/switchup_1765590146414.webp
        alt: SwitchUp - Best Coding Bootcamps 2025
        logoHeight: 56px
      - id: course-report-2024
        logo: https://storage.googleapis.com/4geeks-academy-website/media/course-report_1765590146414.webp
        alt: Course Report - Best Coding Bootcamp 2024
        logoHeight: 56px
      - id: tech-hub
        logo: https://storage.googleapis.com/4geeks-academy-website/media/south-florida-tech-hub_1765548979070.jpeg
        alt: South Florida Tech Hub
        logoHeight: 56px
      - id: ebootcamp
        logo: https://storage.googleapis.com/4geeks-academy-website/media/ebootcamp-top_1765549056325.png
        alt: eBootcamp Top
        logoHeight: 56px
      - id: premios-tecnologia
        logo: https://storage.googleapis.com/4geeks-academy-website/media/premios_tecnologia_sigloxxi_1765549146476.png
        alt: Premios Tecnologia Siglo XXI
        logoHeight: 56px
      - id: newsweek
        logo: https://storage.googleapis.com/4geeks-academy-website/media/newsweek_1764709608255.webp
        alt: Newsweek
        logoHeight: 56px
      - id: reviews-coursereport
        logo: https://storage.googleapis.com/4geeks-academy-website/media/reviews_1765549549051.png
        alt: 4.9 on Course Report Reviews
        logoHeight: 56px
      - id: excelencia-educativa
        logo: https://storage.googleapis.com/4geeks-academy-website/media/exelencia-educativa-es_1765549347699.png
        alt: Excelencia Educativa - Institutional Quality
        logoHeight: 56px
    marginY:
      desktop: none lg
  - type: faq
    section_id: faq-t2xnm8
    title: Frequently Asked Questions
    related_features:
      - outcomes
      - scholarships
    marginY:
      desktop: none md
  - type: cta_banner
    section_id: cta_banner-b8nnpi
    version: "1.0"
    title: Take the Next Step Toward Your Tech Career
    subtitle: Get pricing, program details, and personalized guidance.
    background: hsl(var(--primary))
    variant: form
    form:
      variant: stacked
      submit_label: Get the details
      tags: request_more_info
      fields:
        email:
          visible: true
          required: true
          placeholder: Your email address
        first_name:
          visible: true
          required: true
          placeholder: First name
        phone:
          visible: true
          required: false
          placeholder: Phone number
        program:
          visible: true
          required: true
      success:
        message: Thank you! We'll be in touch soon.
      consent:
        email: true
        marketing: true
        marketing_text: I agree to receive information about courses and promotions
      show_terms: true
      button_className: bg-white text-primary hover:bg-white/90 border-white
      terms_className: text-white/80
    marginY:
      desktop: lg none
    paddingY:
      desktop: md
  - type: sticky_cta
    section_id: sticky_cta-hhq5oq
    version: "1.0"
    heading: Ready to start your tech career?
    button_label: Apply Now
    show_dismiss: false
    form:
      variant: inline
      conversion_name: student_application
      submit_label: Submit Application
      tags: website-lead
      automations: strong
      fields:
        email:
          visible: true
          required: true
        first_name:
          visible: true
          required: true
        last_name:
          visible: true
          required: false
        phone:
          visible: true
          required: false
        program:
          visible: false
          required: false
          default: ai-engineering
      success:
        message: Thanks! We'll be in touch within 24 hours.
