    version: v1.0
    title: Destacados en prensa
    columns: 3
    items:
      - logo: global-miami-logo
        title: El Futuro del Trabajo
        excerpt: Los bootcamps de tecnología ofrecen una formación rápida y práctica, enfocada en habilidades específicas. Esto los convierte en una opción atractiva para trabajadores que quieren actualizar sus conocimientos o cambiar de carrera sin necesidad de invertir años en un título universitario.
        link_text: Leer Artículo
        link_url: https://issuu.com/coralgablesmagazine.com/docs/gm_jan-feb_2024_fullissue/74?ff
      - logo: forbes_logo_award
        title: Mejores Bootcamps de Ciencia de Datos en 2024
        excerpt: Los profesionales actuales y futuros de la tecnología pueden completar un bootcamp de ciencia de datos para perfeccionar sus habilidades existentes para cambiar de campo o avanzar en sus carreras actuales...
        link_text: Leer Artículo
        link_url: https://www.forbes.com/advisor/education/bootcamps/best-data-science-bootcamps/
      - logo: the-miami-herald-logo
        title: Becas para aprender a programar
        excerpt: Después de mucho trabajo hemos logrado aliarnos con United Way para ofrecer 100 becas en poblaciones minorias para convertirse en desarrollador de software
        link_text: Leer Artículo
        link_url: https://www.miamiherald.com/news/business/article263937731.html
      - logo: forbes_logo_award
        title: Coding Bootcamps para aprender a programar
        excerpt: En un estudio publicado por Forbes donde se especifica todas las maneras en las que puedes convertirte en un desarrollador web en los EEUU
        link_text: Leer Artículo
        link_url: https://www.forbes.com/advisor/education/what-is-web-development
      - logo: forbes_logo_award
        title: 5 Mejores Bootcamps Full-Stack en Línea para este 2024
        excerpt: Los desarrolladores full-stack crean y solucionan problemas para la web y software, habilidades muy demandadas actualmente para diversas industrias.
        link_text: Leer Artículo
        link_url: https://www.forbes.com/advisor/education/bootcamps/best-full-stack-developer-bootcamp/
      - logo: cnn-logo
        title: Entrevista / 4Geeks en CNN Chile
        excerpt: "Gracias a nuestros amigos de CNN Chile por haber estado presentes en nuestro evento y publicar tan buen material sobre el futuro en educación que ofrecemos a la comunidad de Santiago a través de nuestro programa de #Bootcamp de #Programación."
        link_text: Ver Entrevista
        link_url: https://www.facebook.com/4GeeksAcademyCL/videos/492034597993382/
      - logo: https://storage.googleapis.com/4geeks-academy-website/media/economista-logo.png
        title: 4Geeks lanza un millón en becas para la formación de futuros programadores
        excerpt: La escuela de programadores 4Geeks Academy apuesta por acercar el mundo de la programación a todos los públicos. La compañía lanza más de 300 becas con un valor de un millón de euros en todo el mundo a través del Marketplace Landing.Jobs.
        link_text: Ver Entrevista
        link_url: https://www.eleconomista.es/ecoaula/noticias/11389106/09/21/4Geeks-Academy-lanza-un-millon-en-becas-para-la-formacion-de-futuros-programadores.html
