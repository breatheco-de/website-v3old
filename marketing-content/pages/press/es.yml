slug: prensa
template: default
title: press
meta:
  robots: index, follow
  priority: 0.8
  change_frequency: weekly
  page_title: Prensa y Medios | 4Geeks Academy
  description: press - Aprende más sobre este tema en 4Geeks Academy.
  redirects: []
schema:
  include:
    - organization
    - website
sections:
  - type: hero
    section_id: hero-u9x8y8
    version: "1.0"
    variant: singleColumn
    title: Nuestra Historia, en las noticias
    badge: Prensa y medios
    trust_bar:
      rating: {{ global.global_review_rating | 4.8 }}/5
      rating_count: 2,500+
      trusted_text: Más de {{ global.global_total_alumni | 10,000 }} estudiantes confían en nosotros
    award_badges:
      - name: Mejor Bootcamp de Programación
        source: Forbes
        year: "2024"
      - name: Mejor Escuela Tech
        source: Course Report
    background: linear-gradient(to bottom, hsl(210 100% 50% / 0.05), transparent)
    paddingY:
      desktop: md none
  - type: list_press_mentions
    dynamic_entries:
      database: press_mentions
      permanent_filters:
        - item_property_slug: locale
          value: es
      item_template:
        title: {{ single.title }}
        excerpt: {{ single.excerpt }}
        logo: {{ single.logo }}
        link_url: {{ single.link_url }}
        link_text: {{ single.link_text }}
    paddingY:
      desktop: none md
    section_id: list_press_mentions-b266eb
  - type: value_proof_panel
    section_id: value_proof_panel-z4hasv
    title: Reconocidos globalmente por la excelencia
    subtitle: No solo decimos que cumplimos, el reconocimiento de fuentes confiables lo demuestra.
    evidence_items:
      - icon: Trophy
        title: Top 5 bootcamps de programación a nivel mundial
        source: Newsweek, Forbes, SwitchUp, Course Report
      - icon: Award
        title: Mejor soporte al estudiante y mejor valor
        source: Course Report, SwitchUp
      - icon: Users
        title: 35,000+ graduados en más de 20 países
        description: Una comunidad global de profesionales de tecnología exitosos
    media:
      type: image
      src: https://storage.googleapis.com/4geeks-academy-website/media/caracas-graduates_1765387638222.png
      alt: Estudiantes colaborando en el aula
      aspect_ratio: "4:3"
      style: rounded
    background: hsl(210 100% 50% / 0.05)
    stacked_header: true
    marginY:
      desktop: none lg
    paddingY:
      desktop: md
  - type: awards_marquee
    section_id: awards_marquee-fbu2lq
    version: v1.0
    speed: 40
    gradient: true
    gradientWidth: 100
    items:
      - id: switchup-2025
        logo: https://storage.googleapis.com/4geeks-academy-website/media/switchup_1765590146414.webp
        alt: SwitchUp - Best Coding Bootcamps 2025
        logoHeight: 56px
      - id: course-report-2024
        logo: https://storage.googleapis.com/4geeks-academy-website/media/course-report_1765590146414.webp
        alt: Course Report - Best Coding Bootcamp 2024
        logoHeight: 56px
      - id: tech-hub
        logo: https://storage.googleapis.com/4geeks-academy-website/media/south-florida-tech-hub_1765548979070.jpeg
        alt: South Florida Tech Hub
        logoHeight: 56px
      - id: ebootcamp
        logo: https://storage.googleapis.com/4geeks-academy-website/media/ebootcamp-top_1765549056325.png
        alt: eBootcamp Top
        logoHeight: 56px
      - id: premios-tecnologia
        logo: https://storage.googleapis.com/4geeks-academy-website/media/premios_tecnologia_sigloxxi_1765549146476.png
        alt: Premios Tecnologia Siglo XXI
        logoHeight: 56px
      - id: newsweek
        logo: https://storage.googleapis.com/4geeks-academy-website/media/newsweek_1764709608255.webp
        alt: Newsweek
        logoHeight: 56px
      - id: reviews-coursereport
        logo: https://storage.googleapis.com/4geeks-academy-website/media/reviews_1765549549051.png
        alt: 4.9 on Course Report Reviews
        logoHeight: 56px
      - id: excelencia-educativa
        logo: https://storage.googleapis.com/4geeks-academy-website/media/exelencia-educativa-es_1765549347699.png
        alt: Excelencia Educativa - Institutional Quality
        logoHeight: 56px
    marginY:
      desktop: none lg
  - type: faq
    section_id: faq-fb7ppw
    title: Preguntas frecuentes
    related_features:
      - outcomes
      - scholarships
    marginY:
      desktop: none md
  - type: cta_banner
    section_id: cta_banner-otp2ha
    version: "1.0"
    title: Da el siguiente paso hacia tu carrera en tecnología
    subtitle: Recibe información personalizada del programa y los próximos pasos.
    background: hsl(var(--primary))
    variant: form
    form:
      variant: stacked
      submit_label: Obtener los detalles
      tags: website-lead
      fields:
        email:
          visible: true
          required: true
          placeholder: Tu correo electrónico
        first_name:
          visible: true
          required: true
          placeholder: Nombre
        phone:
          visible: true
          required: true
          placeholder: Número de teléfono
        program:
          visible: true
          required: true
          default: auto
      success:
        message: ¡Gracias! Nos pondremos en contacto contigo pronto.
      consent:
        email: true
        marketing: true
        marketing_text: Acepto recibir información por email, WhatsApp y/o otros canales sobre talleres, eventos, cursos y materiales de marketing. Nunca compartiremos tus datos y puedes darte de baja cuando quieras.
      show_terms: true
      button_className: bg-primary
    form_background: hsl(var(--card))
    terms_color: hsl(var(--primary))
    marginY:
      desktop: lg none
    paddingY:
      desktop: md
  - type: sticky_cta
    version: "1.0"
    heading: ¿Listo para empezar tu carrera en tech?
    button_label: Aplicar ahora
    show_dismiss: false
    form:
      variant: inline
      conversion_name: student_application
      submit_label: Enviar solicitud
      tags: website-lead
      automations: strong
      fields:
        email:
          visible: true
          required: true
          placeholder: Correo electrónico
        first_name:
          visible: true
          required: true
          placeholder: Nombre
        last_name:
          visible: true
          required: true
          placeholder: Apellido
        phone:
          visible: true
          required: true
        program:
          visible: true
          required: true
      success:
        message: ¡Gracias! Nos pondremos en contacto en 24 horas.
    load: eager
    section_id: sticky_cta-uh331m
