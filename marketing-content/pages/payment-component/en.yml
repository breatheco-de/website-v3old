    choose_date_label: Choose your start date
    included_label: What's included
    programs:
      - id: ai-engineering
        description: Secure your seat in AI Engineering with a registration fee, jump straight into your class with AI Fluency, or unlock our complete course catalog with AI Flex. Complete your checkout to get immediate access to 4Geeks.com!
        selection_card:
          name: AI Engineering
          duration: 24 weeks
          badge: Most Popular
          icon: IconCode
        summary:
          price_label: Due today
          price_amount: $500
          price_sub: Applied toward your total tuition
          rows:
            - label: Program
              show_dynamic_program: true
            - label: Start date
              show_dynamic_date: true
            - label: Total program fee
              value: $15,999
            - label: Financing from
              value: $349/mo
            - label: Job guarantee
              show_dynamic_addon: true
          cta:
            text: Secure My Seat
            url: https://4geeks.com/checkout?plan=ai-engineering-registration-fee&cohort={qs:cohort|sept-2026}
            variant: primary
          trust_note:
            initials: 4G
            message: <span class="font-semibold text-foreground">An admissions advisor will call you within a few hours</span> to finalize enrollment, walk you through financing, and answer any questions.
        benefits:
          - title: Immediate access to the full 4Geeks suite (prework + projects)
            desc: Your account activates the moment you pay. Start Foundations right away — Git, JavaScript basics, YAML & JSON, internet fundamentals, and your first coding agents.
          - title: Unlimited 1-on-1 mentorship
            desc: Book as many sessions as you need with senior engineers and industry mentors — no caps, no waitlists, ever.
          - title: Immersive weekly schedule + live classes
            desc: Join mentor-led group sessions every week to get guidance on projects, talk through blockers, and learn alongside your cohort.
          - title: Unlimited career support
            desc: Resume reviews, mock interviews, LinkedIn optimization, and job search coaching — for life, not just while enrolled.
          - title: Alumni network — 8,500+ graduates
            desc: Instant access to a global community of working engineers. Referrals, connections, job leads.
          - title: Flexible financing
            desc: Flexible payment plans starting at $349/month. Partner financing also available.
        unlocks:
          - text: Master the fundamentals — Learn Git, JavaScript, YAML/JSON, and core web concepts.
          - text: Build AI from day one — Create your first coding agents with hands-on projects.
          - text: Learn with expert support — Get LMS & VPS access plus weekly live classes and 1:1 mentorship sessions.
        addon:
          id: job-guarantee
          label: Job guarantee
          badge: Optional add-on
          description: Get hired within 9 months of graduating — or receive a full refund. Conditions apply.
          "on":
            url: "?addon=job-guarantee"
            added_label: Job guarantee added
            summary_value: Included
          "off":
            url: "?addon="
            summary_value: Not included
        dates:
          mode: static
          items:
            - date_iso: "2026-08-24"
              badges:
                - text: 4 seats left
                  color: destructive
                - text: Fast track
                  color: primary
              url: "?cohort=1536"
            - date_iso: "2026-10-05"
              url: "?cohort=1536"
            - date_iso: "2026-11-09"
              url: "?cohort=1536"
      - id: ai-fluency
        description: Secure your seat in AI Engineering with a $250 registration fee, jump straight into your class with AI Fluency, or unlock our complete course catalog with AI Flex. Complete your checkout to get immediate access to 4Geeks.com!
        selection_card:
          name: AI Fluency
          duration: 4 weeks
          badge: Upskilling
          icon: IconBrain
        summary:
          price_label: Pay today
          price_amount: $810
          price_sub: Get 10% off
          rows:
            - label: Program
              show_dynamic_program: true
            - label: Start date
              show_dynamic_date: true
            - label: Total program fee
              value: $900
            - label: Financing from
              value: $75/mo
          cta:
            text: Secure My Seat
            url: https://4geeks.com/checkout?plan=ai-fluency&cohort={qs:cohort|fluency-sept-2026}
            variant: primary
          trust_note:
            initials: 4G
            message: <span class="font-semibold text-foreground">Have questions?</span> Reach out to us at support@4geeksacademy.com.
        benefits:
          - title: Immediate access to the full 4Geeks suite
            desc: Start learning AI fundamentals right away — prompting, agents, automation, and no-code tools.
          - title: Weekly live classes
            desc: Join mentor-led live sessions every week to get guidance on projects, talk through blockers, and learn alongside your cohort in real time.
          - title: Everything you need to build with AI
            desc: Enjoy AI tokens, AI completions, GitHub Copilot, a dedicated VPS, and other premium tools—all included, so you can create without extra costs or technical setup.
          - title: Real-world projects
            desc: Graduate with deployed projects that demonstrate what you can actually build.
          - title: Flexible financing
            desc: Flexible payment plans start at $75/month, or save 10% when you pay upfront.
        unlocks:
          - text: Access to AI tokens & completions — Everything you need to build, test, and ship your projects from day one.
          - text: Build AI from day one — Create your first coding agents with hands-on projects.
