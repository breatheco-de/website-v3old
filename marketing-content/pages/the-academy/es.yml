slug: sobre-la-academia
template: default
title: Sobre 4Geeks Academy
meta:
  robots: index, follow
  priority: 0.8
  change_frequency: weekly
  page_title: Sobre 4Geeks Academy | 4Geeks Academy
  description: La Academia - Aprende más sobre 4Geeks Academy.
  redirects: []
schema:
  include:
    - organization
    - website
sections:
  - type: hero
    version: '1.0'
    variant: singleColumn
    title: Construyendo carreras en la era de la IA
    subtitle: >-
      4Geeks Academy es un coding bootcamp internacional con 8 campus en EE. UU., Latinoamérica y Europa. Formamos
      estudiantes en Ingeniería en IA, Data Science & Machine Learning y Ciberseguridad — con un camino claro hacia el
      empleo.
    badge: 10+ años lanzando carreras en tecnología
    image:
      src: https://storage.googleapis.com/4geeks-academy-website/media/the-academy-header_1770614327963.png
      alt: Estudiantes programando en computadoras en un aula
    image_full_width: false
    marginY:
      desktop: none md
    background: linear-gradient(to bottom, hsl(210 100% 50% / 0.05), transparent)
    paddingY:
      desktop: md none
    section_id: hero-1dzhwx
  - type: split_cards
    variant: primary-left
    primary_width: narrow
    primary:
      heading: Nuestra misión y enfoque
      description: >-
        Desde 2015, 4Geeks Academy ha ayudado a miles de estudiantes a hacer la transición hacia carreras en tecnología.
        Nuestro modelo combina formación práctica basada en proyectos con mentorías ilimitadas 1:1, herramientas de
        aprendizaje impulsadas por IA y acompañamiento estructurado para la búsqueda de empleo. El objetivo es simple:
        brindar la profundidad técnica, experiencia práctica y estrategia profesional necesarias para conseguir trabajo
        — y seguir creciendo.
      badge: Modelo respaldado por resultados
    secondary:
      benefits:
        - text: Currículo alineado con la industria e integrado con IA
        - text: Mentoría personalizada ilimitada
        - text: Soporte de carrera de por vida
      image_id: what_is_4geeks
      image_object_fit: cover
      image_object_position: 60% 100%
    marginY:
      desktop: lg none
    section_id: split_cards-4sew7d
  - type: features_quad
    version: '1.0'
    variant: laptopEdge
    heading: Qué nos hace diferentes
    cards:
      - icon: Trophy
        title: Programas enfocados en la carrera
        description: Formación práctica, intensiva y orientada al mundo real para lanzar carreras tecnológicas.
      - icon: Wallet
        title: Aprendizaje hiperpersonalizado
        description: Rigobot ofrece retroalimentación instantánea 24/7 para asegurar que siempre recibas la guía que necesitas.
      - icon: Clock
        title: Mentoría humana ilimitada
        description: Mentores y coaches de carrera brindan apoyo personalizado durante el programa y para siempre.
      - icon: Users
        title: Habilidades preparadas para el futuro
        description: Currículo actualizado continuamente con herramientas y tecnologías que impulsan la industria tecnológica.
    background: hsl(var(--muted))
    description_with_background: false
    marginY:
      desktop: lg none
    paddingY:
      desktop: none
    section_id: features_quad-b7t650
  - type: stats
    version: '1.0'
    items:
      - value: +{{ global.global_total_alumni | 7000 }}
        label: Alumni
      - value:
          '[object Object]': null
        label: Campus
      - value: ~{{ global.global_job_placement_rate | 84 }}%
        label: Tasa de Contratación
      - value:
          '[object Object]': null
        label: Calificación Promedio
    marginY:
      desktop: lg
    paddingY:
      desktop: none sm
    section_id: stats-r34w4a
  - type: two_column
    proportions:
      - 4
      - 8
    background: hsl(var(--muted))
    alignment: center
    left:
      image: https://storage.googleapis.com/4geeks-academy-website/media/crusa-forte-scholarship_1770606829241.webp
      image_alt: Estudiante programando en una laptop
      image_object_fit: cover
      image_object_position: 10% 80%
      justify: end
    right:
      heading: Impulsando el ecosistema tecnológico global
      description: >-
        En 4Geeks Academy creemos que la colaboración genera impacto real. Trabajamos con universidades, organizaciones
        sin fines de lucro, iniciativas de desarrollo laboral, organizaciones globales y comunidades tecnológicas
        locales para ampliar el acceso a educación tecnológica de alto nivel y fortalecer las oportunidades
        profesionales. Juntos formamos y colocamos talento diverso, cerramos la brecha de habilidades digitales y
        construimos la fuerza laboral tecnológica del futuro. También participamos activamente en la comunidad,
        colaborando en hackatones, desafíos tecnológicos y eventos de la industria que conectan talento con
        oportunidades y muestran las habilidades de nuestros estudiantes y graduados.
      text_align: left
    gap: '12'
    marginY:
      desktop: md none
    paddingY:
      desktop: sm
    section_id: two_column-4q8dyy
