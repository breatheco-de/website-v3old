  - type: cta_banner
    version: '1.0'
    title: Da el siguiente paso hacia tu carrera en tecnología
    subtitle: Recibe información personalizada del programa y los próximos pasos.
    background: hsl(var(--primary))
    variant: form
    form:
      variant: stacked
      submit_label: Obtener los detalles
      tags: website-lead
      fields:
        email:
          visible: true
          required: true
          placeholder: Tu correo electrónico
        first_name:
          visible: true
          required: true
          placeholder: Nombre
        phone:
          visible: true
          required: true
          placeholder: Número de teléfono
        program:
          visible: true
          required: true
          default: auto
      success:
        message: ¡Gracias! Nos pondremos en contacto contigo pronto.
      consent:
        email: true
        marketing: true
        marketing_text: >-
          Acepto recibir información por email, WhatsApp y/o otros canales sobre talleres, eventos, cursos y materiales
          de marketing. Nunca compartiremos tus datos y puedes darte de baja cuando quieras.
