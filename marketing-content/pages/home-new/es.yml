        col1_subtitle: Construye un perfil atractivo para reclutadores.
        col1_description: >-
          Prepárate para procesos reales de contratación usando una combinación de herramientas de IA y coaching 1:1.

          Rigobot revisa tu currículum y LinkedIn en tiempo real. Los mentores de carrera te ayudan a perfeccionar tu
          historia, portafolio y desempeño en entrevistas.
        col1_tagline: Te ayudaremos a crear materiales de búsqueda de empleo
        col1_boxes:
          - icon: IconBrandLinkedin
            text: LinkedIn
          - icon: IconFileText
            text: Currículum
          - icon: IconBriefcase
            text: Portafolio
          - icon: IconMail
            text: Carta de presentación
        col2_heading: Estrategia profesional, construida para ti
        col2_bullets:
