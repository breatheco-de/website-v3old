        title: Accede al mercado laboral oculto.
        left_text: >-
          Una vez que tu perfil esté listo, la visibilidad pasa a ser el foco. Te conectamos directamente con socios de
          contratación y tomadores de decisiones. Tu perfil se comparte con empresas que activamente buscan egresados de
          4Geeks, respaldado por una estrategia de networking dirigida.
        left_image_id: career_team_women
        left_image_object_fit: cover
        left_image_object_position: center
        left_stat:
          value: 250+
          label: empresas en la red de empleadores de 4Geeks
        right_bullets:
          - icon: IconUserPlus
            text: Referidos directos a socios de contratación
          - icon: IconTargetArrow
            text: Ofertas laborales curadas según tu perfil
          - icon: IconMessageChatbot
            text: Coaching en networking y conversaciones con reclutadores
        right_logos:
          - image_id: logo_google
            alt: Google
          - image_id: logo_meta
            alt: Meta
          - image_id: logo_microsoft
            alt: Microsoft
          - image_id: logo_uber
            alt: Uber
          - image_id: logo_ebay
            alt: eBay
          - image_id: logo_kpmg
            alt: KPMG
      - tab_label: Proyectos que convierten
        layout: text_and_image
        title: Proyectos que demuestran habilidad real.
        left_description: >-
          La visibilidad atrae atención. Tu portafolio cierra la brecha.

          Gradúate con un portafolio que muestre lo que realmente puedes construir. Desde proyectos prácticos hasta un
          proyecto final que resuelve problemas reales de negocio, tu trabajo se convierte en evidencia clara de tu
          capacidad.
        left_bullets:
          - icon: IconBriefcase
            text: Proyectos alineados con la industria y el mundo real
          - icon: IconPresentation
            text: Un proyecto final listo para mostrar
          - icon: IconBrandGithub
            text: Optimización de GitHub y revisión profesional de código
