  - type: syllabus
    title: Financia tu carrera tech
    subtitle: >-
      Explora caminos de financiación flexibles, desde ahorros upfront hasta planes basados en ingresos, y elige la
      opción que mejor se adapte a ti.
    modules:
      - title: Pago anticipado y ahorra 10%
        description: Paga la matrícula completa antes de que comience el programa y recibe un 10% de descuento.
      - title: Cuotas sin intereses a 6 Meses
        description: Divide el coste de tu matrícula en 6 meses, sin intereses ni costes adicionales con nuestros partners.
      - title: Pagos basados en ingresos
        description: >-
          ¿Prefieres pagar cuando ya estés trabajando? Con la financiación ISA de BCAS FinTECH, comienzas a pagar
          únicamente cuando tus ingresos anuales alcancen los __TPL__. A partir de ese momento, se aplica un porcentaje
          fijo de tus ingresos, adaptado a tu situación económica.
      - title: Financia tu formación con comodidad
        description: >-
          Ofrecemos opciones de financiación de hasta 24 meses, según tu perfil crediticio, con cuotas mensuales desde
          __TPL__. La aprobación y condiciones finales dependen de la entidad financiera.
      - title: Becas
        description: >-
          Ofrecemos becas parciales internas según perfil y promociones vigentes, así como becas a través de
          organizaciones colaboradoras. La disponibilidad y los importes pueden variar.
