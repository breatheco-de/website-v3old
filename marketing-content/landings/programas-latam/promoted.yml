  - type: geeks_vs_others_comparison
    version: "1.0"
    title: ¿Qué diferencia a nuestro bootcamp de programación de los demás?
    columns:
      - name: Característica
      - name: 4Geeks Academy
        highlight: true
      - name: Promedio de la industria / competidores
    rows:
      - feature: Apoyo profesional personalizado
        values:
          - Soporte de por vida hasta que consigas trabajo (y más allá)
          - Limitado, a menudo expira después de meses
      - feature: Proporción profesor:estudiante
        values:
          - "1:7"
          - 1:10+
      - feature: Retroalimentación con IA
        values:
          - Personalizada según tu progreso
          - Genérica o inexistente
      - feature: Mentoría 1 a 1
        values:
          - Ilimitada y continua
          - Sesiones limitadas
      - feature: Plan de estudios
        values:
          - Actualizado continuamente para coincidir con las necesidades de la industria
          - Lento para adaptarse
    marginY:
      desktop: none xl
    paddingY:
      desktop: none
  - type: features_grid
    version: "1.0"
    variant: detailed
    title: Objetivos de nuestra academia
    subtitle: ¿Qué nos hace diferentes?
    items:
      - id: aprendizaje-practico
        icon: Flag
        category: Objetivo
        title: Aprendizaje práctico y orientado a la realidad
        description: Nos enfocamos en las herramientas y tecnologías más demandadas por las empresas líderes del sector, lo que te permitirá estar preparado para cualquier trabajo una vez que te gradues.
      - id: flexibilidad
        icon: Clock
        category: Objetivo
        title: Horarios y métodos de pago flexibles
        description: Ofrecemos un modelo de formación a medio tiempo, para que puedas conciliar tus estudios con otras actividades. Además, también contamos con múltiples formas de financiación para hacer más accesibles los costos de un curso de esta calidad.
      - id: comunidad
        icon: Users
        category: Objetivo
        title: Una comunidad apasionada por la tecnología
        description: Desde un principio decidimos crear una comunidad de programadores de calidad con el propósito de que puedas encontrar apoyo, colaboración y oportunidades de networking que te ayudarán a alcanzar tus metas.
    columns: 3
    collapsible_mobile: true
    background: hsl(var(--secondary))
    paddingY:
      desktop: md lg
