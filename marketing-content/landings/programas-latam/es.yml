  - type: course_selector
    version: "1.0"
    variant: spotlight
    heading: Elige tu programa
    subheading: Cuatro programas. Todos diseñados para conseguirte empleo, no solo formarte.
    courses:
      - name: Ingeniería de IA
        icon: Bolt
        duration: 24 semanas, o track acelerado de 15 semanas
        label: Actualizado en 2026
        title: Ingeniería de IA
        badges:
          - icon: Bolt
            text: RAG y Búsqueda Vectorial
          - icon: Bolt
            text: Agentes de IA
          - icon: Bolt
            text: Python
        description: Transforma un caso de negocio real en un sistema completamente nativo de IA, capa por capa. Domina los agentes, sistemas RAG y pipelines de automatización que las empresas están contratando ahora mismo.
        cta_text: Obtener detalles del programa
        cta_url: /es/career-programs/ai-engineering
        course_background: accent
      - name: Ciencia de Datos y Machine Learning
        icon: IconChartBar
        duration: 18 semanas
        label: Actualizado en 2026
        title: Ciencia de Datos y Machine Learning
        badges:
          - icon: ChartBar
            text: Python y Pandas
          - icon: ChartBar
            text: TensorFlow
          - icon: ChartBar
            text: Visualización de Datos
        description: Domina las habilidades detrás de las decisiones impulsadas por IA. Construye modelos, analiza datos a escala y despliega soluciones que empresas de todos los sectores están contratando activamente.
        cta_text: Obtener detalles del programa
        cta_url: /es/career-programs/data-science-ml
        course_background: hsl(var(--muted-foreground))
      - name: Ciberseguridad
        icon: IconShield
        duration: 16 semanas
        label: Actualizado en 2026
        title: Ciberseguridad
        badges:
          - icon: Shield
            text: Hacking Ético y Pentesting
          - icon: Shield
            text: Marco NIST
        description: Detecta amenazas, protege sistemas y asegura los datos de los que depende cada organización. Una de las carreras de mayor crecimiento en tecnología, con una escasez global de profesionales cualificados que no muestra señales de desaceleración.
        cta_text: Obtener detalles del programa
        cta_url: /es/career-programs/cybersecurity
        course_background: destructive
      - name: Desarrollo Full Stack con IA
        icon: IconCode
        duration: 20 semanas
        label: Actualizado en 2026
        title: Desarrollo Full Stack con IA
        badges:
          - icon: Code
            text: React y Next.js
          - icon: Code
            text: Python y APIs
          - icon: Code
            text: Integración de IA
        description: Construye aplicaciones web modernas y listas para producción de frontend a backend, con IA integrada en tu proceso de desarrollo desde el primer día.
        cta_text: Obtener detalles del programa
        cta_url: /es/career-programs/full-stack
        course_background: primary
