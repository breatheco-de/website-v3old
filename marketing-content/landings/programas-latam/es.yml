          - text: Cientos de ejercicios interactivos en Learnpack, nuestra plataforma de aprendizaje
        video_url: https://youtu.be/NRuShbSLtg0
      - icon: Headset
        title: Mentoría 1:1 ilimitada de por vida, no solo mientras estudias
        show_rigobot_logo: true
        bullets:
          - text: Reserva sesiones 1:1 ilimitadas con ingenieros senior incluso después de graduarte
          - text: Ratio 7:1 estudiante por mentor para que tu mentor sepa quién eres
          - text: Check-ins semanales para que te mantengas enfocado y termines el programa
          - text: Comunidad activa en Slack con canales de empleo, soporte técnico y consejos de carrera
        video_url: https://youtu.be/Zoxxw5jP7xA
