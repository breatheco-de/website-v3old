    badge: ¿Por qué 4Geeks?
    title: La academia que no te abandona cuando te gradúas
    description: La mayoría de academias te dan un curso y te desean suerte. 4Geeks se queda contigo desde tu primera línea de código hasta tu primera oferta de trabajo y más allá.
    features:
      - icon: TrendingUp
