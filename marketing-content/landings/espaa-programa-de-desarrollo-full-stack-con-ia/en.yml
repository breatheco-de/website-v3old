# 4Geeks Landing Page Optimizer

This skill captures the strategic framework built during the AI Engineering landing redesign. It exists so every future landing — regardless of program — follows the same proven narrative structure, copy principles, and component rules.

**Two roles, one output:**
- **Copywriter** — provides the human voice, real student stories, program-specific details, and emotional punch
- **LLM (this skill)** — acts as the strategic head: enforces structure, rewrites copy for conversion, validates metrics, and ensures every section earns its place

---

## Core Philosophy

Three rules that override everything else:

1. **Sell the outcome, never the feature.** Users don't buy a bootcamp. They buy a new salary, a new career, a way out of a job with a ceiling. Every section must answer "what does the user get?" not "what does the program have?".

2. **Earn trust before you sell.** Paid traffic arrives cold. If the first thing they see is a product pitch, they leave. The page must first make the user feel understood, then prove the product works, then explain what it is.

3. **Every section must earn its place.** No section goes on the page because it exists in the CMS. Each one must answer a specific question the user has at that exact point in their scroll. If it doesn't, it gets cut.

---

## Section Order — The Required Narrative Sequence

This is the only correct order for a 4Geeks paid traffic landing. Do not reorder without strong reason.

| Position | Section | User question it answers |
|---|---|---|
| 1 | Hero | "Is this for someone like me?" |
| 2 | Career Outcomes (stats + photos) | "Does this actually work?" |
| 3 | Why [Field] Now | "Is this field worth pursuing?" |
| 4 | Syllabus / What You'll Build | "Will I learn what I need?" |
| 5 | Why 4Geeks | "Why this bootcamp over others?" |
| 6 | Certificate + Detailed Outcomes | "What do I walk away with?" |
| 7 | Testimonials | "Did it work for someone like me?" |
| 8 | Pricing | "Can I afford this?" |
| 9 | Where Graduates Work | "Are these employers real?" |
| 10 | CTA Final | "What do I do right now?" |

**Never put pricing before testimonials.** The user needs emotional validation before they see a number.

**Never duplicate section titles.** If "Career Outcomes" appears twice, delete one. Duplicates signal a broken page and destroy credibility.

---

## Hero — Rules

The hero is the most important section. It must do three things above the fold:

**1. Open with the user's pain, not the product.**
Wrong: "Become an AI Engineer in 24 Weeks"
Right: "Your current job has a ceiling. Become an AI Engineer."

The first line must describe the user's current situation or frustration before naming the solution.

**2. Include the job promise with a specific number of days.**
Every hero bullet list must contain a line that promises employment with a concrete timeline.
Formula: `Career-focused from day one: get job-ready in [X weeks] and hired in [Y days]`

**3. Never mention price in the hero.**
Price in the hero kills conversion for cold traffic. They haven't processed the value yet. Mention that financing exists but never the dollar amount.
Wrong: `Pay as low as $349/mo`
Right: `Flexible financing available, including zero upfront payment options`

**Hero CTA label:** Always `See If You Qualify. It's Free` — never "Apply Now" or "Get Started". "Apply" implies commitment. "See If You Qualify" frames it as the user evaluating the program, not the program evaluating them.

**Form card subtitle:** Always include `Takes 2 minutes.` as the first sentence. Time friction is the primary cause of form abandonment.

**Awards marquee:** Always `show_awards_marquee: true`. Third-party recognition is the only proof that doesn't come from 4Geeks itself.

---

## Career Outcomes (graduates_stats) — Rules

This is the credibility anchor. It goes immediately after the hero.

- Must have **4 stats**, not 3. The fourth stat is always scale: `5,000+ Graduates Employed Worldwide`
- Use **verified 2025 data**: 86% hiring rate, ~3 months to hire, 55% salary increase
- Never use template variables like `{{ global.job_placement_rate | 84 }}` — hardcode verified values
- The subheading must start with a data point, not a promise from 4Geeks
- Keep real student photos. Never replace with icons or illustrations

---

## Why [Field] Now (features_grid) — Rules

This section agitates the market opportunity. It goes after Career Outcomes.

- The subtitle must turn the market data into a personal invitation to the user
- Wrong: `"The talent shortage is your opportunity"`
- Right: `"87% of companies can't find the engineers they need. You can be one of them."`
- The three stats must be market-level numbers (jobs available, growth rate, salary range) — not program features
- This section should have no CTA. It's pure context-building.

---

## Syllabus — Rules

- `program_description` must close with what the user **has** at the end, not what they **learn**
- Always end with a version of: `"You graduate with a live product, not just a certificate"`
- Every `projects` field must describe a consequence, not a task
  - Wrong: `Build the company's backend`
  - Right: `Create the company's backend — the engine that powers everything`
- Simplify technical jargon in `objectives` without losing precision — the landing serves both technical and non-technical audiences

---

## Why 4Geeks (ai_learning) — Rules

This section answers "why 4Geeks over any other bootcamp."

- The component title must attack the #1 objection against bootcamps: that they abandon you after graduation
- Use: `"The Bootcamp That Doesn't End When You Graduate"`
- The description must contrast 4Geeks against unnamed competitors
- Use: `"Most bootcamps disappear after demo day. 4Geeks stays with you..."`
- All bullets must be in outcome format, not feature format
- All CTAs within this component: `See If You Qualify`
- No dashes in bullet text — they signal AI-generated copy

---

## Testimonials — Rules

This is the emotional close before pricing. It must contain:

- Real photos (not avatars or initials)
- Full names (not just first names)
- Specific salary increase percentages in the `achievement` field
- The `description` subheading must list real backgrounds (musician, nurse, support specialist) so the user identifies with someone before reading a single testimonial

Wrong title: `"Real Careers Start Here — Just Ask Our Students"`
Right title: `"They Made the Switch. Here's What Happened."`

---

## Pricing — Rules

- Title and subtitle must frame the price as an ROI calculation, not a cost
- Formula: `"The average graduate sees X% salary increase. At $[price], the program pays for itself within months of your first paycheck."`
- The **Job Guarantee must be the first bullet** — it's the most powerful objection-eliminator and must appear before the user processes the price
- CTA: `See If You Qualify` — never `Get More Info`
- Never show ISA option on landings where ISA is not available for that geography

---

## Where Graduates Work (whos_hiring) — Rules

- Title must state a fact about graduates, not a claim about 4Geeks
  - Wrong: `"Trusted by Leading Innovators"`
  - Right: `"Where Our Graduates Work"`
- Subtitle must reference the 5,000+ alumni number to anchor credibility
- This section goes **after** pricing — it reinforces the decision already made, it doesn't build toward it

---

## CTA Final — Rules

- Title must activate loss aversion, not make a promise
  - Wrong: `"Ready to Become an AI Engineer?"`
  - Right: `"Your AI career won't start itself."`
- Subtitle must create urgency based on real market conditions, never fake scarcity
  - Wrong: `"Limited spots available"`
  - Right: `"Every week you wait is a week someone else gets hired first."`
- Success message must confirm action with human tone and tell the user exactly what happens next
  - Wrong: `"Thank you! We'll be in touch soon."`
  - Right: `"You're in. Someone from our admissions team will reach out within minutes — check your inbox."`

---

## Metrics — Verified Values (2025)

Always use these verified numbers. Never use outdated defaults.

| Metric | Value | Source |
|---|---|---|
| US Hiring Rate | 86% | 2025 Mid-Year Outcomes Report |
| Time to Hire (US) | ~3 months | 2025 Mid-Year Outcomes Report |
| Average Salary Increase (global) | 55% | Annual outcomes survey |
| Average Salary Increase (US only) | 41% | Course Report 2024 |
| Graduates Employed | 5,000+ | Annual outcomes survey |
| Course Report Rating | 4.9 stars | Course Report (verified) |

**Critical correction:** `5,000+` refers to **graduates employed**, never "hiring partners". These are two different things. Using "hiring partners" with this number is factually incorrect and a regulatory risk.

---

## What Gets Cut

Remove any section or element that:
- Duplicates information already on the page
- Links away from the landing (except Privacy Policy and Terms — legally required)
- Uses nav links that exit the page — paid traffic landings must have zero exit links except the CTA
- Talks about 4Geeks in third person superlatives without data to back it
- Uses generic feature descriptions ("global community", "international recognition") without specific proof

---

## Copy Voice Rules

These apply to every section, every component, every line:

- **No dashes as stylistic punctuation** — they read as AI-generated
- **No em-dashes in bullet points** — use commas or periods
- **Outcomes before features** — always answer "what do I get" before "what does it have"
- **Specific over general** — "$112K salary" beats "high-paying role"
- **User as subject** — "You graduate with..." beats "Graduates receive..."
- **Active verbs** — "Build", "Ship", "Land", "Earn" beat "Learn about", "Understand", "Explore"

