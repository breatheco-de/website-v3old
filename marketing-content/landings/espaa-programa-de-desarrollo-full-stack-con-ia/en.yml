      - title: JavaScript
        duration: Weeks 3-5
        objectives:
          - Variables, functions, and control flow
          - DOM manipulation for interactive pages
          - Modern ES6+ features and async programming
        projects: Build dynamic web apps users can actually interact with
        orientation: vertical
        icon: IconBrandJavascript
      - title: React
        duration: Weeks 6-9
        objectives:
          - Component-based user interfaces
          - State management with hooks
          - Routing and scalable app architecture
        projects: Build the kind of frontend that gets you hired
        orientation: vertical
