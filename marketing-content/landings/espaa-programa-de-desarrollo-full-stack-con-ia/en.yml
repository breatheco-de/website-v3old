        objectives:
          - Core programming and data structures
          - Object-oriented programming
          - Web development and automation
        projects: Create backend services and automation scripts that run in production
        orientation: vertical
        icon: IconBrandPython
      - title: Creating APIs
        duration: Weeks 13-15
        objectives:
          - Design and build RESTful APIs
          - Authentication and database integration
          - API documentation and best practices
        projects: Build a full REST API that powers a real frontend application
        orientation: vertical
        icon: IconApi
      - title: Agile Methodologies
        duration: Week 16
        objectives:
          - Scrum, Kanban, and agile frameworks
