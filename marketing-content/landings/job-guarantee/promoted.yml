sections:
  - type: hero
    version: "1.0"
    variant: simpleTwoColumn
    title: Get Into Tech With Our Job Guarantee*
    subtitle: "&nbsp;Built to give you extra confidence as you invest in your career. Get hired within 9 months of graduation, or we'll refund 100% of your tuition.&nbsp;<div bis_skin_checked=\"1\"><span style=\"font-size: 0.75rem;\"><span><span>*Not available in all regions.&nbsp;<a href=\"https://storage.googleapis.com/4geeks-academy-website/PDF%20and%20Docs/job-guarantee-en.pdf\"><span><span><span><span>Terms and conditions apply.</span></span></span></span></a></span></span></span><a href=\"https://storage.googleapis.com/4geeks-academy-website/PDF%20and%20Docs/job-guarantee-en.pdf\"><span style=\"font-size: 1rem;\"><span><span style=\"font-size: 0.875rem;\"><span></span></span></span></span></a></div>"
    image:
      src: https://storage.googleapis.com/4geeks-academy-website/media/generated_images/Students_collaborating_workspace_d1560810.webp
      alt: Students collaborating in a tech workspace
    cta_buttons:
      - text: Get more info
        url: "#bottom"
        variant: primary
    background: linear-gradient(to bottom, hsl(210 100% 50% / 0.05), transparent)
    paddingY:
      desktop: lg none
    marginY:
      desktop: none md
  - type: hero
    version: "1.0"
    variant: ApplyFormProductShowcase
    title: Aprende de 0 a 100 las ultimas técnicas en Ingenieria de IA para el 2026
    brand_mark:
      prefix: Que no te
      highlight: Reemplace, Dominala!
    description: Aprende a desarrollar, integrar y desplegar soluciones de IA en 24 semanas con mentoría 1:1 ilimitada y una comunidad profesional que acompaña tu crecimiento profesional.
    form:
      variant: stacked
      conversion_name: student_application
      submit_label: Aplicar ahora
      tags: website-lead
      fields:
        email:
          visible: true
          required: true
          placeholder: Correo Electrónico
        first_name:
          visible: true
          required: true
          placeholder: Nombre
        last_name:
          visible: true
          required: true
          placeholder: Apellido
        phone:
          visible: true
          required: true
          default_country: MX
        program:
          visible: false
          default: ai-engineering
      success:
        message: ¡Revisa tu bandeja de entrada! Tu programa está en camino.
      terms_url: /terminos-condiciones
      privacy_url: /politica-privacidad
      consent:
        sms: true
        marketing: true
        marketing_text: Acepto recibir información por email, WhatsApp y/o otros canales sobre talleres, eventos, cursos y materiales de marketing. Nunca compartiremos tus datos y puedes darte de baja cuando quieras.
        sms_text: Acepto recibir SMS sobre talleres, eventos, cursos y materiales de marketing. Pueden aplicar cargos por mensaje y datos. Responde STOP para cancelar, HELP para ayuda. Puedes recibir 4–6 mensajes al mes. Nunca compartiremos tus datos y puedes darte de baja cuando quieras.
        sms_usa_only: false
      show_terms: true
    cta_button:
      text: Descargar programa
      url: /programa/ai-engineering
      variant: outline
      icon: Download
    video:
      url: https://youtube.com/shorts/-SpU1PWNBF4?si=Hf6pIB-aSDUHFgj2
      ratio: "9:16"
      muted: true
    paddingY:
      mobile: md none
      desktop: lg none
    marginY:
      mobile: none
      desktop: none
    background: linear-gradient(to bottom, hsl(210 100% 50% / 0.1), transparent)
  - type: graduates_stats
    version: v1.0
    variant: fullBleed
    heading: Results That Back Our Job Guarantee
    subheading: "These numbers reflect real graduates and real hires. Our Job Guarantee is built around one outcome: succesfully launching your tech career."
    stats:
      - value: {{ global.global_job_placement_rate | 84 }}
        unit: "%"
        label: Job placement rate
      - value: 3-6
        unit: months
        label: Average time to get hired
      - value: {{ global.global_salary_increase | 55 }}%
        label: Salary increase after graduation
    collage_images:
      - image_id: graduates_team_1
        col_span: 4
        row_span: 2
        col_start: 6
        row_start: 1
      - image_id: graduates_team_2
        col_span: 3
        row_span: 2
        col_start: 10
        row_start: 1
      - image_id: graduates_coding
        col_span: 5
        row_span: 2
        col_start: 4
        row_start: 3
      - image_id: graduates_friends
        col_span: 4
        row_span: 2
        col_start: 9
        row_start: 3
    featured_images:
      - image_id: graduates_celebration
        col_span: 5
        row_span: 2
        col_start: 1
        row_start: 1
      - image_id: graduates_workspace
        col_span: 3
        row_span: 2
        col_start: 1
        row_start: 3
    background: bg-muted/30
    image_bordered: true
    paddingY:
      desktop: none
