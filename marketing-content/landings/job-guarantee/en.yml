  - type: numbered_steps
    section_id: numbered_steps-646rz5
    variant: default
    title: Get Hired Faster With GeekForce
    description: Our 3-step Career Acceleration System combines proven strategies, personalized guidance, and direct access to hiring companies to help you land a tech role quickly.
    description_link:
      text: See terms
      url: /terms-and-conditions
    steps:
      - icon: School
        text: Optimize your LinkedIn, GitHub, and portfolio, craft an ATS-ready resume, and graduate with a recruiter-ready portfolio.
      - icon: Briefcase
        text: Master technical and behavioral interviews, practice coding exercises, and develop winning strategies for upcoming opportunities.
      - icon: Cash
        text: Follow a tailored job search plan, leverage AI-driven hiring tools, and connect with top hiring companies to land your role.
    background: hsl(var(--secondary))
    bullet_icon: Check
    bullet_icon_color: text-green-600
    paddingY:
