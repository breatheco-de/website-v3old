        text: Let us know if you haven’t been hired into a qualifying role within 9 months after graduation.
        title: Notify Us
      - icon: Interview
        text: Our team verifies that all Job Guarantee requirements were completed during the program and job search period.
        title: Requirement Review
      - icon: JobSearch
        text: Once approved, you'll receive your full tuition refund within 30 days.
