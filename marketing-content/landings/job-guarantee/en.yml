sections:
  - type: hero
    version: "1.0"
    variant: productShowcase
    title: Tech Career with Extra Confidence.
    brand_mark:
      prefix: Launch a
      highlight: High-Growth
      color: primary
    description: Build the skills companies are hiring for and add the Job Guarantee* for extra confidence. *Not available in all regions. Terms and conditions apply.
    bullets:
      - text: 84% of graduates land a tech job
      - text: Get hired within 9 months or receive a full refund
      - text: 1:1 career coaching and employer network access
      - text: Join 6000+ graduates who have launched careers with us
    video_id: "-2ZvlgDnltc"
    video_ratio: "9:12"
    form:
      variant: stacked
      conversion_name: student_application
      submit_label: Apply now
      tags: website-lead
      fields:
        email:
          visible: true
          required: true
          placeholder: Email
        first_name:
          visible: true
          required: true
          placeholder: First name
        last_name:
          visible: true
          required: true
          placeholder: Last name
        phone:
          visible: true
          required: true
        program:
          visible: false
          default: ai-engineering
      success:
        message: Check your inbox! Your syllabus is on the way.
      terms_url: /terms-and-conditions
      privacy_url: /privacy-policy
      consent:
        sms: true
        marketing: true
        marketing_text: I agree to receive information through email, WhatsApp and/or other channels about workshops, events, courses, and other marketing materials. We'll never share your contact information, and you can easily opt out at any moment.
        sms_text: I agree to receive SMS/text messages about workshops, events, courses, and other marketing materials. Message and data rates may apply. Reply STOP to unsubscribe, HELP for help. You may receive up to 4–6 text messages per month. We will never share your contact information, and you can easily opt out at any moment.
        sms_usa_only: true
      show_terms: true
    form_vertical_align: center
    show_awards_marquee: true
    awards_marquee:
      items:
        - id: switchup-2025
          alt: SwitchUp - Mejores Bootcamps de Código 2025
          logo: https://storage.googleapis.com/4geeks-academy-website/media/switchup_1765590146414.webp
          logoHeight: 55px
        - id: course-report-2024
          alt: Course Report - Mejor Bootcamp de Código 2024
          logo: https://storage.googleapis.com/4geeks-academy-website/media/course-report_1765590146414.webp
          logoHeight: 55px
        - id: tech-hub
          alt: South Florida Tech Hub
          logo: https://storage.googleapis.com/4geeks-academy-website/media/south-florida-tech-hub_1765548979070.jpeg
          logoHeight: 55px
        - id: ebootcamp
          alt: eBootcamp Top
          logo: https://storage.googleapis.com/4geeks-academy-website/media/ebootcamp-top_1765549056325.png
          logoHeight: 55px
        - id: premios-tecnologia
          alt: Premios Tecnología Siglo XXI
          logo: https://storage.googleapis.com/4geeks-academy-website/media/premios_tecnologia_sigloxxi_1765549146476.png
          logoHeight: 55px
        - id: newsweek
          alt: Newsweek
          logo: https://storage.googleapis.com/4geeks-academy-website/media/newsweek_1764709608255.webp
          logoHeight: 55px
        - id: reviews-coursereport
          alt: 4.9 en Reseñas de Course Report
          logo: https://storage.googleapis.com/4geeks-academy-website/media/reviews_1765549549051.png
          logoHeight: 55px
        - id: excelencia-educativa
          alt: Excelencia Educativa - Calidad Institucional
          logo: https://storage.googleapis.com/4geeks-academy-website/media/exelencia-educativa-es_1765549347699.png
          logoHeight: 55px
    video_title: GeekForce Career Support
  - type: features_quad
    version: "1.0"
    variant: default
    compact: true
    heading: How Our Job Guarantee Works
    cards:
      - icon: Handshake
        title: 1. Add the Job Guarantee When You Enroll
      - icon: Contract
        title: 2. Complete the Program and Build Your Portfolio
      - icon: Briefcase
        title: 3. Follow Our Proven Career Placement System
      - icon: Contract
        title: 4. Get Hired Within 9 Months — Or Get 100% of Your Tuition Back
    background: hsl(210 100% 50% / 0.05)
  - type: course_selector
    version: "1.0"
    variant: solid
    heading: High-Growth Tech Careers, Backed by Our Job Guarantee
    subheading: Choose your path
    courses:
      - name: AI Engineering
        icon: Brain
        duration: {{ global.ai_engineering_week_duration | 24 }} weeks
        label: Updated in 2026
        title: AI Engineering
        badges:
          - icon: DollarSign
            text: APIs, automation, telemetry
        description: Build production-ready AI systems and learn to design, deploy, and scale AI-driven products.
        price_period: " "
        cta_text: Program details
        cta_url: /en/career-programs/ai-engineering
        course_background: hsl(var(--accent))
      - name: Data Science and Machine Learning
        duration: {{ global.data_science_week_duration | 16 }} weeks
        label: Updated in 2026
        title: Data Science and Machine Learning
        badges:
          - icon: Brain
            text: Python, TensorFlow, SQL
        description: Analyze real-world data, build predictive models, and apply machine learning techniques used by modern teams.
        price_period: " "
        cta_text: Program details
        cta_url: /en/career-programs/ai-machine-learning
        course_background: hsl(var(--primary))
      - name: Cybersecurity
        duration: {{ global.cybersecurity_week_duration | 16 }} weeks
        label: Updated in 2026
        title: Cybersecurity
        badges:
          - icon: Code
            text: Threat detection & system protection
        description: Develop the skills to identify threats, secure systems, and support security operations in today’s digital economy.
        price_period: " "
        cta_text: Program details
        cta_url: /en/career-programs/cybersecurity
        course_background: hsl(var(--secondary-foreground))
  - type: features_grid
    version: "1.0"
    variant: highlight
    title: Real Outcomes for Our Graduates
    subtitle: 4Geeks grads across the U.S., LATAM, and beyond launch careers in AI engineering, software development, data, and cybersecurity, landing jobs and increasing earning potential.
    items:
      - icon: Briefcase
        value: {{ global.global_job_placement_rate | 84 }}%
        title: Job placement rate
      - icon: Graduation
        value: 3-6 months
        title: Average time to get hired
      - icon: GrowthChart
        value: {{ global.global_salary_increase | 55 }}%
        title: Average salary increase after graduation
    columns: 3
    icon_color: "#0097CD"
    background: hsl(var(--secondary))
    marginY:
      desktop: none md
  - type: features_grid
    version: "1.0"
    variant: cardHeader
    heading: Confidence You Can Rely On
    description: |
      Our students get hired, and our high placement and retention rates prove it. At 4Geeks, you develop the AI-native, hands-on skills companies are actively looking for, all backed by the growth mindset that will set you apart. With an industry-aligned curriculum and unlimited 1:1 mentorship, you’re prepared for in-demand roles — and employers notice.
    image: https://storage.googleapis.com/4geeks-academy-website/media/comunity-support_1765908983485.png
    image_alt: 4Geeks Academy career support
    background: bg-primary/5
    cards:
      - icon: BriefcaseFilled
        text: Career Support with Proven Track Record
      - icon: Brain
        text: AI-Native Training Employers Are Hiring For
      - icon: ChalkboardTeacher
        text: Structured, Personalized Learning Method
  - type: two_column_accordion_card
    variant: image_background
    version: "1.0"
    title: AI-Powered Learning. Expert Mentorship. Real Career Support.
    description: Our AI-powered learning, paired with unlimited 1:1 mentorship and career support, helps you build in-demand skills, gain confidence, and advance in high-growth tech roles faster than you thought possible.
    bullets:
      - heading: Personalized Learning With Expert Support
        text: Small student-to-teacher ratios, unlimited mentor access, and AI-guided feedback keep your learning fast, adaptive, and focused on what matters.
      - heading: Lifelong Mentorship & Career Support
        text: Work 1:1 with mentors and career coaches who guide your portfolio, interview preparation, and job search strategy until you land your first tech role.
      - heading: AI-Integrated Curriculum and Learning Tools
        text: Master the latest AI tools and workflows that employers are actively hiring for.
    image: https://storage.googleapis.com/4geeks-academy-website/media/community_1764717588840.png
    image_alt: Student learning with mentor support
    video:
      url: https://storage.googleapis.com/4geeks-academy-website/media/loop-1.mp4
    reverse: true
    marginY:
      desktop: none lg
    paddingY:
      desktop: none
  - type: numbered_steps
    title: How the Job Guarantee Works
    description: We stand behind your success. If you complete the program, actively engage with our career services, and still don’t secure a qualifying tech role within 180 days of graduation, you may be eligible for a tuition refund under our Job Guarantee (conditions apply).
    description_link:
      text: Read the full terms
      url: /terms-and-conditions
    steps:
      - icon: School
        text: Complete our intensive coding bootcamp and graduate within 180 days of your program start date.
      - icon: Briefcase
        text: Actively apply for jobs using our career services, attend all coaching sessions, and follow our job search methodology.
      - icon: Cash
        text: If you haven’t received a qualifying job offer within 180 days of graduation, request your full tuition refund.
    background: bg-muted/30
    variant: default
  - type: numbered_steps
    version: "1.0"
    variant: bubbleText
    title: Get Hired with our 3-Step Career Development Process
    description: Our structured process is designed to get you hired fast.
    steps:
      - icon: Optimization
        title: Profile Optimization
        bullets:
          - Polish LinkedIn, GitHub, and portfolio to attract recruiters and pass AI-based filters.
          - Build a resume that clears applicant tracking systems (ATS) and highlights your strengths.
          - Showcase your skills with a recruiter-ready portfolio.
      - icon: Interview
        title: Interview Preparation
        bullets:
          - Gain confidence with mock technical and behavioral interviews.
          - Practice coding and problem-solving with auto-graded exercises.
          - Develop tailored strategies for upcoming interviews.
      - icon: JobSearch
        title: Strategic Job Search
        bullets:
          - Create a personalized job search plan aligned with your goals.
          - Navigate AI-driven hiring platforms, from resume scanners to automated interviews.
          - Connect with our extensive network of global hiring partners.
    background: bg-background
    paddingY:
      desktop: none
  - type: whos_hiring
    variant: carousel
    title: Where 4Geeks Graduates Work
    subtitle: Our alumni have joined leading companies across tech, media, and startups worldwide.
    logos:
      - src: https://storage.googleapis.com/4geeks-academy-website/media/microsoft_1764719829995.png
        alt: Microsoft
      - src: https://storage.googleapis.com/4geeks-academy-website/media/google-developers_1764719904190.png
        alt: Google Developers
      - src: https://storage.googleapis.com/4geeks-academy-website/media/boats_1764719939123.jpg
        alt: Boats Group
      - src: https://storage.googleapis.com/4geeks-academy-website/media/meta-logo_1764719959855.png
        alt: Meta
      - src: https://storage.googleapis.com/4geeks-academy-website/media/ebay_1764719967118.png
        alt: eBay
      - src: https://storage.googleapis.com/4geeks-academy-website/media/natgeo_1764719975443.png
        alt: National Geographic
      - src: https://storage.googleapis.com/4geeks-academy-website/media/evernote_1764719981901.png
        alt: Evernote
      - src: https://storage.googleapis.com/4geeks-academy-website/media/telefonica_1764719987250.png
        alt: Telefonica
      - src: https://storage.googleapis.com/4geeks-academy-website/media/twilio_1764719992371.png
        alt: Twilio
      - src: https://storage.googleapis.com/4geeks-academy-website/media/uber_1764719999685.png
        alt: Uber
      - src: https://storage.googleapis.com/4geeks-academy-website/media/Neo9_1764720006347.png
        alt: Neo9
      - src: https://storage.googleapis.com/4geeks-academy-website/media/jooble_1764720010702.png
        alt: Jooble
  - type: testimonials_slide
    title: The Stories Behind the Stats
    description: We stand behind the results our graduates achieve. Meet some of the students who transformed their careers through our programs.
  - type: numbered_steps
    version: "1.0"
    variant: bubbleText
    title: What Happens If You Don’t Get Hired
    description: If you complete the program and meet the Job Guarantee requirements but don't land a qualifying tech role within 9 months of graduation, 4Geeks will refund 100% of your tuition.
    description_link:
      text: Terms and conditions apply.
      url: https://storage.googleapis.com/4geeks-academy-website/PDF%20and%20Docs/job-guarantee-en.pdf
    steps:
      - icon: Optimization
        text: Let us know if you haven’t been hired into a qualifying role within 9 months after graduation.
        title: Notify Us
      - icon: Interview
        text: Our team verifies that all Job Guarantee requirements were completed during the program and job search period.
        title: Requirement Review
      - icon: JobSearch
        text: Once approved, you'll receive your full tuition refund within 30 days.
        title: Full Refund
    background: hsl(var(--secondary))
  - type: features_quad
    version: "1.0"
    variant: laptopEdge
    heading: Who Can Add the Job Guarantee?
    description: "You can enroll in the Job Guarantee if you:"
    cards:
      - icon: IconBriefcaseFilled
        title: {{ global.who_is_eligible_work_authorization | Have U.S. work authorization }}
      - icon: IconCircleDashedCheck
        title: Complete all coursework
      - icon: IconBrain
        title: Pass our logic test
      - icon: IconArrowGuideFilled
        title: Follow our career plan
    background: hsl(var(--muted))
    marginY:
      desktop: none md
    paddingY:
      desktop: none
  - type: cta_banner
    version: "1.0"
    title: Start Your Tech Career with the Confidence of a Job Guarantee
    subtitle: Apply to a career-focused program and choose the Job Guarantee option at enrollment.
    background: hsl(var(--primary))
    variant: form
    form:
      variant: stacked
      conversion_name: student_application
      submit_label: Apply Now
      tags: website-lead
      fields:
        email:
          visible: true
          required: true
          placeholder: Your email address
        first_name:
          visible: true
          required: true
          placeholder: First name
        phone:
          visible: true
          required: true
          placeholder: Phone number
        program:
          visible: true
          required: true
      success:
        message: Thank you! We'll be in touch soon.
      consent:
        email: true
        marketing: true
        marketing_text: I agree to receive information about courses and promotions
      show_terms: true
      button_className: bg-white text-primary hover:bg-white/90 border-white
      terms_className: text-white/80
    marginY:
      mobile: md none
      desktop: md none
    paddingY:
      mobile: lg
      desktop: lg
