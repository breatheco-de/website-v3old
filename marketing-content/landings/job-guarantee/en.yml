      desktop: none
    paddingY:
      desktop: none md
    background: hsl(210 100% 50% / 0.05)
  - type: two_column_accordion_card
    section_id: two_column_accordion_card-s6gzio
    variant: image_background
    version: "1.0"
    title: What Backs Our Guarantee
    description: "The Job Guarantee isn't a marketing promise. It's backed by a system built around one outcome: getting you hired. Here's what that looks like in practice."
    bullets:
      - heading: Personalized Support at Every Step
        text: Unlimited 1:1 mentorship from experienced instructors, plus AI-powered feedback 24/7. Every interaction is tailored to optimize your learning curve.
      - heading: AI-Native Skills Employers Are Hiring For
        text: The curriculum is built around what companies actually need today, including AI tools, workflows, and systems that are shaping every tech role in the market.
      - heading: Career Support Built for Today's Job Market
        text: From a recruiter-ready profile to direct access to 400+ hiring partners, GeekFORCE works with you until you land, with coaching, referrals, and interview prep built in.
    image: https://storage.googleapis.com/4geeks-academy-website/media/community_1764717588840.png
    image_alt: Student learning with mentor support
    video:
      url: https://storage.googleapis.com/4geeks-academy-website/media/loop-1.mp4
    reverse: true
    marginY:
      desktop: none md
    paddingY:
      desktop: none md
  - type: course_selector
    version: "1.0"
    variant: solid
    heading: Choose the Tech Career You Want to Launch
    subheading: Choose your path
    courses:
      - name: AI Engineering
        icon: Brain
        duration: {{ global.ai_engineering_week_duration | 24 }} weeks
        label: Updated in 2026
        title: AI Engineering
        badges:
          - icon: DollarSign
            text: APIs, automation, telemetry
        description: Build production-ready AI systems and learn to design, deploy, and scale AI-driven products.
        price_period: " "
        cta_text: Program details
        cta_url: /en/career-programs/ai-engineering
        course_background: hsl(var(--accent))
      - name: Data Science and Machine Learning
        duration: {{ global.data_science_week_duration | 16 }} weeks
        label: Updated in 2026
        title: Data Science and Machine Learning
        badges:
          - icon: Brain
            text: Python, TensorFlow, SQL
        description: Analyze real-world data, build predictive models, and apply machine learning techniques used by modern teams.
        price_period: " "
        cta_text: Program details
        cta_url: /en/career-programs/ai-machine-learning
        course_background: hsl(var(--primary))
      - name: Cybersecurity
        duration: {{ global.cybersecurity_week_duration | 16 }} weeks
        label: Updated in 2026
        title: Cybersecurity
        badges:
          - icon: Code
            text: Threat detection & system protection
        description: Develop the skills to identify threats, secure systems, and support security operations in today’s digital economy.
        price_period: " "
        cta_text: Program details
        cta_url: /en/career-programs/cybersecurity
        course_background: hsl(var(--secondary-foreground))
