  - type: features_grid
    version: "1.0"
    variant: highlight
    title: Real Outcomes for Our Graduates
    subtitle: "These numbers come from real graduates with real jobs. Our Job Guarantee is built around one outcome: getting you hired."
    items:
      - icon: Briefcase
        value: {{ global.global_job_placement_rate | 84 }}%
        title: Job placement rate
      - icon: Graduation
        value: 3-6 months
        title: Average time to get hired
      - icon: GrowthChart
        value: {{ global.global_salary_increase | 55 }}%
        title: Average salary increase after graduation
