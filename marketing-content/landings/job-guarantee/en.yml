sections:
  - type: hero
    version: "1.0"
    variant: productShowcase
    title: Get Hired. Or Your Tuition Back.
    brand_mark:
      prefix: Launch Your
      highlight: Tech Career.
      color: primary
    description: Add the Job Guarantee* to any eligible program. Get hired within 9 months of graduation, or we refund 100% of your tuition.
    bullets:
      - text: 84% of our graduates land a tech job
      - text: Get hired within 9 months or get a full tuition refund
      - text: Unlimited 1:1 career coaching and access to 400+ hiring partners
    footer: "<span style=\"color: hsl(var(--foreground));\"><span style=\"font-size: 1.25rem;\">Trusted by 6,000+ graduates • Top-rated by Course Report, SwitchUp & Forbes</span></span><div><br></div><div>* <a href=\"https://storage.googleapis.com/4geeks-academy-website/PDF%20and%20Docs/job-guarantee-en.pdf\">Terms and conditions apply.</a></div>"
    video_id: "-2ZvlgDnltc"
    video_ratio: "9:12"
    form:
      variant: stacked
      conversion_name: student_application
      submit_label: Start Your Application
      tags: website-lead
      fields:
        email:
          visible: true
          required: true
          placeholder: Email
        first_name:
          visible: true
          required: true
          placeholder: First name
        last_name:
          visible: true
          required: true
          placeholder: Last name
        phone:
          visible: true
          required: true
        program:
          visible: false
          default: ai-engineering
      success:
        message: Check your inbox! The information is on the way.
      terms_url: /terms-and-conditions
      privacy_url: /privacy-policy
      consent:
        sms: true
        marketing: true
        marketing_text: I agree to receive information through email, WhatsApp and/or other channels about workshops, events, courses, and other marketing materials. We'll never share your contact information, and you can easily opt out at any moment.
        sms_text: I agree to receive SMS/text messages about workshops, events, courses, and other marketing materials. Message and data rates may apply. Reply STOP to unsubscribe, HELP for help. You may receive up to 4–6 text messages per month. We will never share your contact information, and you can easily opt out at any moment.
        sms_usa_only: true
      show_terms: true
    form_vertical_align: center
    show_awards_marquee: true
    awards_marquee:
      items:
        - id: switchup-2025
