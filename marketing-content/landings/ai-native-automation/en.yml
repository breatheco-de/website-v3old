  - type: syllabus
    version: "1.0"
    title: Crea flujos de automatización desde cero hasta producción
    subtitle: En este curso aprenderás desde los fundamentos del pensamiento orientado a workflows hasta sistemas de automatización listos para producción. Dominarás la automatización con n8n, la integración de APIs y la implementación de IA.
    modules:
      - title: Flujos de trabajo del día a día
        description: En esta sesión, los estudiantes desarrollarán habilidades fundamentales de pensamiento en workflows, esenciales para la ingeniería de automatización. Aprenderán a identificar y diagramar procesos reales, comenzando por actividades cotidianas como la rutina de la mañana, hacer la compra o tareas diarias. Dominarán la identificación de procesos, la descomposición en pasos, la toma de decisiones (ramificaciones), los bucles y la gestión de errores. Al finalizar este módulo, serán capaces de crear diagramas completos de workflows con más de 15 pasos, sentando las bases para abordar la automatización de forma estructurada. Esta base práctica prepara a los estudiantes para pensar en términos de procesos y secuencias, una habilidad clave para todo el trabajo posterior en automatización.
      - title: Introducción a n8n
        description: En esta sesión, los estudiantes tendrán su primera experiencia práctica con la plataforma de automatización n8n. Construirán 3 flujos de trabajo funcionales, progresando desde estructuras básicas de 2 nodos hasta sistemas más complejos de 5 nodos con lógica condicional. Aprenderán a navegar por la interfaz de n8n, comprender los distintos tipos de nodos —incluyendo disparadores (triggers) y acciones—, dominar los conceptos de flujo de datos y utilizar nodos IF para implementar lógica condicional básica. El módulo pone especial énfasis en la inspección de datos y en técnicas de depuración de ejecuciones, permitiendo a los estudiantes entender cómo se mueve la información dentro de sus automatizaciones y cómo resolver problemas cuando algo no funciona como se espera. Este conocimiento fundamental de la plataforma es clave para todo el desarrollo de automatizaciones posterior.
      - title: Automatizaciones Multi-Step
        description: En esta sesión, los estudiantes construirán flujos de trabajo complejos de entre 6 y 10 nodos, incorporando funcionalidades avanzadas como la transformación de datos, múltiples condiciones y una gestión de errores completa. Dominarán el uso de nodos Merge para combinar flujos de datos, nodos Code para lógica personalizada y aprenderán el patrón de workflow en 5 fases Trigger → Gather → Transform → Evaluate → Act. Los estudiantes implementarán rutas con múltiples condiciones para gestionar distintos escenarios, desarrollarán estrategias de manejo de errores para crear automatizaciones robustas y practicarán metodologías de testing sistemático. Este módulo marca el paso de un nivel básico a uno más avanzado, formando profesionales capaces de diseñar sistemas de automatización sofisticados, listos para producción y preparados para gestionar la complejidad y los casos reales.
      - title: APIs y datos externos
        description: En esta sesión, los estudiantes aprenderán a integrar datos externos reales en sus flujos de trabajo utilizando peticiones HTTP y APIs públicas. Dominarán las estructuras de datos JSON, las técnicas de extracción de campos anidados y los patrones de gestión de errores en APIs. Trabajarán en profundidad con APIs meteorológicas, desarrollando 4 flujos completos basados en datos del tiempo que demuestran patrones de integración reales. El módulo cubre el uso de peticiones HTTP GET, el parseo y la navegación de JSON, el acceso a estructuras de datos anidadas, el uso de parámetros en APIs y la implementación de integraciones robustas con datos meteorológicos. Esta experiencia práctica con APIs reales prepara a los estudiantes para conectar sus automatizaciones con cualquier servicio externo o fuente de datos en entornos profesionales.
      - title: Databases & SQL
        description: Design and implement databases using SQL, understanding relationships, queries, and data modeling.
      - title: Integración de IA
        description: En esta sesión, los estudiantes incorporarán inteligencia artificial a sus flujos de trabajo mediante la integración con OpenAI GPT, transformando automatizaciones simples en sistemas inteligentes. Aprenderán técnicas de prompt engineering para obtener respuestas óptimas de la IA, gestionarán credenciales de API para realizar integraciones seguras y descubrirán cómo combinar datos externos con contenido generado por inteligencia artificial. Los estudiantes desarrollarán 4 sistemas de automatización potenciados con IA, aplicando casos prácticos reales dentro de workflows. El módulo pone especial énfasis en estrategias de control de costes en el uso de APIs de IA, asegurando que puedan construir sistemas inteligentes de forma eficiente. Al combinar la obtención de datos, su transformación y el procesamiento con IA, los estudiantes crearán asistentes avanzados capaces de entender el contexto y generar respuestas similares a las humanas.
      - title: Webhooks y automatización interactiva
        description: En esta sesión, los estudiantes transformarán sus flujos de trabajo, pasando de ejecuciones manuales a sistemas en tiempo real basados en eventos mediante el uso de webhooks. Aprenderán a crear endpoints de webhook capaces de recibir datos desde servicios externos, validar la entrada de usuarios para garantizar la calidad de los datos y desarrollar sistemas de respuesta en tiempo real que reaccionan de forma inmediata ante cualquier evento. Además, combinarán webhooks con APIs e inteligencia artificial para crear asistentes interactivos que puedan activarse mediante eventos externos, procesar solicitudes al instante y ofrecer respuestas inteligentes. El módulo cubre la creación de webhooks, la gestión de peticiones POST, técnicas completas de validación de datos, patrones de activación basados en eventos y arquitecturas de respuesta en tiempo real, permitiendo a los estudiantes desarrollar sistemas de automatización dinámicos y avanzados.
      - title: Diseño de experiencia de usuario UX
        description: En esta sesión, los estudiantes aprenderán a perfeccionar sus flujos de trabajo para convertirlos en aplicaciones fáciles de usar que ofrezcan una experiencia de usuario excelente. Dominarán técnicas de formateo de salidas para presentar la información de forma clara, diseñarán mensajes de error útiles que guíen al usuario, crearán respuestas estructuradas en múltiples secciones para outputs complejos y desarrollarán APIs autoexplicativas e intuitivas. El módulo cubre buenas prácticas de formateo de mensajes, principios de diseño de interfaces de entrada, estrategias de comunicación de errores, estructuras de respuesta multiparte y fundamentos de UX aplicados a sistemas de automatización. Los estudiantes transformarán workflows técnicos en interfaces pulidas, pensadas para que usuarios no técnicos puedan interactuar con ellas con confianza, cerrando la brecha entre funcionalidad avanzada y diseño accesible.
      - title: Proyecto final
        description: En esta sesión final, los estudiantes diseñarán y desarrollarán un sistema completo de automatización que integra todas las habilidades adquiridas a lo largo del curso. Realizarán una planificación detallada para definir el alcance del proyecto, implementarán el sistema por fases para gestionar la complejidad, llevarán a cabo pruebas sistemáticas para garantizar la calidad y elaborarán documentación profesional orientada a su portfolio. Los estudiantes entregarán un workflow funcional, un paquete completo de documentación, resultados de testing detallados, materiales de presentación y un repositorio listo para GitHub que demuestre su dominio. Este proyecto, con una duración de entre 180 y 240 minutos, representa la culminación del aprendizaje, dando lugar a una pieza sólida para portfolio que demuestra la capacidad de crear soluciones de automatización listas para producción, desde el concepto hasta su despliegue.
      - title: Buenas prácticas profesionales
        description: En esta sesión, los estudiantes llevarán su proyecto final a estándares de producción mediante la adopción de prácticas profesionales de desarrollo. Aprenderán convenciones de nomenclatura utilizadas en la industria para crear código mantenible, implementarán patrones de organización claros, desarrollarán documentación de nivel profesional, aplicarán estrategias avanzadas de gestión de errores, utilizarán control de versiones con Git y mejorarán sus habilidades de comunicación con stakeholders. El módulo cubre estándares de naming, buenas prácticas de documentación, patrones comunes de errores y sus soluciones, metodologías de testing sistemático, flujos de trabajo con control de versiones y técnicas efectivas de presentación de proyectos técnicos. Los estudiantes transformarán su automatización funcional en un sistema pulido y profesional, alineado con los estándares de la industria y preparado para presentarse con confianza ante empleadores, clientes o stakeholders.
    section_id: syllabus-xtnk7v
