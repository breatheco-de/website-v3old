sections:
  - type: hero
    section_id: hero-kygxz1
    version: "1.0"
    variant: ApplyFormProductShowcase
    title: Construye sistemas reales, listos para producción.
    brand_mark:
      prefix: Conviértete en
      highlight: Ingeniero de IA
      color: primary
    description: Aprende a desarrollar, integrar y desplegar soluciones de IA en 24 semanas con mentoría 1:1 ilimitada y una comunidad profesional que acompaña tu crecimiento profesional.
    form:
      variant: stacked
      conversion_name: student_application
      submit_label: Postular ahora
      tags: website-lead
      fields:
        email:
          visible: true
          required: true
          placeholder: Correo Electrónico
        first_name:
          visible: true
          required: true
          placeholder: Nombre
        last_name:
          visible: true
          required: true
          placeholder: Apellido
        phone:
          visible: true
          required: true
          default_country: CL
        program:
          visible: false
          default: ai-engineering
      success:
        message: ¡Revisa tu bandeja de entrada! Tu programa está en camino.
      terms_url: /terminos-condiciones
      privacy_url: /politica-privacidad
      consent:
        sms: false
        marketing: true
        marketing_text: Acepto recibir información por email, WhatsApp y/o otros canales sobre talleres, eventos, cursos y materiales de marketing. Nunca compartiremos tus datos y puedes darte de baja cuando quieras.
      show_terms: true
    cta_button:
      text: Descargar programa
      url: /programa/ai-engineering
      variant: outline
      icon: Download
    paddingY:
      mobile: md none
      desktop: lg none
    marginY:
      mobile: none
      desktop: none
    background: linear-gradient(to bottom, hsl(210 100% 50% / 0.1), transparent)
