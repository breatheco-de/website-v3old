  - type: syllabus
    variant: program-modules
    program_title: What You Build in 24 Weeks
    program_description: Python is your foundation. This program puts it to work on the full AI Engineering stack. Across 10 milestones, you build a fully operational, AI-powered company using Python for data pipelines, RAG systems, agent orchestration, and automated workflows. You graduate with a live system, not just a certificate.
