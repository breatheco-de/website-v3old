            image_object_position: center
            contributor_logos:
              - image_id: logo_utec-545x305-q70
              - image_id: bid_logo
            description: Melanie retrained as a software developer and now works remotely for a tech company, from home, in a career she chose.
            achievement: Her salary doubled. And she works remotely, on her own terms.
