  - modules:
      - description: Configure an open source AI agent as a personal assistant, then develop custom skills for it. Turn it into a productive tool with real autonomy in business contexts.
        title: Personal Assistants with OpenClaw
      - description: "Implement contextual memory: episodic, semantic, procedural. Build memory banks and context rules from an existing codebase, and turn your agent into a collaborator that understands your work."
        title: Advanced Personal Assistants with OpenClaw
      - description: Write executable specifications for agents, agent specs, and synthesize reusable skills so agents act with precision instead of guessing.
        title: Working with AI Coding Agents
      - description: Prepare data and select models for training. Implement RAG on proprietary knowledge bases, work with vector databases, and learn when and how to fine tune. Evaluate, debug, and integrate models in production.
        title: LLMs, Training and RAG
      - description: Build agents with real tool calling that access external systems safely under guardrails. Extend agent capabilities with the Model Context Protocol, provide tools through CLIs optimized for AI, and give an agent persistent memory.
        title: Agentic Engineering
      - description: Design multi agent systems with LangGraph's state graph model. Define state schemas, handle errors at individual nodes without crashing the graph, build modular subgraphs, and trace routing decisions and token cost across the whole system.
        title: Agentic Workflows and Orchestration
