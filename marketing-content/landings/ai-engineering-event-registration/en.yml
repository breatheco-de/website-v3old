  - description: <p>You'll go from configuring your first agent to orchestrating systems where multiple agents collaborate on their own. This is a highlight reel. The full curriculum covers more ground.</p>
    header: A preview of what's inside
    marginY:
      mobile: md
      desktop: none lg
    module_cards:
      - duration: Module 01
        icon: IconRobot
        objectives:
          - Configure an open source AI agent as a personal assistant
          - Develop custom skills for it
          - Turn it into a productive tool with real autonomy in business contexts
        orientation: vertical
        title: Personal Assistants with OpenClaw
      - duration: Module 02
        icon: IconRobot
        objectives:
          - "Implement contextual memory: episodic, semantic, procedural"
          - Build memory banks and context rules from an existing codebase
          - Turn your agent into a collaborator that understands your work
        orientation: vertical
        title: Advanced Personal Assistants with OpenClaw
      - duration: Module 03
        icon: IconCode
        objectives:
          - Write executable specifications for agents, agent specs
          - Synthesize reusable skills so agents act with precision instead of guessing
        orientation: vertical
        title: Working with AI Coding Agents
      - duration: Module 04
        icon: IconDatabase
        objectives:
          - Prepare data and select models for training
          - Implement RAG on proprietary knowledge bases, work with vector databases
          - Learn when and how to fine tune
          - Evaluate, debug, and integrate models in production
        orientation: vertical
        title: LLMs, Training and RAG
      - duration: Module 05
        icon: IconBolt
        objectives:
          - Build agents with real tool calling that access external systems safely under guardrails
          - Extend agent capabilities with the Model Context Protocol
          - Provide tools through CLIs optimized for AI
          - Give an agent persistent memory
        orientation: vertical
        title: Agentic Engineering
      - duration: Module 06
        icon: IconLayoutKanban
        objectives:
          - Design multi agent systems with LangGraph's state graph model
          - Define state schemas, handle errors at individual nodes without crashing the graph
          - Build modular subgraphs
          - Trace routing decisions and token cost across the whole system
        orientation: vertical
        title: Agentic Workflows and Orchestration
