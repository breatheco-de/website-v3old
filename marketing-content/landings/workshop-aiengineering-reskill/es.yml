  - type: faq
    version: v1.0
    title: Preguntas Frecuentes
    items:
      - question: ¿Necesito experiencia previa?
        answer: No. Pero sí necesitas compromiso y mentalidad de aprendizaje. Lo importante es tener interés en aprender y aplicar tecnología a problemas reales.
      - question: ¿Esto me garantiza empleo?
        answer: No, no hay garantías. Pero sí te posiciona en una de las áreas con mayor crecimiento y demanda actual. El objetivo es ayudarte a entender si este camino puede mejorar tu empleabilidad.
      - question: ¿Es técnico el webinar?
        answer: No. Es una sesión estratégica para entender el cambio del mercado y ayudarte a tomar una decisión informada.
      - question: ¿Cuánto tiempo necesito para reconvertirme?
        answer: No es inmediato, pero tampoco es un proceso de años. Con una formación estructurada, en unos meses puedes adquirir las bases necesarias para empezar a construir proyectos y posicionarte en este nuevo mercado.
      - question: ¿Y si no estoy seguro de querer cambiar de carrera?
        answer: Este webinar es justo para esto. Para que puedas entender el contexto actual y decidir con información si este camino tiene sentido para ti o no.
    section_id: faq-4w2e25
