  - module_cards:
      - duration: Phase 1 — Weeks 1–4
        icon: IconBrandPython
        objectives:
          - Python programming fundamentals
          - Command line, Git, and developer tools
          - Build your first AI-powered scripts
        orientation: vertical
        title: Foundations & Python
      - duration: Phase 2 — Weeks 5–10
        icon: IconRobot
        objectives:
          - Prompt engineering and LLM APIs
          - Build AI agents with tool calling
          - RAG, vector databases, and memory layers
        orientation: vertical
        title: AI Engineering Core
      - duration: Phase 3 — Weeks 11–16
        icon: IconServer
        objectives:
          - Backend APIs with FastAPI
          - Agentic workflows and n8n automations
          - Real-time communication and async processing
        orientation: vertical
        title: Infrastructure for AI
      - duration: Phase 4 — Weeks 17–20
        icon: IconReact
        objectives:
          - Frontend with React and AI-generated UI
          - Full-stack deployment on cloud infrastructure
          - Cybersecurity best practices for AI apps
        orientation: vertical
        title: Full Stack & Deployment
      - duration: Phase 5 — Weeks 21–24
        icon: IconBriefcase
        objectives:
          - Build a complete AI-transformed company project
          - Portfolio polish and technical interviews
          - Career support and job placement activation
        orientation: horizontal
        title: Capstone & Career Launch
