    description: Aplicar no es comprometerse. Es el primer paso para saber si este programa es el adecuado para ti. Todo el proceso dura menos de 48 horas.
    steps:
      - icon: Application
        title: Aplicación al programa
        bullets:
          - Completa el formulario inicial para iniciar tu proceso de admisión.
          - Revisamos tu perfil, experiencia y objetivos profesionales.
          - Buscamos personas comprometidas con una transformación real en su carrera.
      - icon: Interview
        title: Entrevista por WhatsApp
        bullets:
          - Nuestro equipo de admisiones te escribirá por WhatsApp.
          - Evaluamos tu motivación, disponibilidad y encaje con el programa.
          - No es un examen técnico, es una conversación para entender si este es el momento adecuado para ti.
      - icon: Decision
        title: Selección y próximos pasos
        bullets:
          - Si tu perfil encaja, te compartimos la información completa para avanzar.
          - Recibirás orientación clara sobre fechas, inversión y expectativas.
          - Si no es el mejor momento, te recomendamos alternativas para tu crecimiento profesional.
