      - name: OpenAI
        icon: openai
      - name: Claude
        icon: claude
      - name: Python
        icon: python
      - name: Pandas
        icon: pandas
      - name: NumPy
        icon: numpy
      - name: Scikit-learn
        icon: scikitlearn
      - name: PyTorch
        icon: pytorch
      - name: Matplotlib
        icon: matplotlib
      - name: React
        icon: react
      - name: Next.js
        icon: nextjs
      - name: Tailwind CSS
        icon: tailwindcss
      - name: Node.js
        icon: nodejs
      - name: Vercel
