  - type: syllabus
    variant: program-modules
    program_title: What You Build to Earn Your Certification
    program_description: Certification at 4Geeks is not a quiz you pass at the end. You earn it by building a fully operational, AI-powered company across 10 milestones. Every milestone is a deliverable. Every deliverable becomes part of the portfolio you show employers. You graduate with a live system and a credential that proves you built it.
