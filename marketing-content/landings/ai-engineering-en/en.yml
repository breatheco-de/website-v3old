    module_cards:
      - title: AI-First Prework
        duration: Milestone 0
        objectives:
          - YAML/JSON fundamentals
          - Git version control
          - JS basics
          - Internet fundamentals
          - Coding agents
        icon: IconRocket
      - title: Web Foundations
        duration: Milestone 1
        objectives:
          - HTML, CSS, Tailwind
          - Accessibility best practices
          - Layout techniques
        projects: Build the company's first webpage
        icon: IconWorld
      - title: Programming Foundations
        duration: Milestone 2
        objectives:
          - Algorithms and data structures
          - Stateflow vs controlflow
          - JavaScript mastery
        projects: Implement small features for the company
        icon: IconCode
      - title: AI-Driven UI Engineering
        duration: Milestone 3
        objectives:
          - Vision-to-Spec prompting
          - Component generation with AI
        projects: Rebuild the company's UI using AI
        icon: IconSparkles
      - title: React Fundamentals
        duration: Milestone 4
        objectives:
          - SPA architecture
          - Props, state, and effects
          - Debugging techniques
        projects: Build the company's interactive frontend
        icon: IconBrandReact
      - title: Backend for AI Frontends
        duration: Milestone 5
        objectives:
          - APIs and DB basics
          - Serialization and auth
          - Serverless functions
        projects: Create the company's backend
        icon: IconServer
      - title: Telemetry & Data Pipelines
        duration: Milestone 6
        objectives:
          - Collect, transform, aggregate, report
        projects: Build telemetry for the company
        icon: IconChartLine
      - title: RAG & Memory
        duration: Milestone 7
        objectives:
          - Chunking and embeddings
          - Vector search
        projects: Add the company's knowledge layer
        icon: IconBrain
      - title: Agent Engineering
        duration: Milestone 8
        objectives:
          - Rules and memory bank
          - Tool calling
          - Multi-agent planning
        projects: Build the company's agents
        icon: IconRobot
      - title: Agentic Workflow Generation
        duration: Milestone 9
        objectives:
          - Use LLMs to analyze company case
          - Generate and validate internal workflows
          - Implement automation pipelines
        projects: Serverless, queues, cronjobs, or n8n
        icon: IconSitemap
      - title: Real-Time Systems
        duration: Milestone 10
        objectives:
          - Streaming and sockets
          - Pub/sub patterns
        projects: Enable real-time interactions for data, customers, AI or employees
        icon: IconBolt
      - title: Full AI-Transformed Company
        duration: Capstone
        objectives:
          - AI-generated frontend
          - API + authentication
          - Telemetry + reporting pipeline
          - Workflow automation (agent-generated)
          - RAG knowledge layer
          - Agents with tool calling
          - Real-time communication layer
        projects: Deliver the complete transformation of your chosen company
        orientation: horizontal
        icon: IconTrophy
