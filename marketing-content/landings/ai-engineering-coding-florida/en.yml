      - name: Git
        icon: git
      - name: GitHub
        icon: github
      - name: Postman
        icon: postman
      - name: n8n
        icon: n8n
    module_cards:
      - title: AI-First Prework
        duration: Milestone 0
        objectives:
          - YAML/JSON fundamentals
          - Git version control
          - JS basics
          - Internet fundamentals
          - Coding agents
        projects: Set up your dev environment and ship your first AI-assisted code
        icon: IconRocket
      - title: Web Foundations
        duration: Milestone 1
        objectives:
          - HTML, CSS, Tailwind
          - Accessibility best practices
          - Layout techniques
        projects: Build the company's first webpage — live on the internet
        icon: IconWorld
      - title: Programming Foundations
        duration: Milestone 2
        objectives:
          - Algorithms and data structures
          - JavaScript mastery
          - Logic and control flow
        projects: Build real features for your chosen company using code you wrote
        icon: IconCode
      - title: AI-Driven UI Engineering
        duration: Milestone 3
        objectives:
          - Vision-to-Spec prompting
          - Component generation with AI
          - AI-assisted design workflows
        projects: Rebuild the company's entire UI using AI tools — in a fraction of the time
        icon: IconSparkles
      - title: React Fundamentals
        duration: Milestone 4
        objectives:
          - SPA architecture
          - Props, state, and effects
          - Debugging techniques
        projects: Build the company's interactive frontend — dynamic, responsive, production-ready
        icon: IconBrandReact
      - title: Backend for AI Frontends
        duration: Milestone 5
        objectives:
          - APIs and database design
          - Authentication and security
          - Serverless functions
        projects: Create the company's backend — the engine that powers everything
        icon: IconServer
      - title: Telemetry & Data Pipelines
        duration: Milestone 6
        objectives:
          - Data collection and transformation
          - Aggregation and reporting
          - Pipeline architecture
        projects: Build the company's data layer — know what's happening in your product in real time
        icon: IconChartLine
      - title: RAG & Memory
        duration: Milestone 7
        objectives:
          - Embeddings and vector search
          - Knowledge retrieval systems
          - Long-term AI memory
        projects: Give your company's AI a brain — it learns from your data, not just its training
        icon: IconBrain
      - title: Agent Engineering
        duration: Milestone 8
        objectives:
          - Tool calling and planning
          - Multi-agent coordination
          - Rules and memory banks
        projects: Build autonomous AI agents that work for your company 24/7
        icon: IconRobot
      - title: Agentic Workflow Generation
        duration: Milestone 9
        objectives:
          - LLM-generated workflow analysis
          - Automation pipeline implementation
          - Serverless, queues, and cronjobs
        projects: Automate the company's internal operations — agents that run the business
        icon: IconSitemap
      - title: Real-Time Systems
        duration: Milestone 10
        objectives:
          - Streaming and websockets
          - Pub/sub patterns
          - Live data architecture
        projects: Enable real-time interactions — for customers, employees, and AI systems
        icon: IconBolt
      - title: Full AI-Transformed Company
        duration: Capstone
        objectives:
          - AI-generated frontend
          - API + authentication
          - Telemetry + reporting pipeline
          - Workflow automation (agent-generated)
          - RAG knowledge layer
          - Agents with tool calling
          - Real-time communication layer
        projects: "Deliver the complete transformation: a fully operational, AI-powered company — built entirely by you"
        orientation: horizontal
