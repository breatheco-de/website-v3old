  - type: two_column
    proportions:
      - 5
      - 7
    background: bg-muted/30
    alignment: center
    left:
      image: https://storage.googleapis.com/4geeks-academy-website/media/hombre-joven-con-laptop_1764691956393.webp
      image_alt: Team collaborating on a project
      justify: center
    right:
      heading: ¡Desde Cero Hasta Tu Primer Empleo!
      description: Descubre una oportunidad única para transformar tu carrera y adentrarte en el mundo de la programación. En solo 18 semanas, te guiaremos desde cero hasta conseguir tu primer trabajo como programador.
      bullets:
        - text: No se requiere experiencia previa
        - text: Horario part-time adaptable a tu vida actual
        - text: Mentorías y career support de por vida
      bullet_icon: Check
      font_size: base
    reverse_on_mobile: true
    gap: "12"
  - type: why_learn_ai
    variant: laptop-edge
    title: JavaScript y Python
    subtitle: ""
    description: El Bootcamp abarca desde los fundamentos de programación en JavaScript hasta la creación de aplicaciones dinámicas con React.js. También incluye conceptos avanzados como Python, Flask, bases de datos y la publicación de sitios web. Prepárate para desarrollar proyectos web de forma efectiva y aplicar tus conocimientos en entornos profesionales, donde se valora altamente a profesionales bien preparados en esta área.
    cta:
      text: Obtener más información
      url: /signup
      variant: primary
  - type: course_selector
    version: "1.0"
    variant: solid
    heading: Descubre tu potencial en 4Geeks Academy
    subheading: Programas para convertirte en un experto en programación y complementar tu perfil profesional
    courses:
      - name: Desarrollo Full Stack con IA
        icon: Code
        duration: 20 semanas
        label: Actualizado en 2026
        title: Desarrollo de Software Full Stack
        badges:
          - icon: Code
            text: React, Node.js y Python
        tags:
          - icon: Plus
            text: Desarrollo de APIs
          - icon: ""
            text: ""
        description: Domina el desarrollo web moderno de frontend a backend y construye aplicaciones listas para producción con herramientas estándar de la industria.
        cta_text: Ver Detalles del Programa
        cta_url: /es/programas-de-carrera/desarrollo-full-stack
        course_background: hsl(var(--destructive))
