sections:
  - type: syllabus
    version: "1.0"
    variant: program-modules
    program_title: What You'll Build
    program_description: From day one, you'll work on real projects that prepare you for a career in tech.
    tech_logos:
      - name: React
        icon: react
      - name: Python
        icon: python
      - name: Node.js
        icon: nodejs
      - name: Git
        icon: git
    module_cards:
      - title: Foundation
        duration: Weeks 1-4
        objectives:
          - HTML & CSS fundamentals
          - JavaScript basics
          - Version control with Git
        projects: Build your first responsive website
        orientation: vertical
        icon: IconRocket
      - title: Frontend Mastery
        duration: Weeks 5-8
        objectives:
          - React component architecture
          - State management
          - API integration
        projects: Create a full React application
        orientation: horizontal
        icon: IconLayoutDashboard
      - title: Backend Development
        duration: Weeks 9-12
        objectives:
          - Python fundamentals
          - REST API design
          - Database integration
        projects: Build a complete API server
        orientation: vertical
        icon: IconServer
      - title: Full Stack Integration
        duration: Weeks 13-16
        objectives:
          - Connect frontend to backend
          - Authentication flows
          - Deployment strategies
        projects: Launch your capstone project
        orientation: horizontal
        icon: IconStack2
  - type: hero
    version: "1.0"
    variant: productShowcase
    title: ""
    brand_mark:
      prefix: Conviértete en un
      highlight: Desarrollador Full Stack
      color: primary
    description: Construye tu camino
    bullets:
      - text: Aprende a programar desde cero hasta ser un profesional.
      - text: ¡Somos el único bootcamp que no finaliza cuando te gradúas! En 4Geeks dispones de mentorías ilimitadas y de por vida.
      - text: Contamos con diferentes opciones de financiamiento puedes financiar el importe en 6, 9, 12 y 18 meses.
    video_id: "-2ZvlgDnltc"
    video_ratio: "9:12"
    form:
      variant: stacked
      conversion_name: student_application
      submit_label: Solicitar Información
      tags: website-lead
      fields:
        email:
          visible: true
          required: true
          placeholder: Email
        first_name:
          visible: true
          required: true
          placeholder: Nombre
        last_name:
          visible: true
          required: true
          placeholder: Apellido
        phone:
          visible: true
          required: true
        program:
          visible: false
          default: full-stack
      success:
        message: ¡Gracias por tu solicitud! En pocos minutos te llegará un correo con la información
      terms_url: /terms-and-conditions
      privacy_url: /privacy-policy
      consent:
        sms: false
        marketing: true
        marketing_text: Acepto recibir información por email, WhatsApp y/o otros canales sobre talleres, eventos, cursos y materiales de marketing. Nunca compartiremos tus datos y puedes darte de baja cuando quieras.
        sms_text: I agree to receive SMS/text messages about workshops, events, courses, and other marketing materials. Message and data rates may apply. Reply STOP to unsubscribe, HELP for help. You may receive up to 4–6 text messages per month. We will never share your contact information, and you can easily opt out at any moment.
        sms_usa_only: true
      show_terms: true
    form_vertical_align: center
    video_title: GeekForce Career Support
    marginY:
      desktop: md none
    background: linear-gradient(to bottom, hsl(210 100% 50% / 0.05), transparent)
