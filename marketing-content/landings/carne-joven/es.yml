      - name: Emily Thompson
        role: Ingeniera DevOps
        company: Netflix
        rating: 5
        comment: El equipo de soporte profesional me ayudó a negociar un salario 50% más alto de lo que esperaba.
        outcome: Aumento salarial del 50%
      - name: David Kim
        role: Tech Lead
