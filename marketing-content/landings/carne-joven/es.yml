        description: Conéctate con más de 6,000 profesionales en todo el mundo, creando redes valiosas y oportunidades de colaboración.
      - icon: briefcase-business
        title: Preparación Laboral
        description: Capacitación enfocada en habilidades altamente demandadas en el mercado laboral, garantizando tu empleabilidad en sectores en crecimiento.
      - icon: Award
        title: Reconocimiento Internacional
        description: 4Geeks Academy es reconocido internacionalmente por su enfoque práctico y la calidad de sus programas.
    footer_description: Con nuestra colaboración especial con Carné Joven, puedes acceder a una formación de alta calidad a un precio accesible.
