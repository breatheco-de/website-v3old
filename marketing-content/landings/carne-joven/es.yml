sections:
  - type: hero
    version: "1.0"
    variant: productShowcase
    title: Bootcamp de Programación de 4Geeks Academy y Carné Joven
    brand_mark:
      prefix: Obtén
      highlight: 50% de descuento
      color: primary
    description: Completa el formulario y en menos de 5 minutos tendrás toda la información del bootcamp y opciones de financiamiento en tu correo.
    bullets:
      - text: Obtén un 50% de descuento en el bootcamp de programación de 4Geeks Academy
      - text: Disfruta de tutorías personalizadas y acceso a una comunidad de más de 6,000 profesionales
      - text: Aprende a programar y adquiere competencias esenciales para tu carrera
    form:
      variant: stacked
      conversion_name: student_application
      submit_label: Solicita tu plaza
      tags: website-lead
      fields:
        first_name:
          visible: true
          required: true
          placeholder: Nombre completo
        email:
          visible: true
          required: true
          placeholder: Correo electrónico
        phone:
          visible: true
          required: true
        last_name:
          visible: false
        program:
          visible: false
          default: ai-engineering
      success:
        message: Una vez completado el formulario, recibirás en tu correo toda la información del curso y las opciones de financiamiento disponibles.
      terms_url: /terms-and-conditions
      privacy_url: /privacy-policy
      consent:
        sms: true
        marketing: true
        marketing_text: Acepto recibir información vía email, WhatsApp y/o otros canales sobre talleres de programación, eventos, cursos y otros materiales de marketing. Nunca compartiremos tu información de contacto y puedes darte de baja fácilmente en cualquier momento.
        sms_text: Acepto recibir mensajes SMS/texto sobre talleres, eventos, cursos y otros materiales de marketing. Pueden aplicarse tarifas de mensajes y datos. Responde STOP para darte de baja, HELP para ayuda. Puedes recibir hasta 4–6 mensajes de texto por mes. Nunca compartiremos tu información de contacto y puedes darte de baja fácilmente en cualquier momento.
        sms_usa_only: true
      show_terms: true
    form_vertical_align: center
    show_awards_marquee: false
