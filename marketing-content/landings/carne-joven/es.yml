  - type: geeks_vs_others_comparison
    section_id: geeks_vs_others_comparison-bdczjl
    version: "1.0"
    title: ¿Qué diferencia a nuestro bootcamp de programación de los demás?
    columns:
      - name: Característica
      - name: 4Geeks Academy
        highlight: true
      - name: Promedio de la industria / competidores
    rows:
      - feature: Apoyo profesional personalizado
        values:
          - Soporte de por vida hasta que consigas trabajo (y más allá)
          - Limitado, a menudo expira después de meses
      - feature: Proporción profesor:estudiante
        values:
          - "1:7"
          - 1:10+
      - feature: Retroalimentación con IA
        values:
          - Personalizada según tu progreso
          - Genérica o inexistente
      - feature: Mentoría 1 a 1
        values:
          - Ilimitada y continua
          - Sesiones limitadas
      - feature: Plan de estudios
        values:
          - Actualizado continuamente para coincidir con las necesidades de la industria
          - Lento para adaptarse
