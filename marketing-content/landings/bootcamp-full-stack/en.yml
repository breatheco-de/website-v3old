  - type: syllabus
    section_id: syllabus-zk9m5o
    variant: program-modules
    program_title: Full Stack with AI Program Overview
    program_description: Learn to build modern, production-ready web applications by mastering frontend and backend development alongside AI. Work with APIs, databases, and intelligent tools to design, develop, and ship real-world software.
    tech_logos:
      - name: HTML5
        icon: html
      - name: CSS3
        icon: css
      - name: JavaScript
        icon: javascript
      - name: React
        icon: react
      - name: Python
        icon: python
      - name: Git
        icon: git
    module_cards:
      - title: Introduction To HTML And CSS
        duration: Weeks 1-2
        objectives:
          - Create web structures with semantic HTML
          - Style pages with modern CSS techniques
          - Build visually appealing and accessible websites
        projects: Build responsive landing pages from scratch
        orientation: vertical
        icon: IconCode
      - title: JavaScript
        duration: Weeks 3-5
        objectives:
          - Master variables, functions, and loops
          - DOM manipulation for interactive pages
          - Modern ES6+ features and async programming
        projects: Create dynamic, interactive web applications
        orientation: vertical
        icon: IconBrandJavascript
      - title: React
        duration: Weeks 6-9
        objectives:
          - Build component-based user interfaces
          - State management with hooks
          - Routing and best practices for scalable apps
        projects: Build modern single-page applications
        orientation: vertical
        icon: IconBrandReact
      - title: Python
        duration: Weeks 10-12
        objectives:
          - Core programming concepts and data structures
          - Object-oriented programming principles
          - Web development and automation skills
        projects: Create backend services and automation scripts
        orientation: vertical
        icon: IconBrandPython
      - title: Creating APIs
        duration: Weeks 13-15
        objectives:
          - Design and build RESTful APIs
          - Authentication and database integration
          - API documentation and best practices
        projects: Build a full REST API with Flask/Express
        orientation: vertical
        icon: IconApi
      - title: Agile Methodologies
        duration: Week 16
        objectives:
          - Scrum, Kanban, and agile frameworks
          - Sprint planning and daily standups
          - Effective collaboration in dev teams
        projects: Work in agile teams on group projects
        orientation: vertical
        icon: IconUsers
    paddingY:
      desktop: md
  - type: projects
    section_id: projects-41ar2f
    title: Learn by Building Real-Life Projects
    subtitle: Build production-ready full stack applications that mirror real software engineering roles and industry workflows.
    items:
      - title: Build a StarWars REST API
        description: The StarWars Blog API will let you practice building a REST API using lightweight API frameworks like Express (for node) or Flask (for python) using SQLAlchemy ORM and Python language, while building a fun blog. Ideal for juniors looking to practice API development in python.
        image: star-wars
        tags:
          - REST
        duration: 8 HOURS
        difficulty: easy
        date: 15/11/2022
      - title: Authentication System with JWT
        description: Create a complete authentication system with JWT tokens, React frontend, and Python backend. Learn security best practices and session management patterns used in production applications.
        image: authentication
        tags:
          - Security
          - JWT
        duration: 6 HOURS
        difficulty: medium
        date: 20/01/2023
      - title: Full-Stack Final Project
        description: Design and build your own full-stack application from scratch. Demonstrate your skills with React, Flask, SQLAlchemy, and third-party API integrations. This capstone project showcases everything you've learned.
        image: final-project
        tags:
          - Full-Stack
          - Capstone
        duration: 40 HOURS
        difficulty: hard
        date: 01/03/2023
    paddingY:
