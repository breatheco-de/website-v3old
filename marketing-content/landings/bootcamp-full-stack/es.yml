  - type: syllabus
    section_id: syllabus-vr2u4r
    variant: program-modules
    program_title: Programa Full Stack con IA
    program_description: Construye aplicaciones web listas para producción con IA desde cero — frontend, backend, APIs, bases de datos y funcionalidades potenciadas por IA. Seis módulos que te llevan desde tu primera página web hasta una aplicación Full Stack completa y desplegable.
    tech_logos:
      - name: HTML5
        icon: html
      - name: CSS3
        icon: css
      - name: JavaScript
        icon: javascript
      - name: React
        icon: react
      - name: Python
        icon: python
      - name: Git
        icon: git
    module_cards:
      - title: Introducción a HTML y CSS
        duration: Semanas 1-2
        objectives:
          - Crear estructuras web con HTML semántico
          - Estilizar páginas con técnicas modernas de CSS
          - Construir sitios web visualmente atractivos y accesibles
        projects: Construye tus primeras páginas web con HTML y CSS — aprendiendo a estructurar contenido, maquetar y crear interfaces que funcionan en todos los dispositivos.
        orientation: vertical
        icon: IconCode
      - title: JavaScript
        duration: Semanas 3-5
        objectives:
          - Dominar variables, funciones y bucles
          - Manipulación del DOM para páginas interactivas
          - Características modernas de ES6+ y programación asíncrona
        projects: Aprende JavaScript desde cero y úsalo para crear experiencias web interactivas y dinámicas — el lenguaje detrás de casi todo lo que se mueve en la web.
        orientation: vertical
        icon: IconBrandJavascript
      - title: React
        duration: Semanas 6-9
        objectives:
          - Construir interfaces de usuario basadas en componentes
          - Gestión de estado con hooks
          - Enrutamiento y mejores prácticas para apps escalables
        projects: Construye interfaces de usuario basadas en componentes con React, la librería detrás de algunas de las aplicaciones web más usadas del mundo.
        orientation: vertical
        icon: IconBrandReact
      - title: Python
        duration: Semanas 10-12
        objectives:
          - Conceptos fundamentales de programación y estructuras de datos
          - Principios de programación orientada a objetos
          - Desarrollo web y habilidades de automatización
        projects: Aprende Python para el desarrollo backend — escribiendo código limpio y legible que impulsa la lógica del servidor de tus aplicaciones.
        orientation: vertical
        icon: IconBrandPython
      - title: Creación de APIs
        duration: Semanas 13-15
        objectives:
          - Diseñar y construir APIs RESTful
          - Autenticación e integración de bases de datos
          - Documentación de APIs y mejores prácticas
        projects: Diseña y construye APIs RESTful que conectan tu frontend con tu backend — la habilidad que une todas las partes de una aplicación Full Stack.
        orientation: vertical
        icon: IconApi
      - title: Metodologías Ágiles
        duration: Semana 16
        objectives:
          - Scrum, Kanban y frameworks ágiles
          - Planificación de sprints y reuniones diarias
          - Colaboración efectiva en equipos de desarrollo
        projects: Aprende cómo trabajan los equipos de desarrollo reales — practicando Scrum, Kanban y flujos de trabajo ágiles en proyectos grupales.
        orientation: vertical
        icon: IconUsers
    paddingY:
      desktop: md none
    marginY:
      desktop: none md

  - type: projects
    section_id: projects-t6l1tn
    title: Aprende construyendo proyectos reales
    subtitle: Cada módulo termina con un proyecto práctico — aplicaciones reales que van directamente a tu portfolio.
    items:
      - title: Construye una API REST de StarWars
        description: Construye una API REST completamente funcional desde cero usando Flask y SQLAlchemy — modelos de datos, endpoints y respuestas gestionadas como lo hacen los sistemas backend reales.
        image: star-wars
        tags:
          - REST
        duration: 8 HORAS
        difficulty: easy
        date: 15/11/2022
      - title: Sistema de Autenticación con JWT
        description: Construye un sistema de login completo con autenticación JWT, un frontend en React y un backend en Python. El tipo de flujo de seguridad que aparece en casi todas las aplicaciones en producción.
        image: authentication
        tags:
          - Security
          - JWT
        duration: 6 HORAS
        difficulty: medium
        date: 20/01/2023
      - title: Proyecto Final Full Stack
        description: Tu capstone. Diseña y construye una aplicación Full Stack desde cero usando React, Flask, SQLAlchemy y APIs de terceros — y gradúate con un portfolio que muestra a los empleadores el cuadro completo.
        image: final-project-applied-ai-1767880920613
        tags:
          - Full-Stack
          - Capstone
        duration: 40 HORAS
        difficulty: hard
        date: 01/03/2023
    marginY:
      desktop: lg xl

