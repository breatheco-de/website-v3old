    section_id: syllabus-ozgru7
    variant: program-modules
    program_title: Lo que construirás en 24 semanas
    program_description: Desde el primer día eliges una empresa, ya sea la que quieres construir o una que quieras transformar. A lo largo de 10 hitos, la conviertes en un negocio totalmente operativo impulsado por IA.
    tech_logos:
