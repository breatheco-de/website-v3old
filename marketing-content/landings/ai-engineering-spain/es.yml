    module_cards:
      - title: Prework con enfoque en IA
        duration: Hito 0
        objectives:
          - Fundamentos YAML/JSON
          - Control de versiones con Git
          - Bases de JavaScript
          - Fundamentos de internet
          - Agentes de código
        projects: Configura tu entorno y entrega tu primer código asistido por IA
        icon: IconRocket
      - title: Fundamentos web
        duration: Hito 1
        objectives:
          - HTML, CSS, Tailwind
          - Mejores prácticas de accesibilidad
          - Técnicas de maquetado
        projects: Publica la primera página web real de la empresa, visible en internet desde el primer día
        icon: IconWorld
      - title: Fundamentos de programación
        duration: Hito 2
        objectives:
          - Algoritmos y estructuras de datos
          - Lógica y control de flujo
          - Dominio de JavaScript
        projects: Implementa funcionalidades reales para la empresa con código que tú escribiste
        icon: IconCode
      - title: UI con IA
        duration: Hito 3
        objectives:
          - Prompting de visión a especificación
          - Generación de componentes con IA
          - Flujos de diseño asistidos por IA
        projects: Reconstruye toda la UI de la empresa usando IA en una fracción del tiempo habitual
        icon: IconSparkles
      - title: Fundamentos de React
        duration: Hito 4
        objectives:
          - Arquitectura SPA
          - Props, state y effects
          - Técnicas de depuración
        projects: Construye el frontend interactivo de la empresa, dinámico, responsivo y listo para producción
        icon: IconBrandReact
      - title: Backend para frontends con IA
        duration: Hito 5
        objectives:
          - APIs y bases de datos
          - Serialización y autenticación
          - Funciones serverless
        projects: Crea el backend de la empresa, el motor que impulsa todo lo demás
        icon: IconServer
      - title: Telemetría y pipelines de datos
        duration: Hito 6
        objectives:
          - Recopilación y transformación de datos
          - Agregación y reporting
          - Arquitectura de pipelines
        projects: Construye la capa de datos de la empresa para saber en tiempo real qué está pasando
        icon: IconChartLine
      - title: RAG y memoria
        duration: Hito 7
        objectives:
          - Embeddings y búsqueda vectorial
          - Sistemas de recuperación de conocimiento
          - Memoria a largo plazo para IA
        projects: Dale un cerebro a la IA de la empresa, que aprende de sus propios datos
        icon: IconBrain
      - title: Ingeniería de agentes
        duration: Hito 8
        objectives:
          - Llamadas a herramientas y planificación
          - Coordinación multi-agente
          - Reglas y memoria
        projects: Construye agentes autónomos que trabajan para la empresa las 24 horas del día
        icon: IconRobot
      - title: Generación de flujos agenticos
        duration: Hito 9
        objectives:
          - Análisis de casos con LLMs
          - Implementación de pipelines de automatización
          - Serverless, colas y cronjobs
        projects: Automatiza las operaciones internas de la empresa con agentes que gestionan el negocio
        icon: IconSitemap
      - title: Sistemas en tiempo real
        duration: Hito 10
        objectives:
          - Streaming y websockets
          - Patrones pub/sub
          - Arquitectura de datos en vivo
        projects: Habilita interacciones en tiempo real para clientes, empleados y sistemas de IA
        icon: IconBolt
      - title: Empresa transformada por IA
        duration: Capstone
        objectives:
          - Frontend generado por IA
          - API y autenticación
          - Pipeline de telemetría y reportes
          - Automatización de flujos generada por agentes
          - Capa de conocimiento RAG
          - Agentes con llamadas a herramientas
          - Capa de comunicación en tiempo real
        projects: "Entrega la transformación completa de tu empresa elegida: un negocio operativo e impulsado por IA, construido íntegramente por ti"
        orientation: horizontal
        icon: IconTrophy
