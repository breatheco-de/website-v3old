slug: uganda
visibility: listed
context:
  when_to_use: >-
    Para visitantes del área de Madrid o interesados en oportunidades tech en el mayor y más dinámico ecosistema
    tecnológico de España.
  target_audience: >-
    Residentes locales de Madrid, profesionales buscando transición al sector tech, expatriados latinoamericanos en
    España y ciudadanos de la UE atraídos por el visado nómada digital y las políticas favorables a startups.
  goals:
    - Posicionar a Madrid como hub tech de Europa
    - Enfatizar soporte bilingüe (español/inglés) y comunidad internacional
    - >-
      Destacar las más de 25.000 plazas de desarrollador sin cubrir y la fuerte demanda de contratación en fintech, IA y
      ciberseguridad
    - Mostrar el rol de Madrid como puerta entre los mercados tech europeos y latinoamericanos
catalog:
  admission_advisors:
    - name: Admissions Team
      email: admissions@4geeks.com
      calendar_url: https://calendly.com/4geeks-admissions
      languages:
        - en
        - es
schema:
  include:
    - organization
    - website
  overrides:
    organization:
      address:
        '@type': PostalAddress
        streetAddress: Calle de Alcalá 54
        addressLocality: Madrid
        postalCode: '28014'
        addressCountry: ES
