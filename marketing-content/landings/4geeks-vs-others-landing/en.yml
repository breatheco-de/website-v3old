  - type: two_column_accordion_card
    variant: image_background
    version: "1.0"
    title: The Bootcamp That Doesn't End When You Graduate
    description: Most bootcamps hand you a certificate and disappear after demo day. 4Geeks stays with you until you land the job — and beyond. Unlimited mentorship, AI-powered learning, and career support that keeps working for you long after graduation.
    bullets:
      - heading: Unlimited 1:1 Mentorship
        text: Get guidance whenever you need it. From your first line of code to preparing for senior roles, mentors support your learning and career growth at every stage — for life.
      - heading: AI-Powered Learning and Feedback
        text: Rigobot and LearnPack tailor your learning path, give instant feedback on your code, and guide you to solve problems the way a real engineer would. Available 24/7.
      - heading: Lifelong Career Support
        text: GeekFORCE helps you land your first role and keep advancing. Resume prep, interview coaching, job search strategy, and direct referrals to 400+ hiring partners — always accessible.
    footer: Join 5,000+ graduates who've launched tech careers and never stopped growing.
    image: https://storage.googleapis.com/4geeks-academy-website/media/generated_images/Students_collaborating_workspace_d1560810.webp
    section_id: two_column_accordion_card-7wppr4
