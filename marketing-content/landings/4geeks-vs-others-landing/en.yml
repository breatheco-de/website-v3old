          logo: https://storage.googleapis.com/4geeks-academy-website/media/exelencia-educativa-es_1765549347699.png
          logoHeight: 55px
    video_title: GeekForce Career Support
  - type: two_column_accordion_card
    variant: image_background
    version: "1.0"
    title: Hyperpersonalized Learning & Support that Lasts a Lifetime
    description: At 4Geeks, we built an entire support system around personalization. And unlike most other programs, it doesn’t end with your first job.
    bullets:
      - heading: Unlimited 1:1 Mentorship
        text: Access personalized guidance whenever you need it. From debugging code to preparing for senior roles, our mentors support your learning and growth at every stage.
      - heading: AI-Powered Learning & Feedback
        text: Rigobot + LearnPack optimize your learning through personalization, providing instant feedback, guiding you to solve problems efficiently, and tracking your skill development.
      - heading: Lifelong Career Support
        text: GeekFORCE is designed to get you hired and keep advancing your career. From landing your first role to leveling up, you can access career coaching whenever you need it.
    footer: We've helped more than 7,000 graduates launch successful tech careers.
    image: https://storage.googleapis.com/4geeks-academy-website/media/generated_images/Students_collaborating_workspace_d1560810.webp
  - type: features_grid
    version: "1.0"
    variant: stats-cards
    title: Real Outcomes, Proven Results
    subtitle: Our alumni land jobs fast, boost their salaries, and launch tech careers that last.
    use_card: true
    items:
      - value: {{ global.global_job_placement_rate | 84 }}%
        title: Graduates Hired
        text: Within 6 months of completing the program
      - value: 3-6 months
        title: Time to Get Hired
        text: Average time to secure a tech role
      - value: {{ global.global_salary_increase | 55 }}%
        title: Salary Boost
        text: Average increase after graduation
      - value: AI, Full-Stack, Data & Cybersecurity
        title: Programs Offered
        text: Launch your career in your chosen tech path
    marginY:
      desktop: md
  - type: comparison_table
    version: "1.0"
    title: Launching Successful Tech Careers in the AI Era
    subtitle: "We're built to prepare you for success. From an industry-aligned, future-proof curriculum to lifelong mentorship and career support, here’s how 4Geeks stands out:"
    columns:
      - name: Feature
      - name: 4Geeks Academy
        highlight: true
      - name: Industry average / competitors
    rows:
      - feature: Career support
        values:
          - Personalized, lifelong guidance
          - Limited or short-term support
      - feature: Teacher-to-student ratio
        values:
          - {{ global.global_teacher_student_ratio | 1:7 }}
          - Usually 1:10+
      - feature: AI-powered feedback
        values:
          - Personalized to your learning progress
          - Rarely available
      - feature: 1-on-1 mentoring
        values:
          - Unlimited, lifelong access
          - Mostly limited sessions
      - feature: Curriculum
        values:
          - Continuously updated to fit market needs
          - Updates vary by provider
      - feature: Hiring rate
        values:
          - ~{{ global.global_job_placement_rate | 84 }}% within 6 months
          - Varies; mostly unreported
      - feature: Community
        values:
          - Strong local & global network
          - Depends on school
      - feature: Class format
        values:
          - Online & in-person options
          - Usually one format only
      - feature: Prior experience
        values:
          - No experience required
          - Most require prior skills or assessments
    marginY:
      desktop: none md
    paddingY:
      desktop: md
  - type: testimonials_slide
    title: Real Careers Start Here — Just Ask Our Students
    description: With 84% of our graduates hired within six months, their stories show how hands-on learning, personalized mentorship, and career support launch careers in tech.
  - type: value_proof_panel
    title: Recognized Globally for Excellence
    subtitle: We don't just say we deliver — recognition from trusted sources proves our worth.
    evidence_items:
      - icon: Trophy
        title: Top 5 coding bootcamps worldwide
        source: Newsweek, Forbes, SwitchUp, Course Report
      - icon: Award
        title: Best student support & best value
        source: Course Report, SwitchUp
      - icon: Users
        title: 35,000+ Graduates Across 20+ Countries
        description: A global community of successful tech professionals
      - icon: Certificate
        title: Industry-recognized certificates
        description: Credentials that employers trust and value
    media:
      type: image
      src: https://4geeksacademy.com/static/0e206e6ab1ae7f4ca09668b2d287baa7/56f2e/alejandrosanchez.webp
      alt: Students collaborating in classroom
      aspect_ratio: "4:3"
      style: rounded
    background: bg-muted/30
    stacked_header: true
    marginY:
      desktop: none xl
  - type: features_quad
    version: "1.0"
    variant: default
    heading: Making Tech Careers Accessible
    description: Tech careers can transform lives and finances should never stand in the way. That’s why we offer some of the most flexible, student-friendly payment and scholarship options in the industry.
    cards:
      - icon: CurrencyDollar
        title: Affordable tuition
        description: Among the most affordable tuition of any top-ranked program (recognized by Forbes).
      - icon: CreditCard
        title: Flexible financing
        description: Financing options start from {{ global.lowest_monthly_financing_option | $299 }}/month, so you can learn without financial stress.
      - icon: Coin
        title: Income-based payment
        description: Start learning now and only pay once you’re earning in tech.
      - icon: School
        title: Scholarships available
        description: Partial scholarships are available for eligible students.
    background: hsl(var(--secondary))
    marginY:
      desktop: none xl
  - type: split_cards
    variant: primary-left
    primary:
      heading: Your Career, Guaranteed
      description: "The strongest proof that we believe in our model? We back it with an optional Job Guarantee*. Most schools promise \"career support.\" At 4Geeks, we promise results: get hired within 9 months, or we refund your tuition in full.&nbsp;<div><span style=\"font-size: 0.875rem;\">*The Job Guarantee is not available in all regions.&nbsp;&nbsp;<a href=\"https://storage.googleapis.com/4geeks-academy-website/PDF%20and%20Docs/job-guarantee-en.pdf\" style=\"font-size: 0.875rem;\"><span><span><span>Terms and conditions apply.</span></span></span></a></span><a href=\"https://storage.googleapis.com/4geeks-academy-website/PDF%20and%20Docs/job-guarantee-en.pdf\" style=\"font-size: 0.875rem;\"><span style=\"font-size: 1rem;\"><span style=\"font-size: 0.875rem;\"><span style=\"font-size: 0.875rem;\"></span></span></span></a></div>"
      badge: Results-backed promise
    secondary:
      benefits:
        - text: Our curriculum is industry-aligned and AI-ready
        - text: Our mentorship is unlimited and personalized
        - text: Our career support never expires
