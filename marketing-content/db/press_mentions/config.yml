name: Press Mentions
description: A list of news that mention us to showcase on the pages
source:
  type: local
  local:
    filename: press_mentions.yml
    results_path: press_mentions
cache:
  ttl_hours: 24
field_mapping:
  locale: locale
  title: title
  subtitle: subtitle
  category: category
  excerpt: excerpt
  priority: priority
  organization: organization
  stat_label: stat_label
  stat_value: stat_value
  year: year
  tags: tags
  logo: logo
  link_url: link_url
  link_text: link_text
  image: image
editor:
  excerpt:
    type: textarea
  priority:
    type: number
  stat_label:
    type: text
  tags:
    type: tags
    populate_options: true
  image:
    cache_images: true
  logo:
    cache_images: true
