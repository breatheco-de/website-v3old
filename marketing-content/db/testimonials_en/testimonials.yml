  related_features:
  - content-and-syllabus
  - price
  excerpt: This has been a great way to get started with coding. We've learned to
    work with Manny and now things are going much smoother because now we're getting
    better at interpreting all the information. However, I will say, the pace of the
    course is wild....
  full_text: This has been a great way to get started with coding. We've learned to
    work with Manny and now things are going much smoother because now we're getting
    better at interpreting all the information. However, I will say, the pace of the
    course is wild. While its been an altogether good experience, I feel like within
    the reading and documentation that we have, there's always something missing or
    maybe its written out of order in terms of building upon previous skills. Like
    personally, I would implement within the first week of class, to learn about GitHub
    and all those concepts for two reasons using simple HTML boilerplates. Firstly,
    it starts exposing the student to reading code and getting used to reading it,
    and secondly, it gives the professor a chance to set up everyones machine in the
    same way. As I've come along in the course I was starting to have issues pushing
    work from my local machine and etc. If this was done in one of our first modules,
    we'd all have a similar set up to work.
  content: This has been a great way to get started with coding. We've learned to
    work with Manny and now things are going much smoother because now we're getting
    better at interpreting all the information. However, I will say, the pace of the
    course is wild. While its been an altogether good experience, I feel like within
    the reading and documentation that we have, there's always something missing or
    maybe its written out of order in terms of building upon previous skills. Like
    personally, I would implement within the first week of class, to learn about GitHub
    and all those concepts for two reasons using simple HTML boilerplates. Firstly,
    it starts exposing the student to reading code and getting used to reading it,
    and secondly, it gives the professor a chance to set up everyones machine in the
    same way. As I've come along in the course I was starting to have issues pushing
    work from my local machine and etc. If this was done in one of our first modules,
    we'd all have a similar set up to work.
