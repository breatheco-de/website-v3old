    ending, but this is just the beginning of my developer journey! Thanks to Ernesto
    and Slavina, especially Ernesto for being the ideal mentor to start this adventure.
    Thank you to all the mentors in my 1-on-1 sessions who kept me going, and to Laura,
    Daniel, and the admin team for their invaluable support throughout. It was daunting
    at first (and still is), but having such amazing people guide us made it so much
    smoother. Can’t wait to see what’s to come. Additionally, the daily live coding
    sessions, regular peer feedback, and hands-on projects reinforced each concept
    and created a collaborative, supportive atmosphere that boosted my confidence
    and practical skills. :-)'
