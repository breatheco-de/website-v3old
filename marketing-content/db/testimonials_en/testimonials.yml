  content: Our instructors are very knowledgeable and do their best to challenge us
    and teach new concepts. But for in-person sessions, I believe going over projects
    step by step would be more helpful so we can fully understand what and why we’re
    doing something, and be able to really apply those skills after we graduate. I
    think that makes more sense, since most people have the same questions and instead
    of going one by one we can address it as a group and move forward. I also have
    to use other online courses and resources often to help me understand some concepts
    instead of just copying and pasting code. Sometimes I find myself being more productive
    working on the exercises on my own than in class, so maybe less in-person sessions
    or having the option of online would be much less draining throughout the week
