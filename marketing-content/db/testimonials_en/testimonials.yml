- student_name: William Boakye
  priority: 2
  testimonial_date: '2019-10-01'
  source: https://www.switchup.org/bootcamps/4geeks-academy#reviews
  related_features:
  - mentors-and-teachers
  - career-support
  - outcomes
  excerpt: What attracted me to 4Geeks Academy originally was the option of attending
    a part time cohort. For me, it meant I was able to continue my professional uninterrupted
    by a 3-4 month full-time course. I went in Mon & Wed 6-9 and Sat 9-12. Starting
    the...
  full_text: What attracted me to 4Geeks Academy originally was the option of attending
    a part time cohort. For me, it meant I was able to continue my professional uninterrupted
    by a 3-4 month full-time course. I went in Mon & Wed 6-9 and Sat 9-12. Starting
    the cohort ... was a bit overwhelming for me as I had to get used to retraining
    myself how to approach a problem. The instructors at the academy do a pretty good
    job at trying to minimize the learning curve, but in reality they can only do
    so much with ~4 months of time to play with. Being a part-time course, a good
    portion of the learning falls on you and your motivation in your personal time.
    A lot of the assignments were the type where you learn *just* enough in class
    to go home and apply it yourself. Then, come back to the next class with any questions
    or concerns. There were absolutely times that were frustrating, and those frustrating
    moments hit everyone at different points. Luckily the team was very supportive/encouraging,
    and we managed to develop a kind of support group within the classmates. The course
    focused heavily on JavaScript/Reactjs for a large chunk of the time which, looking
    back, I appreciate because it’s the thing that I fell back on the most during
    the job interview that I got hired in. If you’re wondering whether they can teach
    you how to code - the answer is yes, but you have to put in a considerable amount
    of effort and time as well. They’ll lead you to the stream but you have to be
    the one to drink. 4Geeks has a well developed ecosystem of online resources as
    well as their knowledgeable staff that’ll do everything in their power to make
    sure you can surmount new topics and concepts. What’s was crazy for me was, because
    of imposture syndrome, (which you’ll likely have) I didn’t realize how much I
    had learned and was capable of until the very end when I had a functional final
    project that I was showing off to my peers. Above all, though, the most personally
    valuable skill I gained from the course was learning *how* to learn and teach
    myself. If I had been told that learning to learn would be one of my major take-always
    before signing up, I probably would have rolled my eyes. In reality, though, yes
    learning how to code is a big accomplishment (and with effort, you will), but
    in such a quickly evolving tech landscape where everything you need to know is
    available for free online, the most powerful tool you can have is your ability
    to pick up new skills and tricks to evolve with it. From what I saw, 4Geeks was
    working behind the scenes to make sure you gained that ability before they set
    you off into the world. 4Geeks hosts in-house meetups with local business from
    time-to-time to introduce their students to the industry. They’re a good opportunity
    make connections with local leaders as well as network with new and former 4Geeks
    students. I’ve heard of some students leveraging them to land interviews. I managed
    to get hired for my first tech job just a little before graduating (so I can’t
    personally speak on post-grad job support) which was great and very possible,
    but not exactly the norm. A few of my classmates also recently got hired within
    a few months after graduating (one of which I know what’s receiving job support
    from the academy). What’s amazing is after graduating I’d come back to 4Geeks
    whenever there was something that I couldn’t figure out at the new job and they
    (Alejandro and others) would *always be willing to set aside time for me and smooth
    out my confusions. All-in-all I would definitely recommend 4Geeks with the caveat
    that you only get out of it what you put in. However, if you’re motivated to change
    your life and can weather some inevitably stressful moments, you’ll do fine and
    be well positioned to transition into tech.
