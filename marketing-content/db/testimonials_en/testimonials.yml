  excerpt: Tim is a great instructor and definitely has the experience to be teaching
    us. Rick was a fantastic instructor as well when filling in for Tim. Very helpful
    anytime I have questions. Theresa is a great TA as well. Live classes are helpful
    and I am...
  full_text: Tim is a great instructor and definitely has the experience to be teaching
    us. Rick was a fantastic instructor as well when filling in for Tim. Very helpful
    anytime I have questions. Theresa is a great TA as well. Live classes are helpful
    and I am happy we do group work and collaborate with one another. The one on one
    sessions with the mentors has been great. The only thing I think can be improved
    are the exercises. Sometimes I will run into problems with them. Some of the exercises
    has a tutorial video with an explanation which is great, but not all of them.
    Sometimes I have no idea what the answer is, I'll get the solution in the file,
    but I didn't learn anything from it. It helps to have an explanation go along
    with the answer. The exercises have helped me, but I think they can be improved.
    The learning curve is very steep as you progress through some exercises.
  content: Tim is a great instructor and definitely has the experience to be teaching
    us. Rick was a fantastic instructor as well when filling in for Tim. Very helpful
