  full_text: At this point, I can see that 4Geeks has a decent framework to work off
    of, but it really depends on the professor that you get. After my first couple
    months in the program, with no idea what to expect I didn't know at what level
    of understanding I had to be at, and thus now in retrospect I see that we are
    all extremely lost and looking to other resources like Udemy and freeCodeCamp
    to make sense of what little information we know. At the point that our cohort
    was switched which was about 2-3 weeks before our final project, just feels like
    too little too late, and at best I have a fractured foundation on which to continue
    my studies and try to piece together and come out successful on the other side.
    Perhaps with a better method of deciding who teaches, or even hiring from within
    using former students as teachers who know what we're currently going through,
    perhaps the program would be more cohesive in its learning style.
  content: At this point, I can see that 4Geeks has a decent framework to work off
    of, but it really depends on the professor that you get. After my first couple
    months in the program, with no idea what to expect I didn't know at what level
    of understanding I had to be at, and thus now in retrospect I see that we are
    all extremely lost and looking to other resources like Udemy and freeCodeCamp
    to make sense of what little information we know. At the point that our cohort
    was switched which was about 2-3 weeks before our final project, just feels like
    too little too late, and at best I have a fractured foundation on which to continue
    my studies and try to piece together and come out successful on the other side.
    Perhaps with a better method of deciding who teaches, or even hiring from within
    using former students as teachers who know what we're currently going through,
    perhaps the program would be more cohesive in its learning style.
