    a fun and...
  full_text: Score might be higher if I wasn't the only computer nerd I know. I enjoy
    the confusion of learning to code and overcoming coding issues, whereas pretty
    much everybody I know would rather pull their hair out. That being said, it's
    a fun and well-organized program on the human side. There's a lot of very helpful
    people that seem to genuinely enjoy helping solve problems and focusing on getting
    you to understand what you're doing rather than just go through the motions. On
    the software side, I have noticed several issues regarding what seems to be mildly
    outdated lessons, and updates to the website causing issues for lesson layout
    and access. The LearnPack sometimes doesn't give enough information to understand
    what you're doing without guidance, and the objectives sometimes range from arbitrarily
    particular (where two things would work fine, only one is accepted) to far too
    loose (will say you're correct and let you move on without actually programming
    the intended effect correctly).
  content: Score might be higher if I wasn't the only computer nerd I know. I enjoy
    the confusion of learning to code and overcoming coding issues, whereas pretty
    much everybody I know would rather pull their hair out. That being said, it's
    a fun and well-organized program on the human side. There's a lot of very helpful
    people that seem to genuinely enjoy helping solve problems and focusing on getting
    you to understand what you're doing rather than just go through the motions. On
    the software side, I have noticed several issues regarding what seems to be mildly
    outdated lessons, and updates to the website causing issues for lesson layout
    and access. The LearnPack sometimes doesn't give enough information to understand
    what you're doing without guidance, and the objectives sometimes range from arbitrarily
    particular (where two things would work fine, only one is accepted) to far too
    loose (will say you're correct and let you move on without actually programming
    the intended effect correctly).
