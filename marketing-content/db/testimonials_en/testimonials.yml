- student_name: Vanessa Lamarque
  priority: 2
  source: https://careerkarma.com/schools/4geeks-academy/
  related_features:
  - mentors-and-teachers
  - content-and-syllabus
  excerpt: Before you officially start the program, they give you pre-work that consists
    mainly HTML & CSS. I had exposure to HTML and CSS before starting the boot camp
    which did help me a little. So if you want to learn a little about HTML and CSS
    before...
  full_text: Before you officially start the program, they give you pre-work that
    consists mainly HTML & CSS. I had exposure to HTML and CSS before starting the
    boot camp which did help me a little. So if you want to learn a little about HTML
    and CSS before starting the program it’s always helpful but not a necessity. You’re
    going to learn a LOT. Don’t feel discouraged if you don’t feel ready enough in
    one area when the program progresses to another concept. The 4Geeks community
    is really helpful and kind, they’ll help you with anything. They have mentors
    you can schedule sessions with to help you with assignments or questions that
    you have. Everyone there wants you to succeed. Once you’re a part of the 4Geeks
    family, you’re there forever. With any bootcamp or learning resource, it’s really
    about the time and energy you put into something. There are tons of exercises
    and projects that they have for you, as well as class instruction where you work
    on projects in class. Don't be shy to ask for help! They really do encourage you
    to schedule mentoring sessions and may even have "study group" sessions once a
    week with a TA to help with the current assignments you're working on. Take advantage
    of the resources available! Unrelated to the boot camp, one advice I keep seeing
    and hearing is when you learn enough to build a simple project, build, build,
    build! You’ll have plenty to build within the program, but in general always keep
    building and using Google for what you know. I always think I understand something
    until I start building lol so applying your knowledge is key!
  content: Before you officially start the program, they give you pre-work that consists
    mainly HTML & CSS. I had exposure to HTML and CSS before starting the boot camp
    which did help me a little. So if you want to learn a little about HTML and CSS
