  full_text: I find myself seeking outside materials to understand what this course
    should be helping me to understand. I need the concepts in this course explained
    to me as if I am a five year old, and this course just doesn't do that for me.
    If the readings and exercises were presented in a way I could understand and feel
    comfortable grasping maybe then I would be more confident recommending this material
    to others. As an example I am finding myself seeking out the videos of the SuperSimpleDev
    on YouTube, and although I am starting from the beginning of his videos, I know
    that once I complete tasks from the examples his videos give me, I have a better
    understanding. This course I think is more suited to those who are not just beginning
    code, and is better suited to people who already have some type of foundational
    knowledge of the languages being presented, and just need the structure to learn
    better. The materials are also outdated, and learning a tutorial from a 7 year
    old video is nuts.
