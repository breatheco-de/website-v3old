    have for you, as well as class instruction where you work on projects in class.
    Don't be shy to ask for help! They really do encourage you to schedule mentoring
    sessions and may even have "study group" sessions once a week with a TA to help
    with the current assignments you're working on. Take advantage of the resources
    available! Unrelated to the boot camp, one advice I keep seeing and hearing is
