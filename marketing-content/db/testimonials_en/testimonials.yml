  excerpt: 'Edgar tries to explain what he is doing but uses FAR too much tech talk
    and seems to forget that we have never lived and breath code before. When a problem
    in an exercise is given, each time, we NEED to read and stop and be ASKED: What
    do WE think...'
  full_text: 'Edgar tries to explain what he is doing but uses FAR too much tech talk
    and seems to forget that we have never lived and breath code before. When a problem
    in an exercise is given, each time, we NEED to read and stop and be ASKED: What
    do WE think the issue is? How do WE think we will solve this, string by string,
    carefully and methodically and wait for student responses (i.e; do we need to
    set up any variables, define a new function, what existing ones should/can we
    look for, if I write this, can you tell me what I am missing) otherwise it goes
    completely over my head and there''s too much to even formulate a question for.'
  content: 'Edgar tries to explain what he is doing but uses FAR too much tech talk
    and seems to forget that we have never lived and breath code before. When a problem
    in an exercise is given, each time, we NEED to read and stop and be ASKED: What
    do WE think the issue is? How do WE think we will solve this, string by string,
    carefully and methodically and wait for student responses (i.e; do we need to
    set up any variables, define a new function, what existing ones should/can we
    look for, if I write this, can you tell me what I am missing) otherwise it goes
