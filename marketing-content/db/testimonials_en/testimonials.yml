    course on the 4Geeks webpage. While I think the content covers a lot of decent
    information, I also understand that much of the content was translated from another
    language making it difficult to follow sometimes. I find myself outlining the
    lesson and having to compare and find other resources to fill in gaps of understanding.
    Again, while I understand the goal is to facilitate a habit of research, having
    an unstable structure makes it difficult to know what to research for in a broader
    aspect.'
  content: The platform itself has been easy to use and access. It is easy to navigate
    the course on the 4Geeks webpage. While I think the content covers a lot of decent
    information, I also understand that much of the content was translated from another
    language making it difficult to follow sometimes. I find myself outlining the
    lesson and having to compare and find other resources to fill in gaps of understanding.
    Again, while I understand the goal is to facilitate a habit of research, having
    an unstable structure makes it difficult to know what to research for in a broader
    aspect.
