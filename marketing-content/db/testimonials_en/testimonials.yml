    Biggest issue is organization or pedagogical approach. Different types of data
    need different...
  full_text: 'How has your experience been studying Data Science and Machine Learning
    - 16 wks so far?


    The curriculum needs a lot of work. From depth to organization to pacing. George
    has really come in clutch to help fill in the gaps- huge kudos to him. Biggest
    issue is organization or pedagogical approach. Different types of data need different
    approaches and bring a lot of baggage with each different approach. The current
    curriculum treats all data the same and focuses on modeling? Missed the target
    on that one. Also, the solutions that George has provided are vastly better on
    multiple levels. He has been crucial to any success in this.'
  content: The curriculum needs a lot of work. From depth to organization to pacing.
    George has really come in clutch to help fill in the gaps- huge kudos to him.
    Biggest issue is organization or pedagogical approach. Different types of data
    need different approaches and bring a lot of baggage with each different approach.
    The current curriculum treats all data the same and focuses on modeling? Missed
    the target on that one. Also, the solutions that George has provided are vastly
    better on multiple levels. He has been crucial to any success in this.
