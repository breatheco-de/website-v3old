    2 or 3 days doing each project to get the understanding. It hard to learn when
    you have a new project due everyday, an you haven''t understood the previous assignment
    I think we should had more time on each project at least 2 days no more than 3
    days so we can get the full understanding of the projects to help flow along with
    the curriculum. I understand we signed up knowing this was like a full time job,
    but the original place was supposed to b Downtown so most of us had made the arrangements
    to go Downtown. When the location changed at the last minute it changed mostly
    everyone schedule most of us it take hour an 30 mins to get there it takes me
    2 hours to get there and back home so it make it harder for me to study because
    I get home late.'
