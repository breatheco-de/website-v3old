  excerpt: The material and methodology is really good. I was skeptical at first,
    but I can attest now that it is working for me (and I am not the most logically
    inclined person). My main issue is with the teaching method. For now, both of
    the mentors main...
  full_text: The material and methodology is really good. I was skeptical at first,
    but I can attest now that it is working for me (and I am not the most logically
    inclined person). My main issue is with the teaching method. For now, both of
    the mentors main concern seems to be to get to the solution to any question as
    fast as possible. Interest in the learning process of the student and in meeting
    the student where they currently stand seems to be secondary, if it is a concern
    at all. Comments like "why did you do X? I did not tell you to do X" or "you were
    supposed to only copy a part of the solution but copied all of it instead" (with
    an amused undertone) are not helpful, but clearly do show that there are some
    gaps in the students understanding. So why not start with some explainations first
    and making the solution secondary until it is clear that the student has understood?
  content: The material and methodology is really good. I was skeptical at first,
    but I can attest now that it is working for me (and I am not the most logically
    inclined person). My main issue is with the teaching method. For now, both of
    the mentors main concern seems to be to get to the solution to any question as
    fast as possible. Interest in the learning process of the student and in meeting
    the student where they currently stand seems to be secondary, if it is a concern
    at all. Comments like "why did you do X? I did not tell you to do X" or "you were
    supposed to only copy a part of the solution but copied all of it instead" (with
    an amused undertone) are not helpful, but clearly do show that there are some
    gaps in the students understanding. So why not start with some explainations first
    and making the solution secondary until it is clear that the student has understood?
