  full_text: Maybe it has to be this way since this bootcamp is really short in duration
    compared with others, but at this point I feel overwhelmed by how densely packed
    together the new concepts are in the lessons on the 4Geeks website. It seems like
    there is a lot of implicit knowledge that is not explicitely talked about, but
    we are still expected to use. On the other hand I am struggling with the little
    amount of instruction that is given in the projects. While this "do or die" approach
    makes you work really hard, I also feel that keeping the success rate reliably
    high is important both for motivation and progress (especially when you get several
    projects in a couple of days). One solution could be the addition of fully optional
    hints that guide you in the right direction.
  content: Maybe it has to be this way since this bootcamp is really short in duration
    compared with others, but at this point I feel overwhelmed by how densely packed
    together the new concepts are in the lessons on the 4Geeks website. It seems like
    there is a lot of implicit knowledge that is not explicitely talked about, but
    we are still expected to use. On the other hand I am struggling with the little
