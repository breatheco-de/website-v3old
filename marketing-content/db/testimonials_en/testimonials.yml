- student_name: Jorge Luis Pardo Rodríguez
  priority: 2
  testimonial_date: '2022-05-31'
  source: https://www.switchup.org/bootcamps/4geeks-academy#reviews
  related_features:
  - mentors-and-teachers
  - content-and-syllabus
  - online-platform
  excerpt: For the past 16 weeks, I have been learning how to completely develop a
    web application at 4Geeks, and I have really enjoyed it. In the first weeks of
    the course, we covered the basics of front-end development (html, css, javascript,
    and react), as...
  full_text: For the past 16 weeks, I have been learning how to completely develop
    a web application at 4Geeks, and I have really enjoyed it. In the first weeks
    of the course, we covered the basics of front-end development (html, css, javascript,
    and react), as well ... as complementary technologies required for working in
    an office environment (git, command line, etc). Subsequently, the training focused
    on interacting with APIs, before creating one with SQLAlchemy, Python, and Flask.
    As well, we learned how to limit access to the API information. The last part
    of the course was a four-week final project that consisted of building a complete
    web application that put all the knowledge learned in the course to the test through
    a stream on the academy's YouTube channel. In each class, we had a teacher and
    an assistant who taught us the bases to carry out the exercises of the program
    meticulously. I have also benefited from unlimited mentoring provided by the school,
    which helped me to strengthen my knowledge and resolve any doubts I had throughout
    the bootcamp. In my opinion, the most valuable aspect of the academy is that all
    the teachers and mentors have been very willing to thoroughly teach me the content
    and to ensure that I understand the technologies. It's an atmosphere that's focused
    on total collaboration and helping you learn as much as possible (even remotely).
    4Geeks is a great place to learn how to program, and with dedication on your part,
    you will surely learn a great deal about programming.
