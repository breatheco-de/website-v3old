    whenever we have practice and exercises to assimilate new tools/skills the student
    experiences a really great and smooth transition but otherwise, when the module
    is built with the material and straight to a project it's harder to do that same
    transition. You manage to deliver the project, if you look back on it, now that
    you have the knowledge fully assimilated you find it to be extremely easy but
    during production you struggled so much.
