    ensuring that the students succeed. If we''re learning algebra, Jandry or Matheus
    will ask something asinine like "Rick, is it true that math is used for rockets?"
    Rick will waste 25min talking about physics with the excuse of "not wanting to
    stifle their enthusiasm." Every. Single. Class. A responsible teacher will say
    "if you''re interested, message me and I''ll give you resources to read" or "we
    can discuss that later." These questions and Rick''s responses create an irrelevant
    conversation where myself and others have to either wait or interrupt to ask any
    questions about what we are ACTUALLY supposed to be learning. We space out. If
    this class is a Rick+Jandry+Matheus special time then we should ALL get our money
    back. I 100% feel scammed. Maybe 3 people in this class could even hope to graduate
    unless everyone is rubber stamped. I''m not the bad guy. Rick is a clown and this
    cohort is a circus.'
