  full_text: 'How has your experience been studying Full-Stack Software Developer
    18w so far?


    Ernesto has been a fantastic teacher. Very attentive and nonjudgemental, and explains
    things very well. Really did a good job helping people feel comfortable learning
    a brand new skill. I feel like I''ve learned how to learn, and now I can learn
    anything code related I need to. I feel like I have the foundation I need to really
    propel myself. I''m very excited for the final project and I''m REALLY excited
    to have the time and skills to work on some projects I''ve been thinking of over
    the last 4 months as I''ve gone down this path. Thank you 4Geeks for making a
    fast paced and affordable coding bootcamp! I could not afford the other ones I
    was finding and they took a long time. I think this bootcamp was fast enough but
    also thorough enough to scan the field and understand the different pieces that
    make up the big picture of fullstack webdevelopment. My classmates and mentors
    and tutors, everyone is just really stellar. If I can work with people like this,
    I''ll be so happy.'
  content: Ernesto has been a fantastic teacher. Very attentive and nonjudgemental,
    and explains things very well. Really did a good job helping people feel comfortable
    learning a brand new skill. I feel like I've learned how to learn, and now I can
    learn anything code related I need to. I feel like I have the foundation I need
    to really propel myself. I'm very excited for the final project and I'm REALLY
    excited to have the time and skills to work on some projects I've been thinking
    of over the last 4 months as I've gone down this path. Thank you 4Geeks for making
    a fast paced and affordable coding bootcamp! I could not afford the other ones
    I was finding and they took a long time. I think this bootcamp was fast enough
    but also thorough enough to scan the field and understand the different pieces
    that make up the big picture of fullstack webdevelopment. My classmates and mentors
    and tutors, everyone is just really stellar. If I can work with people like this,
    I'll be so happy.
