  - content-and-syllabus
  - price
  excerpt: Carlos is very nice, respectful, patient and cheerful teacher. In several
    classes I have received his help through some situation I got stuck and I have
    liked the way he was fluent, and determined not to leave me without solving the
    issue. Carlos...
  full_text: Carlos is very nice, respectful, patient and cheerful teacher. In several
    classes I have received his help through some situation I got stuck and I have
    liked the way he was fluent, and determined not to leave me without solving the
    issue. Carlos seems very competent to a student like me, and in several occasions
    I could absorb his method of thinking from his practical approach. Nevertheless,
    Carlos must improve his english pronunciation. I know it can very very hard but
    it is important because it moves the focus from the content of the class to understanding
    what he is saying and sometimes comes to point of being unintelligible. It would
    be lovely if Carlos(/4Geeks) gave us projects or tasks, that we could do by ourselves
    in order to apply the crucial skills we have just learned. It would be for sure
    optional, but such projects would be much needed in my opinion. It is hard to
    figure that out alone. E.g. a entire CSS and HTML page, that is within our skillset
    reach to solidify them..
  content: Carlos is very nice, respectful, patient and cheerful teacher. In several
    classes I have received his help through some situation I got stuck and I have
    liked the way he was fluent, and determined not to leave me without solving the
    issue. Carlos seems very competent to a student like me, and in several occasions
    I could absorb his method of thinking from his practical approach. Nevertheless,
    Carlos must improve his english pronunciation. I know it can very very hard but
    it is important because it moves the focus from the content of the class to understanding
    what he is saying and sometimes comes to point of being unintelligible. It would
    be lovely if Carlos(/4Geeks) gave us projects or tasks, that we could do by ourselves
    in order to apply the crucial skills we have just learned. It would be for sure
    optional, but such projects would be much needed in my opinion. It is hard to
    figure that out alone. E.g. a entire CSS and HTML page, that is within our skillset
    reach to solidify them..
