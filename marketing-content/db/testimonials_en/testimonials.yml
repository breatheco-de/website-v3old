  full_text: I believe this being a bootcamp it is supposed to be fast paced. Which
    isn't a problem but the quickness of registering the code on screen typing the
    code and actually understanding the code is hard to sustain at this speed. However,
    it does take as a developer time and experience to get the material. Videos are
    a good source for me if the time stamps where available as to what is being talked
    about it would be amazing. We are coming to the end of the session, and I don't
    believe we received enough raw material for students that wish to join the work
    force solo and not enter a job under more established names. Payment systems/
    generating code and set up from scratch/ resources to go into the work force solo
    and tools for those students would be helpful as well.
  content: I believe this being a bootcamp it is supposed to be fast paced. Which
    isn't a problem but the quickness of registering the code on screen typing the
    code and actually understanding the code is hard to sustain at this speed. However,
    it does take as a developer time and experience to get the material. Videos are
    a good source for me if the time stamps where available as to what is being talked
    about it would be amazing. We are coming to the end of the session, and I don't
    believe we received enough raw material for students that wish to join the work
