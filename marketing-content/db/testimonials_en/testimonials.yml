    code spaces there are far to many technical issues to make learning enjoyable.
    As someone who...
  full_text: 'How has your experience been studying Full-Stack Software Developer
    FT - 9wks so far?


    I think the course has great potential but there are a few concerns that I have
    had, and have spoken on that have not been addressed. 1. When working in code
    spaces there are far to many technical issues to make learning enjoyable. As someone
    who has been computer literate since childhood I have had far too many issues
    that made me feel as if continuing this course is even worth it. 2. The core instruction
    meaning the reading material was hard to connect with, and could have been presented
    better. For example there were times I did not understand the wording of a lesson
    because the grammar was unnecessarily wordy. 3. The pace of the instruction is
    at break neck speed, and as a visual learner I am finding it difficult to understand
    and absorb concepts I''ve only been given less than 24 hours to understand. 4.
    Although I am finally beginning to grasp some concepts I do not feel confident
    that I will be able to speak to the harder parts of the languages I''ve seen thus
    far.'
  content: I think the course has great potential but there are a few concerns that
    I have had, and have spoken on that have not been addressed. 1. When working in
    code spaces there are far to many technical issues to make learning enjoyable.
    As someone who has been computer literate since childhood I have had far too many
    issues that made me feel as if continuing this course is even worth it. 2. The
    core instruction meaning the reading material was hard to connect with, and could
    have been presented better. For example there were times I did not understand
    the wording of a lesson because the grammar was unnecessarily wordy. 3. The pace
    of the instruction is at break neck speed, and as a visual learner I am finding
    it difficult to understand and absorb concepts I've only been given less than
    24 hours to understand. 4. Although I am finally beginning to grasp some concepts
    I do not feel confident that I will be able to speak to the harder parts of the
    languages I've seen thus far.
