  full_text: Amazing teacher and mentors, really great and helpful. The format is
    not good. Flip classroom, spending most of the lessons working with classmates
    and learning on my own are not a good method. Other classmates as well agree that
    when we have long explanations we know what to do during practice, when we have
    short explanations we feel like we have no idea what to do. We would prefer to
    have three hours of explanations where we get the tools and then do practice outside
    of the lessons. Otherwise we spend most of the time just in rooms with classmates
    where no one knows what we are supposed to do. I feel like I would learn a lot
    more the other way. At the moment I feel like I am unnecessarily struggling which
    would be easy to avoid. Mentoring sessions are great and teacher flexible to adapt,
    which he did and was appreciated. The downside is just the format. Also, I think
    you should let future students knoe that the course is not for beginner, because
    it isn't.
  content: Amazing teacher and mentors, really great and helpful. The format is not
    good. Flip classroom, spending most of the lessons working with classmates and
    learning on my own are not a good method. Other classmates as well agree that
    when we have long explanations we know what to do during practice, when we have
    short explanations we feel like we have no idea what to do. We would prefer to
    have three hours of explanations where we get the tools and then do practice outside
    of the lessons. Otherwise we spend most of the time just in rooms with classmates
    where no one knows what we are supposed to do. I feel like I would learn a lot
