  full_text: 'How has your experience been with your mentor George Perdrizet so far?


    As mentioned in last comment, George has been completely crucial to any success
    in this course. He could still improve, and I will personally send some notes
    to him at some point, but he could structure more collaborative engagement and
    cohort-style relationship building (structured items during class as well as opportunities
    for engaging via slack outside of class). Cohort-based learning is powerful and
    we are missing a few of those items. However, he is clearly spending a lot of
    time making up for the shortcomings of the curriculum.'
  content: As mentioned in last comment, George has been completely crucial to any
    success in this course. He could still improve, and I will personally send some
    notes to him at some point, but he could structure more collaborative engagement
    and cohort-style relationship building (structured items during class as well
    as opportunities for engaging via slack outside of class). Cohort-based learning
    is powerful and we are missing a few of those items. However, he is clearly spending
    a lot of time making up for the shortcomings of the curriculum.
