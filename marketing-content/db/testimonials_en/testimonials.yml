    Specifically the exercise solutions. I have caught multiple errors (both coding
    and dependency...
  full_text: I love our professor (George). He is always ready and willing to help
    and is very knowledgable. He gets a 10/10. Its the course material that concerns
    me. Specifically the exercise solutions. I have caught multiple errors (both coding
    and dependency errors) in the solutions and confirmed they were errors by asking
    George about them. In some cases George has reviewed solutions provided by 4Geeks
    and informed us not to look at them due to the errors; he then provides his own
    solutions which are very helpful. In the beginning George was submitting pull
    request to fix the errors but no one on 4Geeks backend is approving his pull requests.
    I have paid thousands of dollars for this class and I think it is important that
    the exercise solutions are up to date, with clean code that is free of errors.
    It's normal to have a few errors here and there but at this point I don't even
    use the solutions to check my work and that is problematic.
  content: I love our professor (George). He is always ready and willing to help and
    is very knowledgable. He gets a 10/10. Its the course material that concerns me.
    Specifically the exercise solutions. I have caught multiple errors (both coding
    and dependency errors) in the solutions and confirmed they were errors by asking
    George about them. In some cases George has reviewed solutions provided by 4Geeks
    and informed us not to look at them due to the errors; he then provides his own
    solutions which are very helpful. In the beginning George was submitting pull
    request to fix the errors but no one on 4Geeks backend is approving his pull requests.
    I have paid thousands of dollars for this class and I think it is important that
    the exercise solutions are up to date, with clean code that is free of errors.
    It's normal to have a few errors here and there but at this point I don't even
    use the solutions to check my work and that is problematic.
