  excerpt: The pros are that you will have a large community supporting you. At the
    beginning you will be almost alone in the new world of programming when you do
    the pre-work for the course. However, once you get to know your teacher and the
    rest of the...
  full_text: The pros are that you will have a large community supporting you. At
    the beginning you will be almost alone in the new world of programming when you
    do the pre-work for the course. However, once you get to know your teacher and
    the rest of the students you will gradually realize that this seemingly lonely
    environment is actually a community where we all face the same challenges. We
    all support each other gradually, of course at the beginning you will be somewhat
    reticent, reserved, becau... The pros are that you will have a large community
    supporting you. At the beginning you will be almost alone in the new world of
    programming when you do the pre-work for the course. However, once you get to
    know your teacher and the rest of the students you will gradually realize that
    this seemingly lonely environment is actually a community where we all face the
    same challenges. We all support each other gradually, of course at the beginning
    you will be somewhat reticent, reserved, because it is not normal to find yourself
    in a world where community support is the norm and being alone, reserved, isolated
    without helping others or being helped is the least usual, although you can opt
    for that path, but I warn you that it will not be easy to opt for that path. This
    is a path of challenges, defeats that soon become triumphs. At the beginning you
    feel helpless and incapable but as you advance, you overcome stagnations and generate
    those euphoric victories, you become addicted to this world of programming. Of
    course, all this is thanks to the immense support that you have from all sides
    along the bootcamp, you forget that you are in remote because as soon as you ask
    for help, (yes, you have to get used to confess something as difficult as "I can't,
    I'm stuck, I don't see the error" and they tell you, you are missing a semicolon
    in that line) all the mechanisms move in your favor to convert into victories
    those jams that seem to have no end. In conclusion, this bootcamp delivers like
    no other. It teaches you to be passionate about this world, but it also makes
    you wonder if this is really the path you want to follow. Because no matter how
    smart you are, this river only flows if you are really determined to move forward
    without fear of waterfalls. The teachers and mentors are wonderful, at least the
    one I had, Emanuel Martinez, taught me more than any of my teachers throughout
    my life. Victor and Marcos make things clear and always encourage you to keep
    going despite everyone. The treatment is personal, the platforms are ready to
    be used, and they help you at all times, even when they let you hit the ground
    with your face. After finishing the bootcamp they help you build a resume you
    would have never imagined, perfect your linkedin and know well what you need to
    do to get the attention of recruiters. And rest assured that if you don't know
    how to tackle a programming or job search problem you have lifetime mentoring,
    the 4Geeks Slack community that is IMMENSE and all the support of your mentors
    at your disposal. The best investment of my entire life. Thanks to this bootcamp
