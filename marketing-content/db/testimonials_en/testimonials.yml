    useful. Most times when we are getting lectured on a new concept time does not
    feel useful. Examples are too complex, explanations are long-winded, often ideas
    are not sequential (first you need to... next...), and little is done to see if
    we retained information other than vague superficial questions such as: "does
    that make sense?" or "Any questions?" (sometimes we don''t know the questions
    to ask, maybe we think we know but we don''t, etc).'
