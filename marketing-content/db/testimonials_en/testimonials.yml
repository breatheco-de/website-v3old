  - content-and-syllabus
  excerpt: I started the course in April and currently I am in the final phase, working
    with my team on the final project. It has been a roller coaster of emotions and
    feelings, but I would definitely do it again. Throughout the course we got support
    from both...
  full_text: I started the course in April and currently I am in the final phase,
    working with my team on the final project. It has been a roller coaster of emotions
    and feelings, but I would definitely do it again. Throughout the course we got
    support from both our teacher and the teacher assistant. You can ask for mentorship
    sessions to build up on certain things or, in case you did not understand something,
    to review. It is very important that you ask questions. Revise, read everything
    there is to read and attend those sessions. You can't just attend the classes
    and call it a day. You need to program outside of the scheduled classes as well
    and the more you do, the better for you. Every module has at least one project,
    which has several levels and you can add more functionalities. I always tried
    to personalize things to make them more interesting. Sky really is the limit!
    At the beginning things look very overwhelming and scary, but once you notice
    the pattern and you reflect upon your progress, you realize that it works. You
    just need to have faith in the course and the way things are done. Talk to your
    classmates, to your teachers. Don't believe what that little voice in your head
    is telling you. Everybody struggles, some people are doing the exercises faster,
    some people are slower. Some are better in one module, but completely suck at
    the other one. Just keep on coding, it will get easier after some time. What I
    do definitely recommend is to reduce working hours when working on the final project.
    If you can, even take a vacation. Don't underestimate the task, you will need
    to code every single day and you most probably will face some technical issues
    which will require time.
