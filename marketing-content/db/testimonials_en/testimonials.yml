  - career-support
  excerpt: Right now I understand we are just at the start, so it is hard even to
    think about recommending it. I am optimistic about it :) It is very hard to answer
    this survey with the straightness I did because I run the risk of being unfair
    towards 4 geeks...
  full_text: Right now I understand we are just at the start, so it is hard even to
    think about recommending it. I am optimistic about it :) It is very hard to answer
    this survey with the straightness I did because I run the risk of being unfair
    towards 4 geeks or someone. Hope it won't be the case. Opinions are like asses,
    everybody has one. I really want to suggest that 4geeks creates a peer dynamics
    that is inexistent for the moment. There is very little to no interaction between
    peers because we have no optional challenge, or extra-homework to do. In this
    way we loose a great opportunity of learning to cooperate or co-code. Schools
    like 42 are solely based on peer interaction for example. Like I said, it would
    be optional, and anyone interested could do them alone or message a colleague
    for cooperation. I think it would be fantastic that there are so many optional
    projects/tasks advanced by 4geeks/teachers that one would hardly manage to do
    complete them. Thank you! :)
  content: Right now I understand we are just at the start, so it is hard even to
    think about recommending it. I am optimistic about it :) It is very hard to answer
    this survey with the straightness I did because I run the risk of being unfair
    towards 4 geeks or someone. Hope it won't be the case. Opinions are like asses,
    everybody has one. I really want to suggest that 4geeks creates a peer dynamics
    that is inexistent for the moment. There is very little to no interaction between
    peers because we have no optional challenge, or extra-homework to do. In this
    way we loose a great opportunity of learning to cooperate or co-code. Schools
    like 42 are solely based on peer interaction for example. Like I said, it would
    be optional, and anyone interested could do them alone or message a colleague
    for cooperation. I think it would be fantastic that there are so many optional
    projects/tasks advanced by 4geeks/teachers that one would hardly manage to do
    complete them. Thank you! :)
