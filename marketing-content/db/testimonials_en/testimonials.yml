  excerpt: I took the part-time full stack web development bootcamp taught by 4Geeks,
    through Miami Dade College's continuing education department. I went into it unsure
    of what to expect as it was my first time diving into anything related to coding,
    but I...
  full_text: 'I took the part-time full stack web development bootcamp taught by 4Geeks,
    through Miami Dade College''s continuing education department. I went into it
    unsure of what to expect as it was my first time diving into anything related
    to coding, but I ended ... up enjoying it immensely. This was due in large part
    to our instructor Jonathan who was encouraging, friendly, and engaging, and made
    it clear that there was no such thing as a "dumb question" in his class. He and
    the TAs Andy and Angelo were also always available on Slack for questions outside
    of class, as well as the rest of the 4Geeks community (the #publicsupport channel
    on Slack is a great place to ask questions). This course was the catalyst for
    an entire career change for me, and I''m excited to look for my first dev job
    now. Regarding curriculum, I would have liked to spend a bit more time on backend
    languages. We studied PHP in this particular course, but our larger projects were
    more robust on Javascript/React (which I''m also glad I learned!). But with that
    being said, this particular course was only 3 months and so there is only so much
    subject matter you can meaningfully squeeze in. Overall it was a good balance
    for the time that we had.'
  content: 'I took the part-time full stack web development bootcamp taught by 4Geeks,
