  full_text: For me the experience has been both good and bad. I have learned more
    while here than I have while trying to teach my self on my own, but I think I
    could know and understand more with some changes. I think the overall curriculum
    is "good" but misses out on helping people truly understand all that they need
    to know. Some classes with teachers are "good", but not all classes leave me feeling
    like that, and we lose time on explaining the harder concepts and focus a bit
    too much on doing the exercises only. I think overall there is a good attempt
    to teach people how to learn how to program, but we are still missing out on some
    necessary items to make it a great experience.
  content: For me the experience has been both good and bad. I have learned more while
    here than I have while trying to teach my self on my own, but I think I could
    know and understand more with some changes. I think the overall curriculum is
    "good" but misses out on helping people truly understand all that they need to
    know. Some classes with teachers are "good", but not all classes leave me feeling
    like that, and we lose time on explaining the harder concepts and focus a bit
    too much on doing the exercises only. I think overall there is a good attempt
    to teach people how to learn how to program, but we are still missing out on some
    necessary items to make it a great experience.
