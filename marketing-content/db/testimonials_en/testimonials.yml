    but the lack of guide to github, codespaces, to even not knowing I was 'saving
    them properly' were not met with proper instruction until someone 'finally' checked
    into my project submissions and a number of them being flagged as missing - adding
    to the frustration and disappointment.
  content: Rushed! This, according to a number of my own community have asked how
    on Earth I was being expected to learn so much, so fast and on a part-time basis,
    going in fresh? Simply - I didn't. I took bits and pieces where I could and any
    questions I had in between could be left floating around for hours or days before
    I got a response which then overlapped with other modules - Doing 3 per week.
