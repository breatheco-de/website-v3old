    videos of Alejandro Sanchez's weren't explanatory enough that's why I had to watch
    so many outside sources like youtube, edx, coursera videos from other creators.
    Also I think courses should be more practice based, not reading a powerpoint slide
    every course for 1.5 hours. That can be pre-recorded to be watched before classes
    so that we can profit more of the practice side. Lack of practice without supervision
    or a mentor made it super difficult for me to catch up and stay on track with
    the bootcamp so far. Also we only have two mentors which one is never available
    (Elisa) and the other is only available after evening hours which makes it difficult
    to catch up or do anything during the day.
