  full_text: I’ve been wanting to learn how to code but never found the time with
    a full time job, but then I saw 4GeeksAcademy offering a part time full stack
    bootcamp, and decided to spend a few hard months to learn. The part time structure
    was with 1 mentor and 1 assistant throughout the whole course for each lesson
    of 3 hours, 3 times a week, with a flip classroom concept of students are to learn
    before the class, and listen to explanation in class after already having gone
    through the ma... I’ve been wanting to learn how to code but never found the time
    with a full time job, but then I saw 4GeeksAcademy offering a part time full stack
    bootcamp, and decided to spend a few hard months to learn. The part time structure
    was with 1 mentor and 1 assistant throughout the whole course for each lesson
    of 3 hours, 3 times a week, with a flip classroom concept of students are to learn
    before the class, and listen to explanation in class after already having gone
    through the material. The bootcamp has a good structure easing in the ‘coding
    mindset’ with HTML, CSS, JavaScript, and eventually SQL and Python. If I were
    to give a negative feedback, it would be that the slowly easing in front end was
    making it rather easy to digest, but when it came to backend and endpoints, it
    was rather fast paced comparing to the frontend part of the course - although
    I have to say I wasn’t an example student studying coding hardcore pushing everyday.
    For a full time working person, this is manageable, although I missed a few classes
    while traveling, Marta the mentor of my bootcamp offered mentorship sessions,
    to explain topics that I missed. I would definitely recommend - hours wise this
    is perfect for someone working full time office hours, although the 3x3 hours
    per week is not to be taken lightly - students are expected to learn and code
    on their own outside of the classes, to be able to follow the designed learning
    path. Mentors and assistants are very nice and friendly, passionate about coding
    as well as getting people to learn - the course also creates a great community
    within the class of ~6 people in my case, I believe it’s maximum 14 people in
    one class. There’s also lifetime support on the slack channels, finding a job,
    or just mentorship on anything. On the finance side, I have to say they offer
    a rather considerate support, they are in partnership with a payment/credit company,
    students can choose to pay in installments, as small as 100 euros a month, and
    obviously paying in full also works. (Not sure if this is only applicable in Europe)
