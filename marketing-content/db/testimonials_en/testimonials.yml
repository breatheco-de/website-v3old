  full_text: Joining 4geeks has been a life changing experience. from the first time
    i reached out to them until now on the cusp of graduation the 4geeks team has
    gone above and beyond what i expected from them. My situation was very complicated
    as i lived on the other side of the world and had a 12 hour difference from the
    other students and teachers. Despite that setback the instructors and staff ahve
    always been available and friendly. The teachers are excellent and have a wealth
    of knowledge. apart from the curriculum my instructor sprinkled in his own nuggets
    of information when he had time. One of my favorite aspects of the course was
    the mentoring program (which is available even after graduation). Here there is
    a staff of teachers who are available to have 1- 1 meetings about pretty much
    anything you can think of related to programming/coding. The core curriculum is
    extensive and gives a solid background in several languages. looking back at where
    i was at the beginning of the course to now... the difference is night and day
    and i feel so much more confident when approaching new material now. There are
    also mini talks and presentations related to applying to jobs and different aspects
    of coding. Choosing to join 4geeks is one of the best decisions i have made in
    my life!
