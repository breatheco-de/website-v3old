  full_text: 'Generally, the experience is good. Nikhils demos and explainations are
    solid and very useful for me once I use them to revise on my own time. Suggestion
    for improvement: some rhetorical training for better presentation of the material.
    Less reliance on filler phrases, like the very common "this is a thing". What
    is this "thing" exactly? Better explainations could be (for the sake of example):
    - This is another array method to add to your toolbox. - This is a workaround
    you can use once you get stuck. - This is what we consider the best practice.'
