    class, in the practice if you haven't done it in time, it gets more difficult
    to understand and...
  full_text: We only have 2 days from one class to another to finish the project of
    the lesson. Although it's not mandatory to finish the project before the next
    class, in the practice if you haven't done it in time, it gets more difficult
    to understand and embrace the next lesson (and this problem gets bigger after
    each lesson and eventually the student feels lost). I would give one more class
    from one lesson to the next one. And maybe two projects for lesson being mandatory
    only one, so that if the student has more time he can do 2 projects and embrace
    better the lesson. But also the students with less time (or that struggles with
    the lesson) have time to finish their project and be in a better position to understand
    the next lesson. Unit testing has one lesson but in the next projects it's not
    mentioned at all. I would include hints to apply unit testing in the project instructions
    so we can learn to apply it by practice. Same for git commands.
