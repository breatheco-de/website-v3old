program:
  directory: programs
  url_pattern:
    en: /en/career-programs/:slug
    es: /es/programas-de-carrera/:slug
location:
  directory: locations
  url_pattern:
    en: /en/location/:slug
    es: /es/ubicacion/:slug
landing:
  directory: landings
  url_pattern:
    default: /landing/:slug
page:
  directory: pages
  url_pattern:
    en: /en/:slug
    es: /es/:slug
blog:
  directory: blog
  database:
    slug: blog_posts
    field_mapping:
      _locale: lang
      title: title
      slug: slug
      description: description
      image: preview_image
      published_at: published_at
      updated_at: updated_at
      status: status
      category: cluster_slug
      tags: tags
      lang: language
      content: content
    indexes:
      - status
      - category
  url_pattern:
    en: /en/blog/:category/:slug
    es: /es/blog/:category/:slug
downloadable:
  directory: downloadable
  url_pattern:
    en: /endownloadable
    es: /esdescargable
