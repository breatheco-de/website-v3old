# Content Types Configuration
# ===========================
# Each entry defines a content type with its URL routing, field mapping, and optional database connection.
#
# Required fields:
#   directory: folder inside marketing-content/ where YAML entries live
#   url_pattern: URL routing pattern (must include :slug for unique entry URLs)
#     - Per-locale object: { en: /en/path/:slug, es: /es/ruta/:slug }
#     - Shorthand: { default: /landing/:slug } (same path for all locales)
#
# field_mapping (recommended):
#   Declares which fields are available as {{ single.* }} template variables.
#   For database-backed types: maps content concepts to database column names.
#     Underscore-prefixed fields are mandatory special fields:
#       _slug: DB field containing the entry's unique identifier
#       _locale: DB field containing the entry's language
#   For non-database types: exposes YAML keys from merged content as {{ single.* }} variables.
#     Dot-notation supported for nested keys (e.g., page_title: meta.page_title).
#
# indexes (optional):
#   Fields for filtering when listing entries. Works for DB and non-DB types.
#
# database (optional):
#   slug: database name (matches a db config in marketing-content/db/)

program:
  directory: programs
  field_mapping:
    slug: slug
    title: title
    bc_slug: bc_slug
    job_role: job_role
  url_pattern:
    en: /en/career-programs/:slug
    es: /es/programas-de-carrera/:slug
location:
  directory: locations
  field_mapping:
    slug: slug
    name: name
    city: city
    country: country
    country_code: country_code
    region: region
    default_language: default_language
    phone: phone
    address: address
    latitude: latitude
    longitude: longitude
    timezone: timezone
    available_programs: available_programs
  indexes:
    - region
    - country
  url_pattern:
    en: /en/location/:slug
    es: /es/ubicacion/:slug
landing:
  directory: landings
  field_mapping:
    slug: slug
    title: title
    locale: locale
  url_pattern:
    default: /landing/:slug
page:
  directory: pages
  field_mapping:
    slug: slug
    title: title
  url_pattern:
    en: /en/:slug
    es: /es/:slug
blog:
  directory: blog
  field_mapping:
    _slug: slug
    _locale: lang
    title: title
    description: description
    image: preview_image
    published_at: published_at
    updated_at: updated_at
    status: status
    category: cluster_slug
    tags: tags
    lang: >-
      function:KHZhbHVlLCBpdGVtKSA9PiB7IGNvbnN0IHYgPSBTdHJpbmcoaXRlbS5sYW5ndWFnZSB8fCAnJyk7IHJldHVybiB2ID09PSAndXMnID8gJ2VuJyA6IHY7IH0=
    content: content
  indexes:
    - status
    - category
  database:
    slug: blog_posts
  url_pattern:
    en: /en/blog/:category/:slug
    es: /es/blog/:category/:slug
downloadable:
  directory: downloadable
  field_mapping:
    slug: slug
    title: title
  url_pattern:
    en: /en/downloadable/:slug
    es: /es/descargable/:slug
landing-page:
  directory: landing-page
  url_pattern:
    en: /en/landing-page/:slug
    es: /es/landing-page/:slug
sampel:
  directory: sampel
  url_pattern:
    en: /en/sample/:slug
    es: /es/sample/:slug
