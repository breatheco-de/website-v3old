# Content Types Configuration
# ===========================
# Each entry defines a content type with its URL routing, field mapping, and optional database connection.
#
# Required fields:
#   directory: folder inside marketing-content/ where YAML entries live
#   url_pattern: URL routing pattern (must include :slug for unique entry URLs)
#     - Per-locale object: { en: /en/path/:slug, es: /es/ruta/:slug }
#     - Shorthand: { default: /landing/:slug } (same path for all locales)
#
# field_mapping (recommended):
#   Declares which fields are available as {{ single.* }} template variables.
#   For database-backed types: maps content concepts to database column names.
#     Underscore-prefixed fields are mandatory special fields:
#       _slug: DB field containing the entry's unique identifier
#       _locale: DB field containing the entry's language
#   For non-database types: exposes YAML keys from merged content as {{ single.* }} variables.
#     Dot-notation supported for nested keys (e.g., page_title: meta.page_title).
#
# indexes (optional):
#   Fields for filtering when listing entries. Works for DB and non-DB types.
#
# database (optional):
#   slug: database name (matches a db config in marketing-content/db/)
#
# layout (optional):
#   menu:
#     top: menu ID for navbar (e.g., "main-navbar") or null for no navbar
#     bottom: menu ID for footer (e.g., "main-footer") or null for no footer
#   System default (when absent): { menu: { top: null, bottom: null } }
#   Per-entry override: set layout.menu.top / layout.menu.bottom in _common.yml or locale files

program:
  insights_intent: product_service
  directory: programs
  unique_fields:
    - slug
    - bc_slug
    - job_role
  field_mapping:
    slug: slug
    title: title
    bc_slug: bc_slug
    job_role: job_role
    valid_lead_form_option: valid_lead_form_option
  url_pattern:
    en: /en/career-programs/:slug
    es: /es/programas-de-carrera/:slug
  layout:
    menu:
      top: main-navbar
      bottom: main-footer
location:
  insights_intent: brand_corporate
  directory: locations
  field_mapping:
    slug: slug
    name: name
    city: city
    country: country
    country_code: country_code
    region: region
    default_language: default_language
    phone: phone
    address: address
    latitude: latitude
    longitude: longitude
    timezone: timezone
    available_programs: available_programs
  indexes:
    - region
    - country
    - city
  url_pattern:
    en: /en/location/:slug
    es: /es/ubicacion/:slug
  layout:
    menu:
      top: main-navbar
      bottom: main-footer
  unique_fields:
    - slug
    - name
    - latitude
    - longitude
    - city
landing:
  insights_intent: lead_generation
  directory: landings
  field_mapping:
    slug: slug
    title: title
    locale: locale
  url_pattern:
    default: /landing/:slug
  layout:
    menu:
      top: logo-only
      bottom: null
page:
  insights_intent: brand_corporate
  directory: pages
  field_mapping:
    slug: slug
    title: title
  url_pattern:
    en: /en/:slug
    es: /es/:slug
  layout:
    menu:
      top: main-navbar
      bottom: main-footer
blog:
  insights_intent: content_seo
  directory: blog
  field_mapping:
    _slug: slug
    _locale: lang
    title: title
    description: description
    image: preview_image
    published_at: published_at
    updated_at: updated_at
    status: status
    category: cluster_slug
    tags: tags
    lang: language
    content: content
  indexes:
    - status
    - category
  database:
    slug: blog_posts
  url_pattern:
    en: /en/blog/:category/:slug
    es: /es/blog/:category/:slug
  layout:
    menu:
      top: main-navbar
      bottom: main-footer
  unique_fields:
    - slug
downloadable:
  insights_intent: lead_generation
  directory: downloadable
  field_mapping:
    slug: slug
    title: title
  url_pattern:
    en: /en/downloadable/:slug
    es: /es/descargable/:slug
  layout:
    menu:
      top: main-navbar
      bottom: main-footer
outcome-report:
  insights_intent: outcome
  directory: outcome-report
  url_pattern:
    en: /en/outcomes-report/:slug
    es: /es/informe-de-resultados/:slug
how-to:
  directory: how-to
  url_pattern:
    en: /en/how-to/:slug
    es: /es/how-to/:slug
  field_mapping:
    _slug: slug
    _locale: language
    title: title
    slug: slug
    description: description
    image: image_url
    content: content
    updated_at: '?updated_at'
    technologies: technologies
  indexes:
    - technologies
  database:
    slug: how_to
