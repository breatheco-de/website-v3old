name: Profiles Carousel Section
version: "1.0"
component: ProfilesCarousel
file: client/src/components/profiles_carousel/variants/ProfilesCarouselDefault.tsx
description: A paginated carousel displaying people profiles (staff, mentors, partners, etc.) with photos, names, roles, and optional LinkedIn links.
when_to_use:
  - Showcase team members, instructors, or mentors
  - Display partner or alumni profiles
  - Present staff or faculty with photos and bios
  - Show a large set of people in a compact paginated layout

image_sizes:
  default.profiles[].image_id: "(min-width: 1024px) 25vw, (min-width: 640px) 33vw, 50vw"

props:
  heading:
    type: string
    required: false
    description: Section heading displayed above the carousel
  description:
    type: string
    required: false
    description: Section subtitle or supporting text
  image_round:
    type: boolean
    required: false
    description: If true, renders profile images as small circles with a compact card layout. If false (default), renders rectangular portrait-style images.
  background:
    type: string
    required: false
    description: CSS background value for the section (e.g. a gradient or color)
  profiles:
    type: array
    required: true
    description: List of profile cards to display in the carousel
    items:
      image_id:
        type: string
        required: false
        description: Image registry ID for the profile photo
      object_fit:
        type: string
        required: false
        description: "CSS object-fit for the image: cover (default), contain, fill, none, scale-down"
      object_position:
        type: string
        required: false
        description: CSS object-position for the image (default 'center center')
      name:
        type: string
        required: true
        description: Full name of the person
      role:
        type: string
        required: false
        description: Job title or role
      description:
        type: string
        required: false
        description: Short bio or description shown below the role
      linkedin_url:
        type: string
        required: false
        description: LinkedIn profile URL (renders a LinkedIn icon link)
