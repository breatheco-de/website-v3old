        label: Updated in 2026
        title: Data Science & Machine Learning with AI
        badges:
          - icon: DollarSign
            text: $3,250 full tuition
          - icon: CheckCircle
            text: Qualifies for 10% upfront discount and up to 6 interest-free installments.
