name: "Course Selector - Spotlight Variant"
description: "Course selector with spotlight layout: first course as large featured card on the left, remaining courses stacked as smaller cards on the right. Each card has its own color via course_background."
yaml: |
  - type: course_selector
    version: "1.0"
    variant: spotlight
    heading: "Choose Your Path"
    subheading: "Pick the program that fits your career goals"
    courses:
      - name: "AI Automation"
        icon: "Bolt"
        duration: "4 months part-time"
        label: "Most Popular"
        title: "AI Automation"
        badges:
          - icon: "Bolt"
            text: "AI tools for business"
          - icon: "Rocket"
            text: "No coding required"
        description: "Connect AI tools to enterprise platforms and business data. Optimize existing solutions or build new ones. Eliminate resource bottlenecks and transform operations."
        price: "$328"
        price_period: "/mo"
        original_price: "$442"
        price_info: "with 4Geeks Installments"
        cta_text: "Discover program"
        cta_url: "/en/ai-automation"
        course_background: "accent"

      - name: "Machine Learning"
        icon: "Brain"
        duration: "9 months part-time"
        label: "Updated in 2025"
        title: "AI and Machine Learning"
        badges:
          - icon: "Brain"
            text: "LLMs & Generative AI"
        description: "Build systems that learn from data and improve over time without being explicitly programmed."
        price: "$439"
        price_period: "/mo"
        cta_text: "Discover program"
        cta_url: "/en/ai-machine-learning"
        course_background: "primary"

      - name: "Full Stack Dev"
        icon: "Code"
        duration: "9 months part-time"
        title: "Full Stack Software Development"
        badges:
          - icon: "Code"
            text: "React, Node.js & Python"
        description: "Master modern web development from frontend to backend. Build production-ready applications."
        price: "$439"
        price_period: "/mo"
        cta_text: "Discover program"
        cta_url: "/en/full-stack"
        course_background: "secondary"

      - name: "Data Science"
        icon: "ChartBar"
        duration: "6 months part-time"
        title: "Data Science & Analytics"
        badges:
          - icon: "ChartBar"
            text: "Python & SQL"
        description: "Turn raw data into meaningful insights. Learn to analyze, visualize, and communicate data-driven decisions."
        price: "$399"
        price_period: "/mo"
        cta_text: "Discover program"
        cta_url: "/en/data-science"
        course_background: "destructive"
