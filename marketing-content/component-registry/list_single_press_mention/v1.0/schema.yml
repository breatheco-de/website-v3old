title: Single Press Mention (Featured)
description: Displays one highlighted press mention in a two-column layout — image on the left, content on the right.
when_to_use: |
  Use to spotlight one particularly impactful press mention or media feature — such as a
  major publication quote or award. Better than the list_press_mentions cards variant when
  you want to give a single mention strong editorial weight. Often used above or below the
  multi-mention list_press_mentions component.
props:
  background:
    type: string
    description: CSS background value (color or gradient) for the section
  button_icon:
    type: string
    description: Tabler icon name shown beside the CTA button text
  image:
    type: string
    description: Section-level image (used when not sourcing from dynamic_entries)
  title:
    type: string
    description: Headline of the press mention
  subtitle:
    type: string
    description: Secondary descriptor beneath the title
  excerpt:
    type: string
    description: Short body text describing the mention
  organization:
    type: string
    description: Name of the publication or organisation
  link_text:
    type: string
    description: CTA button label
  link_url:
    type: string
    description: URL the CTA button links to
  items:
    type: array
    description: Resolved items from dynamic_entries (auto-populated)
  dynamic_entries:
    type: object
    description: Database source configuration
