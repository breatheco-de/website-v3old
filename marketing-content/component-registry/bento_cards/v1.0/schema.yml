name: Bento Cards Section
version: "1.0"
component: BentoCards
file: client/src/components/bento-cards/BentoCards.tsx
description: A bento-box style card grid that bleeds to the right edge of the viewport. Displays feature cards with icons, titles, and descriptions in an asymmetric grid layout.
when_to_use: |
  Use for feature sections that need a modern, editorial feel with asymmetric card sizes.
  The right-edge bleed creates visual dynamism. Best for homepage feature highlights or
  "what you'll learn" sections where you want to break away from a standard uniform grid.