name: Text Block
version: "1.0"
component: TextBlock
file: client/src/components/text_block/variants/TextBlockDefault.tsx
description: A standalone block of formatted copy — an optional eyebrow label, an optional heading, and a rich-text body. Use wherever editors need to drop in prose without repurposing a more complex layout component.

when_to_use: |
  Use for editorial content that is purely text: policy copy, long-form explanations,
  marketing prose, or any section that needs a heading and rich paragraph body without
  columns, images, or interactive elements. Supports alignment and max-width constraints
  to control readability across wide layouts.

props:
  eyebrow:
    type: string
    required: false
    description: Small label rendered above the heading (e.g. "About us", "New")
  heading:
    type: string
    required: false
    description: Section heading displayed below the eyebrow
  body:
    type: string
    required: true
    description: Rich text body stored as HTML (produced by the WYSIWYG editor)
  alignment:
    type: string
    required: false
    description: "Text alignment: 'left' (default), 'center', or 'right'"
  max_width:
    type: string
    required: false
    description: "Constrains readable line length: 'narrow', 'default' (default), or 'wide'"
