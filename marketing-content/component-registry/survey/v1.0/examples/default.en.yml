type: survey
variant: default
aggregation_method: concat

badge_text: "Build your path"
title: "Your AI curriculum,"
title_highlight: "built around you."
subtitle: "A few questions. No commitment. We map the exact courses you need."
icon: "4GeeksAvatar"
back_label: "Back"
restart_label: "Start over"
step_label: "Question"
step_of_label: "of"

questions:
  - text: "What's your main goal right now?"
    options:
      # No action: auto-route fires immediately (early exits below)
      - label: "Build apps or technical projects with AI"
      - label: "Work with data, analytics, or machine learning"
      # Explicit action: advance to next question
      - label: "Use AI to be more productive at my current job"
        action:
          next_question: 2
      - label: "Automate repetitive tasks without writing code"
        action:
          next_question: 2

  - text: "How comfortable are you with coding?"
    options:
      # Explicit action: go directly to a result message
      - label: "No experience — and I'd like to keep it that way"
        action:
          message: "You're a great fit for the AI Professional Skills path — practical, no code required."
      # Explicit action: navigate to an inline section
      - label: "I know some basics (scripts, spreadsheets)"
        action:
          url: inline#ai-flex-path-professional
      # No action: default route fires when all answers match
      - label: "I code regularly"

routes:
  # Early exits — fire as soon as the matching option is picked (1-part key)
  q1o1:
    url: inline#ai-flex-path-builder
  q1o2:
    url: inline#ai-flex-path-analyst

  # Full 2-step path for coders who reach question 2
  q1o3-q2o3:
    url: inline#ai-flex-path-career
  q1o4-q2o3:
    url: inline#ai-flex-path-career

  default:
    url: inline#ai-flex-path-professional
