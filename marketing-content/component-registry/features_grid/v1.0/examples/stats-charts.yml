- type: features_grid
  version: "1.0"
  variant: stats-charts

  # --- Encabezado de la sección (layout 2 columnas) ---
  subtitle: Market Intelligence          # texto pequeño sobre el título, colorido
  title: The AI Skills Gap Is Real       # heading principal
  description: The data is clear — AI is transforming the job market faster
    than the workforce can adapt. Those who develop AI skills now will lead
    the next decade.                     # párrafo derecho

  # --- Fondo de la sección ---
  background: bg-slate-950              # clase Tailwind para el fondo (siempre oscuro recomendado)

  # --- Colores de acento por card (usar CSS vars del tema) ---
  card_bars_accent: hsl(var(--color-green))
  card_gauge_accent: hsl(var(--color-orange))
  card_trend_accent: hsl(var(--primary))

  # --- Card 1: Gráfico de barras ---
  card_bars:
    badge: Jobs Market                  # pill/etiqueta arriba
    title: AI jobs created vs. displaced  # heading de la card
    description: "Annual delta · 2021-2025 · indexed"  # meta texto pequeño
    stat_value: +340%                   # número grande
    stat_label: net new AI roles created since 2021
    displaced_label: Displaced          # leyenda barra "gris"
    created_label: Created by AI        # leyenda barra "accent"
    # years: ["2021","2022","2023","2024","2025"]  # opcional, estos son los defaults

  # --- Card 2: Donut gauge ---
  card_gauge:
    badge: Workforce Readiness
    title: Who's actually ready for AI roles?
    description: "Global workforce · 2025 data"
    gauge_percentage: 3                 # número dentro del donut (el % "bueno")
    gauge_label: qualified              # texto dentro del donut bajo el %
    stat_label: of the workforce is not ready for AI roles today  # texto junto al 97%
    bar1_label: Traditional workforce   # barra gris (complemento del gauge_percentage)
    bar2_label: AI-ready professionals  # barra accent (igual al gauge_percentage)

  # --- Card 3: Gráfico de tendencia ---
  card_trend:
    badge: Demand Curve
    title: Demand for AI engineers
    description: "Indexed job postings · 2020 → 2027 projected"
    stat_value: 1.3M                    # número grande
    stat_label: new AI roles expected by 2027
    end_label: "1.3M · 2027"           # label flotante al final de la línea

