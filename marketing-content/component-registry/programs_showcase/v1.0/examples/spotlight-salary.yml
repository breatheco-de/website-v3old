name: "Programs Spotlight with Salary"
description: "Featured card + smaller cards layout showing average salary in each footer"
yaml: |
  - type: programs_showcase
    layout: spotlight_with_list
    heading: "Choose Your Career Path"
    subheading: "Four programs built around the skills companies are actively hiring for right now."
    featured_label: "Featured Program"
    show_salary: true
    salary_label: "Avg. salary"
    programs:
      - name: "Full Stack Development with AI"
        icon: "IconCode"
        description: "Build modern, production-ready web applications from frontend to backend, using the latest AI-powered tools and workflows."
        avg_salary: "$75,000 – $120,000"
        cta_text: "Explore Program"
        cta_url: "/programs/full-stack"
      - name: "AI Engineering"
        icon: "IconBrain"
        description: "Build and scale AI-native products while mastering real-world AI systems, workflows, and deployment strategies. Transform a single business case into a fully AI-native system, layer by layer."
        avg_salary: "$95,000 – $150,000"
        cta_text: "Explore"
        cta_url: "/programs/ai-engineering"
      - name: "Data Science & ML"
        icon: "IconChartBar"
        description: "Learn to analyze complex datasets, build intelligent models, and deploy AI-driven solutions to real-world problems."
        avg_salary: "$80,000 – $130,000"
        cta_text: "Explore"
        cta_url: "/programs/data-science"
      - name: "Cybersecurity"
        icon: "IconShield"
        description: "Develop practical skills to protect systems, secure infrastructure, and respond to modern cybersecurity threats."
        avg_salary: "$70,000 – $110,000"
        cta_text: "Explore"
        cta_url: "/programs/cybersecurity"
