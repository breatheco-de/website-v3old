name: Enrollment Selector
version: "1.0"
component: EnrollmentSelectorDefault
file: client/src/components/enrollment_selector/variants/EnrollmentSelectorDefault.tsx
description: >-
  An interactive enrollment/checkout section with a program selector, date or plan picker, a benefits list, and a sticky
  summary card. Supports date-mode (cohort start dates) and plan-mode (subscription plans). Responds to ?program=<id>
  querystring to pre-filter a specific program and hide the selector.
when_to_use: >
  Use on enrollment or pricing pages where users need to choose a program, pick a start date or subscription plan, and
  review what is included before completing enrollment. The right column summary card is sticky and shows pricing,
  summary rows, feature unlocks, a CTA button, and an optional trust note.
props:
  eyebrow:
    type: string
    required: false
    description: Small uppercase label shown above the main title
  title:
    type: string
    required: true
    description: Main section heading. Supports richtext HTML (italic, bold, span with text-primary, etc.)
  choose_program_label:
    type: string
    required: false
    description: Label above the program selector tiles (default "Choose your program")
  choose_date_label:
    type: string
    required: false
    description: Label above the date selector and the auto-inserted "Start date" summary row (default "Choose your start date")
  choose_plan_label:
    type: string
    required: false
    description: Label above the plan selector tiles (default "Choose your plan")
  included_label:
    type: string
    required: false
    description: Label above the benefits list (default "What's included")
  programs:
    type: array
    required: true
    items:
      id:
        type: string
        required: true
      description:
        type: string
        required: false
      selection_card:
        type: object
        required: true
        properties:
          name:
            type: string
            required: true
          duration:
            type: string
            required: true
          badge:
            type: string
            required: false
          icon:
            type: string
            required: false
      summary:
        type: object
        required: true
        properties:
          price_label:
            type: string
            required: true
          price_amount:
            type: string
            required: true
          price_period:
            type: string
            required: false
          price_sub:
            type: string
            required: false
          rows:
            type: string
            required: true
          cta:
            type: object
            required: true
            properties:
              text:
                type: string
                required: true
              url:
                type: string
                required: true
              variant:
                type: string
                required: true
                options:
                  - primary
                  - secondary
                  - outline
              button_variant:
                type: string
                required: false
              text_color:
                type: string
                required: false
              icon:
                type: string
                required: false
              us_only:
                type: boolean
                required: false
          trust_note:
            type: object
            required: false
            properties:
              image_id:
                type: string
                required: false
              initials:
                type: string
                required: true
              message:
                type: string
                required: true
      benefits:
        type: string
        required: true
      unlocks:
        type: string
        required: true
      dates:
        type: string
        required: false
      plans:
        type: array
        required: false
        items:
          id:
            type: string
            required: true
          name:
            type: string
            required: true
          tagline:
            type: string
            required: false
          currency:
            type: string
            required: true
          amount:
            type: string
            required: true
          period:
            type: string
            required: true
          billing_note:
            type: string
            required: false
          tag:
            type: string
            required: false
          featured:
            type: boolean
            required: false
          summary:
            type: object
            required: true
            properties:
              price_label:
                type: string
                required: true
              price_amount:
                type: string
                required: true
              price_period:
                type: string
                required: false
              price_sub:
                type: string
                required: false
              rows:
                type: string
                required: true
              cta:
                type: object
                required: true
                properties:
                  text:
                    type: string
                    required: true
                  url:
                    type: string
                    required: true
                  variant:
                    type: string
                    required: true
                    options:
                      - primary
                      - secondary
                      - outline
                  button_variant:
                    type: string
                    required: false
                  text_color:
                    type: string
                    required: false
                  icon:
                    type: string
                    required: false
                  us_only:
                    type: boolean
                    required: false
              trust_note:
                type: object
                required: false
                properties:
                  image_id:
                    type: string
                    required: false
                  initials:
                    type: string
                    required: true
                  message:
                    type: string
                    required: true
          benefits:
            type: array
            required: false
            items:
              icon:
                type: string
                required: false
              title:
                type: string
                required: true
              desc:
                type: string
                required: true
          unlocks:
            type: array
            required: false
            items:
              icon:
                type: string
                required: false
              text:
                type: string
                required: true
    description: >-
      Array of programs. A program with a "dates" key uses date-mode; one with a "plans" key uses plan-mode. Each
      program has: id, selection_card (name, duration, badge?, icon?), summary (price_label, price_amount,
      price_period?, price_sub?, rows[], cta, trust_note?), benefits[], unlocks[], and either dates (static or interval)
      or plans[]. Plans can override summary, benefits, and unlocks from the parent program.
  variant:
    type: string
    required: true
