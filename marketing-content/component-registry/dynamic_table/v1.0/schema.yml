name: DynamicTable
version: "1.0"
component: DynamicTable
file: client/src/components/DynamicTable.tsx
description: >-
  A table component that fetches data from an external API endpoint and renders it
  with sortable columns, typed cell rendering (text, number, date, image, link, boolean),
  optional row action buttons with templated URLs, AI-powered global filtering,
  and configurable max row limits with expand/collapse. Each column uses a base64-encoded
  JavaScript function to extract and transform cell values from row data.

when_to_use: >
  Use when you need to display tabular data fetched live from an external API endpoint.
  Supports nested data paths, column sorting, action buttons per row, global filtering
  using AI-generated JavaScript functions, and limiting visible rows.
  Best for displaying lists of students, courses, events, or any structured API data.

variants:
  default:
    description: Classic bordered table with standard rows and column headers
    best_for: General data tables, admin-facing lists
  striped:
    description: Alternating row colors with a colored header row for easier scanning
    best_for: Large datasets, comparison-heavy tables
  cards:
    description: Responsive card layout on mobile, refined table on desktop
    best_for: User-facing data tables that need to look great on all screen sizes
  comparison:
    description: Comparison-optimized table layout with highlighted columns
    best_for: Feature comparisons, plan/tier comparison tables

props:
  variant:
    type: string
    required: false
    default: default
    description: "Visual style of the table. Options: 'default' (classic bordered table), 'striped' (alternating row colors with a colored header), 'cards' (responsive card layout on mobile, refined table on desktop)"
    enum:
      - default
      - striped
      - cards
      - comparison
  endpoint:
    type: string
    required: true
    description: The full URL of the API endpoint that returns the data (e.g., "https://api.example.com/items")
  data_path:
    type: string
    required: false
    description: If the array is nested inside the response object, specify the property name (e.g., "results")
  title:
    type: string
    required: false
    description: Main heading displayed above the table
  subtitle:
    type: string
    required: false
    description: Supporting text below the title
  background:
    type: string
    required: false
    description: Background color or gradient for the section
  columns:
    type: array
    required: true
    description: Array of column definitions
    items:
      key:
        type: string
        required: true
        description: "The primary data field path used for sorting. Supports dot notation for nested fields (e.g., 'academy.name')."
      label:
        type: string
        required: true
        description: Display label for the column header
      type:
        type: string
        required: true
        description: "Column type: text, number, date, image, link, or boolean"
      function:
        type: string
        required: false
        description: "Base64-encoded JavaScript arrow function that receives the row object and returns the cell value. Example (before encoding): '(row) => row.academy?.name || \"\"'. The AI generates these functions automatically via the Table Builder wizard."
  action:
    type: object
    required: false
    description: Optional action button for each row
    properties:
      label:
        type: string
        required: true
        description: Button text (e.g., "View", "Edit")
      href:
        type: string
        required: true
        description: "URL template with {columnName} placeholders (e.g., 'https://example.com/item/{id}')"
  global_filter:
    type: string
    required: false
    description: "Base64-encoded JavaScript arrow function that filters the data array before rendering. The function receives two arguments: the full array of rows and a session context object (ctx) with the visitor's region, country_code, city, language, and timezone. Signature: (rows, ctx) => rows.filter(row => ...). Use ctx for region-aware filtering, e.g. '(rows, ctx) => rows.filter(row => !ctx.region || ctx.region === \"latam\" ? row.academy?.slug === \"online\" : true)'. Generated by AI via the Global Filter editor."
  max_rows:
    type: number
    required: false
    description: "Maximum number of rows to display initially. When set, a 'Show all' button appears to expand the full list. Leave empty to show all rows."
