name: list_cards
description: A generic card grid for listing content entries with optional search, user-driven filtering, and pagination. Supports dynamic entries from content types or databases.

variants:
  - name: default
    description: Standard card grid with image, title, description, badge, metadata, and CTA link

dynamic_item_fields:
  - name: image
    type: string
    description: Image URL for the card header
  - name: title
    type: string
    required: true
    description: Card title text
  - name: description
    type: string
    description: Card description text (line-clamped to 3 lines)
  - name: badge
    type: string
    description: Category or tag badge displayed above the title
  - name: url
    type: string
    required: true
    description: Link URL for the card. Use {{ single._resolved_url }} for content types with a url_pattern.
  - name: meta_left
    type: string
    description: Left-side metadata (e.g., author name)
  - name: meta_right
    type: string
    description: Right-side metadata (e.g., date)
  - name: cta_text
    type: string
    description: Call-to-action link text at the bottom of the card

properties:
  - name: title
    type: string
    description: Section heading
  - name: sub_heading
    type: string
    description: Subtitle text below the heading
  - name: layout
    type: object
    description: Visual grid settings
    properties:
      - name: columns
        type: number
        default: 3
        description: Number of grid columns (1-4)
  - name: search
    type: object
    description: Search input settings
    properties:
      - name: enabled
        type: boolean
        default: false
        description: Show a text search input
      - name: placeholder
        type: string
        description: Placeholder text for the search input
  - name: category_filter
    type: object
    description: Category filter badge settings
    properties:
      - name: enabled
        type: boolean
        default: false
        description: Show category filter badges derived from item badge values
      - name: all_label
        type: string
        default: "All"
        description: Label for the "all categories" filter badge
  - name: pagination
    type: object
    description: Pagination settings and labels
    properties:
      - name: page_size
        type: number
        description: Items per page (omit for no pagination)
      - name: page_label
        type: string
        default: "Page"
        description: Label before the current page number
      - name: of_label
        type: string
        default: "of"
        description: Label between current page and total pages
      - name: items_label
        type: string
        default: "items"
        description: Label after the total count
      - name: empty_text
        type: string
        description: Text shown when no items match
