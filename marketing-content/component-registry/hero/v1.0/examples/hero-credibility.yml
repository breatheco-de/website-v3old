name: "Hero Credibility"
description: "Two-column hero with large rich-text title on the left and credibility pills on the right, plus a muted watermark marquee at the bottom."
yaml: |
  - type: hero
    version: "1.0"
    variant: credibility
    description: "Immersive programs built to launch AI careers. Backed by lifelong unlimited mentorship, AI-powered learning, and career support that gets you hired."
    title: "1.3 million<br>new <span style=\"color:#0084FF;font-style:italic\">AI roles.</span><br>We'll get you one."
    cta_buttons:
      - text: "See if you qualify"
        url: "/apply"
        variant: "primary"
        icon: "ChevronRight"
      - text: "View curriculum"
        url: "/curriculum"
        variant: "outline"
    pills:
      - category: "Institutional Backing"
        logos:
          - image_id: "forbes_logo_award"
        label: "Chosen Partners of 12+ Universities"
      - category: "Graduate Outcomes"
        logos:
          - image_id: "logo_switchup"
        label: "Trusted with $20M+ in Government Funding"
      - category: "Student Ratings"
        logos:
          - image_id: "course_report_badge"
          - image_id: "forbes_logo_award"
        label: "Best Bootcamp Awards by Forbes, Course Report and more."
    logo_rotation_ms_time: 2000
    colored_logos: true
    show_marquee: true
    marquee_items:
      - bold_text: "Course Report"
        light_text: "4.9 ★"
      - bold_text: "SwitchUp"
        light_text: "4.9 ★"
      - bold_text: "Career Karma"
        light_text: "4.9 ★"
      - bold_text: "5,000+"
        light_text: "graduates employed worldwide"
      - bold_text: "55%"
        light_text: "avg salary increase"
