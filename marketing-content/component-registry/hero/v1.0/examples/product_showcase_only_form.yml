name: "Product Showcase Only Form"
description: "Two column layout with welcome text, brand mark, title, description on left and embedded video on right. Includes optional lead capture form."
yaml: |
  - type: hero
    version: "1.0"
    variant: productShowcase
    title: Thrive in Today’s Tech and Shape Tomorrow’s.
    brand_mark:
      prefix: Become an
      highlight: AI Engineer
      color: primary
    description: Launch your AI-driven career in 24 weeks with unlimited 1:1 mentorship and personalized career guidance. Be the professional companies can’t wait to hire.
    bullets:
      - text: Aprende las habilidades en ingeniería de IA que hoy buscan las empresas tecnológicas.
      - text: Accede a mentorías 1:1 ilimitadas y a una comunidad profesional de por vida.
      - text: Fórmate en grupos reducidos, con acompañamiento continuo incluso después de graduarte.
    video_id: "-2ZvlgDnltc"
    video_ratio: "9:12"
    form:
      variant: stacked
      conversion_name: student_application
      submit_label: Apply now
      tags: website-lead
      fields:
        email:
          visible: true
          required: true
          placeholder: Email
        first_name:
          visible: true
          required: true
          placeholder: First name
        last_name:
          visible: true
          required: true
          placeholder: Last name
        phone:
          visible: true
          required: true
        program:
          visible: false
          default: ai-engineering
      success:
        message: Check your inbox! Your syllabus is on the way.
      terms_url: /terms-and-conditions
      privacy_url: /privacy-policy
      consent:
        sms: true
        marketing: true
        marketing_text: I agree to receive information through email, WhatsApp and/or other channels about workshops, events, courses, and other marketing materials. We'll never share your contact information, and you can easily opt out at any moment.
        sms_text: I agree to receive SMS/text messages about workshops, events, courses, and other marketing materials. Message and data rates may apply. Reply STOP to unsubscribe, HELP for help. You may receive up to 4–6 text messages per month. We will never share your contact information, and you can easily opt out at any moment.
        sms_usa_only: true
      show_terms: true
    form_vertical_align: center
    show_awards_marquee: true
    awards_marquee:
