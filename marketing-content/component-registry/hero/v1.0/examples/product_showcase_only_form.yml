name: "Product Showcase Only Form"
description: "Two column layout with welcome text, brand mark, title, description on left and embedded video on right. Includes optional lead capture form."
yaml: |
  - type: hero
    version: "1.0"
    variant: productShowcase
    title: en 4Geeks
    brand_mark:
      prefix: Conviértete en un
      highlight: Desarrollador Full Stack
      color: primary
    description: Desarrolla aplicaciones web modernas, listas para producción e integradas con IA, y posiciónate para la nueva generación de roles de desarollo web impulsados por inteligencia artificial.
    bullets:
      - text: Aprende a programar desde cero hasta ser un profesional
      - text: ¡Somos el único bootcamp que no finaliza cuando te gradúas! En 4Geeks dispones de mentorías ilimitadas y de por vida
      - text: Contamos con diferentes opciones de financiamiento puedes financiar el importe en 6, 9, 12 y 18 meses
    image_object_fit: none
    form:
      variant: stacked
      conversion_name: student_application
      submit_label: Solicita más información
      tags: website-lead
      fields:
        email:
          visible: true
          required: true
          placeholder: Correo electrónico
        first_name:
          visible: true
          required: true
          placeholder: Nombre
        last_name:
          visible: true
          required: true
          placeholder: Apellido
        phone:
          visible: true
          required: true
        program:
          visible: false
          default: full-stack
      success:
        message: Una vez completado el formulario, alguien de nuestro equipo se pondrá en contacto contigo en breves minutos a través de un correo electrónico.
      consent:
        sms: true
        marketing: true
        sms_usa_only: true
      show_terms: true
    form_vertical_align: bottom
    form_card_text_color: hsl(var(--foreground))
    form_card_title: Get Full Program Details
    form_card_subtitle: Apply below to receive the program overview by e-mail and choose how you'd like our admissions team to contact you.
    form_card_image: https://storage.googleapis.com/4geeks-academy-website/media/Course-Report-Badge-2025_1764709632231.webp
    show_awards_marquee: false
    awards_marquee:
      items:
        - id: switchup-2025
          alt: SwitchUp - Mejores Bootcamps de Código 2025
          logo: https://storage.googleapis.com/4geeks-academy-website/media/switchup_1765590146414.webp
          logoHeight: 55px
        - id: course-report-2024
          alt: Course Report - Mejor Bootcamp de Código 2024
          logo: https://storage.googleapis.com/4geeks-academy-website/media/course-report_1765590146414.webp
          logoHeight: 55px
        - id: tech-hub
          alt: South Florida Tech Hub
          logo: https://storage.googleapis.com/4geeks-academy-website/media/south-florida-tech-hub_1765548979070.jpeg
          logoHeight: 55px
        - id: ebootcamp
          alt: eBootcamp Top
          logo: https://storage.googleapis.com/4geeks-academy-website/media/ebootcamp-top_1765549056325.png
          logoHeight: 55px
        - id: premios-tecnologia
          alt: Premios Tecnología Siglo XXI
          logo: https://storage.googleapis.com/4geeks-academy-website/media/premios_tecnologia_sigloxxi_1765549146476.png
          logoHeight: 55px
        - id: newsweek
          alt: Newsweek
          logo: https://storage.googleapis.com/4geeks-academy-website/media/newsweek_1764709608255.webp
          logoHeight: 55px
        - id: reviews-coursereport
          alt: 4.9 en Reseñas de Course Report
          logo: https://storage.googleapis.com/4geeks-academy-website/media/reviews_1765549549051.png
          logoHeight: 55px
        - id: excelencia-educativa
          alt: Excelencia Educativa - Calidad Institucional
          logo: https://storage.googleapis.com/4geeks-academy-website/media/exelencia-educativa-es_1765549347699.png
          logoHeight: 55px
    video_title: GeekForce Career Support
    marginY:
      desktop: none
    background: linear-gradient(to bottom, hsl(210 100% 50% / 0.05), transparent)
    paddingY:
      desktop: md none
    marginX:
      desktop: none
  