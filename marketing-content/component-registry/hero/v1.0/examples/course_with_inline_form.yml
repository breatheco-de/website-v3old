name: "Course Hero with Inline Lead Form"
description: "Course variant hero section with an inline lead form replacing the CTA button in the signup card"
yaml: |
  - type: hero
    version: "1.0"
    variant: course
    title: "Full Stack Development with AI"
    title_highlight: "with AI"
    subtitle: "Learn at your own pace with AI-powered tools and unlimited mentorship"
    form:
      fields:
        email: { visible: true, required: true }
        first_name: { visible: true, required: true }
        phone: { visible: true, required: true }
        program: { visible: false, required: true, default: full-stack }
      submit_label: "Send me the details"
      tags: "website-lead"
    signup_card:
      title: "Start Learning Today"
      description: "Join 10,000+ students building their tech career"
      features:
        - icon: IconClock
          text: "Duration"
          count: "16 weeks"
        - icon: IconCode
          text: "Projects"
          count: "20+"
        - icon: IconUsers
          text: "Mentorship"
          count: "Unlimited"
    bullet_points:
      - "Build real-world projects from day one"
      - "Career support and job placement assistance"
      - "Flexible schedule — learn at your own pace"
