name: contact_us_info
version: "1.0"
description: Two-column section with a LeadForm on the left and office/location contact details on the right.
when_to_use: |
  Use on contact pages or at the bottom of landing pages where you want to capture leads
  while simultaneously showing office locations and contact info. Combines lead capture and
  office/location details so users who prefer to contact directly can find that information too.
props:
  title:
    type: string
    description: Optional heading above the form
  description:
    type: string
    description: Optional description text
  background:
    type: string
    description: CSS background value
  form:
    type: object
    description: LeadForm configuration (same as cta_banner form)
  locations_title:
    type: string
    description: Optional heading above the locations list
  locations:
    type: array
    description: List of office/location contacts
    items:
      code:
        type: string
        description: Country code (e.g. US, ES, CL)
      name:
        type: string
        description: Location name (e.g. USA, Madrid, Chile)
      address:
        type: string
        description: Physical address (optional)
      phone:
        type: string
        description: Phone number (optional)
      email:
        type: string
        description: Contact email
