name: Why Learn AI Section
version: "1.0"
component: WhyLearnAISection
file: client/src/components/why-learn-ai/WhyLearnAI.tsx
description: Compelling section about the importance of learning AI-powered development
when_to_use: |
  Use to motivate students about the future of AI in software development.
  Creates urgency and explains why this skill set matters.
variants:
  default:
    description: Original design with man-with-laptop illustration
    best_for: General motivation sections
  laptop-edge:
    description: Modern design with code editor laptop extending to screen edge with decorative background
    best_for: Tech-focused pages, data science programs
props:
  variant:
    type: string
    required: false
    description: Visual style variant
    options:
      - default
      - laptop-edge
    example: default
  title:
    type: string
    required: true
    description: Main headline
    example: Why Should I Learn to Build and Code with AI?
  subtitle:
    type: string
    required: true
    description: Supporting headline
    example: Software Development as You Know It Will Cease to Exist
  description:
    type: string
    required: true
    description: Detailed explanation of why AI coding matters
    example: >-
      Coding with AI will become a new standard, but it's a very different profession from traditional software
      development.
  mobile_see_more:
    type: boolean
    required: false
    description: Opt-in for laptop-edge mobile description truncation with expand/collapse
    example: true
  mobile_see_more_label:
    type: string
    required: false
    description: Label for expand control on mobile
    example: See more
  mobile_see_less_label:
    type: string
    required: false
    description: Label for collapse control on mobile
    example: See less
  laptop_image:
    type: object
    required: false
    description: Optional laptop/code-editor image for the laptop-edge variant. When omitted, a default image is used.
    properties:
      image_id:
        type: string
        required: true
        description: Image ID from the image registry
        example: "image_feature_5"
      alt:
        type: string
        required: false
        description: Alt text for the laptop image
        example: Code editor on laptop
  cta:
    type: object
    required: false
    properties:
      text:
        type: string
        required: true
        example: Join now!
      url:
        type: string
        required: true
        example: /signup
      variant:
        type: string
        required: true
        options:
          - primary
          - secondary
          - outline
      icon:
        type: string
        required: false
    description: Call-to-action button
