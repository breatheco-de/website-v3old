title: Press Mentions
description: Displays press mentions in one of two layouts — a masonry card grid or a featured showcase with a hero card, carousel, and footer stats.
when_to_use: |
  Use to show social proof from press coverage, institutional partnerships, or media recognition.
  - Use variant "cards" (default) for a compact multi-column grid of quotes and logos.
  - Use variant "featured_showcase" when you want to lead with one standout mention, follow with 3 supporting cards, and close with aggregate stats.

variants:
  cards:
    description: Masonry column grid of press mention cards. Each card shows a logo, title, excerpt, and optional link.
    best_for: General press sections, homepage social proof
  featured_showcase:
    description: Full-width featured card (items[0]) + row of 3 supporting cards (items[1-3]) + footer stats bar.
    best_for: Institutional credibility sections, partnerships pages

image_sizes:
  default.items[].logo: "(min-width: 768px) 120px, 80px"

props:
  variant:
    type: string
    enum: [cards, featured_showcase]
    default: cards
    description: Layout variant selector
  title:
    type: string
    description: Section heading
  subtitle:
    type: string
    description: Section subheading beneath the title
  show_links:
    type: boolean
    default: false
    description: (featured_showcase only) Show link_text/link_url on featured card and cards. Hidden by default.
  show_logos:
    type: boolean
    default: true
    description: (featured_showcase only) Show logos on featured card and cards.
  featured_background:
    type: string
    description: (featured_showcase only) CSS background color for the featured hero card. Defaults to primary color.
  cards_background:
    type: string
    description: (featured_showcase only) CSS background color for the supporting cards. Defaults to card background.
  footer_stats:
    type: array
    description: (featured_showcase only) Aggregate stats shown in the footer bar.
    items:
      value:
        type: string
        description: Stat figure e.g. "$20M+"
      label:
        type: string
        description: Stat description e.g. "Institutional funding mobilized"
  footer_text:
    type: string
    description: (featured_showcase only) Short paragraph shown on the right of the footer stats.
  background:
    type: string
    description: CSS background color or gradient for the section wrapper
  columns:
    type: number
    default: 3
    description: (cards only) Number of masonry columns at desktop width
  default_box_color:
    type: string
    description: (cards only) Default background color for each card
  dynamic_entries:
    type: object
    description: Database source configuration — resolves items[] automatically at render time
    properties:
      database:
        type: string
        description: Database slug e.g. "press_mentions"
      limit:
        type: number
        description: Max number of items to load (use 4 for featured_showcase — 1 featured + 3 cards)
      sort:
        type: string
        description: Sort field e.g. "priority"
      permanent_filters:
        type: array
        description: Server-side filters always applied regardless of user selection

variant_props:
  featured_showcase:
    items:
      description: Resolved from dynamic_entries. items[0] = featured card, items[1-3] = supporting cards.
      fields:
        year:
          type: string
          description: Year label shown on the featured card (e.g. "2024")
        title:
          type: string
          description: Press mention headline — used as the main text on featured card and as the subtitle line on supporting cards
        organization:
          type: string
          description: Publisher or institution name — shown bold on supporting cards
        category:
          type: string
          description: Badge label on supporting cards (e.g. "Multilateral Bank")
        excerpt:
          type: string
          description: Short body text on supporting cards
        stat_value:
          type: string
          description: Large metric shown at the bottom of supporting cards (e.g. "96%")
        stat_label:
          type: string
          description: Label beneath the stat value
        tags:
          type: array
          description: Tag pills — max 4 shown on featured card, max 3 on supporting cards
        logo:
          type: string
          description: Image registry ID for the logo
        link_text:
          type: string
          description: Link label (only rendered when show_links is true)
        link_url:
          type: string
          description: Link destination (only rendered when show_links is true)
