faqs:
  - locale: en
    question: Do I get a job after completing the program?
    answer: >
      At 4Geeks Academy, we are dedicated to preparing you for the job market and supporting you in your job search
      after completing the program. While we cannot guarantee a job, we provide unlimited and lifelong technical and
      career support, including assistance with resume building, interview preparation, and access to our network of
      associated employers.

      Additionally, according to our statistics, 84% of graduates in the US who complete the stages and requirements
      secure employment with an average salary over $50k per year. To understand more about our job support and the
      steps we take to help you succeed, visit our Job Guarantee page and learn about our comprehensive GeekForce Career
      Support program.
    locations:
      - all
    related_features:
      - career-support
      - job-guarantee
    last_updated: "2026-02-12"
    priority: 1
  - locale: en
    question: Does the Job Guarantee refund the full tuition if I don't get hired?
    answer: >-
      Yes. If you qualify for the Job Guarantee and don't receive a qualifying job offer within the job search window,
      you'll receive a full tuition refund.
    locations:
      - all
    related_features:
      - job-guarantee
    last_updated: "2026-01-16"
    priority: 1
  - locale: en
    question: GeekForce or GeekPal, which one to choose?
    answer: >
      GeekForce and GeekPal are both valuable mentorship programs offered by 4Geeks Academy, and choosing between them
      depends on your current needs.

      GeekPal is ideal if you're looking for technical coaching, such as code debugging, problem-solving, and interview
      preparation. It's perfect for honing your technical skills and getting hands-on guidance.

      GeekForce, on the other hand, is focused on career coaching, including soft skills development, career advice, and
      resume building. This is a great choice if you're looking to enhance your employability and professional
      development.

      Remember, both services are unlimited and for life, so you can always switch or use both as your needs evolve
      throughout your career.
    locations:
      - all
    related_features:
      - mentors-and-teachers
      - career-support
    last_updated: "2026-01-16"
    priority: 1
  - locale: en
    question: How does the 4Geeks Academy Job Guarantee work?
    answer: >-
      Our Job Guarantee ensures that if you meet all program requirements and still don't get a qualifying tech job
      within 9 months of graduation, you are eligible for a full refund of your tuition. It's our way of backing the
      real-world outcomes our bootcamp delivers. Conditions apply.
    locations:
      - all
    related_features:
      - job-guarantee
    last_updated: "2026-02-12"
    priority: 1
