      Sí, tener tu propio portátil es esencial para las clases en nuestro campus de Miami. Aunque no exigimos un sistema
      operativo concreto para la mayoría de programas, se recomienda Windows, macOS o Linux. Para el programa de
      Ciberseguridad se recomienda encarecidamente Windows o Linux por compatibilidad con herramientas como VirtualBox y
      Packet Tracer. Las clases y ejercicios se acceden desde la nube, así que puedes trabajar desde cualquier lugar en
      Miami.
    locations:
      - miami-usa
    related_features:
      - cybersecurity
    last_updated: "2026-02-12"
