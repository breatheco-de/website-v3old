    question: ¿4Geeks Academy ofrece apoyo profesional?
    answer: >
      ¡Sí! En 4Geeks Academy ofrecemos apoyo profesional para ayudarte a alcanzar tus objetivos de carrera. Nuestro plan
      de apoyo profesional ilimitado forma parte de nuestro programa GeekForce. Tendrás acceso ilimitado a sesiones
      profesionales individuales y grupales donde te equipamos con las herramientas necesarias para conseguir trabajo:
      optimizar currículum, perfiles LinkedIn y GitHub, conexión con eventos y nuestra red de contratación, y
      preparación para entrevistas técnicas y conductuales. Más información en nuestro programa GeekForce y de apoyo
      profesional.

      Además, al pagar el bootcamp tendrás acceso a un plan de mentoría de apoyo profesional más básico que incluye
      nuestro programa GeekPal. Para más detalles, visita el programa GeekPal.
    locations:
      - all
    related_features:
      - mentors-and-teachers
      - career-support
    last_updated: "2026-02-12"
