    question: ¿Plan de pago extendido? ¿Cómo funciona? ¿Qué significa?
    answer: >
      Nuestro plan de pago extendido te permite distribuir los pagos de la matrícula durante un período de hasta 2 años,
      pagando de forma gradual durante y después del curso. Para inscribirte se requiere un depósito inicial de $500; el
      saldo restante se divide en cuotas mensuales iguales sin intereses.

      Para más detalles sobre nuestros planes, visita nuestra página de Financiación.
