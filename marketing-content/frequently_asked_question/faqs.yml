  - locale: en
    question: Do I need to have my own laptop in Dallas?
    answer: >-
      Yes, having your own laptop is essential for classes at our Dallas campus. While we don't mandate a specific
      operating system for most programs, it’s recommended to have a laptop with Windows, macOS, or Linux. For our
      Cybersecurity program, it’s highly recommended to use Windows or Linux to ensure compatibility with course tools
      such as VirtualBox and Packet Tracer. Classes and exercises are accessed through the cloud, so you can work from
      anywhere in Dallas.
    locations:
      - dallas-usa
    related_features:
      - cybersecurity
    last_updated: "2026-02-12"
    priority: 3
