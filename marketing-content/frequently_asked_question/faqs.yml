  - locale: en
    question: Extended Payment Plan? How does it work? And what does it mean?
    answer: >
      Our extended payment plan allows you to spread your tuition payments over a period of up to 2 years, enabling you
      to pay gradually during and after the course. To enroll, a $500 deposit is required upfront, and the remaining
      balance is divided equally over the agreed-upon number of months, with no interest charged.


      For more details about our plans, visit our Financials page.
    locations:
